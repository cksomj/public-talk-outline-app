한 영적 피조물들로 이루어진 군대를 이끄실 것이다 (「순」 180면 19항)  [시각 자료 3]", "5절: “그의 뒤에서 도시 가운데로 두루 다니면서 쳐라”", "예수와 그분의 하늘 군대는 이 악한 세상을 멸망시킬 것이다", "에스겔 시대와 마찬가지로, 여호와께서 미래에 악한 자들을 멸망시키시는 것도 너무나 당연하고 정당한 일이다 (겔 9:9, 10)", "6절: “누구든 표가 있는 사람에게는 가까이 가지 마라”", "여호와께서는 생존을 위한 표를 받은 사람들을 멸망시키지 않으실 것이다 (시 37:28) [시각 자료 4]"]}, {"title": "생존하려면 어떻게 해야 하는가?", "points": ["이 세상에서 벌어지는 악한 일들 때문에 “한숨짓고 신음”하고 있다는 것을 어떻게 나타낼 수 있는가? (「순」 178면 17항)", "여호와에 대해 그리고 선악에 관한 그분의 표준에 대해 배우라", "하느님께서 좋아하시는 것을 좋아하고 미워하시는 것을 미워하는 법을 배우라 (롬 12:9)", "예수에 대해 배우고 그분의 성품을 본받으라 (엡 4:20-24)", "여호와의 의로운 표준을 지지한다는 것을 행동으로 나타내라 [말라기 3:18 낭독]", "하느님의 표준에 따라 생각하고 행동하기 위해 계속 노력하라. 하느님께서 당신이 그렇게 하도록 도와주실 것이다 (시 86:11; 요1 5:3)", "여호와 하느님께 헌신하고 침례를 받으라 (마 16:24; 벧전 3:21)"]}, {"title": "곧 의로운 신세계가 올 것이다", "points": ["머지않아 이 땅은 하느님과 그분의 표준을 사랑하는 사람들로 가득 차게 될 것이다 (시 37:10, 11) [시각 자료 5]", "아마겟돈을 생존한 사람들은 “풍부한 평화”를 누릴 것이다", "여호와에 관해 배우고 “그분의 길을 따”른다면 당신도 이 약속이 이루어지는 것을 보게 될 것이다 (시 37:34)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 34 9/22"]}]}, {"no": 35, "title": "당신도 영원히 살 수 있다!", "t": 6, "note": "", "sections": [{"title": "인간은 영원히 살도록 창조되었다", "points": ["우리가 희망을 갖고 계획을 세우고 삶을 즐기려면 살아 있어야만 한다", "시간은 매우 빨리 흘러가고 인생은 너무도 짧다 (「깨」 13/8 6면)", "인간에게는 영원히 살고자 하는 욕구가 있다 [전도서 3:11 낭독] (「깨」 13/8 8면 1-2항)", "하느님께서는 인간이 땅에서 완전한 상태로 영원히 살도록 창조하셨다 (창 1:26, 31; 「파배19.3」 6-7면)", "아담과 하와는 하느님께 순종하기만 한다면 영원히 살 수 있었다 (창 2:16, 17)"]}, {"title": "인간이 영원히 살 수 없게 된 이유", "points": ["아담과 하와는 고의적으로 하느님께 불순종했다 (창 3:6) [시각 자료 1]", "그들은 에덴동산에서 쫓겨났고 결국 죽게 되었다 (창 3:19, 22, 23; 5:5)", "아담은 죄와 불완전성과 죽음을 모든 후손에게 물려주었다 [로마서 5:12 낭독]", "에덴에서 반역이 일어났지만 인류에 대한 하느님의 목적은 변하지 않았다 (「깨」 08/12 7면)", "불완전한 인간이 영원히 사는 것이 어떻게 가능한가?"]}, {"title": "영원히 사는 것이 어떻게 가능한가?", "points": ["노화를 막으려는 인간의 노력으로는 영원한 생명을 얻을 수 없다", "위생과 의료 수준이 높아지면서 많은 사람이 예전에 비해 더 오래 살게 된 것은 사실이지만, 인간의 수명이 획기적으로 늘어난 것은 아니다 (시 90:10; 「파배19.3」 5면 3-4항)", "여호와 하느님께서는 인류가 유전받은 죄와 죽음에서 벗어날 수 있는 길을 마련하셨다 [요한복음 3:16 낭독]", "예수께서는 아담의 후손들을 위해 자신의 생명을 기꺼이 대속물로 내주셨다 (마 20:28; 롬 5:19; 「실쉬」 54-55면 10-11항) [시각 자료 2]", "하느님의 목적과 일치하게 많은 사람이 낙원이 된 땅에서 영원히 살게 될 것이다 (시 37:29)", "수백만이 넘는 사람들이 현 세상의 끝을 살아남을 것이며, 그보다 훨씬 더 많은 사람들이 부활될 것이다 \n(계 7:9, 14; 20:13)"]}, {"title": "영원한 삶은 어떤 모습일 것인가?", "points": ["앞으로 하느님께서는 우리의 삶을 힘겹게 하는 문제들을 없애실 것이다", "모든 악이 사라질 것이다 (시 37:10, 11)", "병과 죽음, 그로 인한 슬픔마저도 없어질 것이다 (사 25:8; 33:24; 계 21:3, 4)", "하느님께서는 노화 과정을 되돌리셔서 노인들을 다시 젊어지게 하실 것이다 (욥 33:24, 25)", "인류는 평화를 누리며 풍요로운 삶을 살 것이다 (시 72:7, 16)", "영원한 삶은 결코 지루하지 않을 것이다", "창조물을 연구하고, 여행을 다니고, 새로운 기술을 배우고, 사람들과 우정을 쌓아 나갈 기회가 끝없이 펼쳐질 것이다", "부활된 조상들을 만나면 얼마나 기쁠지 상상해 보라", "가장 중요한 것으로 우리는 여호와에 대해 계속 배우고 그분과 더 가까워질 것이다 (롬 11:33)"]}, {"title": "당신은 영원히 살 것인가?", "points": ["여호와와 그분의 아들 예수는 우리가 영원히 살 수 있는 길을 열어 주셨다. 하지만 대속이라는 사랑에 찬 마련을 받아들일 것인지는 우리 각자가 선택해야 한다", "대속에 대한 믿음을 나타내는 사람은 영원한 생명을 얻게 될 것이다 (요 3:36; 「파배17.2」 7면 1항)", "영원한 생명으로 인도하는 지식을 얻기 위해 열심히 노력하라 (요 17:3)", "[관심을 가진 사람들에게 회중 집회에 정기적으로 참석하고 성서 연구를 받아들임으로 정확한 성경 지식을 얻도록 격려한다]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 35  1/20"]}]}, {"no": 36, "title": "현 생명이 인생의 전부인가?", "t": 6, "note": "", "sections": [{"title": "인생은 짧고 흔히 실망감만 안겨 준다", "points": ["많은 사람은 인생에 아무런 의미가 없다고 생각하여 공허감을 느끼며 살아간다", "부, 명예, 권력을 얻으려고 애쓰는 것은 흔히 실망감만 안겨 준다 (전 2:11, 15, 16)", "인생은 너무 짧아서 원하는 것을 다 할 수는 없다. 죽음이 너무도 빨리 찾아온다 (시 103:15, 16) [시각 자료 1]", "인간이 이렇게 사는 것이 창조주의 원래 목적인가?"]}, {"title": "우리는 죽지 않고 영원히 살도록 창조되었다", "points": ["여호와 하느님께서는 원래 인간이 땅에서 영원히 살도록 창조하셨다 [창세기 1:28 낭독] (「파17.02」 4-5면 6-7항)", "아담과 하와와 그들의 자손은 낙원에서 의미 있는 삶을 영원히 누릴 전망을 갖고 있었다. 죽음은 오직 불순종의 결과로만 언급되었다 (창 2:15-17) [시각 자료 2]", "아담과 하와가 하느님께 불순종하기로 선택했기 때문에 오늘날 인간은 모두 죽는다 (창 3:17, 19; 롬 5:12) \n[시각 자료 3]"]}, {"title": "사람이 죽으면 어떻게 되는가?", "points": ["예전부터 사람들은 죽은 후에도 계속 살기를 바랐다 [현지 신앙에 대해 언급한다]", "많은 사람은 인간에게 불멸의 영혼이 있다고 믿는다", "선한 사람이 하늘에 간다고 믿는 사람들이 있는가 하면, 영혼이 환생한다고 믿는 사람들도 있다", "성경은 사람이 죽을 때 그 사람의 무언가가 살아남는다고 가르치지 않는다 [전도서 9:5, 10 낭독]", "죽은 뒤에는 모든 것이 사라져 존재하지 않게 된다 (시 146:3, 4; 전 3:19, 20)", "죽은 사람들에게 희망이 있는가?"]}, {"title": "부활 희망이란 무엇인가?", "points": ["하느님께서는 아들인 예수를 사용해 죽은 사람들을 부활시키실 것이다", "부활되는 사람들 중 얼마는 예수와 함께 하늘에서 통치할 것이다 (눅 12:32; 계 14:1, 3; 20:4, 6)", "부활되는 사람들 중 대다수는 땅에서 살게 될 것이다 [사도행전 24:15 낭독] (「파15」 8/1 6면) [시각 자료 4]", "그렇게 부활되는 수많은 사람들은 영원한 생명을 얻을 기회를 갖게 될 것이다 (요 5:28, 29; 계 20:12, 13)", "부활 희망은 동화 속에나 나오는 허황된 이야기가 아니다", "하느님께서는 예수를 부활시키심으로 자신이 앞으로 하실 일을 보증해 주셨다 (고전 15:20-22)", "예수의 제자들은 그분이 부활되셨다는 것을 확신했고 그러한 확신과 일치하게 살았다 (고전 15:3-8, 12-14, 31, 32)", "성경에 나오는 그 밖의 부활 기록들은 하느님께서 죽은 사람을 부활시키실 수 있다는 확신을 강화해 준다 (「파15」 8/1 4면 네모; 「실쉬」 76면 12항)", "부활 희망이 있으므로 분명 현 생명이 인생의 전부는 아니다!", "우리의 전능하신 창조주께서는 개개인에 대한 모든 세세한 정보를, 그가 죽은 지 아무리 오래되었다 하더라도 기억하시고 재창조하실 수 있다 (사 40:26; 마 10:30)", "부활 희망은 우리가 죽음에 직면하거나 사랑하는 사람과 사별하는 고통을 겪을 때 위안이 된다 (고전 15:55)", "우리는 현재의 짧은 인생 너머에 있는 영원한 생명을 확신 있게 기대할 수 있다"]}, {"title": "영원한 생명을 누리려면 어떻게 해야 하는가?", "points": ["머지않아 이 악한 세상은 멸망될 것이다", "수백만이 넘는 사람들이 이 세상 끝을 생존하여 결코 죽지 않을 것이다", "이 세상이 멸망된 뒤에, 죽은 사람들이 이 땅으로 부활되기 시작할 것이다", "영원한 생명을 얻으려면 우리는 하느님과 그분의 아들에 대해 알아 가고 그분들에게 순종해야 한다\n(요 3:36; 17:3)", "예수께서는 우리가 영원한 생명을 얻는 데 있어서 매우 중요한 역할을 하신다 (요 11:25, 26)", "이 세상의 끝을 생존해서든 부활이 되어서든 영원한 생명을 얻을 수 있다는 희망이 있기에, 우리는 인생에 아무런 의미가 없다는 실망감에서 벗어날 수 있다 (고전 15:32)", "오히려 우리는 하느님의 약속이 이루어질 때를 고대하면서 인생을 의미 있게 살아갈 수 있다 (사 25:8; 계 21:3, 4)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 36 7/20"]}]}, {"no": 37, "title": "하느님의 길로 걷는 것이 정말 유익한가?", "t": 9, "note": "하느님의 길을 따르는 것이 참으로 합당하고 유익함을 청중이 이해하도록 따뜻하고 확신을 주는 방식으로 돕는다. 하느님과 친밀한 개인적 관계를 발전시키고 그분에 대한 온전한 믿음을 나타낼 필요성을 강조한다", "sections": [{"title": "하느님의 길은 세상의 길과 완전히 다르다", "points": ["성경에서는 이렇게 알려 준다. “여호와께 희망을 두고 그분의 길을 따라라” (시 37:34)", "우리는 여호와를 본받고 그분이 원하시는 일을 함으로 그분의 길을 따른다", "하느님의 길은 사랑에 기초해 있기 때문에 인간의 길보다 높다 (사 55:8, 9; 요1 4:8)", "하느님의 길을 따르는 사람들은 세상의 길을 따르는 사람들과 구별되는 특성들을 나타낸다 (말 3:18; 요 17:14-16)", "세상의 길은 사탄의 영향력을 반영하며 이기주의, 물질주의, 인종주의, 성적 부도덕, 폭력을 조장한다 (요1 5:19)", "우리는 어떻게 하느님의 길을 배울 수 있는가?"]}, {"title": "창조물을 통해 하느님의 길에 대해 알 수 있다", "points": ["창조물에서 하느님의 사랑, 지혜, 그리고 능력을 볼 수 있다 (롬 1:19, 20; 「파13」 8/1 11면)", "하느님이 모든 생물을 위해 마련해 주신 것들에 그분의 특성이 반영되어 있다 (시 104:10-15; 145:15, 16)", "창조물에서 볼 수 있는 설계는 그분의 지혜와 사랑을 보여 준다 (시 104:24)", "아름다움을 느끼는, 헤아릴 수 없이 놀라운 인간 두뇌의 능력은 하느님이 주신 사랑의 선물이다", "우주는 하느님의 무한한 능력을 증언한다 (시 8:3, 4; 사 40:26)", "물리 법칙은 지구상에 생명이 존재할 수 있게 해 주고 삶을 즐겁게 해 주는 체계를 마련해 준다 (「깨」 09/12 5-7면)"]}, {"title": "성경은 현재 우리에게 유익이 되는 하느님의 길을 알려 준다!", "points": ["창조물을 보면 하느님이 우리가 삶을 즐기기를 바라신다는 것을 알 수 있다. 성경에 나오는 그분의 길을 따르면 지속적인 행복을 누리게 된다 (시 119:18; 128:1)", "하느님께서는 부부가 사랑과 존경을 바탕으로 친밀한 관계를 누리기를 바라신다 (엡 5:28, 33)", "하느님께서는 부모 자신이 먼저 진리를 마음에 새긴 뒤에 자녀에게 부지런히 가르치기를 바라신다 (신 6:6, 7; 엡 6:4)", "하느님께서는 우리가 진실을 말하고 자제와 근면함과 친절을 나타내기를 바라신다 (엡 4:25-29, 31, 32)", "하느님께서는 우리가 모든 사람과 평화롭게 지내고 편견과 증오심을 품지 않기를 바라신다 (롬 12:17, 18)", "하느님께서는 우리가 어디에 살든 정부 권위에 존중심을 보이고 온화하며 순종적인 태도를 나타내기를 바라신다 (딛 3:1, 2)"]}, {"title": "하느님과 친밀한 개인적 관계를 발전시키라", "points": ["여호와께서는 우리가 그분의 사랑에 호응하기를 원하신다. 그렇게 하려면 그분과 친밀한 개인적 관계를 발전시켜야 한다 (시 73:28)", "성경을 부지런히 연구하면 여호와를 알아 가게 되고 그분께 더욱더 가까이 가게 된다 (시 119:33-35; 요 17:3)", "하느님께 기도로 우리의 마음을 쏟아 놓음으로 그분을 신뢰한다는 것을 나타낼 수 있다 (시 62:8; 65:2)", "우리가 알게 된 것을 다른 사람들에게 말할 때 여호와의 이름을 알리고 그분을 기쁘시게 할 수 있다 (시 105:1)", "하느님과 친밀한 관계를 누리려면 정확한 지식이 기초가 된 강한 믿음이 필요하다. 믿음은 행함으로 나타난다 (히 11:6; 약 2:24, 26)", "행함에는 그리스도인 모임에 참석하는 것이 포함되는데, 그러한 모임은 우리의 정신을 새롭게 하고 새 인간성을 입는 데 도움이 된다 (롬 12:2; 골 3:10)", "[시간이 허락되는 대로, 그리스도인 모임이 우리의 영적 발전에 중요한 역할을 한다는 것을 보여 주는 확증된 경험담(들)을 간단히 언급한다 (「파07」 5/15 11면; 「파02」 5/15 8면; 「파00」 6/1 30면; 「파93」 8/15 9면)]"]}, {"title": "지금부터 영원히 하느님의 길로 걸으라", "points": ["여호와께서는 모든 사람에게 세상의 길을 버리고 그분의 길로 걷는 법을 배우라고 권하신다 (사 55:6, 7)", "하느님의 길을 따르면 그분의 축복을 받아 평화와 번영을 누리게 된다 (사 48:17, 18)", "하느님의 길로 걸으면 지금부터 영원히 자신도 유익을 얻고 다른 사람에게도 유익을 줄 수 있다 [시편 119:1-3 낭독]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 37-KO 3/17\t 30분에 다룰 것", ""]}]}, {"no": 38, "title": "세상 끝을 어떻게 생존할 수 있는가?", "t": 1, "note": "", "sections": [{"title": "“세상 끝”이란 무엇인가?", "points": ["많은 사람은 “세상 끝”이 지구가 멸망하는 것이라고 생각해서 두려워한다 (마 24:3, 개역개정판; 「깨」 12/9 4-7면)", "하지만 성경은 지구에서 사람이 완전히 없어지거나 지구가 멸망되는 일이 결코 없을 것이라고 보증한다\n(시 37:29; 104:5; 전 1:4)", "노아 시대와 마찬가지로 하느님은 그분을 무시하는 경건하지 않은 사람들로 이루어진 세상을 멸망시키실 것이다 (벧후 3:5-7)"]}, {"title": "하느님은 어떻게 악한 세상을 멸망시키실 것인가?", "points": ["여호와께서는 악한 사람들이 서로 싸우게 하실 것이다 (겔 38:21)", "그분은 때때로 이 방법을 사용하여 이스라엘 백성을 구출하셨다 (대하 20:22-24)", "여호와께서는 또한 자연의 힘을 이용하여 불의한 사람들을 멸망시키실 것이다 (욥 38:22, 23; 겔 38:22)", "그분은 과거에 자연의 힘을 이용해 적들을 꼼짝 못 하게 하시고 자신의 반대자들을 멸하셨다 (수 10:11;\n삿 4:13-16; 5:19-21; 「파17.04」 29-30면 6-8항)", "여호와의 심판 집행관인 그리스도 예수는 자신의 하늘 군대와 함께 행악자들을 멸절하는 일을 완수하실 것이다 (살후 1:7, 8; 계 2:26, 27; 19:11-16; 「계」 52면 18항)", "이 강력한 영적 피조물들은 땅에 있는 적들을 완전히 없앨 것이다 (왕하 19:35)", "여호와의 심판을 피할 수 있는 사람은 아무도 없을 것이다 (암 9:1-3; 계 6:16, 17)"]}, {"title": "생존하기 위해서는 어떻게 해야 하는가?", "points": ["노아 시대에 여호와께서 악에 대한 심판을 집행하신 일을 생각해 보면 세상 끝을 어떻게 생존할 수 있는지 알 수 있다", "여호와께서 불경건한 사람들의 세상에 홍수를 가져오셨을 때 노아를 안전하게 지켜 주신 이유는 무엇인가? [창세기 6:9 낭독]", "“노아는 의로운 사람이었다. 그는 그 당시 사람들 가운데 흠 없는 사람이었다” (「통」-1 364면 1항)", "그는 주위에 만연한 폭력과 부도덕을 멀리했다 (창 6:4, 5, 11-13)", "[노아가 아들들을 나쁜 영향으로부터 보호하는 장면이 담긴 삽화를 사용해 그 점을 설명한다]", "그는 당시 사람들이 나타낸 무관심한 태도에도 흔들리지 않았다 (마 24:38, 39)", "우리는 앞으로 멸망될 세상과 반드시 분리되어 있어야 한다 (요1 2:15-17)", "“노아는 참하느님과 함께 걸었다”", "그는 여호와께서 하라고 하신 일을 수행했으며 하느님과 친밀한 친구가 되었다 (「믿본」 17면 3항)", "우리는 하느님 앞에서 ‘단정하게 걸어야’ 한다 (롬 13:11-13)", "노아는 방주를 지음으로 믿음을 나타냈다 [히브리서 11:7 낭독] (「파16.10」 27면 7항)", "노아는 대홍수가 닥칠 정확한 시기를 몰랐지만 자신이 맡은 일을 미루지 않았다", "[노아와 그의 가족이 방주를 만드는 장면이 담긴 삽화를 사용해 그 점을 설명한다]", "그는 계속 철저히 순종했다 (창 6:22)", "그는 방주를 건축할 때 여호와께서 알려 주신 방법을 그대로 따랐다 (창 6:14-16)", "우리도 철저히 순종해야 하며 이 세상의 끝이 늦어질 것이라고 생각해서는 안 된다 (벧후 3:3, 4)", "노아는 “의의 전파자”였다 [베드로 후서 2:5 낭독]", "그는 자신의 가족이 계속 연합하여 여호와를 섬기도록 도와주었다 (「파13」 8/1 14면 4-5항)", "우리는 사람들에게 악이 사라질 때가 다가오고 있다는 경고를 해야 한다 (겔 3:18, 19)"]}, {"title": "세상 끝을 생존하는 사람들은 행복할 것이다", "points": ["노아와 그의 가족이 대홍수를 생존하여 얼마나 행복하고 감사했을지 생각해 보라!", "불의가 완전히 사라진 땅에 발을 처음 내디뎠을 때 매우 감격스러웠을 것이다! (창 8:15-20)", "[노아와 그의 가족이 방주에서 나가는 장면이 담긴 삽화를 사용해 그 점을 설명한다]", "하느님이 불경건한 세상을 멸망시키실 때 하느님께 경건한 정성을 바치는 사람들은 구원받을 것이다 (벧후 2:9; 계 7:9, 10, 14)", "여러분도 생존하여 행복을 누리기 바란다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2019 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 38 11/19"]}]}, {"no": 39, "title": "예수 그리스도—세상을 이기시는 분", "t": 0, "note": "", "sections": [{"title": "예수께서는 우리가 진리의 편에 서도록 도와주실 수 있다", "points": ["매년 수많은 사람이 성경 진리를 배우고 침례를 받아 여호와의 증인이 된다", "[최근 전 세계에서 얼마나 많은 사람이 침례를 받았는지 통계를 언급한다]", "어쩌면 당신은 성경 진리를 배우고 있지만 배운 것을 어떻게 실천하며 살지 고민하고 있을지 모른다", "예수의 참된 제자가 되는 것은 결코 쉬운 일이 아니다 (요 7:12, 13; 9:22)", "성경은 예수께서 세상을 이기시는 분이라고 알려 준다. 따라서 그분은 당신이 진리의 편에 서도록 도와주실 수 있다"]}, {"title": "예수께서는 땅에 계실 때 세상을 이기셨다", "points": ["예수께서는 처형되시기 전 밤에 자신이 “세상을 이겼다”고 말씀하셨다 [요한복음 16:33 낭독]", "이 성구에서 “세상”은 예수와 참그리스도인들을 반대하는 인간 사회를 가리킨다", "“세상”은 “세상의 통치자”인 사탄의 지배 아래 있다 (요 14:30)", "예수께서는 이 땅에 계실 때 어떻게 세상을 이기셨는가?", "그분은 세상의 유혹이나 영향력에 결코 굴복하지 않으셨다", "마귀는 자신에게 숭배 행위를 하면 “사람이 거주하는 땅의 모든 왕국”을 주겠다고 했지만, 예수께서는 그렇게 하기를 거절하셨다 (눅 4:5-8) [시각 자료 1]", "예수께서는 세상에 널리 퍼져 있던 태도를 결코 받아들이지 않으셨다. 예를 들어 모욕을 당했을 때도 보복하지 않으셨다 (벧전 2:23)", "심지어 기둥에 못 박혔을 때도 온화와 자제를 나타내면서 하느님을 계속 신뢰하셨다 (눅 23:34)", "그분은 숭배나 행실에 대한 자신의 표준을 결코 낮추지 않으셨다", "예수의 소식을 배척한 일부 사람들이 그분을 죽이려 했지만, 예수께서는 자신이 전하는 소식의 강도를 약화시키려고 하지 않으셨다 (눅 4:24-30)", "예수께서는 결혼에 대한 하느님의 높은 표준을 옹호하셨다. 그분은 성적 부도덕만이 이혼의 근거가 된다고 말씀하셨다 (마 19:3-9)", "그분은 거짓 종교 지도자들의 위선을 용기 있게 폭로하셨다 (마 23:23-28)", "예수께서는 죽기까지 충성과 충절을 지키심으로 세상을 이기셨다", "예수께서 세상을 이기신 것은 당신에게 어떤 의미가 있는가?", "예수의 제자들처럼 당신도 그분이 세상을 이기셨다는 사실에서 용기를 얻을 수 있다", "그분의 모범은 세상을 이기는 것이, 다시 말해 세상의 유혹과 나쁜 영향력을 물리치는 것이 가능하다는 것을 분명히 보여 준다", "예수의 본을 어떻게 따를 수 있는가?", "인간의 지혜가 아니라 성경 말씀에 의지하라", "사람들이 냉담한 반응을 보이거나 반대하더라도 하느님을 기쁘시게 하겠다는 결심이 결코 약해지지 않게 하라 [시각 자료 2]", "옳은 일을 한다는 이유로 모욕이나 박해를 당해도 “계속 선으로 악을 이기라” (롬 12:21)"]}, {"title": "예수께서는 지금 세상을 이기고 계신다", "points": ["예수께서는 예언적인 환상에서 전사인 왕으로 묘사되어 있으시다 [요한 계시록 6:2 낭독] [시각 자료 3]", "그분은 1914년부터 지금까지 계속해서 세상을 이기고 계신다", "예수의 적들은 그때 당시에도 힘을 행사하고 있었고 현재도 그러하다 (시 110:2)", "예수께서는 지금 어떻게 세상을 이기고 계신가?", "예수께서는 양 같은 사람들을 세상에서 이끌어 내어 그리스도인 회중으로 모아들이고 계신다 (요 10:27, 28; 15:19)", "“세상의 통치자”인 사탄은 그처럼 이기며 나아가시는 예수를 막을 아무런 힘이 없다 (요 14:30)", "예수께서는 반대를 겪는 그리스도인 회중을 계속 보호하고 계신다 (「파05」 1/15 17면 11항)", "예수께서 세상을 이기고 계신 것은 당신에게 어떤 의미가 있는가?", "예수의 편에 선다면 그분은 당신이 세상의 반대를 이겨 내도록 도와주실 것이다 (딤후 4:17)"]}, {"title": "예수께서는 앞으로 세상을 온전히 이기실 것이다", "points": ["앞으로 예수께서는 “열 왕”으로 상징된 모든 인간 정부를 이기실 것이다 [요한 계시록 17:12-14ㄱ 낭독]", "예수께서는 앞으로 어떻게 세상을 이기실 것인가?", "예수께서는 아마겟돈 전쟁에서 인간 정부들과 그 지지자들을 없애실 것이다 (시 2:8, 9; 계 19:11, 15-21) [시각 자료 4]", "그분은 사탄을 무저갱에 던져 1000년 동안 아무런 활동도 하지 못하는 상태에 있게 하실 것이다 (계 20:1-3)", "예수께서 앞으로 세상을 이기실 것이라는 점은 당신에게 어떤 의미가 있는가?", "하늘 생명으로 부활되는 일부 충실한 그리스도인들은 앞으로 예수와 함께 세상을 이길 것이다 (계 17:14ㄴ)", "예수의 제자들 대부분은 땅에 있을 것이며, 아마겟돈 전쟁에 참여하지 않을 것이다 (대하 20:17) [시각 자료 5]", "그들은 예수께서 이기시는 일로부터 유익을 얻어, 낙원이 된 땅에서 살게 될 것이다. 낙원에서는 현 세상과 그 통치자의 영향력이 모두 사라지고 없을 것이다 (시 37:34)"]}, {"title": "이기시는 왕인 예수에 대한 믿음을 가지고 행동하라", "points": ["[예수께서 어떻게 세상을 이기시는지 지금까지 살펴본 내용을 간단히 복습한다]", "예수께서는 제자들에게 이렇게 약속하셨다. “나는 세상 제도의 종결까지 모든 날 동안 여러분과 함께 있습니다” (마 28:20)", "이 세상 제도의 끝이 매우 가까웠다. 지금은 단호하게 행동할 때이다", "이기시는 왕인 그리스도 예수에 대한 믿음을 가지고 행동한다면 당신도 세상을 이길 수 있다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 39 9/22"]}]}, {"no": 40, "title": "가까운 미래에 일어날 일", "t": 9, "note": "", "sections": [{"title": "미래를 어떻게 알 수 있는가?", "points": ["사람들은 앞으로 일어날 일들을 알고 대비하기를 원한다", "많은 사람은 신뢰할 수 없는 곳에서 미래에 대한 지식을 얻으려고 한다 (「파배18.2」 3면; 「파14」 5/1 3면)", "오직 참하느님께서만 앞으로 일어날 일들을 알려 주실 수 있다 [이사야 46:9, 10 낭독]"]}, {"title": "성경이 미래에 관해 알려 주는 점들은 신뢰할 만하다", "points": ["우리가 성경을 신뢰할 수 있는 이유는 성경에서 예언한 일들이 지금 정확히 일어나고 있기 때문이다", "성경은 “마지막 날”에 사람들이 두드러지게 나타낼 성향들을 예언했다 (딤후 3:1-5)", "성경은 “세상 제도의 종결” 기간에 예수께서 보이지 않게 임재해 계심을 식별하게 해 줄 세계적인 사건들을 예언했다 (마 24:3, 6-8; 눅 21:11; 「파배18.2」 7면)", "“왕국의 좋은 소식”이 세계 전역에 전파되고 있다 (마 24:14)", "성경 예언은 이러한 일들이 1914년부터 일어나기 시작할 것이라고 지적했다 (「행누」 32과)"]}, {"title": "하느님의 말씀은 가까운 미래에 어떤 일이 있을 것이라고 말하는가?", "points": ["성경 예언은 가까운 미래에 어떤 중요한 사건들이 일어날 것인지 알려 준다", "(1) “평화롭다, 안전하다”라고 선언하는 일이 있다 (살전 5:2-4; 「국」 222면 3항) [시각 자료 1]", "(2) 국제 연합의 회원국들이 종교 조직을 공격한다 (계 17:16; 18:7, 8; 「국」 223면 5-6항) [시각 자료 2]", "(3) 나라들의 연합체가 하느님께 순결한 숭배를 드리는 사람들을 공격한다 (겔 38:2, 11; 「순」 182-183면 3-10항) [시각 자료 3]", "(4) 하느님께서 자신을 숭배하는 사람들을 보호하고 적들을 멸망시키신다 (겔 38:18; 계 16:14, 16; \n「순」 199면 23-24항) [시각 자료 4]", "(5) 의로운 사람들은 생존하여 하느님께서 땅에 자신의 목적을 이루시는 것을 보게 된다 (시 37:10, 11; 계 21:1-4) [시각 자료 5]"]}, {"title": "가까운 미래에 있을 일들에 대비하라", "points": ["여호와께서 우리에게 미래에 일어날 일들에 대해 경고해 주시는 이유는 우리가 생존하기를 바라시기 때문이다 \n(암 3:7; 벧후 3:9)", "여호와께서는 우리가 지금 어떤 일들을 반드시 해야 하는지 알려 주신다 [스바냐 2:2, 3 낭독] (「파01」 2/15 18-19면 5-7항)", "“여호와를 찾아라”: 그분의 말씀을 연구하고 그분과 가까운 관계를 발전시켜 나가라 (딤전 2:3, 4; 약 4:8)", "“의를 찾아라”: 옳고 그른 것에 관한 하느님의 표준을 배우고 적용하라 (롬 12:9)", "“온유를 찾아라”: 겸손하게 여호와께 순종하라 (잠 3:5, 6)", "당신이 지금 여호와를 산성으로 삼는다면 앞으로 영원한 생명을 누릴 수 있다 (시 91:2, 14-16)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 40 10/21"]}]}, {"no": 41, "title": "‘그대로 서서 여호와의 구원을 보십시오’", "t": 0, "note": "", "sections": [{"title": "하느님의 전쟁인 아마겟돈이란 무엇인가?", "points": ["놀라운 미래가 우리 눈앞에 있다. 이제 곧 “의로운 자들이 땅을 차지할” 것이다! (시 37:29; 마 6:10)", "그렇게 되려면 하느님께서 악한 자들을 없애셔야만 한다 (잠 2:21, 22)", "악한 자들은 “전능자이신 하느님의 큰 날의 전쟁”인 아마겟돈 때 멸망될 것이다 (계 16:14, 16; 「파19.09」 8면 3항)", "우리는 다가오는 하느님의 전쟁에 어떻게 대비해야 하는가? 우리도 그 전쟁에 참여해 싸워야 하는가?"]}, {"title": "하느님의 백성은 아마겟돈 전쟁에서 싸울 필요가 없을 것이다", "points": ["지상에 있는 그리스도인들은 아마겟돈에서 싸울 필요가 없을 것이다 (요 18:36)", "예수의 제자들은 실제로 전투에 가담해 싸우지 않는다 (마 26:52; 고후 10:3, 4) [시각 자료 1]", "오직 예수와 그분의 하늘 군대만이 하느님의 전쟁에서 싸울 것이다 (계 19:11-15)", "여호와께서 나라들과 벌이시는 전쟁은 상징적으로 말해 “여호사밧 골짜기”에서 치러지는데, 이 표현은 과거에 있었던 한 가지 결정적인 전투와 관련해 사용되었다 (욜 3:2, 12, 14; 「파07」 10/1 13면 3항)", "과거의 그 전투를 살펴보면 아마겟돈 때 우리가 무엇을 해야 할지 알 수 있다", "[역대기하 20:1-30에 나오는 내용을 설명할 때 청중에게 성구를 따라 보도록 권한다. 몇몇 구절을 선택해 읽으면서 상황을 생생하게 묘사한다]", "여호사밧왕은 여러 민족으로 이루어진 대규모 연합군이 유다로 쳐들어오고 있다는 소식을 듣게 된다\n(대하 20:1, 2)", "여호사밧왕과 유다 백성은 여호와께 기도하며 그분의 인도를 구한다 (대하 20:3-13)", "여호와께서는 예언자 야하시엘을 통해 인도를 베푸시며 안심시켜 주는 말씀을 하신다 [역대기하 20:17 낭독] \n(대하 20:14-19)", "언뜻 보기에 이해하기 어려운 지시 사항이었지만 여호사밧과 백성은 기꺼이 순종한다 (대하 20:20, 21)\n[시각 자료 2]", "여호와께서는 적들을 모두 멸망시키고 자신의 백성을 구원하신다 (대하 20:22-30)", "아마겟돈 때 지상에 있는 하느님의 종들은 ‘그대로 서서 여호와의 구원을 볼’ 것이다"]}, {"title": "다가오는 하느님의 전쟁에 지금 대비하라", "points": ["아마겟돈 전쟁 전에 그리고 그 전쟁이 진행되는 중에 우리는 여호와와 그분의 대표자들에 대한 강한 신뢰심이 필요할 것이다", "우리는 어떻게 하느님에 대한 신뢰심을 강화하고 다가오는 그분의 전쟁에 대비할 수 있는가?", "[이어지는 내용을 설명하면서 역대기하 20:1-30에 나오는 여호사밧의 행동과 우리가 해야 할 일 사이에 어떤 유사점이 있는지 강조한다]", "생활의 모든 부면에서 여호와의 인도를 구하라 (시 25:15)", "하느님의 말씀인 성경을 연구하고 성경의 지혜로운 교훈을 적용하라 (벧전 2:2)", "기도로 여호와의 인도를 구하라 (시 25:9; 벧전 4:7)", "자신의 생각이 아니라 하느님의 뜻에 따라 결정을 내리라 (잠 3:5, 6)", "여호와를 섬기는 동료 신자들과 계속 연합하라 (「파14」 12/15 23면 7-8항)", "여호와의 증인의 회중 집회에 정기적으로 참석하라 (롬 1:11, 12; 히 10:24, 25)", "오늘날 하느님의 백성이 수행하고 있는 왕국 전파 활동에 참여하라 (마 24:14)", "이 세상의 끝이 다가옴에 따라 영적으로 계속 깨어 살피라 (마 24:42; 눅 21:34-36)", "여호와의 대표자들로부터 오는 인도를 신뢰하고 그 인도에 순종하라", "여호와께서 오늘날 어떤 통로를 사용해 인도를 베풀고 계신지 분별하라 (마 24:45; 히 13:7, 17; 「파11」 4/15 4면 1-3항)", "지금 여호와의 대표자들을 신뢰하는 법을 배우는 것은 앞으로도 그들에게 즉시 순종하는 데 도움이 된다"]}, {"title": "여호와께서 구원해 주실 것임을 확신하라", "points": ["하느님의 전쟁인 아마겟돈이 급속히 다가오고 있다는 사실에는 의문의 여지가 없다 (딤후 3:1; 계 12:9, 12)", "아마겟돈 전쟁이 시작되기 직전에 마귀는 나라들을 선동하여 하느님의 백성에게 최종 공격을 가할 것이다 (「파19.09」 11면 13항)", "우리는 이 최종 공격이나 그 후에 있을 아마겟돈 전쟁을 전혀 두려워할 이유가 없다", "우리는 ‘그대로 서서 우리를 위한 여호와의 구원을 볼’ 것이다 (대하 20:17) [시각 자료 3]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 41 9/20"]}]}, {"no": 42, "title": "사랑이 증오를 이길 수 있는가?", "t": 3, "note": "", "sections": [{"title": "왜 세상에는 증오가 가득한가?", "points": ["인류 역사는 증오와 폭력으로 가득 차 있다 (창 4:8)", "하지만 인간에게는 비이기적인 태도와 사랑을 나타낼 역량이 있다. 또한 대부분의 사람은 평화를 갈망한다", "세상에는 왜 이렇게 증오가 가득한가?", "성경은 증오와 폭력이 어떻게 시작되었는지 알려 준다", "하느님이 인간을 창조하셨을 때, 인간에게는 증오심이 없었다. 인류는 원래 완벽한 평화를 누렸다 (창 1:27)", "악한 영적 피조물인 사탄이 자신과 함께 하느님께 반역하도록 첫 인간 부부와 일부 천사들을 부추겼다 (요 8:44)", "그 결과 오늘날 세상에는 악이 가득하게 되었다 (딤후 3:1-5)", "성경은 사랑이 곧 증오를 완전히 이길 것이라는 점도 알려 준다", "사랑이 어떻게 이미 여러 가지 면으로 증오를 이기고 있는지 살펴보자"]}, {"title": "사랑의 하느님께서 인류를 증오에서 해방시켜 주겠다고 약속하시다", "points": ["여호와 하느님께서는 인류를 사랑하시기 때문에 사탄이 초래한 나쁜 결과를 바로잡겠다고 약속하신다\n[창세기 3:15 낭독 후 (1) 뱀, (2) 뱀의 자손, (3) 여자의 정체에 관해 설명한다. 「파수대」 2011년 1월 1일호 10면 네모 참조] [시각 자료 1, 2, 3]", "수천 년 동안 여자의 자손의 정체는 밝혀지지 않았다", "그 시기에 하느님께서는 자신의 약속을 어떻게 이루실지 점진적으로 밝혀 주셨다", "그분은 아브라함에게 모든 민족이 그의 자손을 통해 축복받을 것이라고 말씀하셨다 (창 22:18)", "때가 되자 여호와께서는 고대 이스라엘 민족이 약속된 여자의 자손인 그리스도 예수를 산출하게 하셨다\n(갈 3:16) [시각 자료 4]"]}, {"title": "예수께서는 사랑이 증오를 이길 수 있다는 것을 증명하셨다", "points": ["이 땅에 계실 때 예수께서는 증오를 이기는 사랑의 길을 가르쳐 주셨다 [마태복음 5:38-44 낭독]", "예수께서는 제자들에게 원수를 사랑하고, 화를 억제하고, 보복하지 말라고 가르치셨다", "예수께서는 자신의 삶을 통해 하느님과 인류에 대한 큰 사랑을 나타내셨다", "예수께서는 하느님의 뜻을 행하기 위해 유혹을 물리치시고, 가혹한 대우를 받아도 인내하셨다 (마 4:1-10; 26:65-67) [시각 자료 5]", "예수께서는 자신의 완전한 인간 생명을 바치심으로 ‘마귀의 일을 부숴 버리기’ 시작하셨다 (요1 3:8; 「파98」 7/1 11면 17항)", "여호와께서는 사탄이 예수를 죽게 하여 “그의 발꿈치를 상하게” 하는 것을 허용하셨다 (창 3:15)", "그 후 하느님께서는 예수를 하늘 생명으로 부활시키셨다 (행 2:32, 33)", "예수의 삶, 죽음, 부활은 사랑이 증오를 이길 수 있다는 것을 증명했다 (롬 5:6-8)"]}, {"title": "참그리스도인들은 사랑이 증오를 이길 수 있다는 것을 증명하고 있다", "points": ["예수께서는 많은 거짓 그리스도인들이 생겨날 것을 예언하셨다 (마 7:21-23)", "수 세기 동안 거짓 그리스도교는 극도의 증오와 잔혹성을 나타냈다", "예수께서는 자신의 참제자들이 그들이 나타내는 사랑으로 식별될 것이라고 말씀하셨다 [요한복음 13:34, 35 낭독]", "전 세계 여호와의 증인은 넘치는 사랑을 나타내고 있으며, 그 사랑은 증오를 이기고 있다", "그들은 서로에게 진정한 사랑을 나타낸다", "그들은 하느님을 사랑하고 그분께 충성스럽게 순종한다 (요1 5:3)", "그들은 자신들을 반대하거나 박해하는 사람들에게도 사랑을 나타낸다", "다음 동영상에서 오늘날 사랑이 어떻게 증오를 이기고 있는지 유의해 보라"]}, {"title": "동영상", "points": []}, {"title": "사랑이 곧 증오를 완전히 이길 것이다", "points": ["지체하지 말고 우리와 함께 참그리스도교를 실천할 것을 모두에게 권한다", "점점 악화되고 있는 세상 상태를 보면, 이 세상 제도의 끝이 가깝다는 것을 알 수 있다 (마 24:3-12)", "곧 예수께서는 “원래의 뱀”인 사탄을 1000년 동안 무저갱에 가두실 것이다 (계 20:2) [시각 자료 6]", "증오로 인해 사망한 수많은 사람이 부활될 것이다", "마침내 예수께서 사탄의 머리를 짓밟아, 그와 그의 자손을 완전히 멸망시키실 것이다 (창 3:15; 계 20:7-10)", "사탄이 초래한 모든 나쁜 결과가 사라질 것이며 인류는 영원히 평화를 누릴 것이다", "사랑이 증오를 완전히 이길 것이다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 42 10/23"]}]}, {"no": 43, "title": "하느님이 요구하시는 것—우리에게 언제나 유익하다", "t": 9, "note": "", "sections": [{"title": "하느님의 요구 조건은 비길 데 없이 탁월하다", "points": ["권력을 가진 사람들은 종종 다른 사람들에게 불합리한 요구를 한다 (전 8:9)", "그와는 대조적으로 하느님의 요구 조건은 합리적이고 유익하다", "하느님은 우리를 사랑하시기 때문에 그분이 우리에게 요구하시는 모든 것은 우리의 유익을 위한 것이다\n(요1 4:8)", "그분의 지혜는 그 어떤 인간의 지혜보다 훨씬 더 뛰어나다 (사 55:9)", "여호와께서 바라시는 대로 행할 때 우리는 언제나 유익을 얻는다 (사 48:17, 18)", "예언자 미가는 하느님의 요구 조건을 간결하게 요약했다 [미가 6:8 낭독] (「파12」 11/1 22면 1-3항)", "그 요구 조건들을 하나씩 살펴보면서 (1) 미가가 살던 시대의 상황이 어떠했는지 (2) 오늘날의 상황이 그때와 어떻게 유사한지 (3) 여호와께서 바라시는 일들을 우리가 행할 때 어떤 유익이 있는지 검토해 보자"]}, {"title": "‘공의를 행하라’", "points": ["우리는 하느님의 의로운 표준에 따라 다른 사람들을 대함으로 “공의를 행”한다", "여기에는 다른 사람을 정직하고 공정하게 대하는 것이 포함된다", "미가는 불공정이 만연한 시대에 예언자로 활동했다 (「통」-1 730면)", "상인들은 손님들을 속이기 위해 부정확한 저울추와 저울을 사용했다 (미 6:10-12; 「활」 75면 13항)", "권위를 가진 사람들은 뇌물을 받았다 (미 3:1, 2, 11; 7:3, 4; 「활」 77-78면 15-16항)", "오늘날에도 불공정과 부정부패가 만연해 있다 (「파15」 1/1 3면; 「깨」 12/5 3면)", "우리는 “공의를 행”할 때 깨끗한 양심을 갖게 되고 다른 사람들과 좋은 관계를 누리게 된다", "[경험담을 한 가지 언급한다. 「파수대」 2014년 7월 1일호 8-9면에 나오는 경험담을 사용할 수도 있다]"]}, {"title": "‘충성을 소중히 여기라’", "points": ["우리는 여호와 하느님과 다른 사람들에게 충성을 보임으로 ‘충성을 소중히 여긴다’는 것을 나타낸다", "미가가 살던 시대의 사람들은 친구와 가족에게 불충성스러웠다 (미 7:2, 5, 6)", "오늘날 많은 사람들도 비정하고 충성스럽지 않다 (딤후 3:1-3)", "우리가 ‘충성을 소중히 여길’ 때 여호와의 은혜를 받게 된다 (시 18:25; 「파13」 6/15 18면 5-6항)", "그분은 우리가 그리스도인 회중에서 충성스러운 친구들을 찾게 해 주신다", "[경험담을 한 가지 언급한다. 「파수대」 2012년 4월 1일호 14-15면에 나오는 경험담을 사용할 수도 있다]"]}, {"title": "‘겸허하게 하느님과 함께 걸으라’", "points": ["우리는 우리에게 한계가 있고 여호와의 인도가 필요하다는 것을 인정함으로 ‘겸허하게 걷는다’", "미가 시대의 사람들은 자기가 원하는 것은 무엇이든지 할 수 있으며 자신의 행동에 대해 아무런 대가도 치르지 않을 것이라고 생각했다 (미 2:1, 2)", "오늘날 많은 사람은 아무도 자신에게 이래라저래라 말할 권리가 없다고 생각한다", "겸허하지 않은 사람들은 결국 언젠가 수치를 당하게 될 것이다 (잠 11:2)", "우리는 하느님께서 자신의 말씀을 통해 베푸시는 인도에 따라 살아감으로 ‘겸허하게 걷는다’ (「파12」 11/1\n22면 6-7항)", "그렇게 할 때 진정한 기쁨과 만족을 얻는다", "[경험담을 한 가지 언급한다. 「파수대」 2014년 10월 1일호 14-15면에 나오는 경험담을 사용할 수도 있다]"]}, {"title": "하느님의 요구 조건에 따라 살아가는 사람들과 함께 평화를 누리라", "points": ["미가는 하느님의 요구 조건에 따라 살아가는 사람들이 평화와 연합을 누릴 때에 관해 예언했다 [미가 4:1-4 낭독 및 설명] [시각 자료 1]", "1절: 이 예언은 “마지막 날” 기간인 지금 성취되고 있다 (미 4:1, 각주)", "2절: “많은 나라 사람들”이 여호와의 가르침을 받아들이고 있다", "3절: 그들은 인종이나 국가, 문화가 다르다는 이유로 그들 사이의 평화를 깨뜨리지 않는다", "4절: 그들은 여호와의 보호와 돌봄을 받기 때문에 진정한 안전을 누린다", "당신도 이 모든 유익을 누릴 수 있다", "하느님이 요구하시는 것들을 계속 배우고 생활에서 실천하라", "하느님이 바라시는 일들을 행하는 사람들과 연합하라", "여호와께서는 그분의 요구 조건에 순종하는 모든 사람이 영원히 평화롭게 살 것이라고 약속하신다\n(시 37:11, 29)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 43 9/20"]}]}, {"no": 44, "title": "예수의 가르침은 당신에게 어떤 유익을 줄 수 있는가?", "t": 0, "note": "", "sections": [{"title": "역사상 가장 훌륭한 가르침이 담긴 연설", "points": ["예수께서는 이 땅에서 봉사하시면서 다양한 주제에 관해 가르치셨다", "가장 핵심적인 가르침은 하느님의 왕국에 관한 것이었다 (눅 8:1)", "또한 그분은 자신의 말을 듣는 사람들에게 일상생활과 관련된 실용적인 조언도 해 주셨다 (「까」 211면 4항)", "예수께서 가르치신 가장 유명한 교훈 중 일부가 산상 수훈에 나온다 (「따」 46면 1-2항; 「까」 211면 5항) [시각 자료 1]", "산상 수훈은 그 연설을 듣는 사람들에게 깊은 영향을 주었다 [마태복음 7:28 낭독]", "그 가르침은 오늘날 많은 사람들에게도 큰 영향을 주고 있다 (「따」 109면 4-5항)", "산상 수훈에서 예수께서 다루신 주제 가운데 세 가지를 살펴보면서, 그분의 가르침이 우리에게 어떤 유익을 줄 수 있는지 생각해 보자"]}, {"title": "행복의 비결", "points": ["예수께서는 사람들의 마음을 사로잡을 만한 주제로 산상 수훈을 시작하셨다. 바로 행복의 비결에 관한 것이었다", "그분은 우리가 행복해지는 데 특히 중요한 요소를 가장 먼저 언급하셨다 [마태복음 5:3 낭독] (「파18.09」 18면 4-5항)", "우리는 기도로 하느님께 가까이 가고, 성경과 성경 출판물을 연구하고, 배운 것을 실천함으로 영적 필요를 채워야 한다 (시 1:1-3)", "영적 필요를 채우기 위해 노력할 때 우리는 진정으로 의미 있는 삶을 살게 된다", "[경험담을 한 가지 언급한다. 「파수대」 2013년 4월 1일호 6면 5항에 나오는 경험담을 사용할 수도 있다]"]}, {"title": "기도하는 방법", "points": ["예수께서는 우리가 마음에서 우러나오는 기도를 해야 한다고 가르치셨다 [마태복음 6:7 낭독] (「파배21.1」 8면 1항)", "예수께서는 어떤 것들에 대해 기도할 수 있는지 몇 가지 예를 알려 주셨다 [마태복음 6:9-13 낭독] (「파10」\n10/1 7-8면)", "우리는 하느님의 이름이 거룩해지고 그분의 왕국이 오게 해 달라고 기도해야 한다", "우리는 하느님께 우리의 죄를 용서해 달라고 간청해야 한다", "우리는 물질적인 필요에 관해서나 하느님의 뜻과 일치하다면 그 밖의 어떤 것에 관해서도 기도할 수 있다\n(요1 5:14)", "우리가 진실한 마음으로 기도하고 ‘계속 청한다면’ 여호와께서 축복해 주실 것이다 (마 7:7)", "[경험담을 한 가지 언급한다. 「파수대」 2015년 2월 1일호 10-11면에 나오는 경험담을 사용할 수도 있다]"]}, {"title": "하느님을 기쁘시게 해 드리는 방법", "points": ["예수께서는 우리가 하느님의 승인을 얻기를 원한다면 하느님의 뜻을 행해야 한다고 가르치셨다 [마태복음 7:21 낭독]", "우리는 자신의 표준이 아니라 하느님의 의로운 표준에 따라 결정을 내려야 한다 (마 6:33)", "예수께서는 산상 수훈에서 여호와의 표준 몇 가지를 강조하셨다", "사람들이 우리에게 해 주기를 바라는 대로 우리도 그들에게 해 주어야 한다 (마 7:12)", "돈이나 소유물을 삶에서 가장 중요한 것으로 여겨서는 안 된다 (마 6:24, 31, 32)", "성과 결혼에 관한 하느님의 표준을 존중해야 한다 (마 5:27-32)", "우리 자신의 뜻대로가 아니라 여호와와 그분의 표준을 중심으로 살아간다면 언제나 유익을 얻을 것이다", "[경험담을 한 가지 언급한다. 「파수대」 2014년 10월 1일호 14-15면에 나오는 경험담을 사용할 수도 있다]"]}, {"title": "당신은 예수의 가르침을 실천할 것인가?", "points": ["예수께서는 산상 수훈을 마치시면서 실제로 행동하는 것의 중요성을 강조하셨다 [마태복음 7:24-27 낭독]", "예수의 가르침에서 유익을 얻으려면, 단지 그분의 말씀을 듣기만 하는 것이 아니라 들은 것을 실천해야 한다 (「파08」 11/1 30면 1-3항) [시각 자료 2]", "어떤 행동을 취해야 하는가?", "하느님에 대해 그리고 그분이 요구하시는 것이 무엇인지에 대해 계속 배우라 (요 17:3)", "하느님이 요구하시는 것에 따라 기꺼이 필요한 조정을 하라 (마 7:13, 14)", "예수께서는 자신의 가르침을 실천하면 큰 축복을 얻을 것이라고 강조하셨다. 그분은 “여러분이 이것을 알고 그대로 행하면 행복합니다”라고 말씀하셨다 (요 13:17)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 44 5/21"]}]}, {"no": 45, "title": "생명에 이르는 길을 따르십시오", "t": 6, "note": "", "sections": [{"title": "생명은 소중한 선물이다", "points": ["생명은 소중한 선물이며, 우리는 생명을 주신 여호와 하느님께 감사드려야 한다 (시 36:9)", "여호와께서는 우리가 살면서 기쁨과 만족을 얻기를 바라신다 (전 3:12, 13)", "그분은 우리가 현재에도 행복하게 살고 미래에도 영원한 생명을 얻을 수 있도록 지혜로운 교훈을 베푸신다", "우리는 여호와의 교훈을 배우고 적용하기 위해 열심히 노력함으로 생명이라는 선물을 정말로 소중히 여긴다는 것을 나타낸다"]}, {"title": "잠언에는 행복하게 사는 데 도움이 되는 지침이 들어 있다", "points": ["우리가 행복하게 사는 데 도움이 되는 지혜로운 조언들을 살펴보자. 하느님의 영감을 받은 책인 잠언에 그러한 조언들이 나온다", "신체적·감정적 건강을 잘 관리하는 방법", "균형 잡힌 생활 습관을 기르라. 과식과 과음을 피하라 (잠 20:1; 23:20, 21)", "성적 부도덕을 피하라 (잠 6:23-29, 32; 「파06」 6/15 28면 14항)", "화를 터뜨리지 말고 감정을 잘 다스리라 (잠 14:30; 29:11)", "긍정적인 태도를 유지하기 위해 힘쓰라. 비관적인 태도를 물리치라 (잠 15:15; 17:22; 24:10)", "돈과 재물에 대해 균형 잡힌 시각을 갖는 방법", "부지런히 일하라 (잠 13:4; 14:23)", "균형을 유지하라. 직업을 합당한 위치에 두라 (잠 23:4)", "가진 것으로 만족하고 단순한 삶을 살기 위해 노력하라 (잠 11:28; 15:16, 17)", "대인 관계를 향상시키는 방법", "평화로운 방식으로 대화를 나누라 (잠 12:18; 15:1, 2, 28)", "상대방의 말을 잘 들어 주라 (잠 18:13, 15)", "분한 마음을 떨쳐 내고 기꺼이 용서해 주라 (잠 10:12; 17:9)", "상황이 좋을 때든 나쁠 때든 상대방에게 충성스러운 친구가 되어 주라 (잠 17:17) [시각 자료 1]"]}, {"title": "“여호와에 대한 두려움은 생명으로 인도한다”", "points": ["때때로 여호와의 지혜로운 조언을 따르기가 어렵게 느껴질 수 있다. 그런 때에도 하느님의 조언을 따르는 데 무엇이 도움이 되는가?", "우리에게는 하느님에 대한 사랑은 물론 하느님에 대한 두려움도 필요하다 [잠언 19:23 낭독] (마 22:37)", "그러한 두려움은 병적인 공포심이 아니다. 그것은 여호와 하느님에 대한 깊은 존경심과 그분을 불쾌하시게 하지는 않을까 하는 두려움을 가리킨다 (잠 8:13; 「파20.06」 8면 1항)", "여호와의 지침을 따르기가 어렵다고 느껴질 때에도 그렇게 할 수 있도록 도와 달라고 여호와께 기도하라\n(시 86:11)", "그렇게 한다면 당신은 하느님의 지침을 따르는 것이 언제나 유익한 결과를 가져온다는 것을 경험하게 될 것이다 \n(잠 3:5, 6)"]}, {"title": "당신은 영원한 생명을 얻을 수 있다", "points": ["성경의 가르침을 따를 때 당신은 영원한 생명을 얻을 수 있다 [요한복음 17:3 낭독]", "하느님께서는 사람들이 영원한 생명을 얻을 수 있는 마련을 하셨다. 그 마련 안에서 예수께서는 중추적인 역할을 담당하신다 (요 3:16; 14:6)", "영원한 생명을 얻으려면 예수에게 믿음을 나타내야만 한다 (요 3:36; 「파19.08」 28면 1-3항)", "예수께서는 대부분의 사람들이 영원한 생명에 이르는 길을 따라 걷지 않을 것이라고 말씀하셨다 (마 7:13, 14)", "생명에 이르는 길은 현재의 삶의 기쁨을 앗아 갈 정도로 지나치게 제약이 많은 길인가? 아니다", "여호와와 예수께 순종할 때 우리는 결코 후회하지 않는 풍요롭고 만족스러운 삶을 누릴 수 있다 (잠 4:10-13)"]}, {"title": "생명으로 인도하는 여호와의 길을 따라 걸으라!", "points": ["생명의 길을 찾도록 도와주고 그 길에 머무를 수 있게 해 주는 여호와의 마련들을 활용하라 (잠 13:14)", "여호와께 기도하면서, 그분의 말씀에서 배우는 점들을 적용할 수 있게 도와 달라고 청하라 (잠 15:29)", "회중 집회에 참석하면 더 많은 교훈을 얻고 격려적인 교제를 나눌 수 있다 (잠 1:5)", "장로들을 비롯하여 영적으로 장성한 회중 형제 자매들은 당신이 성경 원칙을 분별하고 적용하도록 도와줄 수 있다 \n(잠 11:14)", "여호와의 도움으로 당신은 어려움을 극복하고 생명에 이르는 길을 따라 계속 걸을 수 있을 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 45 9/20"]}]}, {"no": 46, "title": "끝까지 확신을 굳게 유지하십시오", "t": 8, "note": "", "sections": [{"title": "우리는 확신을 강화해야 한다", "points": ["여호와 하느님과 그분의 약속에 대한 확신을 유지하려면 노력이 필요하다", "우리가 사는 세상은 의심과 불신이 가득하다 (요 18:38)", "때때로 우리는 지치거나 낙담할 수 있다 (히 12:3)", "사도 바울은 히브리 그리스도인들이 강한 믿음을 유지하도록 돕기 위해 그들에게 영감받은 편지를 써 보냈다", "바울의 편지는 그들에게 분명 큰 힘이 되었을 것이며 오늘날 우리에게도 큰 힘이 될 수 있다 (「파98」 7/15 9-10면 3-7항)"]}, {"title": "예수의 모범과 지도력에 대해 묵상하라", "points": ["우리는 예수의 충실한 모범을 살펴봄으로 힘을 얻을 수 있다 [히브리서 3:1, 2 낭독]", "여호와께서는 예수의 충실함에 대해 상을 주셨으며 우리에게도 상을 주실 것이다", "“하늘의 부르심에 참여하는 자들”은 예수와 함께 통치할 것이며, 나머지 사람들은 땅에서 영원한 생명을 얻을 것이다", "우리는 눈에 보이지 않는 지도자인 예수를 신뢰해야 한다 (히 3:3-6; 「파98」 7/15 11면 10-11항)", "히브리 그리스도인들은 예수께서 모세보다 더 우월한 분임을 기억할 필요가 있었다 [시각 자료 1]", "예수께서 인간 통치자나 인간 조직보다 더 강력하신 분임을 기억하라"]}, {"title": "경고의 본보기를 통해 배우라", "points": ["확신을 잃은 이스라엘 사람들의 예는 우리에게 경고의 본보기가 된다 [히브리서 3:7-9 낭독]", "그들은 여호와께서 하신 강력한 일들을 보고도 의심을 품고 불평했다 (출 17:1-5; 32:1-6)", "그들은 믿음이 없었기 때문에 약속된 상을 받지 못했다 (민 13:25–14:4; 14:22, 23; 히 3:10, 11)\n[시각 자료 2]", "물질적인 것들과 세상적인 즐거움에 몰두하다 보면 믿음이 약해질 수 있다 [히브리서 3:12 낭독]", "믿음이 약해지면 “죄의 기만적인 힘”에 쉽게 굴복하게 될 수 있다 [히브리서 3:13 낭독]", "그러한 사람은 죄의 심각성이나 죄의 결과를 대수롭지 않게 여기거나, 잘못된 행실을 정당화하려는 목적으로 성경의 가르침이나 동료 신자들에 대해 트집을 잡으려 할지 모른다", "우리는 죄의 힘을 물리치도록 말과 행동으로 ‘서로를 격려할’ 수 있다", "이스라엘 백성은 믿음이 없었기 때문에 불순종하게 되었으며 약속의 땅에서 쉼을 누릴 기회를 상실했다\n(히 3:14-19)", "우리가 강한 믿음을 유지한다면 현재 특별한 “쉼”을 누릴 수 있다 [히브리서 4:1, 2 낭독]", "하느님의 쉼에 들어가려면 우리는 그분의 목적을 이해하고 그 목적과 일치하게 일해야 한다 (히 4:3-10)", "여기에는 순종하는 태도로 일상생활에서 성경의 조언을 적용하는 것이 포함된다 (히 4:11; 「파11」 7/15 28면 16-17항)"]}, {"title": "“하느님의 말씀”이 우리에게 힘을 발휘하게 하라", "points": ["우리는 하느님의 약속이 담긴 말씀에 확신을 가질 수 있다 [히브리서 4:12 낭독]", "여호와께서는 자신의 목적을 모두 이루시기 위해 계속 일하고 계신다 (「파11」 7/15 32면 20항)", "우리는 여호와께서 이미 하셨거나 지금 하고 계신 모든 일들을 묵상함으로 믿음을 강화할 수 있다", "우리는 하느님의 말씀이 기록된 성경을 매일 읽고 배운 내용을 실천해야 한다", "성경 말씀을 읽으면 우리가 여호와의 시각으로 우리 자신을 바라보는 데 도움이 된다 (「파11」 7/15 29면 6항)", "우리가 하느님의 인도를 따르고 있다면, 그분이 우리의 속사람을 훤히 들여다보신다는 사실을 두려워할 필요가 전혀 없다 (히 4:13)"]}, {"title": "여호와와 예수께서 베푸시는 도움을 받아들이라", "points": ["여호와께서는 자신의 아들을 우리를 위한 하늘의 대제사장으로 임명하셨다 (히 4:14)", "우리는 예수에 대해 “공개적으로 선언하는 일”을 함으로 믿음을 강화할 수 있다", "우리가 믿음이 약해지거나 죄를 지을 때 여호와와 예수께서는 우리를 간절히 돕고자 하신다 [히브리서 4:15, 16 낭독]", "대속 덕분에, 우리는 자신이 하느님께 사랑받을 자격이 없다거나 구제 불능이라고 느낄 필요가 없다", "우리는 예수를 통해 기도로 여호와께 자유롭게 나아갈 수 있다 (「파16.07」 23-24면 12-13항)", "우리는 예수의 사랑을 본받는 그리스도인 장로들에게 도움을 구할 수 있다 (벧전 5:2, 3)", "여호와와 예수께서 베푸시는 도움을 활용할 때, 우리는 강한 믿음을 유지하고 하느님께서 우리의 미래를 위해 약속해 놓으신 모든 것을 누리게 될 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 46 9/20"]}]}, {"no": 47, "title": "“좋은 소식을 믿으십시오”", "t": 7, "note": "", "sections": [{"title": "우리에게는 좋은 소식이 필요하다", "points": ["이 세상은 나쁜 소식으로 가득하다", "어떤 사람들은 좋은 소식이 있다고 하면 의심부터 하면서, ‘너무 좋은 소식은 사실일리가 없다’고 생각한다", "어떤 소식을 접할 때 신중한 태도를 나타내는 것은 지혜로운 일이다 (잠 14:15)", "우리가 신뢰할 수 있는 좋은 소식이 있다 [마가복음 1:14, 15 낭독]", "“좋은 소식”이란 무엇인가? 왜 그것을 ‘믿을’ 수 있는가? 그 믿음을 어떻게 기를 수 있는가?"]}, {"title": "“좋은 소식”이란 무엇인가?", "points": ["좋은 소식의 중요한 한 가지 부면은 예수와 그분의 제자들이 가르쳤던 하느님의 왕국에 관한 것이다 [누가복음 8:1 낭독]", "이 좋은 소식은 앞으로 하느님의 왕국 통치 아래 순종하는 인류가 받게 될 축복을 약속한다", "이 축복들은 삶의 모든 부면에 영향을 줄 것이다", "건강 문제가 더 이상 인류를 괴롭히지 못할 것이다 (사 33:24; 35:5, 6)", "집이나 직업이 없는 사람이 아무도 없을 것이다 (사 65:21, 22)", "전쟁이 그칠 것이다 (시 46:9; 사 2:4)", "가난과 식량 부족이 사라질 것이다 (시 72:12, 13, 16)", "“더 이상 죽음이 없”을 것이다 (계 21:3, 4; 사 25:8)", "사랑하는 사망한 사람들이 살아날 것이다 (사 26:19)", "하느님께서 하신 이 놀라운 약속들을 더 알아보고 싶지 않은가?"]}, {"title": "왜 좋은 소식을 믿을 수 있는가?", "points": ["좋은 소식은 “거짓말하실 수 없는” 여호와 하느님에게서 온 것이다 (딛 1:1, 2)", "여호와는 인류에 대한 자신의 원래 목적을 이루실 것이다 (창 1:28; 사 55:11)", "그분은 약속을 지키는 면에서 완벽한 기록을 갖고 계시다 (「행누」 3과 요점 5)", "예수께서는 하느님의 능력을 받아 기적들을 행하셨고 그것은 좋은 소식이 믿을 만하다는 것을 보여주었다 [마태복음 9:35 낭독]", "수천 명이 넘는 사람들이 그분이 행한 기적들을 목격했고, 심지어 그분의 반대자들까지도 부인할 수 없었다 (마 14:19-21; 요 11:47, 48)", "다양한 배경을 가진 수백만 명의 사람들은 좋은 소식에서 유익을 얻었다", "그들은 더 행복해졌고 미래에 대한 확실한 희망을 갖게 됐다", "다음 동영상을 보면서, 좋은 소식에서 유익을 얻은 사람들의 이야기를 들어 보라", "[음향과 영상을 담당하는 형제가 동영상을 재생한다 (3:41)]"]}, {"title": "좋은 소식에 대한 믿음을 어떻게 기를 수 있는가?", "points": ["이미 성취된 예언들을 포함한 성경의 약속들을 계속 조사하라 (행 17:11)", "진정한 믿음은 무턱대고 믿는 것이 아니라 “명백한 실증” 위에 세워지는 것이다 [히브리서 11:1 및 각주 낭독] (「질」 30-31면)", "좋은 소식을 믿게 된 사람들과 교제하면서 그들이 왜 좋은 소식을 믿게 되었는지 알아보라 (롬 10:17)", "믿음을 키워 나가면서, 자신이 배운 것을 다른 사람들에게 알려 주라", "그렇게 하면 성경 진리가 마음에 더 깊이 새겨질 것이다", "하느님께 가까이 감으로 믿음을 가지고 그분을 찾는 사람들에게 그분이 주시는 상을 경험해 보라 (히 11:6)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 47 10/25"]}]}, {"no": 48, "title": "그리스도인들의 충성—시험받고 있다", "t": 8, "note": "", "sections": [{"title": "그리스도인 충성이란 무엇인가?", "points": ["충성은 바람직한 특성으로 널리 받아들여지지만 그러한 충성을 잘못된 대상에게 나타내거나 온전한 정도로 나타내지 못할 수 있다", "그리스도인 충성이란 무엇이며 어떻게 나타낼 수 있는가?", "그리스도인 충성은 “새 인간성”을 이루는 매우 중요한 특성이다 [에베소서 4:23, 24 낭독]", "우리는 여호와와 예수께서 나타내시는 충성을 본받는다 (요 13:1; 엡 5:1; 계 15:4; 「파13」 6/15 17면 3항; 「까」 282면 7-8항)", "우리는 하느님 그리고 다른 사람들에 대한 비이기적인 사랑을 기름으로 충성심을 강화할 수 있다"]}, {"title": "그리스도인들의 충성심은 시험받을 것이다", "points": ["사탄은 사람들이 하느님을 섬기는 것은 이기적인 이유 때문이며 시험을 받으면 충성을 지키지 않을 것이라고 주장한다 \n(욥 1:9-11; 2:4, 5) [시각 자료 1]", "사탄은 예수의 충성심을 시험했으며 우리의 충성심도 시험할 것이다 (마 4:1-10; 눅 22:31) [시각 자료 2]", "때때로 사탄은 반대나 박해와 같은 직접적인 시험을 가한다 (눅 21:12; 딤후 3:12)", "종종 사탄은 교묘한 덫을 사용하여 우리의 약점을 이용하려 든다 (엡 6:11, 12)"]}, {"title": "여호와께 충성을 나타내라", "points": ["우리의 삶에서 여호와에 대한 충성은 다른 어떤 대상에 대한 충성보다 앞자리에 와야 한다 (계 4:11)", "우리는 정부나 세속 권위를 가진 사람들에게 존중심을 나타내고 순종하지만 하느님의 법과 어긋나는 명령은 무엇이든 따르기를 거부한다 (행 5:29; 롬 13:1)", "우리는 여호와께 기꺼이 순종함으로 그분께 충성을 나타낸다 [신명기 10:12, 13 낭독]", "우리는 사적인 문제에서도 그리고 다른 사람이 우리를 보지 않을 때에도 여호와께 순종한다 (「파07」 6/15 29면 13항)", "사탄은 여호와의 법이 지나치게 제약이 많고 심지어 해롭기까지 하다고 주장한다 (창 3:1-6)", "여호와께 계속 충성을 나타내려면 우리는 여호와의 방식이 최상의 방식이라는 것을 반드시 확신해야 한다 \n(사 48:17; 「파09」 10/1 10면)", "우리는 여호와에 대해 말하기 어려울 때에도 용기를 가지고 그분에 대해 말한다 (사 43:10; 딤후 4:2)"]}, {"title": "가족에게 충성을 나타내라", "points": ["오늘날 많은 사람은 가족보다 자기 자신의 이익을 먼저 생각한다 (딤후 3:1-4)", "가족이 서로에게 충성을 나타낼 때 그것은 하느님께 충성을 나타내는 것이다 (엡 3:14, 15)", "여호와께서는 부부가 어려움이 있을 때에도 서로에게 충성을 나타내기 바라신다 (마 19:5, 6; 「파17.06」 31면 17-18항)", "서로에게 충성스러운 부부는 성적 부도덕을 피하고 자신이 하는 생각에서도 충성을 유지한다 (잠 4:23;\n마 5:28)", "부모는 사랑을 가지고 자녀를 훈련함으로 자녀에게 충성을 나타낸다 (시 127:3; 엡 6:4)", "자녀는 부모를 공경하고 잘 순종함으로 부모에게 충성을 나타낸다 (엡 6:1, 2)"]}, {"title": "동료 그리스도인들에게 충성을 나타내라", "points": ["우리는 동료 그리스도인들을 사랑하기 때문에 그들에게 언제나 충성을 나타낸다", "우리는 참을성을 보이고 동료 신자들의 불완전성을 신속히 눈감아 주며 기꺼이 용서하는 태도를 나타낸다 (고전 13:5)", "우리는 동료 신자들에 대해 좋지 않은 이야기를 하거나 확인되지 않은 소문을 퍼뜨리지 않는다 (고전 13:6, 7)", "우리는 박해를 받을 때 동료 신자들을 결코 배신하지 않는다 (잠 18:24; 「파10」 8/15 24면 17항)", "우리는 회중을 인도하도록 임명된 사람들을 충성스럽게 지지한다 (마 24:45-47; 히 13:17)", "이스라엘 백성이 모세에게 투덜거리고 반역했을 때 여호와께서는 실은 그들이 그분께 반역하는 것이라고 말씀하셨다 (민 14:26, 27)"]}, {"title": "여호와께서는 충성스러운 사람들에게 상 주실 것이다", "points": ["우리가 여호와께 충성을 나타낸다면 그분도 언제나 우리에게 “충성스럽게 행”하실 것이다 [시편 18:25 낭독]", "그분은 우리가 현재 어떤 충성의 시험을 겪든 우리를 도와주실 것이며 미래에 영원한 생명을 상으로 주실 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 48 9/20"]}]}, {"no": 49, "title": "이 땅이 과연 다시 깨끗해질 수 있는가?", "t": 1, "note": "", "sections": [{"title": "우리의 행성 지구는 깨끗해져야 한다", "points": ["여호와 하느님께서는 지구 즉 이 땅을 인간이 살 수 있는 깨끗하고 아름다운 보금자리로 창조하셨다 (창 1:28-31)", "그분은 인간에게 땅을 돌보는 일을 맡기셨다 (창 2:15)", "때가 되면 온 땅이 낙원이 될 것이었다", "인간은 이 땅을 잘 돌보지 못했다. 오히려 땅을 오염시켜 왔다", "인간은 하느님께서 땅에 대한 그분의 목적을 이루시는 것을 막을 수 없다 (시 135:6)", "땅은 왜 이처럼 오염되었는가? 땅은 어떻게 깨끗해질 것인가? 어떻게 당신도 그 일을 지원할 수 있는가?"]}, {"title": "땅은 왜 이처럼 오염되었는가?", "points": ["이 땅의 환경이 오염된 것은 더 심각하고 근본적인 문제 때문에 생긴 한 가지 현상이다", "이 땅은 도덕적 불결함 즉 하느님의 의로운 표준에 어긋나는 태도와 행실로 가득 차 있다\n[신명기 32:4, 5 낭독]", "도덕적 불결함은 사탄이 아담과 하와에게 영향을 미쳐 하느님께 반역하도록 만들었을 때 시작되었다 (창 3:1-5)", "아담과 하와는 하느님을 자신들의 통치자로 받아들이기를 거부하고, 옳고 그른 것에 대한 표준을 스스로 정하는 쪽을 선택했다", "그로 인해 어떤 결과가 초래되었는가?", "많은 사람이 이기적이고 탐욕스럽다 (딤후 3:2-4)", "이기적으로 행동하는 사람들은 흔히 다른 사람들은 물론 환경에도 해를 끼친다 (시 10:3, 7, 8)"]}, {"title": "하느님은 땅을 어떻게 깨끗하게 하실 것인가?", "points": ["하느님께서는 땅에 대한 자신의 목적을 이루시기 위해 땅의 도덕 상태와 환경을 깨끗하게 하실 것이다", "하느님께서는 과거에도 땅을 깨끗하게 하신 적이 있으며 앞으로 다시 한번 그렇게 하실 것이다 (창 6:11-13; 벧후 3:5-7)", "그분은 곧 이 땅을 완전히 그리고 영구적으로 깨끗하게 하실 것이다 (계 21:5; 「파14」 9/1 6면 1항)", "하느님께서는 해를 끼치는 악한 사람들을 없애실 것이다 [요한 계시록 11:18 낭독] (「파08」 8/1 7면 3-5항)", "하느님께서는 땅이나 인류를 멸망시키시는 대신, 비유적으로 말해 “새 하늘과 새 땅”을 마련하실 것이다\n[베드로 후서 3:13 낭독] [시각 자료 1]", "“새 하늘”은 의로운 정부인 하느님의 왕국을 가리킨다", "“새 땅”은 하느님의 왕국의 통치를 받을 땅의 새로운 인간 사회를 가리킨다"]}, {"title": "어떻게 당신도 땅을 깨끗하게 하는 일을 지원할 수 있는가?", "points": ["여호와께서 땅을 깨끗하게 하고 원래 상태로 회복시키실 것임을 신뢰하라 [시편 37:3 낭독]", "현재 지구의 환경을 잘 돌보는 것도 바람직한 일이지만 인간의 노력은 궁극적인 해결책이 될 수 없다 (전 1:15; 렘 10:23; 「깨」 07/12 11면 7-9항)", "인간의 노력에만 신뢰를 둔다면 실망하게 될 뿐이다 (시 37:8, 9; 사 2:22; 「파13」 7/1 12-13면)", "하느님이 마련하실 새로운 세상에서 살고자 하는 모든 사람은 그분의 의로운 표준을 배우고 그에 따라 생활해야 한다 (벧후 3:11; 「파13」 8/15 23면 2항)", "이미 수많은 사람들이 그렇게 하고 있다 (사 11:9; 「파14」 9/1 6면 3항)", "당신도 여호와를 신뢰한다면 땅을 복구하여 낙원으로 바꾸는 일에 참여할 수 있다 (사 65:17-25; 「까」 81-82면 14-15항) [시각 자료 2]", "그 일은 큰 기쁨과 만족을 가져다줄 것이다!"]}, {"title": "당신은 이 땅이 깨끗해질 것임을 확신할 수 있다", "points": ["여호와께서는 땅과 인류에 대한 자신의 목적을 이루실 것이다 (사 55:10, 11)", "그때 당신도 “땅을 차지”하여 영원히 살게 되기를 바란다 (시 37:10, 11, 29)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 49 9/20"]}]}, {"no": 50, "title": "지혜로운 결정—어떻게 내릴 수 있는가?", "t": 3, "note": "", "sections": [{"title": "여호와께서는 우리에게 자유 의지를 주셨다", "points": ["여호와 하느님은 인간에게 선택의 자유를 주셨다 (신 30:19; 「랑쉬」 239면 3항)", "오늘날의 복잡한 세상에서 우리는 반드시 내려야 할 결정들 때문에 심한 압박감을 느낄 수 있다", "여호와의 도움으로 우리는 좋은 결정을 내리고 그것을 실행하는 방법을 배울 수 있다"]}, {"title": "여호와께서는 우리가 좋은 결정을 내리는 데 필요한 것들을 갖추어 주셨다", "points": ["여호와께서는 우리가 좋은 결정을 내리는 데 도움이 되는 것들을 선물로 주셨다", "사전에 미리 이러한 선물들을 잘 활용한다면 결정을 내려야 할 순간이 왔을 때 더 나은 선택을 할 수 있을 것이다", "하느님께서는 그분의 말씀인 성경을 우리에게 주셨는데 성경에는 지혜롭고 유익한 지침들이 들어 있다\n(사 48:17)", "하느님의 말씀을 매일 읽고, 그 내용을 깊이 생각해 보라 [시편 119:97, 100 낭독]", "하느님의 법을 배우고, 그 법을 따르겠다고 결심하라", "구체적인 명령이 성경에 나오지 않는 상황에서 지침이 될 만한 성경 원칙을 찾아내라", "성경 인물들이 내린 결정과 그 결과를 통해 교훈을 얻으라 (고전 10:11)", "여호와께서 주신 또 다른 선물들은 “사고력”과 양심이다 (잠 2:10, 11; 히 5:14)", "양심을 미리 훈련하라. 그러면 결정을 내려야 할 순간이 왔을 때 양심이 올바로 작동할 것이다"]}, {"title": "좋은 결정을 내리게 해 주는 단계들을 따르라", "points": ["결정을 내려야 할 때 성경에 근거한 다음 단계들을 따른다면 좋은 결과를 얻을 수 있다", "(1) 성급하게 결정하지 않는다 (잠 21:5)", "당신이 할 수 있는 다양한 선택들과, 각각의 선택이 가져올 수 있는 결과들을 시간을 내어 생각해 보라 [신명기 32:29 낭독]", "당신의 결정이 다른 사람들에게 어떤 영향을 미칠지 그리고 당신과 여호와의 관계에 어떤 영향을 줄지 생각해 보라 (고전 10:24, 31-33)", "(2) 기도로 지혜를 구한다 (약 1:5; 「파19.11」 27면 7항)", "관련된 성경 원칙을 분별하고 그 원칙을 어떻게 적용해야 할지 이해하게 도와 달라고 여호와께 청하라", "(3) 철저히 조사한다 (잠 2:3-5; 「파19.11」 27면 8항)", "그리스도인 회중을 통해 공급받는 조사 도구와 출판물을 잘 활용하라", "영적으로 장성한 그리스도인들에게 조언을 구할 수 있다. 하지만 대신 결정을 내려 달라고 요청해서는 안 된다 (잠 20:18; 갈 6:5)", "(4) 자신의 동기를 살핀다 (잠 16:2; 「파19.11」 27-29면 9-10항)", "단지 감정에 치우쳐서 결정을 내려서는 안 된다 (잠 28:26; 「파17.03」 16면 12-13항)", "이러한 단계들을 모두 밟았다면 미루지 말고 결정을 내리라 (약 1:7, 8)"]}, {"title": "결정을 실행에 옮기라", "points": ["일단 결정을 내렸다면 결정대로 실행하기 위해 노력하라 (고전 9:26; 고후 8:11)", "여호와를 의지하면서, 행동으로 옮길 수 있도록 용기와 힘을 달라고 그분께 청하라 (빌 2:13)", "좋은 결정을 내렸다 하더라도 어려움을 겪을 수 있다 (시 34:19)", "어려움이 아니라 자신이 달성하려는 목표에 초점을 맞추라 (갈 6:9)", "때때로 이미 내린 결정을 바꿔야 할지도 모른다 (전 3:6; 「파19.11」 29면 12항)"]}, {"title": "당신이 내려야 하는 가장 중요한 결정", "points": ["당신이 내려야 하는 가장 중요한 결정은 여호와께 헌신할 것인지의 여부이다 (마 16:24)", "침례받는 것을 성급하게 결정하지도, 불필요하게 미루지도 말라 (눅 14:28; 약 4:8, 17)", "어떤 문제로 인해 당신이 주저하고 있다면 그 문제가 무엇인지 파악하고 극복하기 위해 조처를 취하라", "당신이 이미 여호와께 헌신한 사람이라면 그분을 섬기기로 한 결정을 계속 이행하기 위해 최선을 다하라\n(민 30:2)", "어려움을 겪을 때 여호와께 도움을 청하라 (시 119:173)"]}, {"title": "여호와께서는 당신이 내리는 결정에 관심이 있으시다", "points": ["당신이 내리는 결정은 여호와께 중요하다 (잠 27:11)", "그분은 당신이 행복하기를 바라신다 (약 1:25)", "당신이 하느님의 인도를 따른다면 언제나 지혜로운 결정을 내릴 수 있을 것이다 (잠 3:5, 6)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 50 9/20"]}]}, {"no": 51, "title": "진리가 당신의 생활을 변화시키고 있는가?", "t": 4, "note": "", "sections": [{"title": "성경 진리가 우리를 변화시키게 해야 한다", "points": ["오늘날 수많은 사람이 여호와의 증인과 성경을 공부하고 있다", "흔히 그들은 하느님과 그분의 목적에 관한 진리를 배우며 매우 기뻐한다 (요 8:32)", "성경 진리를 배우는 것에는 단지 지식을 얻는 것 이상이 관련된다 [로마서 12:2 낭독]", "여호와를 알아 가고 그분이 우리를 얼마나 사랑하시는지 이해하게 되면서 우리 역시 그분을 사랑하게 된다", "여호와를 기쁘시게 해 드리려는 열망은 우리의 삶에서 큰 변화를 하려는 마음을 갖게 할 수 있다\n(벧전 1:14, 15)", "성경의 영감받은 소식이 당신의 생활을 변화시키고 있는가? 그러한 변화를 하는 데에는 무엇이 관련되는가?"]}, {"title": "성경 진리는 우리가 행실을 변화시키도록 영향을 준다", "points": ["여호와를 기쁘시게 해 드리려면 우리는 그분이 승인하지 않으시는 행실을 피해야 한다 [에베소서 4:22 낭독]", "깊이 뿌리 박힌 습관이라 해도 변화시킬 수 있다. 그러한 습관에는 다음과 같은 것들이 있다", "과음 (잠 23:20; 고전 6:10)", "흡연이나 기분 전환용 마약의 사용 (롬 12:1; 고후 7:1)", "성적 부도덕과 더러운 행실 (고전 6:9, 18; 엡 5:3; 「랑쉬」 120면 9항)", "사도 바울은 1세기 그리스도인들에게 다음과 같이 말했다. “여러분 가운데에도 그런 사람들이 있었습니다”\n(고전 6:11)", "[현대에 있었던 격려적인 사례를 한 가지 소개한다]"]}, {"title": "성경 진리는 우리가 속사람을 변화시키도록 영향을 준다", "points": ["우리는 겉으로 드러나는 행동만이 아니라 속사람까지 철저히 변화해야 한다 [에베소서 4:23, 24 낭독] (「파19.06」 10면 7-9항) [시각 자료 1]", "우리는 “세상의 영”을 반영하는 태도를 자신에게서 없애 버리기 위해 힘써 노력한다 (고전 2:12)", "자신과 관련해 다음과 같은 자문을 해 보라", "‘나는 나와 인종이나 국적이 다른 사람들을 어떻게 생각하는가?’ (행 10:34, 35)", "‘나는 높은 도덕 표준을 유지하는 것이 중요하다는 사실을 이해하고 있는가?’", "‘옷차림과 몸단장에 있어서 나의 선택은 무엇을 드러내는가?’ (딤전 2:9, 10)", "‘나는 이성을 어떻게 대하는가?’ (딤전 5:2; 「파15」 6/15 16면 10항)", "‘내가 여호와를 신뢰한다는 점이 나의 우선순위에 나타나는가?’ (마 6:33; 딤전 6:9, 10)"]}, {"title": "어떻게 계속 발전할 수 있는가?", "points": ["우리의 생각과 행실을 변화시키는 것은 짧은 시간에 이루어지는 일도, 저절로 되는 일도 아니다", "그러려면 “진지한 노력”을 계속 기울여 나가야 한다 (벧후 1:5-8)", "어떻게 이 면에서 계속 발전할 수 있는가? [시각 자료 2]", "(1) 자신에게 여호와의 도움이 필요하다는 점을 겸손하게 인정하면서 그분께 기도하라 (시 51:10; 「파19.06」 12면 11항)", "성령을 달라고 하느님께 요청하라. 성령은 당신의 생각과 행동을 올바로 인도할 수 있다 (갈 5:22, 23)", "(2) 성경을 정기적으로 읽고, 그 내용을 묵상하라 (시 119:59; 약 1:25; 「파19.06」 12면 12항)", "(3) 교제 대상을 지혜롭게 선택하라 (잠 13:20; 히 10:24, 25; 「파19.06」 12면 14항)", "옳은 일을 하려는 당신의 결심을 약화시키는 교제 대상을 피하라"]}, {"title": "성경 진리에 따라 계속 변화될 때 얻는 유익", "points": ["계속 성경 진리에 따라 자신을 변화시켜 나간다면 많은 유익을 얻게 될 것이다", "여호와와의 우정이 더 깊어지고 그로 인해 평화와 만족감을 얻을 것이다 (사 32:17; 약 4:8)", "당신이 나타내는 좋은 본을 보면서 다른 사람들도 성경의 가르침을 배우려는 마음이 들 수 있다", "건강이 좋아지고 더 행복한 가정생활을 하게 될 것이다 (사 48:17)", "또한 놀라운 미래를 영원히 누릴 희망을 갖게 될 것이다 (시 37:29)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 51 9/20"]}]}, {"no": 52, "title": "당신의 하느님은 누구인가?", "t": 0, "note": "", "sections": [{"title": "사람들은 다양한 대상을 신으로 섬긴다", "points": ["세계 도처에서 사람들은 다양한 신들을 섬긴다 (고전 8:5; 「파10」 12/1 3면)", "일부 사람들은 성경에 나오는 하느님을 섬긴다고 주장하지만, 실제로 그분이 어떤 하느님인지에 대해서는 별로 아는 바가 없다", "어떤 사람들은 종교심이 없다. 하지만 그들은 자기 자신이나 다른 사람들 또는 물질적인 것들을 신으로 삼을지 모른다 (빌 3:19; 골 3:5)", "누가 또는 무엇이 우리의 숭배를 받기에 합당한가?"]}, {"title": "참하느님은 오직 한 분이시다", "points": ["성경에서는 참하느님은 오직 한 분이라고 가르친다 [요한복음 17:3 낭독]", "그분의 이름은 여호와이다 (시 83:18)", "그분은 영적 존재이시고 하늘에 거하신다 (왕상 8:43; 요 4:24)", "그분만이 전능한 하느님이시다. 그분은 우리의 창조주이시기 때문에 우리의 숭배를 받기에 합당하시다\n(계 4:8, 11)", "여호와 하느님을 섬기지 않는 사람이 그토록 많은 이유는 무엇인가?", "영적 피조물인 한 천사가 여호와께 마땅히 돌아가야 할 숭배를 자기도 받기를 갈망했다. 그는 하느님께 반역하여 사탄 마귀가 되었다 (마 4:8-10)", "일부 다른 천사들도 하느님께 반역하고 사탄의 편에 가담하여 악귀가 되었다 (창 6:2)", "사탄과 악귀들은 사람들을 잘못된 길로 인도하고 거짓 숭배를 조장한다 (고후 11:14; 계 12:9)", "여호와를 섬기는 참숭배를 제외한 다른 모든 형태의 숭배는 결국 사탄의 목적에 기여하는 것이다 (고전 10:20)"]}, {"title": "참숭배와 거짓 숭배의 차이를 구분하라", "points": ["영원한 생명을 얻으려면 우리는 여호와를 그분이 받아들이시는 방식대로 숭배해야 한다\n[마태복음 7:13, 14 낭독] [시각 자료 1]", "우리의 숭배 방식을 하느님이 받아들이지 않으신다면 그 숭배는 헛된 것이다 (롬 10:2, 3; 딤후 3:5)", "우리 주위에서 흔히 볼 수 있는 일부 종교 관습과 가치관을 성경에 비추어 검토해 보자 (딤후 3:16, 17)", "[해당 지역에 적용되는 몇 가지 점들만 다룬다]", "형상을 숭배하거나 숭배에 형상을 사용하는 것 (출 20:4, 5; 사 42:8)", "영매술과 점성술 (신 18:10-12)", "조상 숭배 (「실쉬」 165면 4-5항)", "연합 신앙 (고후 6:14, 15, 17)", "부도덕한 행실을 용인하는 것 (고전 6:9, 10; 「파19.06」 5면 12항)", "하느님을 섬기는 일보다 부를 추구하는 일을 앞자리에 두는 것 (마 6:24, 33)"]}, {"title": "참하느님께만 숭배를 드리라", "points": ["참하느님 여호와만 섬기기로 결심하라 (롬 12:2)", "성경을 살펴보면 어떻게 하느님이 받아들이시는 방식으로 그분을 섬길 수 있는지 알 수 있다", "여호와를 더 잘 알게 될수록 그분을 기쁘시게 하려는 열망이 커질 것이다", "하느님께서는 당신이 그분께 가까이 와서 그분의 친구가 되기를 바라신다 (시 25:14; 약 4:8; 「실쉬」 15-16면 18-21항)", "여호와의 친구가 되면 자연스럽게 그분에 관해 다른 사람들에게 말하고 싶어진다 (시 9:1)", "여호와를 섬기기로 선택한다면 당신은 진정한 기쁨을 얻고 앞으로 영원한 축복을 누리게 될 것이다 (사 25:9)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 52 9/20"]}]}, {"no": 53, "title": "당신의 생각은 하느님의 생각과 일치한가?", "t": 9, "note": "", "sections": [{"title": "왜 우리의 생각을 하느님의 생각과 일치시켜야 하는가?", "points": ["여호와 하느님의 생각은 인간의 생각보다 훨씬 탁월하다 [이사야 55:8, 9 낭독] [시각 자료 1]", "인간의 생각은 감정, 추측 또는 제한된 경험에 근거한 것일 수 있다", "인간은 불완전하기 때문에 그들의 생각은 많은 문제를 초래해 왔다", "우리의 생각을 여호와 하느님의 생각과 일치시킬 때 우리는 유익을 얻는다 (시 119:98-100)", "그렇게 한다고 해서 우리가 자신의 개성을 잃게 되는 것은 아니다 (「파18.11」 19-20면 5-8항)"]}, {"title": "어떻게 우리의 생각을 하느님의 생각과 일치하게 조정할 수 있는가?", "points": ["우리는 하느님의 말씀인 성경을 읽음으로 그분의 생각을 배운다 (딤후 3:16, 17)", "하느님의 생각을 이해하고 받아들이려는 목표를 가지고 성경을 읽으라 [시편 119:97, 104 낭독]", "이렇게 자문해 보라. ‘이 내용은 여호와의 특성, 그분의 성품, 그분이 좋아하시는 것과 싫어하시는 것에 대해 무엇을 알려 주는가? 여호와께서 이렇게 생각하시는 이유는 무엇인가?’", "하느님께 성령을 구하는 기도를 하라. 성령은 당신이 배우는 내용을 이해하고 적용하도록 도움을 줄 수 있다\n(약 1:5)", "우리의 생각이 하느님의 생각과 일치한지 평가해 보아야 하는 세 가지 부면을 살펴보자"]}, {"title": "사람들에 대한 하느님의 생각", "points": ["여호와는 편파적이 아니시다. 그분은 어떤 민족의 사람이든 다 받아 주신다 (행 10:34, 35) [시각 자료 2]", "우리는 우리와는 다른 사람들에 대한 편견을 마음속에서 완전히 없애 버림으로 하느님의 생각을 반영한다", "우리는 “모든 부류의 사람들”에게 왕국의 좋은 소식을 열심히 전한다 (딤전 2:3, 4)", "여호와께서는 감사할 줄 모르는 사람들에게도 친절과 관대함을 나타내신다 (마 5:45)", "우리는 우리에게 불친절한 사람들에게도 친절을 나타냄으로 하느님의 생각을 반영한다 (마 5:44)", "그렇게 할 때 평화를 이루는 데 도움이 되고 그러한 사람들이 여호와께 이끌리게 될 수도 있다", "여호와께서는 모든 사람에게 관심을 가지고 계시지만 그분을 사랑하는 사람들을 친구로 선택하신다 (시 25:14)", "우리는 누구와 친하게 지낼지 신중하게 선택함으로 하느님의 생각을 반영한다 (시 119:63)", "그렇게 할 때 우리는 해를 초래하는 인간의 생각에 영향을 받지 않을 수 있다 (「파18.11」 21-22면 15-18항)"]}, {"title": "가족에 대한 하느님의 생각", "points": ["여호와께서는 가정의 창시자이시다. 그분은 가정이 사랑이 가득한 보금자리가 되기를 바라셨다 (엡 3:14, 15)", "가족은 서로에게 사랑과 존중심을 나타냄으로 하느님의 생각을 반영한다 [에베소서 5:33–6:1 낭독]", "남편과 아내는 서로를 친절하고 존중심 있게 대해야 한다 (「깨16.6」 9면)", "그렇게 하면 부부 사이가 튼튼해져서 어려움이 생기더라도 잘 이겨 낼 수 있다", "자녀는 부모에게 순종함으로 그들에게 사랑을 나타낸다 (잠 1:8; 「파13」 5/15 21면 9항; 22면 14항)", "그렇게 하는 자녀들은 여호와의 약속대로 축복을 얻을 것이다 (엡 6:2, 3)"]}, {"title": "일에 대한 하느님의 생각", "points": ["여호와는 생산적으로 일하시는 분이며 자신이 하는 일에서 만족을 느끼신다 (시 104:24, 31; 「파05」 6/15 5면 2-4항)", "우리는 일에 대해 긍정적인 태도를 길러 나감으로 하느님의 생각을 반영한다 (전 2:24)", "우리는 부지런하고 시간을 잘 지키고 생산적으로 일하기 위해 노력해야 한다 (잠 13:4)", "그렇게 하면 자존감과 만족감을 느끼게 된다 (「랑쉬」 202-204면 10-12항)", "우리는 부유해지려고 애쓰는 대신 가진 것으로 만족하는 태도를 기름으로 하느님의 생각을 반영한다\n(딤전 6:8-10)", "성경은 하느님을 숭배할 시간과 휴식을 취할 시간을 따로 떼어 놓으라고 우리에게 권한다 (전 4:6; 빌 1:10)", "그렇게 할 때 우리는 균형 잡힌 생활을 하고 하느님과 좋은 관계를 유지할 수 있다"]}, {"title": "자신의 생각을 하느님의 생각과 일치하게 계속 변화시켜 나가라", "points": ["우리의 생각을 하느님의 생각과 일치하게 조정하기 위해서는 지속적인 노력이 필요하다 (엡 4:23, 24)", "성경을 연구하고 그리스도인 집회에 참석함으로 자신의 생각을 하느님의 생각과 일치하게 계속 변화시켜 나가라", "자신의 생각을 하느님의 생각과 일치시켜 좋은 결과를 경험하다 보면 하느님을 본받으려는 결심이 더욱 강해질 것이다 (엡 5:1)", "우리의 노력은 많은 유익과 큰 행복을 가져다줄 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 53 9/20"]}]}, {"no": 54, "title": "하느님과 그분의 약속에 대한 믿음을 길러 나가십시오", "t": 0, "note": "", "sections": [{"title": "진정한 믿음이란 무엇인가?", "points": ["많은 사람은 증거나 근거 없이 무언가를 확신하는 것을 믿음이라고 생각한다", "진정한 믿음은 “확실한 증거”에 기초해 있다 [히브리서 11:1 낭독]", "믿음에는 (1) 미래에 대한 하느님의 약속과 같이 “바라는 것들”에 대한 믿음과 (2) 여호와 하느님처럼 “보이지 않는 실체”에 대한 믿음이 포함된다", "진정한 믿음이란 무언가가 사실이라고 확신하는 것 이상을 의미한다. 진정한 믿음은 행동하도록 동기를 부여한다 (약 2:19, 20)"]}, {"title": "믿음을 갖는 것이 왜 중요한가?", "points": ["믿음은 하느님을 기쁘시게 하고 그분과 친구가 되는 데 반드시 필요하다 (히 11:6; 약 2:23)", "믿음이 있으면 산과 같은 장애물도 극복할 수 있다 (마 17:20; 「예길」 147면 4-5항)", "하느님은 믿음을 가진 사람들의 기도에 응답하신다 (마 21:22)", "믿음은 영원한 생명을 얻을 수 있게 해 준다 (요 3:16; 히 10:39)", "믿음은 타고나는 것이 아니다. 우리는 믿음을 길러 나가야 한다", "건물도 여러 건축 자재가 하나하나 모여 세워지듯이, 믿음도 여러 증거들을 하나하나 주의 깊이 생각해 봄으로 세워 나갈 수 있다"]}, {"title": "자연에서 볼 수 있는 증거들을 주의 깊이 생각해 보라", "points": ["우리는 자연을 관찰하고 자연에서 볼 수 있는 증거들을 주의 깊이 생각해 봄으로 하느님의 존재에 대한 믿음을 기를 수 있다 [이사야 40:26 낭독] (롬 1:20) [시각 자료 1]", "지구의 물리적 위치와 특징들은 누군가가 목적을 가지고 지구를 창조했다는 증거이다 (히 3:4)", "[「생명—창조된 것인가?」 4-9면에 나오는 예들을 사용해 설명한다]", "생명체의 복잡한 구조는 지성 있는 설계자가 존재한다는 증거이다 (시 139:14)", "[「생명—창조된 것인가?」 12-13면에 나오는 예들을 사용해 설명한다]"]}, {"title": "성경에서 볼 수 있는 증거들을 주의 깊이 생각해 보라", "points": ["성경 예언들을 살펴보면 하느님과 미래에 관한 그분의 약속들에 대해 믿음이 강해질 수 있다\n[이사야 46:9, 10 낭독]", "많은 성경 예언들이 정확하게 성취되었다 (수 23:14; 「파배20.1」 8면; 「파12」 6/1 4면) [시각 자료 2]", "미래에 대한 하느님의 약속들도 반드시 이루어질 것이다 (행 24:15; 계 21:4, 5) [시각 자료 3]", "성경 내용을 직접 살펴보고, 성경에 들어 있는 증거들을 주의 깊이 생각해 보라 (행 17:10-12)", "성경의 특정한 내용에 대해 의문이 든다면, 성경 그리고 jw.org와 같은 도구들을 사용해 조사해 보라"]}, {"title": "믿음을 행동으로 나타내라", "points": ["사용할수록 강해지는 근육처럼, 믿음도 행동으로 나타낼수록 더 강해진다 (약 2:21, 22, 26)", "믿음을 어떻게 행동으로 나타낼 수 있는가?", "자신이 무엇을 믿고 있는지 어떤 희망을 가지고 있는지 다른 사람들에게 이야기해 주라 (고후 4:13)", "기도로 하느님의 도움과 인도를 구하고 그분의 인도를 잘 따르라 (시 62:8; 잠 3:5, 6)", "하느님이 어떻게 당신을 도와주시고 당신의 기도에 응답해 주시는지 경험하면서 그분에 대한 확신이 더욱 커질 것이다 (시 34:8; 요1 5:14, 15)"]}, {"title": "계속 더 강한 믿음을 길러 나가라", "points": ["믿음은 항상 똑같은 상태에 머물러 있지 않다. 더 강해질 수도 있고, 더 약해질 수도 있다 (「파16.10」 27면 5항)", "여호와께 믿음을 더 달라고 기도하고, 기도와 일치하게 노력하라 (마 7:7, 8; 막 9:23, 24)", "당신이 시간과 노력을 들여 믿음을 길러 나간다면 축복을 받게 될 것이다 (롬 1:17)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 54 5/21"]}]}, {"no": 55, "title": "하느님 앞에서 어떻게 좋은 이름을 얻을 수 있는가?", "t": 0, "note": "", "sections": [{"title": "좋은 이름은 큰 가치가 있다", "points": ["대부분의 사람들은 좋은 이름 즉 좋은 평판을 얻기를 원한다 [잠언 22:1 낭독]", "일부 사람들은 부를 쌓거나 명성이나 인기를 얻어서 자기 이름을 떨치려고 노력한다", "그러한 사람들은 삶에서 진정한 행복과 의미를 찾지 못한다 (「파07」 11/15 5면 5항)", "성경은 우리에게 하느님 앞에서 좋은 이름을 얻으라고 권한다 (시 15:1, 2; 마 6:19, 20; 「파20.05」 26면 1항)", "왜 하느님 앞에서 좋은 이름을 얻어야 하며, 어떻게 그렇게 할 수 있는가?"]}, {"title": "왜 하느님 앞에서 좋은 이름을 얻어야 하는가?", "points": ["깊은 인식을 가지고 여호와의 이름에 대해 생각하는 사람들을 여호와께서는 유의해 보신다 [말라기 3:16 낭독] \n(「파12」 12/1 11면)", "그분은 “자신을 진지하게 찾는” 모든 사람에게 상을 주신다 (히 11:6; 「파05」 8/1 28-29면 11-12항)", "여호와께서 우리를 창조하셨으므로 우리는 마땅히 그분을 숭배하고 그분께 순종해야 한다 (계 4:11)", "하지만 우리는 단지 의무감 때문이 아니라 여호와께서 우리에게 사랑을 보이셨고 우리도 그분을 사랑하기 때문에 마음에서 우러나와 그분을 기쁘시게 해 드리려고 노력한다 (시 116:12)"]}, {"title": "어떻게 하느님 앞에서 좋은 이름을 얻을 수 있는가?", "points": ["여호와에 대해 배우라 [요한복음 17:3 낭독]", "여호와를 알아 가는 것은 계속되는 과정이다", "정기적으로 하느님의 말씀을 연구하고 그 내용을 묵상하라 (시 119:97)", "여호와에 대해 배워 감에 따라 그분과 더 가까워질 것이다 (약 4:8)", "여호와의 계명에 순종하라 [요한 1서 5:3 낭독]", "순종하기 어려울 때가 있을 수 있지만 여호와의 법은 “짐스럽지 않다”", "여호와께서는 참을성이 많으시고 사람의 한계를 이해하신다 (시 103:14; 「파09」 8/15 19면 4-5항)", "여호와께 순종할 수 있게 도와 달라고 기도로 청하라. 그분은 반드시 도와주실 것이다 (눅 11:11-13; 빌 4:13)", "여호와의 성품을 본받으라 [시편 25:4 낭독]", "여호와에 대해 배워 가면서 그분의 생각과 행동을 본받기 위해 노력하라", "여호와께서 사랑하시는 것을 사랑하고 그분이 미워하시는 것을 미워하는 법을 배우라 (암 5:15)", "여호와의 성품을 완벽하게 반영하신 예수를 본받으라 (요 14:9)", "여호와께 기도하라 [빌립보서 4:6 낭독]", "여호와께서는 성경을 통해 우리에게 말씀하신다. 우리는 기도를 통해 그분께 말씀드린다 (「파14」 7/1 16면)", "기도는 당신이 당신에게 “관심을 갖고 계”신 하느님과 실제로 의사소통할 수 있게 해 주는 수단이다 \n(벧전 5:7)", "여호와께서는 우리가 우리 자신이 아니라 그분을 의지할 때 기뻐하신다 (시 55:22; 잠 3:5, 6)"]}, {"title": "하느님 앞에서 좋은 이름을 얻기 위해 지금 행동하라", "points": ["여호와께서는 아직 시간이 있는 동안 그분 앞에서 좋은 이름을 얻으라고 모든 사람에게 권하신다 (사 55:6)", "심각한 잘못을 저지른 사람들도 여호와와 “문제들을 바로잡”을 수 있다 (사 1:18)", "여호와께서는 그분을 기쁘시게 해 드리려고 노력하는 사람들에게 풍성한 상을 주신다 (말 3:10)", "하느님 앞에서 좋은 이름을 얻으면 진정한 행복을 누리게 된다 (시 119:1, 2)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 55  5/21"]}]}, {"no": 56, "title": "우리가 신뢰할 수 있는 지도자는 누구인가?", "t": 8, "note": "", "sections": [{"title": "인간 지도자들이 실패해 온 이유", "points": ["오늘날 많은 사람들은 인간 지도자들에게 크게 실망하고 있다", "사람들은 정치계, 종교계, 경제계의 지도자들에게 실망한 나머지 더 이상 그들을 신뢰하지 않는다", "성경은 인간 지도자들이 실패해 온 이유를 밝혀 준다 [예레미야 10:23 낭독]", "하느님은 인간을 창조하실 때 그들에게 스스로를 다스릴 능력이나 권한을 부여하지 않으셨다 (「파12」 5/1 6면)"]}, {"title": "그리스도 예수는 신뢰할 수 있는 지도자이시다", "points": ["성경은 우리가 신뢰할 수 있는 한 지도자에게 주의를 이끈다", "하느님은 예수를 “지도자인 메시아” 즉 “그리스도”로 임명하셨다 [다니엘 7:13, 14 낭독] (단 9:25; 마 23:10)", "그리스도 예수는 최상의 지도자이시다 (「파09」 1/15 3면 4-5항)", "인간 지도자들과는 달리 예수는 비이기적인 사랑이 동기가 되어 모든 일을 하신다 (요 10:14, 15)", "땅에 계실 때 예수는 지도자로서 역량을 증명하셨다", "그분은 수천 명에 달하는 군중을 돌보셨다 (막 6:39-44)", "동정심에서 우러나와 비천한 사람들을 도우셨다 (막 1:40-42)", "단 3년 반 만에 세계적인 전파 활동의 기초를 놓으셨다 (행 1:8)"]}, {"title": "그리스도 예수는 능동적인 지도자이시다", "points": ["부활되어 하늘로 가신 뒤에도 예수는 계속해서 제자들을 인도하고 계신다 (마 28:19, 20; 골 1:18)", "[선택 사항: 다음 두 가지 보조점을 설명할 때, 제공된 삽화를 사용할 수 있다]", "그분은 자격을 갖춘 남자들을 임명해 회중을 돌보아 오셨다 (마 24:45; 엡 4:11, 12; 「여뜻」 19과)", "천사들과 성령을 사용해 제자들을 지원하고 인도하신다 (요 16:13; 히 1:13, 14)", "현재 예수는 하느님의 하늘 왕국의 왕이시다 [요한 계시록 11:15 낭독]", "예수는 그분의 왕권을 반대하는 인간 통치자들을 곧 땅에서 제거하실 것이다 (계 17:12-14)"]}, {"title": "당신은 예수를 지도자로 받아들일 것인가?", "points": ["예수는 우리 모두에게 자신의 제자가 되라고 따뜻이 초대하신다. 여러분은 그 초대를 받아들였는가? (막 10:21; 「따」 5-6면 1-4항)", "여호와의 증인은 예수를 따르는 방법을 여러분에게 기꺼이 알려 줄 것이다 [관심을 가지고 참석한 새로운 사람들에게 성경 공부를 시작해 보도록 권하고, 성경 공부가 어떻게 진행되는지 간단히 설명한다]", "예수를 지도자로 받아들이고 그분을 따르기로 결정했다는 것을 어떻게 나타낼 수 있는가?", "(1) 예수를 본받고 그분의 가르침을 생활 전반에 걸쳐 적용하기 위해 힘쓰라 (벧전 2:21; 「파09」 1/15 4면 6항)", "예수처럼 하느님의 뜻을 삶에서 첫째 자리에 두라 (마 6:33; 요 4:34)", "(2) 여호와 하느님께 헌신하고 침례를 받으라 [마태복음 16:24 낭독] (행 8:12)", "[한때 주저했지만 마침내 침례를 받은 사람들의 이야기가 나오는 3분짜리 동영상을 시청하도록 청중에게 권한다. 동영상을 본 다음, 그들이 장애물을 극복하는 데 무엇이 도움이 되었는지 간단히 강조한다]"]}, {"title": "예수의 인도를 따라 영원한 생명을 얻으라", "points": ["그리스도 예수를 지도자로 받아들이고 ‘그분에게 순종’하면 “영원한 구원”을 얻을 수 있다 (히 5:9)", "예수는 ‘온전한 승리를 거두고’ 이 악한 세상을 멸망시킬 준비가 되어 있으시다 (계 6:2; 마 24:29, 30)", "그분은 제자들이 생존할 수 있도록 지금 그들을 준비시키고 계신다 (계 7:9, 14)", "그리스도의 인도를 따른다면, 불공정과 고통이 사라진 신세계에서 살 수 있다 (벧후 3:13)", "예수는 자신의 제자들을 완전성과 영원한 생명으로 인도하실 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "", "30분에 다룰 것", "© 2019 Watch Tower Bible and Tract Society of Pennsylvania\nS-34-KO No. 56 10/19"]}]}, {"no": 57, "title": "박해를 견디는 길", "t": 0, "note": "그리스도인들이 박해 가운데서도 인내할 수 있도록 격려한다", "sections": [{"title": "그리스도로 인한 박해—어떻게 생각할 것인가?", "points": ["박해는 참 그리스도인임을 나타내는 증거가 된다 (빌 1:29; 딤후 3:12)", "예수께서도 박해를 받으셨다 (요 15:20)"]}, {"title": "박해자들의 유익을 도모하라", "points": ["원수를 사랑하고 박해하는 자들을 위해 기도하라 (마 5:44)", "선으로 악을 이기라 (롬 12:17-21)"]}, {"title": "여호와께서 박해를 허용하시는 이유", "points": ["하느님의 종들의 충성심이 드러난다", "왕국 소식이 더 널리 전파된다 (빌 1:12-14)"]}, {"title": "도움을 주는 원천들", "points": ["성경과 기도를 통해 힘을 얻는다 (시 119:50)", "회중의 지원을 받는다 (행 14:22)", "여호와께서 버려두지 않으신다 (히 13:5, 6)"]}]}, {"no": 58, "title": "누가 그리스도의 참제자인가?", "t": 7, "note": "예수의 가르침과 본을 사용하여 여호와의 증인이 그리스도의 참제자임을 증명한다. 새로운 사람들의 문화적 · 종교적 배경에 맞는 예를 들어 주요점을 설명한다", "sections": [{"title": "그리스도의 참제자를 식별해야 하는 이유", "points": ["전 세계적으로 20억 명 이상이 그리스도를 따른다고 주장한다 (「파12」 3/1 3면)", "그들은 신앙, 도덕 표준, 숭배 형태가 매우 다양한 수많은 종파에 속해 있다", "예수께서는 자신의 아버지의 뜻을 행하는 사람들이 자신의 참제자라고 말씀하셨다 [마태복음 7:21-23 낭독]", "예수를 주라고 부르지만 그분의 아버지의 뜻을 행하지 않는 많은 사람들은 예수의 승인을 받지 못할 것이다", "그러한 사람들은 무가치한 가짜 그리스도교에 속아 온 것이다", "참그리스도교의 4가지 특징을 고려해 보자"]}, {"title": "참그리스도인은 하느님의 말씀을 존중하고 그 말씀에 따라 생활한다", "points": ["예수께서는 하느님의 말씀을 절대적 진리로 여기셨다 [요한복음 17:17 낭독]", "그분은 하느님의 말씀을 인용하고 변호하고 설명하셨다 (「따」 98-107면)", "예수와 그분의 제자들은 성경을 근거로 가르쳤다 (눅 24:45; 행 17:2, 3)", "그들은 사람이 만든 전통이나 철학을 가르치지 않았다 (막 7:6-8; 골 2:8; 「파12」 3/1 4면)", "그리스도의 참제자들은 성경을 그들의 신앙과 행실에 대한 권위로 받아들인다 (살전 2:13)", "여호와의 증인은 하느님의 기록된 말씀과 일치하게 생활한다. 그렇게 하는 것은 우리의 생활 방식 전체와 관련이 있다", "하느님께서는 단순히 그리스도교를 믿는다고 주장하는 사람들을 좋아하지 않으신다"]}, {"title": "그리스도의 참제자들은 하느님의 이름을 알린다", "points": ["예수께서는 아버지의 이름을 영광스럽게 하셨고 그 이름을 알리셨다 [요한복음 17:6, 26 낭독]", "그분의 참제자들은 여호와의 이름을 부르는 사람들만 구원받을 것임을 인정한다 (롬 10:13)", "원어로 된 성경에는 하느님의 이름이 약 7000번 나온다", "그리스도인이라고 주장하는 많은 성경 번역자와 교회 지도자들은 그들의 성경 번역판과 예배에서 하느님의 이름을 사용하지 않는다 (「파12」 3/1 7면)", "여호와께서는 자신을 두려워하고 자신의 이름을 귀중히 여기는 사람들을 소중히 여기신다 (말 3:16-18)", "그분은 자신의 참숭배자들에게 “자신의 이름을 위한 백성”이 되는 영예를 주셨다 (행 15:14)", "그분의 증인들은 하느님의 이름에 모독을 돌리는 가르침을 폭로하는 것을 기뻐한다 (「파09」 11/1 4-9면)"]}, {"title": "참그리스도인들은 인류의 유일한 희망으로 하느님의 왕국을 옹호한다", "points": ["하느님의 왕국은 예수께서 하신 전파 활동의 주제였다 [누가복음 4:43 낭독] (「따」 81-82면 10항)", "그리스도의 참제자들은 하느님의 왕국이 무엇이고 그 왕국이 무엇을 이룰 것인지 알린다", "하느님의 왕국은 그리스도가 왕으로 다스리는 하늘 정부이다 (사 9:6, 각주; 단 7:14; 계 11:15)", "이 왕국은 머지않아 온 땅을 다스리고 지속적인 평화를 가져올 것이다 (사 9:7; 단 2:44)", "여호와의 증인은 하느님의 왕국이 인류의 유일한 희망이라고 전 세계적으로 선포하고 있다 (마 24:14)", "우리는 모든 정치 문제에서 엄정 중립을 유지한다 (요 17:16; 18:36)", "우리는 하느님의 왕국의 국민으로 살아가며 왕국 권익을 생활에서 첫째 자리에 둔다 (마 6:33)"]}, {"title": "예수의 참제자들은 그들이 나타내는 사랑으로 식별된다", "points": ["자기희생적인 사랑은 참그리스도인들을 결속시켜 준다. 그들은 연합된 형제 관계를 이룬다 [요한복음 13:34, 35 낭독]", "그들의 사랑은 인종, 문화, 사회적 지위의 차이를 초월한다 (「파12」 3/1 6면)", "그들은 시련과 재해를 겪을 때 서로 돕는다", "그리스도의 참제자들은 심지어 자신들을 반대하는 사람들을 비롯하여 모든 사람을 사랑한다 (마 5:43-45)", "그들은 성경에 근거한 자신들의 희망을 다른 사람들에게 알리기 위해 열심히 노력한다", "그들은 다른 사람들을 향해 무기를 드는 것을 거부한다 (사 2:4; 마 26:52)"]}, {"title": "그리스도의 참제자임을 증명하라", "points": ["지금 예수의 참제자로 사는 것은 그 어느 때보다 더 긴급하다 (눅 6:46; 요 15:8)", "하느님께서는 그리스도를 따른다고 거짓으로 주장하는 모든 사람에게 책임을 물으실 것이다 (벧후 2:1-3)", "여호와의 증인의 가르침과 행실을 하느님의 말씀에 비추어 더 조사해 보라 (행 17:11)", "우리가 그리스도의 참제자임을 식별하여 우리와 함께 여호와 하느님과 그리스도 예수께 받아들여지는 숭배를 하기 바란다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 58-KO 11/17\t 30분에 다룰 것"]}]}, {"no": 59, "title": "오늘날의 분쟁에 대처하는 데 성서 원칙이 도움이 되는가?", "t": 4, "note": "청중이 성서 원칙을 실생활 분쟁에 적용하도록 격려한다", "sections": [{"title": "분쟁을 해결하는 것이 쉽지 않다", "points": ["사람들은 분쟁으로 인해 스트레스를 받는다", "분쟁을 해결하려는 시도가 항상 성공하지는 않는다"]}, {"title": "성서에는 분쟁을 해결하는 원칙들이 담겨 있다", "points": ["서로 용서하라 (엡 4:32)", "원수와도 화목하도록 노력하라 (롬 12:18)", "겸손하게 다른 사람들을 우월하다고 여기라 (빌 2:3, 4)"]}, {"title": "이러한 원칙을 어떻게 적용할 수 있는가?", "points": ["문제를 해결할 때 여호와께 기도로 구한다", "상대방의 관점을 이해하려고 노력한다", "분쟁보다 관계를 더 소중히 여긴다"]}, {"title": "성서 원칙을 적용한 결과", "points": ["가정과 회중 안에 평화가 깃든다", "다른 사람들이 우리의 행동을 보고 감명을 받을 수 있다"]}]}, {"no": 60, "title": "당신의 삶의 목적은 무엇인가?", "t": 3, "note": "", "sections": [{"title": "당신은 어떻게 삶의 목적을 정할 것인가?", "points": ["사람들이 추구하는 삶의 목적은 문화나 가정 환경에 영향을 받을지 모른다", "어떤 사람들은 전통이나 가족에 대한 의무에 큰 영향을 받는다", "또 다른 사람들은 고등 교육을 받거나 유명해지거나 돈을 많이 버는 것을 삶의 목적으로 삼는다", "우리가 하느님에 대해 무엇을 믿는가에 따라 삶을 살아가는 방식이 크게 달라질 수 있다 (「깨」 15/3 4면 1-4항)", "창조주가 계신다는 증거가 우리 주위에 가득한데도 많은 사람은 그분이 누구인지 모르고 있다 (롬 1:19, 20; 히 3:4)"]}, {"title": "우리의 창조주는 누구인가?", "points": ["성경은 우리의 창조주가 어떤 비인격적인 힘이 아니라 여호와라는 이름을 지니신 사랑 많은 아버지라고 알려 준다 [이사야 42:8 낭독] (마 6:9; 「파20.02」 3면 4항)", "그분은 많은 탁월한 특성들을 갖고 계시며, 그중 가장 탁월한 특성은 사랑이다 (출 34:6; 요1 4:8)", "여호와께서는 우리를 포함해 모든 것들을 목적을 가지고 창조하셨다 (전 12:13; 사 45:18; 「파11」 11/1 21면)", "그분은 우리 각자에게 사랑과 관심을 나타내시며, 우리가 어떻게 살아가는지에 관심을 갖고 계신다 (시 32:8)"]}, {"title": "우리는 “하느님께 가까이 갈” 수 있다", "points": ["여호와께서는 우리에게 자신과 친구가 되자고 권하신다 [야고보서 4:8 낭독] [시각 자료 1]", "우리는 성경을 공부함으로 그분에 대해 알아 갈 수 있다 (요 17:3; 「파15」4/15 21면 7항)", "우리는 하느님께 기도로 우리의 생각과 감정을 모두 솔직하게 말씀드릴 수 있다 (시 62:8; 65:2)", "하느님께 가까이 가면 유익을 얻게 된다 (시 73:28; 사 48:17, 18)", "성경에는 창조주께서 알려 주시는 실용적인 지혜가 들어 있다 (「파배17.1」 6-7면)", "[여호와를 알게 되어 더 나은 삶을 살게 된 사람에 관한 경험담 하나를 이야기한다. 예를 들어 「파수대」 2012년 11월 1일호 10-11면, 13-14면 참조]"]}, {"title": "여호와를 알면 우리의 삶의 목적이 달라지게 된다", "points": ["여호와를 알면 우리의 가치관, 우선순위, 목표가 영향을 받게 된다", "우리는 여호와를 알아 가면서, 그분에 대한 사랑이 점점 더 커진다 (막 12:28-30)", "하느님에 대한 사랑이 사람을 기쁘게 하려는 열망보다 강해야 한다", "여호와에 대한 강한 사랑을 갖게 되면, 마음에서 우러나와 다음과 같은 일들을 하게 된다", "우리는 하느님이 사랑으로 베푸시는 인도를 따른다 (잠 3:5, 6)", "우리는 하느님과 친구가 되기 위해 필요하다면 어떤 변화라도 기꺼이 하려고 한다 (시 37:5) \n[시각 자료 2]", "우리는 이 세상을 “온전히” 이용하려고 하지 않는다 (고전 7:31)", "우리는 다른 사람들이 여호와를 알도록 돕는 일을 삶의 우선순위에 둔다 (마 6:33)", "우리는 하느님의 소유가 되라는 그분의 초대를 받아들인다 (롬 14:8; 벧전 3:21; 「파20.03」 9면 4-5항) \n[시각 자료 3]", "우리가 하느님께 헌신하면 그분의 뜻을 행하는 일이 삶의 목적이 된다 (벧전 4:2)", "우리는 하느님께 영예가 되는 방식으로 가족을 돌보고 그 밖의 책임들을 이행한다"]}, {"title": "당신도 만족을 누릴 수 있는 삶의 목적을 가질 수 있다", "points": ["우리 모두는 무엇을 삶의 목적으로 삼을 것인지 결정해야 한다", "재물을 쌓는 일을 중심으로 살면 고통을 겪고 공허감을 느끼게 된다 (잠 23:4,5)", "우리는 “하느님과 재물을 함께 섬길 수 없다” (마 6:19, 20, 24)", "여호와를 숭배하기로 선택하면 만족스럽고 의미 있는 삶을 살게 된다 [잠언 10:22 낭독]", "계속해서 하느님에 관한 지식을 쌓으며 그분께 가까이 가라", "여호와를 찬양하는 일을 중심으로 살아간다면 영원한 축복을 누리게 될 것이다 (요1 2:17)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No.60 9/21"]}]}, {"no": 61, "title": "당신은 누구의 약속을 신뢰하는가?", "t": 8, "note": "", "sections": [{"title": "인간의 약속은 믿을 수 없다", "points": ["사람들은 약속을 지킬 때도 있고 지키지 않을 때도 있다", "정치인이나 광고주나 그 밖의 사람들은 종종 약속을 해 놓고 지키지 않는다 (시 146:3)", "좋은 의도를 갖고 약속을 했지만 그 약속을 잊어버리거나 약속을 지키는 것을 소홀히 여기는 사람들도 있다", "“예기치 않은 때에 예기치 못한 일”이 닥치기 때문에 약속을 지키지 못하는 경우도 있다 (전 9:11)"]}, {"title": "여호와께서는 언제나 약속을 지키신다", "points": ["여호와 하느님께서는 언제나 약속을 지키신다 [이사야 55:10, 11 낭독]", "그분은 자신이 한 약속을 잊으시거나 소홀히 여기시는 일이 결코 없다 (신 32:4)", "그분은 무한한 능력을 갖고 계시기 때문에 자신이 뜻하는 일은 무엇이든 이루실 수 있다 (사 14:24, 27)", "여호와께서는 아브라함에게 그의 자손이 큰 민족이 되고 가나안 땅을 상속할 것이라고 약속하셨다 (창 12:1, 2, 7)", "여호와께서는 아브라함의 자손인 이스라엘 사람들을 이집트의 노예살이에서 해방시켜 주셨다 (출 3:7, 8; 시 136:10-15) [시각 자료 1]", "여호와께서는 이스라엘 사람들이 광야를 통과해 지나가는 동안 그들을 돌봐 주셨다 (신 8:14-18) [시각 자료 2]", "여호와께서는 가나안 땅을 차지하고 있던 강한 민족들을 물리치셨다 (신 11:23-25; 수 6:1-5, 20) \n[시각 자료 3]", "이스라엘 사람들이 약속의 땅에 정착하고 나서 여호수아는 여호와께서 하신 모든 약속이 다 이루어졌다고 확신 있게 말했다 [여호수아 23:14 낭독] (「파10」 1/1 12면 2-5항)"]}, {"title": "당신도 여호와의 약속을 통해 유익을 얻을 수 있다", "points": ["여호와께서는 인류를 위한 미래의 축복들을 약속하셨으며, 당신도 그러한 축복들을 누릴 수 있다", "곧 하느님의 왕국이 이 땅 전체를 다스릴 것이다 (사 9:6, 7; 단 2:44)", "고통과 죽음이 사라질 것이다 (계 21:3, 4)", "온 땅이 낙원이 될 것이다 (계 21:5; 「까」 81-82면 13-15항) [시각 자료 4]", "당신은 지금도 하느님의 일부 약속들이 이루어지는 것을 경험할 수 있다", "그분은 당신이 그분의 명령에 순종하면 마음의 평화를 누릴 것이라고 약속하신다 (사 48:17, 18)", "그분은 당신이 그분에 대해 배우고 그분이 바라시는 일을 행하는 것을 삶에서 첫째 자리에 두면 당신에게 필요한 것들을 공급해 주겠다고 약속하신다 (마 6:31-33; 「파16.07」 12면 18항)"]}, {"title": "하느님의 약속을 신뢰한다는 것을 나타내라", "points": ["여호와의 약속을 진심으로 믿는 사람들은 그 확신을 행동으로 나타낸다", "여호수아는 여호와의 약속들이 성취되는 것을 보았으며, 그로 인해 그분만 섬기겠다는 결심이 강해졌다 \n[여호수아 24:14, 15 낭독]", "하느님의 표준을 따르고 그분을 숭배하는 일을 삶에서 첫째 자리에 둠으로 그분의 약속을 신뢰한다는 것을 나타내라", "당신이 여호와를 신뢰하면, 그분은 당신에게 상을 주시고 당신을 축복하실 것이다 (눅 18:28-30)", "여호와의 축복과 지원을 경험할 때 그분의 약속들에 대한 확신이 더 강해질 것이다 (시 34:8; 말 3:10; \n「파15」 10/15 11면 11항)", "여호수아처럼 당신도 “[하느님의] 모든 약속 중에 한 말씀도 빠지지 않고 다 이루어졌다”라고 말할 수 있게 될 것이다 (수 23:14)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 61  5/21"]}]}, {"no": 62, "title": "어디에서 진정한 희망을 발견할 수 있는가?", "t": 8, "note": "", "sections": [{"title": "우리에게는 진정한 희망이 필요하다", "points": ["우리 모두는 살면서 고통을 겪거나 가슴 아픈 일을 당한다 (욥 14:1, 2; 전 9:11)", "그럴 때 미래에 대한 희망은 우리에게 힘과 안정감을 줄 수 있다", "오직 성경만이 고통에서 벗어날 수 있는 진정한 희망을 알려 준다", "이제 살펴보겠지만 그 희망은 막연한 바람이 아니다. 그 희망은 확실한 증거에 기초한 것이다", "이제 세 가지 질문을 살펴보자. (1) 왜 이렇게 고통스러운 일이 많은가? (2) 성경에서는 어떤 희망을 알려 주는가? (3) 성경에 담긴 희망을 확신할 수 있는 이유는 무엇인가?"]}, {"title": "왜 이렇게 고통스러운 일이 많은가?", "points": ["사랑 많으신 창조주 여호와 하느님께서는 사람이 고통을 겪거나 죽도록 결코 의도하지 않으셨다", "사탄은 첫 인간 부부인 아담과 하와가 하느님께 반역하도록 영향을 미쳤고, 그로 인해 비참한 결과가 생겼다 (롬 5:12; 8:22; 「깨21.1」 10면)", "하느님은 우리에게 고통을 일으키는 분이 아니시다. 그분은 “희망”에 근거해 고통을 일시적으로 허용해 오셨다  [로마서 8:20 낭독] (「파03」 9/1 10-11면 10-14항)", "여호와께서는 인류가 겪는 고통을 없애기를 열망하신다 (렘 29:11)", "그분은 곧 모든 고통을 끝내시고 사탄이 일으킨 모든 피해를 복구하실 것이다 (롬 8:21)"]}, {"title": "성경에서는 어떤 희망을 알려 주는가?", "points": ["하느님께서는 그분의 왕국을 사용해 인류가 겪는 고통스러운 문제들을 없애실 것이다 (단 2:44; 마 6:10)", "하느님의 왕국이 통치할 때 어떤 일들이 있을 것인가? [요한 계시록 21:3, 4 낭독] [시각 자료 1]", "세계 전역에 진정한 평화가 이루어질 것이다 (시 37:10, 11; 72:7, 8)", "사망한 수많은 사람들이 낙원이 된 땅으로 부활될 것이다 (사 25:8; 행 24:15)", "하느님을 사랑하는 사람들은 영원한 생명을 누릴 것이다 (롬 6:23)", "하느님께서는 우리가 가슴 아픈 일들로 인한 기억 때문에 더는 고통당하지 않게 해 주실 것이다 (사 65:17)"]}, {"title": "성경에 담긴 희망을 확신할 수 있는 이유는 무엇인가?", "points": ["성경은 독특한 책이다. 성경 자체에 이 책이 “하느님의 영감을 받”았다는 풍부한 증거가 들어 있다 [디모데 후서 3:16 낭독]", "성경은 시대에 뒤떨어진 책이 아니며 우리 시대에도 실용적이다", "성경은 과학 서적은 아니지만 자연계에 관한 내용을 언급할 때 항상 정확하다 (「깨17.3」 4면)", "성경은 자기 계발에 관한 책은 아니지만 수많은 사람들이 염려에 대처하는 데 도움이 되었다 (「파배16.1」 15면)", "성경에는 이미 성취된 많은 예언이 들어 있다", "성경은 강력한 나라와 도시들이 멸망될 것임을 예언했다 (「깨17.3」 5면)", "성경은 오늘날 사람들이 나타내는 태도를 놀라울 정도로 자세하게 묘사한다 (딤후 3:1-5)", "여러분도 이러한 증거들을 살펴보면 미래에 관한 하느님의 약속들을 온전히 신뢰할 수 있다 (사 46:10)"]}, {"title": "성경에 담긴 희망에 대한 확신을 강화하라", "points": ["“성경을 주의 깊이 조사”하면 성경에 담긴 희망을 더욱더 확신할 수 있게 된다 (행 17:11)", "[청중에게 3분짜리 동영상을 보여 준다. 동영상에는 여호와의 증인과 성경을 공부하여 진정한 희망을 발견한 사람들의 이야기가 나온다. 동영상을 시청한 후, 그 사람들이 희망을 발견함으로 어떤 유익을 얻었는지 강조한다]", "성경은 희망을 “확실하고 굳건한” 닻에 비한다 (히 6:19; 「사」 07/7 1면 3항)", "현재 우리는 많은 문제들을 겪고 있지만 기쁨과 확신을 가지고 미래를 바라볼 수 있다. 성경에 담긴 희망이 곧 실현될 것임을 알기 때문이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 62 9/22"]}]}, {"no": 63, "title": "진리를 찾을 수 있습니까?", "t": 4, "note": "", "sections": [{"title": "진리를 찾을 수 있는가?", "points": ["많은 사람은 진리라고 불리는 것들에 대해 회의적이다. 그 이유는 무엇인가? [시각 자료 1]", "편향적인 뉴스 보도, 가짜 뉴스, 음모론이 널리 퍼져 있다", "인공 지능으로 인해 무엇이 진짜이고 무엇이 가짜인지 구별하기가 더욱 어려워지고 있다", "성경은 우리 시대에 잘못된 정보가 만연할 것이라고 예언했다 (딤후 3:1, 13)", "우리는 보고 듣는 모든 것을 곧이곧대로 믿지 않음으로써 지혜를 나타낸다 (잠 14:15)", "사람들의 주장이 사실인지 그 증거를 주의 깊이 살펴보아야 한다", "거짓이 널리 퍼져 있다는 것은 진리가 없다는 의미인가?", "예수께서는 진리가 실제로 존재하며 그것을 찾을 수 있다고 가르치셨다 [요한복음 8:32 낭독]", "진리를 알아보는 데 도움이 되는 예수의 가르침 세 가지를 살펴볼 것이다"]}, {"title": "“아버지의 말씀은 진리입니다”", "points": ["예수께서는 하느님의 “말씀은 진리”라고 하셨다 [요한복음 17:17 낭독]", "예수께서는 하느님의 소식이 그분의 기록된 말씀인 성경에 들어 있다고 알려 주셨다 (마 4:4, 7, 10)", "오늘날 우리는 완성된 하느님의 영감받은 말씀인 성경 전서를 가지고 있다", "성경은 진리의 책인가? 몇 가지 증거를 생각해 보자", "[성경이 진리를 담고 있는 신뢰할 만한 책인지 알려 주는 예들을 살펴본다. 「파수대」 2020년 제1호 6-8면과 같은 내용을 참조한다]", "한때 성경에 대해 회의적이었던 많은 사람이 열린 마음으로 성경을 조사해 보기로 했다", "[성경에 회의적이었던 한 사람에 대한 동영상을 함께 시청한다. 동영상을 본 후, 그가 성경에 대한 자신의 생각을 바꾼 이유가 무엇인지 간단히 강조한다 (2:30)]", "성경의 내용을 직접 조사해 보고 하느님의 “말씀은 진리”라는 점을 받아들일지 스스로 결정을 내리는 것이 어떻겠는가?"]}, {"title": "“나는 … 진리입니다”", "points": ["예수께서는 왜 자신이 “진리”라고 하셨는가? [요한복음 14:6 낭독]", "그분은 진리를 말하고 진리대로 사셨다", "심지어 예수의 반대자들도 그분이 진실하시다는 점을 인정했다 (막 12:13, 14)", "그분은 위선이 없으셨고, 자신이 가르친 것을 행하셨다 (요 8:46; 벧전 2:22)", "그분은 자신에 관한 성경의 예언들을 모두 성취시키심으로, 그 예언들이 참되다는 것을 증명하셨다 (고후 1:20)", "[예수께서 봉사하던 기간에 성취시키신 한두 가지 예언을 간단히 언급한다. “성경 질문과 대답”에서 “메시아에 관한 예언은 정말로 예수가 메시아라는 점을 입증해 줍니까?” 기사에 열거되어 있는 예언들을 참조한다]", "예수께서 정말로 진리를 가르치셨다고 결론 내리는 것이 합리적이다"]}, {"title": "‘진리로 아버지를 숭배하십시오’", "points": ["예수께서는 자신의 아버지를 진리로 숭배할 사람들이 있을 것이라고 말씀하셨다 [요한복음 4:23 낭독]", "“참숭배자들”은 하느님께서 승인하시는 방식으로 그분을 숭배하는 사람들이다", "그들의 숭배 방식은 진리에 기초를 두고 있다", "오늘날 그런 사람들을 찾는 것이 가능한가? 예수께서 가르치신 내용을 더 살펴보자", "예수께서는 하느님의 “말씀은 진리”라고 가르치셨다", "따라서 참숭배자들은 성경을 그들의 믿음과 행동의 기초로 받아들인다 (살전 2:13)", "예수께서는 자신이 “진리”라고 가르치셨다", "그러므로 참숭배자들은 예수의 가르침을 받아들이고 그분의 본을 따르려고 노력한다 (벧전 2:21)", "그들은 전쟁에 참여하지 않고 서로 사랑한다 (요 13:35)", "그들은 체포되거나 심지어 죽임을 당하게 되더라도 정치적으로 중립을 유지한다 (요 17:14) [시각 자료 2]", "그들은 적극적으로 사람들에게 “왕국의 좋은 소식”을 전한다 (눅 4:43; 마 28:19, 20) [시각 자료 3]", "수백만 명이 넘는 사람들은 여호와의 증인들이 바로 이렇게 하고 있으며 “진리로 아버지를 숭배”하기 위해 노력하는 사람들이라고 결론 내렸다", "[여호와의 증인에 대해 회의적이었던 한 사람에 대한 동영상을 함께 시청한다. 동영상을 본 후, 그가 자신의 생각을 바꾼 이유가 무엇인지 간단히 강조한다 (2:41)]"]}, {"title": "당신도 진리를 알 수 있다", "points": ["성경에는 사람들이 그토록 알고 싶어 하는 다음과 같은 질문들에 대한 진정한 답이 들어 있다", "우리가 존재하는 이유는 무엇인가? 사람이 죽으면 어떻게 되는가? 행복한 삶을 사는 비결은 무엇인가?", "[맞춤형 성경 공부 과정을 통해 이러한 질문들에 대한 답을 알아보도록 권한다]", "진리는 그것을 얻기 위해 어떤 희생이라도 치를 가치가 있는 소중한 보물과 같다 (잠 23:23)", "그 보물을 당신도 찾을 수 있다. 그 보물이 당신의 것이 되도록 할 것인가? 그렇게 하기를 진심으로 바란다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 63 10/25"]}]}, {"no": 64, "title": "당신은 ‘쾌락을 사랑하는 사람’이 될 것인가, ‘하느님을 사랑하는 사람’이 될 것인가?", "t": 3, "note": "", "sections": [{"title": "사탄은 우리가 하느님이 아니라 쾌락을 사랑하기를 바란다", "points": ["여호와는 “행복하신 하느님”이시며 우리가 삶을 즐기기를 바라신다 (딤전 1:11)", "그분은 “우리가 즐기는 모든 것을 풍부히 주신다” (딤전 6:17; 행 14:17)", "사탄은 행복해지려는 우리의 자연스러운 욕구를 교묘히 이용하려고 한다", "사탄은 자신의 손아귀에 있는 세상을 이용해, 쾌락을 추구하는 것이 인생에서 가장 중요한 일이라는 생각을 부추긴다 (요1 2:15, 16; 5:19)", "그 결과 오늘날 많은 사람은 “하느님을 사랑하기보다는 쾌락을 사랑”한다 [디모데 후서 3:1, 4 낭독] \n(「파18.01」 25면 15항)"]}, {"title": "‘쾌락을 사랑하는 사람’이 진정한 행복을 얻을 수 있는가?", "points": ["쾌락을 추구하는 데 몰두하는 삶은 공허하고 만족을 주지 못한다", "솔로몬왕은 여러 가지 쾌락을 마음껏 맛보고 어떤 결과가 있는지 알아보려고 했다 (전 2:1-9)", "그는 그 모든 일이 “헛되어 바람을 쫓아다니는 것”임을 알게 되었다 [전도서 2:10, 11 낭독]", "어떤 사람들은 하느님이 불쾌하게 여기시는 방식으로 쾌락을 추구한다", "성적으로 부도덕한 일을 하거나 과음을 하거나 마약을 남용하는 사람들은 흔히 감정적·신체적 해를 입는다 \n(갈 6:7, 8)", "진정한 행복은 여호와와 좋은 관계를 누릴 때 얻게 된다 (시 112:1; 마 5:3)", "“현 생활의 · · · 쾌락에 정신을 빼앗”기는 사람은 하느님과 가까워질 수 없다 (눅 8:7, 11, 14)"]}, {"title": "자신이 ‘하느님을 사랑하는 사람’이라는 것을 어떻게 나타낼 수 있는가?", "points": ["쾌락을 추구하는 일을 삶에서 가장 중요한 위치에 두지 말라", "살아가면서 이런저런 즐거움을 누리는 것 자체가 잘못된 일은 아니다 (전 5:18)", "휴식을 취하고 여가 활동을 즐기는 것은 건강을 유지하는 데 필요한 일이다 (막 6:31)", "예수께서도 친구들과 편안하게 여가를 즐기기도 하셨다. 하지만 그분은 하느님의 뜻을 행하는 것을 중심으로 살아가셨다 (요 4:34)", "여가 활동에 과도한 시간을 사용하지 말라 [에베소서 5:15, 16 낭독] (「파19.10」 30-31면 16-17항; \n「파17.05」 25면 13항)", "음식과 술을 과도하게 즐기지 않도록 주의하라 (잠 23:20; 눅 21:34, 35)", "여러 사람과 어울리는 사적인 모임에서 분위기에 휩쓸려 자제력을 잃지 않도록 조심하라 (벧전 4:3)", "오락을 주의 깊이 선택하라", "세상이 제공하는 많은 오락은 부도덕하고 폭력적이고 영매술과 관련이 있다", "오락을 선택할 때 성경 원칙들을 적용하라 (시 11:5; 고전 10:21; 「파19.10」 30면 12항) [시각 자료 1]", "당신에게 좋은 영향을 줄 수 있는 친구들을 선택하라", "하느님을 기쁘시게 하는 일을 중심으로 살아가는 사람들과 새 힘을 주는 교제를 나누라 (잠 13:20)", "온통 즐기는 데에만 정신을 쏟는 사람들과는 교제를 피하라 (고전 15:33)", "가치 있는 활동을 하면서 기쁨을 찾으라", "성경을 읽고 하느님께 기도함으로 그분과 가까워지라 (시 1:1, 2; 살전 5:17)", "그리스도인 집회에 정기적으로 참석하여 영적으로 새 힘을 얻으라 (히 10:24, 25)", "다른 사람들에게 선을 행하면 큰 기쁨을 얻을 수 있다 (행 20:35; 히 13:16)", "다른 사람들이 여호와를 알도록 돕는 것은 큰 만족을 준다"]}, {"title": "하느님에 대한 사랑을 키울 때 얻게 되는 상", "points": ["하느님에 대한 사랑을 키우려면 노력이 필요하지만, 그렇게 할 때 큰 상을 얻게 된다", "우리는 가장 훌륭한 친구이신 여호와와 우정을 누리게 된다 [시편 73:28 낭독]", "하느님을 사랑하는 사람들은 이 세상 제도가 끝날 때 살아남을 전망을 갖게 된다 (요1 2:17)", "여호와께서는 자신을 사랑하는 사람들에게 낙원에서의 영원한 생명을 상으로 주실 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 64  5/21"]}]}, {"no": 65, "title": "분노가 가득한 세상에서 평화를 이루는 방법", "t": 9, "note": "불공정을 겪는 사람들이 분노를 버리고 문제를 여호와의 손에 맡기도록 따뜻하게 권고한다. 항의 시위나 보복 행위를 하는 것보다 그리스도인으로서 평화를 이루는 태도를 보이는 것이 더 좋은 결과를 가져온다는 점을 확증된 경험담을 사용하여 설명한다", "sections": [{"title": "갈수록 불안정해지고 분노에 휩싸이는 세상", "points": ["성경은 “마지막 날”에 사람들이 이기적이고 증오심을 나타낼 것이라고 예언했다 (딤후 3:1-3)", "불공정을 겪는 일부 사람들은 폭력적인 보복 행위를 함으로 또 다른 분노를 낳는다 (「파07」 4/15 4면; 「깨」 11/6 5-6면)", "분노에 사로잡히지 않기 위해 어떻게 할 수 있는가?"]}, {"title": "전능하신 하느님께서 불공정을 영원히 없애실 것이다", "points": ["여호와 하느님께서는 불공정을 미워하시며 불공정을 없애겠다고 약속하신다 [시편 37:10, 11 낭독]", "인간의 정치적인 해결책이나 항의 시위는 하느님께서 정의를 실현하기 위해 사용하시는 방법이 아니다 (단 7:13, 14)", "하느님께서는 아들 예수 그리스도를 사용하여 다른 사람을 압제하는 자들을 모두 없애실 것이다 (시 72:13, 14)", "성경은 하느님이 악한 자들을 없애실 때를 “여호와의 분노의 날”이라고 부른다 \n(습 2:2)", "인간의 분노와 달리 하느님의 분노는 언제나 정당하며 결코 도를 넘지 않는다 \n(「통」-1 932면)", "하느님께서 취하시는 행동은 전 세계에 “풍부한 평화”를 가져올 것이다", "그러한 평화를 누리려면 여호와께서 불공정을 바로잡기 위해 사용하시는 방식을 따라야 한다 (습 2:3)"]}, {"title": "평화를 이루는 사람이 되어 선으로 악을 이기라", "points": ["[로마서 12:18-21의 주요 부분들을 낭독하고 설명한다]", "18절: “가능하다면 여러분이 할 수 있는 대로 모든 사람과 평화롭게 지내십시오”", "평화를 이루는 태도를 보임으로 하느님께서 불공정을 해결하기 위해 사용하시는 방식을 지지하고 있음을 나타내라", "화를 잘 터뜨리거나 보복 행위를 옹호하는 사람들과 어울리는 일을 피하라 (잠 22:24, 25)", "19절: “스스로 복수하지 말고 진노에 맡겨 두십시오. ‘여호와께서 말씀하신다. “복수는 나의 것이니, 내가 갚아 주겠다” ’라고 기록되어 있습니다”", "보복 행위는 스스로에게 해를 끼칠 뿐이며 증오의 악순환을 가져온다 (「파09」 9/1 21-23면)", "보복을 하는 대신, 여호와 하느님께서 행동하실 것이라는 믿음을 강화하라", "예수를 본받으라. 그분은 여호와께서 불공정한 행위에 대해 복수해 주실 것임을 확신하셨다 (벧전 2:23)", "20절: “네 원수가 굶주리거든 먹이고, 목말라하거든 마실 것을 주어라”", "“원수”에게 선한 일을 할 방법을 찾음으로 분노와 보복의 악순환을 끊으라", "다른 사람에게 선한 일을 하는 주된 방법은 불공정이 없어질 것이라는 성경의 희망적인 소식을 전하는 것이다 (「연09」 212-213면)", "21절: “악에게 지지 말고”", "불공정에 맞서 할 수 있는 일이 없다고 느껴지더라도, 가족이나 친구들에게 울분을 터뜨려서는 안 된다", "하느님과 일치한 생각을 가진 장성한 벗의 도움을 받으라 (「깨05」 2/22 19-20면)", "여호와께 기도로 자신의 심정을 털어놓으라 (시 37:5, 6; 55:22)", "21절: “계속 선으로 악을 이기십시오”", "합당한 근거가 있다면 언제나 다른 사람을 기꺼이 용서하라 (엡 4:31, 32; 「깨95」 6/15 10면 6-7항)", "분한 마음을 떨쳐 버리고 문제를 여호와의 손에 맡기라 (「파13」 6/15 20-21면 15-16항; 「파00」 8/15 5면 네모)", "하느님의 성령은 마음속 깊이 뿌리 박힌 분노를 극복할 힘을 줄 수 있다 (고후 10:4, 5; 빌 4:13)", "분노를 버리고 동정심 어린 평온한 마음을 갖게 도와 달라고 하느님께 청하라 \n(「파10」 6/15 23-24면 18-19항)"]}, {"title": "평화를 이루면 축복을 받게 된다", "points": ["많은 사람이 평화를 이루는 태도에 관한 성경 원칙을 적용하여 축복을 경험했다", "폭력적인 삶을 청산했다 (「깨」 12/6 19-21면; 「깨」 11/6 6-7면; 「깨03」 1/8 18-20면)", "건강이 좋아지고 더 행복한 삶을 살게 되었다 (잠 14:30; 마 5:5, 9; 「깨」 06/5 28-29면)", "일부 사람들은 이전에 반대하던 사람이 변화하도록 돕기도 했다 (롬 12:20, 각주; \n「연10」 63-64면)", "불공정을 겪은 사람들은 과거를 바꿀 수는 없지만 밝은 미래를 기대할 수 있다 [시편 37:8, 9 낭독]", "계속 여호와의 증인과 연합하여 “여호와께 희망을 두는” 법을 배우길 권한다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 65-KO 7/16\t 30분에 다룰 것"]}]}, {"no": 66, "title": "당신은 수확하는 일에 참여할 것인가?", "t": 7, "note": "", "sections": [{"title": "수확할 일꾼들이 더 필요하다", "points": ["예수께서 땅에 계실 때 하신 주된 일은 하느님의 왕국의 좋은 소식을 전파하는 것이었다 [마태복음 9:35-38 낭독]", "그분은 전파 활동을 수확하는 일에 비유하셨고 더 많은 일꾼들이 필요하다고 말씀하셨다 [시각 자료 1]", "예수 시대에 일꾼들이 긴급히 필요했던 것처럼, 오늘날에도 그러하다", "당신은 이 중요한 일에 최대한 열심히 참여하고 있는가?"]}, {"title": "왜 우리는 좋은 소식을 전파하는가?", "points": ["우리는 여호와와 예수, 사람들을 사랑하기 때문에 전파한다 (마 22:37-39)", "우리는 여호와를 사랑한다", "우리는 사람들 앞에서 여호와의 이름을 거룩하게 하기를 원한다 (마 6:9; 「파18.05」 18면 4항)", "우리는 여호와에 대한 사랑에서 우러나와, 다른 사람들에게 그분이 우리를 위해 해 오신 일과 그분의 특성에 관해 이야기한다 (시 145:7-12)", "우리는 예수를 사랑한다", "우리는 예수께서 우리를 위해 하신 일에 감사한다 (마 20:28)", "우리는 예수에 대한 사랑에서 우러나와, 전파하고 가르치라는 그분의 명령에 순종한다 \n[마태복음 28:19, 20 낭독]", "우리는 사람들을 사랑한다", "왕국 소식은 사람들에게 위로와 희망을 준다 (시 37:10, 11) [시각 자료 2]", "우리는 다른 사람들도 우리처럼 진리를 알게 되어 유익을 얻기를 바란다 (요 8:32)", "사람들이 영원한 생명을 얻으려면 좋은 소식을 듣고 받아들일 필요가 있다 [로마서 10:13, 14 낭독]"]}, {"title": "수확하는 일에 참여하는 데 방해가 되는 어려움들을 어떻게 극복할 수 있는가?", "points": ["일부 사람들은 다른 사람에게 좋은 소식을 알려 주기를 주저한다", "그들은 가족이나 직장 동료, 이웃 사람들에게서 조롱이나 반대를 당할까 봐 두려워할지 모른다 \n(마 10:16, 36)", "수줍음이 많거나 성경 지식이 부족하다고 느끼는 사람들도 있다", "그러한 어려움들을 극복하는 데 무엇이 도움이 되는가?", "당신 혼자 이 일을 하는 것이 아님을 기억하라", "예수께서는 자신의 제자들을 도와주겠다고 약속하셨다 (마 28:20; 「파14」 11/15 6면 15항)", "전파하는 기술을 발전시키도록 도와줄 수 있는 경험 많은 증인들과 함께 전파하라 (눅 10:1)", "할 말을 미리 준비하라", "성경의 어떤 가르침이 당신에게 감동을 주었는지 생각해 보라. 그런 다음 그 내용을 어떻게 흥미를 끄는 방식으로 다른 사람에게 소개할 것인지 준비하라 (골 4:6; 「파19.07」 15면 6-7항)", "평일 집회에서 살펴보는 대화 방법 제안을 활용하라 (「파21.08」 24면 18항)", "성경 지식이 부족하더라도 주저하지 말라", "대답하기 힘든 질문을 받을 경우, 그에 대해 조사를 한 다음 알게 된 점을 이야기해 줄 수 있다 \n(딤후 2:15)", "많은 사람은 일상생활을 하면서 가족, 친구, 직장 동료에게 증거함으로 추수하는 일에 참여하기 시작한다", "믿음과 용기를 달라고 여호와께 기도하라", "그분은 당신에게 필요한 힘을 주실 것이다 (행 4:29, 31; 「파20.09」 5-6면 12-13항)", "성경에 나오는 예들을 통해 배우라", "여호와께서는 사람들이 그분의 소식을 전할 수 있도록 힘을 주셨다 (렘 1:6-8; 살전 2:2)"]}, {"title": "왜 지금 긴급히 수확하는 일을 해야 하는가?", "points": ["지금은 수확하는 일에 열심을 다해야 할 때이다 (마 24:14)", "이 세상의 끝이 빠르게 다가오고 있다 (습 1:14)", "여호와께서는 너무 늦기 전에 사람들이 그분을 찾기를 바라신다 (습 2:2, 3)", "당신뿐 아니라 당신이 전하는 소식을 잘 듣는 사람들은 영원한 생명의 전망을 갖게 될 것이다 (딤전 4:16)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 66  6/21"]}]}, {"no": 67, "title": "여호와의 말씀과 그분의 창조물에 대해 묵상하십시오", "t": 0, "note": "", "sections": [{"title": "묵상이란 무엇인가?", "points": ["세상에는 다양한 형태의 묵상 혹은 명상 방법이 존재한다", "성경에서 말하는 묵상이란 건전한 주제에 관해 목적을 가지고 생각하는 것을 말한다 (「깨」 14/5 14면 2항)", "이러한 주제 가운데에는 하느님의 말씀 그리고 그분이 하신 일들이 포함된다 [시편 77:11, 12 낭독]"]}, {"title": "왜 묵상해야 하는가?", "points": ["성경은 우리에게 묵상하라고 권한다 [시편 1:2, 3 및 각주 낭독] (「파09」 3/1 17면 5-7항) [시각 자료 1]", "묵상을 하면 여호와와 우정이 더 깊어지고 그분의 말씀과 그분이 하신 일들에 대해 감사하는 마음이 커진다 \n(시 143:5)", "묵상을 하면 하느님을 더 기쁘시게 해 드리는 방식으로 생각하고 말하고 행동하는 법을 알게 된다 (수 1:8)", "묵상을 하면 다른 사람들에게 여호와에 관해 가르치는 능력을 발전시키는 데 도움이 된다 (딤전 4:15, 16, 각주; 「파20.09」 28면 12항)"]}, {"title": "어떻게 하느님의 말씀에 대해 묵상할 수 있는가?", "points": ["다음과 같은 질문들을 사용해 묵상할 수 있다. (1) ‘이 내용은 여호와에 대해 무엇을 알려 주는가?’ (2) ‘어떻게 내 생활에 이 내용을 적용할 수 있는가?’ (3) ‘다른 사람을 돕기 위해 어떻게 이 내용을 사용할 수 있는가?’", "[다음에 나오는 예들 중 일부를 사용해 하느님의 말씀에 대해 묵상하는 방법을 설명한다. 각각의 경우에, 성구를 읽은 다음 위에 언급된 세 가지 질문을 사용해 묵상하는 방법을 보여 준다]", "창세기 19:17-22: 여호와께서는 우리를 대하실 때 합리적인 태도를 나타내신다 (「파13」 6/15 15면 12-14항; 16면 18항)", "욥기 14:14, 15: 여호와께서는 자신의 사망한 종들도 소중히 여기신다 (「파11」 3/1 22면)", "시편 78:40, 41: 우리의 행동은 하느님의 감정에 영향을 미친다 (「파11」 7/1 10면; 「까」 15면 22항)", "사도행전 3:19: 여호와께서는 죄인들이 회개하면 그들을 완전히 용서하신다 (「파13」 6/15 19-20면 11-16항)", "히브리서 11:6: 여호와께서는 자신을 충실하게 섬기는 사람들에게 상을 주신다 (「파16.12」 28면 17-19항; 「파13」 11/1 11면)", "이 성구들은 몇 가지 예에 불과하다. 하느님의 말씀에 기록된 모든 것은 묵상할 수 있는 좋은 재료가 된다 \n(롬 15:4)", "여호와의 증인이 발행한 출판물들은 성경에 대해 더 깊이 생각하는 데 도움이 된다 (빌 4:8)"]}, {"title": "어떻게 하느님의 창조물에 대해 묵상할 수 있는가?", "points": ["다음과 같은 질문들을 사용해 여호와의 창조물에 대해 묵상할 수 있다. (1) ‘이 창조물은 여호와의 특성에 대해 무엇을 알려 주는가?’ (2) ‘이 창조물은 여호와께서 우리를 대하시는 방식에 대해 무엇을 알려 주는가?’ \n[시각 자료 2]", "[다음에 나오는 예들 중 일부를 사용해 창조물에 대해 묵상하는 방법을 설명한다. 각각의 경우에, 위에 언급된 두 가지 질문을 사용해 묵상하는 방법을 보여 준다]", "창조물은 하느님에 대한 외경심 그리고 그분의 사랑에 대해 감사하는 마음을 불러일으킨다 (시 8:3, 4; \n「파20.01」 15면 5항; 「파20.06」 10면 7항)", "창조물은 여호와의 능력이 매우 강하고 그분이 우리에게 힘을 주실 수 있다는 점을 알려 준다 \n(사 40:26-31; 「파18.01」 8-9면 5-11항)", "창조물은 여호와께서 우리에게 필요한 모든 것을 공급해 주실 것이라는 점을 가르쳐 준다 (마 6:26; \n「파16.07」 9-10면 11-13항)"]}, {"title": "시간을 내어 묵상하라", "points": ["생활이 바쁘다 하더라도 시간을 내서 성경과 하느님의 창조물에 대해 묵상하면 큰 유익을 얻게 된다 \n(「파19.05」 26면 1-2항)", "여호와께서는 시간을 내어 묵상하는 사람들을 소중히 여기신다 [말라기 3:16 낭독] (「파12」 12/1 11면)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 67 6/21"]}]}, {"no": 68, "title": "“계속 ··· 서로 기꺼이 용서하십시오”", "t": 3, "note": "", "sections": [{"title": "다른 사람을 기꺼이 용서해야 하는 이유", "points": ["우리 모두는 불완전하기 때문에 다른 사람을 용서해야 하고 또 다른 사람에게 용서를 받아야 한다 (전 7:20; 약 3:2)", "여호와께서 우리를 기꺼이 용서하신 것처럼 우리도 “그렇게 해야 한다” [골로새서 3:13 낭독]", "기꺼이 용서하는 것에는 “용서하겠다”고 말하는 것보다 많은 것이 관련된다", "“불평할 이유”가 있더라도 기꺼이 그리고 진심으로 용서해야 한다", "다른 사람을 기꺼이 용서하는 것은 어려울 수 있으며, 상처를 받았을 때에는 특히 더 그러하다", "기꺼이 용서하는 데 도움이 되는 세 가지 점을 살펴보자. (1) 용서가 무엇을 의미하고 무엇을 의미하지 않는지 이해하는 것 (2) 여호와의 용서를 본받는 것 (3) 용서할 때 얻는 유익에 초점을 맞추는 것"]}, {"title": "용서가 무엇을 의미하고 무엇을 의미하지 않는지 이해하라", "points": ["[“성경 질문과 대답” 항목의 “용서란 무엇입니까?” 기사 참조]", "용서한다는 것은 잘못을 묵인하거나 대수롭지 않게 여기는 것도 아니고, 그런 일이 전혀 없었다는 듯이 행동하는 것도 아니다", "여호와께서는 우리를 용서하실 때 우리의 죄를 묵인하거나 대수롭지 않게 여기시는 것이 아니다", "용서한다는 것은 남에게 마냥 이용당하는 것이 아니다 (잠 14:15)", "용서한다는 것은 잘못한 사람을 타당한 근거도 없이 너그럽게 봐주는 것이 아니다", "여호와께서는 나쁜 마음으로 고의적인 죄를 저지르고 뉘우치지 않는 사람들을 용서하지 않으시며, 우리에게도 그런 사람을 용서할 것을 요구하지 않으신다", "간단히 말해, 용서한다는 것은 다른 사람의 잘못에 대해 분한 마음을 떨쳐 버리기로 선택하는 것이다", "분한 마음을 품으면 잘못한 사람이 아니라 우리 자신이 해를 입는다 (시 37:8; 「파22.06」 10면 10항)", "잘못한 사람이 회개하지 않는 것처럼 보일 때, 우리는 분한 마음을 품을 것이 아니라 확신을 가지고 문제를 여호와의 손에 맡길 수 있다 (롬 12:19-21; 「파22.06」 10면 11항)"]}, {"title": "여호와의 용서를 본받으라", "points": ["여호와께서 어떻게 용서하시는지 생각해 보라", "여호와께서는 가능하다면 언제나, 심지어 사람들이 그분을 화나게 할 때에도 용서하기를 원하신다 (느 9:17; 시 86:5)", "그분은 불완전한 사람들에게 완전함을 기대하지 않으신다 (시 103:13, 14)", "그분은 우리를 거듭거듭 용서하신다. 우리는 날마다 그분의 용서가 필요하다 (마 6:12)", "그분은 우리가 과거에 지은 잘못에 대해 분한 마음을 품고 계시지 않는다. 그분은 용서하시고 나면 잊으신다 (시 103:9, 12; 「까」 262면 9항)", "그분은 어떤 죄를 용서하고 나면 그 문제를 더는 생각하지 않으시고 잘못한 사람을 재차 처벌하지 않으신다는 의미에서 잊으신다 (렘 31:34; 「까」 265-266면 16-17항)", "우리는 어떻게 여호와의 용서를 본받을 수 있는가?", "우리는 성급하게 화내지 않음으로 그분을 본받을 수 있다 (잠 29:22; 전 7:9)", "많은 경우 우리는 사과할 것을 요구하지 않고 용서할 수 있다 (벧전 4:8)", "우리는 기꺼이 다른 사람의 결점을 너그럽게 보아 넘기고 필요하다면 계속해서 용서해야 한다 (마 18:21,  22)", "우리가 누군가를 용서했다면 나중에 다시 그 일을 문제 삼지 않음으로 용서하고 잊을 수 있다 (잠 17:9)"]}, {"title": "용서할 때 얻는 유익에 초점을 맞추라", "points": ["용서하면 자신과 다른 사람들 모두에게 유익하다 [시각 자료 1]", "우리의 신체적, 정신적 건강에 도움이 된다 (잠 14:30; 「깨18.1」 10-11면)", "다른 사람들과 평화로운 관계를 누리게 된다 (약 3:18)", "회중의 평화에 기여하게 된다 (엡 4:1-3, 32)", "가장 중요한 것으로 여호와와의 소중한 관계를 지키게 된다 (마 6:14, 15)", "다른 사람들을 기꺼이 용서함으로 늘 여호와를 기쁘게 해 드리기 바란다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 68 9/22"]}]}, {"no": 69, "title": "왜 자기희생적인 사랑을 나타내야 하는가?", "t": 0, "note": "", "sections": [{"title": "참그리스도인은 자기희생적인 태도를 나타낸다", "points": ["오늘날 많은 사람은 자기를 중심으로 살아야 행복하다고 믿는다", "그들은 자기가 원하는 것을 얻기 위해서는 기꺼이 희생한다. 하지만 다른 사람을 위해 희생하기는 주저할지 모른다", "성경에 예언된 대로 그들은 “자기를 사랑한다” (딤후 3:1, 2; 「파18.01」 23면 5항)", "그와는 달리, 참그리스도인은 자기보다 다른 사람들의 유익과 그들에게 필요한 것들을 먼저 생각한다 \n(고전 10:24)", "참그리스도인은 “자기 유익을 구하지 않는” 사랑을 가지고 있으며, 그 사랑에서 우러나와 자기희생적인 삶을 살아간다 (고전 13:4, 5)"]}, {"title": "자기희생적인 사랑을 나타내야 하는 이유", "points": ["여호와 하느님과 예수는 희생적인 사랑을 나타내는 면에서 최고의 모범이시다", "여호와께서는 우리가 영원한 생명을 얻을 수 있는 마련을 해 주셨다 (요 3:16; 요1 4:9, 19; 「파배17.2」 5면 1-6항)", "예수께서는 순종하기 어려울 때에도 하느님께 순종하셨으며, 우리를 위해 자신의 생명을 기꺼이 내주셨다 \n(마 20:28; 26:39; 요 14:31; 15:13) [시각 자료 1]", "우리는 여호와와 예수께서 나타내신 사랑에 감동되어 그분들을 본받으려고 노력한다 [에베소서 5:1, 2 낭독] \n(고후 5:14, 15)", "사랑을 나타낼 때 우리는 주는 일을 하는 데서 오는 행복을 경험하게 된다 (행 20:35; 「까」 300면 1-3항)"]}, {"title": "자기희생적인 사랑을 나타내는 방법", "points": ["하느님께 헌신하고 침례를 받음으로 그분에 대한 사랑을 나타내라", "예수께서는 제자들이 자기 자신을 부인해야 한다고 말씀하셨다 [마태복음 16:24 낭독] (「파05」 3/15 11면 8항)", "침례를 받은 이후, 그리스도인은 생활의 모든 부면에서 자기희생적인 사랑을 나타내야 한다", "가족들에게 사랑을 나타내라", "남편과 아내는 자기보다 배우자에게 필요한 것들을 먼저 생각함으로 사랑을 나타낸다 (엡 5:22, 28, 29, 33; 「파20.07」 3-4면 4-6항) [시각 자료 2]", "가장은 가족의 영적, 감정적, 물질적 필요를 채워 줌으로 사랑을 나타낸다 (신 6:6, 7; 「파21.02」 6면 14-16항)", "모든 사람에게 사랑을 나타내라", "여러 가지 방법이 있겠지만, 무엇보다 다른 사람들이 여호와에 대해 배우도록 도우라 (마 9:36, 37; \n롬 1:14-16) [시각 자료 3]", "어려움에 처한 사람들을 돕고 위로하라 (요1 3:16-18; 「파15」 2/15 9면 15항)", "자신이 하는 선택 때문에 다른 사람들이 걸려 넘어지지 않도록 주의하라 (고전 10:31-33; 갈 5:13)"]}, {"title": "자기희생적인 사랑을 나타내면 풍성한 축복을 받는다", "points": ["자기중심적인 삶을 살면 진정한 행복을 얻을 수 없다", "예수의 제자로 사는 삶은 희생이 따르지만, 그 삶은 우리에게 새 힘을 준다 (마 11:28-30; 「파04」 8/15 22면 1항; 22-23면 5-7항)", "자기희생적인 사랑을 나타내면 만족을 얻고 풍성한 축복을 받게 될 것이다 (잠 11:25; 마 19:29)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 69 6/21"]
