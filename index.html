: ["모든 사람은 구원이 필요하다 (롬 3:23)", "우리 자신의 힘으로는 구원을 얻을 수 없다"]}, {"title": "구원의 근거", "points": ["예수의 속죄 희생이 구원의 토대이다 (요 3:16)", "하느님의 사랑과 은혜가 구원을 가능케 한다 (엡 2:8)"]}, {"title": "구원을 받기 위한 조건", "points": ["여호와 하느님과 예수 그리스도를 알고 믿는다 (요 17:3)", "회개하고 세례를 받는다 (행 2:38)", "끝까지 인내한다 (마 24:13)"]}, {"title": "누구나 구원받을 수 있다", "points": ["진심으로 구하는 사람은 누구나 구원받을 수 있다", "지금이 구원을 위한 행동을 취할 때이다"]}]}, {"no": 125, "title": "인류에게 택복이 필요한 중요한 이유", "t": 9, "note": "", "sections": [{"title": "인류가 축복이 필요한 이유", "points": ["인간이 완전하지 않기 때문이다 (롬 5:12)", "죄와 죽음의 문제를 스스로 해결할 수 없다"]}, {"title": "하느님께서 축복을 주시는 방법", "points": ["예수의 속죄를 통해 (롬 5:18, 19)", "부활을 통해 (요 5:28, 29)", "새 세상에서의 완전한 삶을 통해"]}, {"title": "그리고도인이 담아 나는 이유", "points": ["하느님의 사랑을 반영한다", "다른 사람들을 돕는 기쁨이 있다"]}, {"title": "지금 축복을 경험하는 방법", "points": ["하느님의 말씀을 따른다", "기도와 연구로 하느님과 가까워진다"]}]}, {"no": 126, "title": "사람이 죽으면 어떻게 될 것인가?", "t": 6, "note": "죽음에 대한 성경의 가르침을 명확히 설명하여 위안과 소망을 준다", "sections": [{"title": "죽음에 대한 세상의 다양한 견해", "points": ["사람들은 죽음 후 무엇이 있는지 궁금해한다", "다양한 종교와 철학이 다른 견해를 가르친다"]}, {"title": "성경은 죽음에 대해 무엇을 가르치는가?", "points": ["죽은 자들은 아무것도 알지 못한다 (전 9:5)", "죽음은 존재의 중단이다 (시 146:4)", "영혼불멸 교리는 비성경적이다"]}, {"title": "희망이 있다—부활", "points": ["하느님은 죽은 자들을 기억하신다 (욥 14:13)", "부활을 통해 죽은 자들이 다시 살 것이다 (요 5:28, 29)"]}, {"title": "부활에 대한 확신을 갖는 방법", "points": ["예수의 부활이 우리의 희망의 근거이다 (고전 15:20-22)", "하느님의 약속을 신뢰한다"]}]}, {"no": 127, "title": "누가 구원을 받을 수 있는지? (2)", "t": 6, "note": "", "sections": [{"title": "구원의 범위", "points": ["하느님은 모든 사람이 구원받기를 원하신다 (딤전 2:4)", "구원의 기회는 광범위하게 주어진다"]}, {"title": "구원받는 사람들의 특징", "points": ["하느님의 말씀을 듣고 받아들인다", "예수의 속죄 희생을 믿는다", "하느님의 뜻을 실천한다"]}, {"title": "지금 어떤 행동을 취해야 하는가?", "points": ["좋은 소식을 진지하게 받아들인다", "변화를 위한 구체적인 행동을 취한다"]}, {"title": "구원의 기쁨", "points": ["구원받은 자들은 영원한 생명을 누린다", "하느님과의 영원한 관계를 갖는다"]}]}, {"no": 128, "title": "사람은 죽으면 어떻게 되는가?", "t": 6, "note": "죽음의 실상에 대한 성경의 가르침을 통해 위로와 희망을 준다", "sections": [{"title": "죽음에 대한 공통된 질문", "points": ["죽으면 모든 것이 끝나는가?", "사랑하는 사람을 다시 볼 수 있는가?"]}, {"title": "성경의 답변: 죽음은 무의식 상태", "points": ["죽은 자들은 아무것도 알지 못한다 (전 9:5)", "죽음은 잠과 같다 (요 11:11-14)", "의식도 활동도 없다 (시 146:4)"]}, {"title": "부활의 희망", "points": ["예수께서 부활을 약속하셨다 (요 5:28, 29)", "라자로의 부활이 예표가 된다 (요 11장)", "죽은 자들이 여호와의 기억 속에 있다"]}, {"title": "이 소망이 우리에게 주는 위로", "points": ["슬픔 가운데서도 희망이 있다", "우리의 행동 방식에 영향을 미친다"]}]}, {"no": 129, "title": "삼위일체는 성경의 가르침인가?", "t": 4, "note": "", "sections": [{"title": "삼위일체를 믿어야 하는가?", "points": ["삼위일체는 “그리스도교의 중심 교리”로 여겨져 왔다 (「파09」 4/1 18면 1항)", "아버지, 아들, 성령이 모두 “동일하게 하느님”이라는 교리가 사실인가? (「깨05」 4/22 6면 5항)", "우리의 영원한 생명은 “오직 한 분의 참하느님”이신 여호와와 그분의 아들 예수 그리스도에 관한 진리를 아는 것에 달려 있다 [요한복음 17:3 낭독]", "우리는 하느님의 말씀인 성경을 살펴봄으로 진리를 찾을 수 있다 (요 4:23, 24; 17:17)"]}, {"title": "여호와와 예수에 관한 진리는 무엇인가?", "points": ["성경에서는 오직 여호와만 전능한 하느님이라고 언급한다 (출 6:3; 계 19:6)", "여호와께서는 예수가 자신의 아들이라고 말씀하셨다 (마 17:5; 눅 3:21, 22; 「파88」 6/1 11면 9-10항)", "하느님께서는 이렇게 예수가 자신보다 낮은 위치에 있는 별개의 인격체라는 것을 보여 주셨다 (「파14」 5/15 9면 13항)", "여호와와는 달리 예수는 시작이 있으셨다 (합 1:12; 골 1:15, 16)", "예수께서는 하느님이 보내셔서 땅으로 오기 전에 하늘에 계셨다 (요 1:14, 18)", "예수께서는 자신이 아버지께 복종한다고 말씀하셨다 [요한복음 12:49 낭독] (요 5:19; 6:38)", "예수께서는 결코 자신이 하느님이라거나 하느님과 동등하다고 말씀하지 않으셨다 (요 14:28)", "예수께서는 자신의 아버지 여호와께 기도하셨다 (눅 22:41, 42; 23:46) [시각 자료 1]", "예수의 뜻은 아버지의 뜻과 다를 수 있다 (눅 22:42)", "예수께서는 자신은 모르고 아버지만 아시는 것이 있다고 언급하셨다 (막 13:32)", "삼위일체를 믿는 사람들은 예수가 땅에 있을 때 하느님보다 낮은 지위에 있으셨다는 것을 인정할지 모른다. 하지만 하늘에서도 예수의 지위는 하느님보다 낮다 (고전 11:3; 15:28)", "영광스럽게 되신 예수 그리스도는 자신의 아버지를 “내 하느님”이라고 거듭 부르셨다 (계 3:12)"]}, {"title": "성령에 관한 진리는 무엇인가?", "points": ["[“성경 질문과 대답” 항목의 “성령이란 무엇입니까?” 기사 참조]", "성령은 하느님의 활동력이다. 하느님은 자신의 뜻을 이루기 위해 성령을 사용하신다", "예를 들어 하느님께서는 성령을 사용해서 우주를 창조하시고, 성경 필자들에게 영감을 주시고, 성경에 기록된 기적들을 행하셨다 (시 33:6; 벧후 1:20, 21) [시각 자료 2]", "성령은 인격체가 아니다 (「파91」 1/15 4면)", "여호와와 예수와는 달리 성령에는 고유한 이름이 없다", "성경에서는 성령을 믿음과 사랑 같은 비인격적인 것들과 함께 언급한다 (행 6:5; 고후 6:4-6)", "일부 성경 구절에서 성령을 의인화하는 것은 사실이지만, 성경에는 지혜나 죽음 같은 것들을 의인화하는 경우도 나온다 (잠 1:20; 요 14:26; 롬 5:17)"]}, {"title": "삼위일체 교리는 어떻게 생겨났는가?", "points": ["초기 그리스도인들은 하느님을 삼위일체라고 생각하지 않았다 (고전 8:5, 6; 「파02」 7/15 18면 18항)", "성경에서는 그리스도교 가르침이 더럽혀질 것이라고 예언했다 (살후 2:3, 7; 딤후 4:3)", "거짓 그리스도인들이 그리스도교 가르침과 이교 그리스 철학을 혼합한 결과 하느님에 대한 혼란이 생겼다 (「파12」 1/15 6면 9-12항; 「파09」 11/1 7면 1-2항)"]}, {"title": "진리를 알면 하느님께 가까이 가는 데 도움이 된다", "points": ["우리가 여호와와 좋은 관계를 누리려면 여호와가 어떤 분이신지에 대한 진리를 알 필요가 있다", "우리는 여호와께만 우리의 숭배를 드려야 한다 (마 4:10)", "또한 우리는 예수께서 하시는 중요한 역할을 이해하고, 그분께 믿음을 나타내야 한다 (요 3:36; 14:6)", "하느님께 성령을 달라고 청하라. 그분은 성령을 사용하여 당신이 진리를 분별하도록 도와주실 것이다 (눅 11:13)", "우리가 하느님에 대한 진리를 알면 그분이 마땅히 받으셔야 할 찬양과 숭배를 드릴 수 있다 (계 4:11)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 129 5/22"]}]}, {"no": 130, "title": "당신은 계속하여 전진할 수 있는가?", "t": 9, "note": "", "sections": [{"title": "영적 성장을 계속해야 한다", "points": ["그리스도인의 성장은 일시적인 것이 아니다 (빌 3:12-14)", "계속해서 발전하고 성숙해야 한다"]}, {"title": "성장을 방해하는 것들", "points": ["안주하려는 경향", "영적 일과의 게을리함", "세상의 부정적 영향"]}, {"title": "계속 성장하는 방법", "points": ["규칙적으로 성경을 공부한다", "영적 목표를 설정하고 추구한다", "형제들과의 교제를 통해 격려를 받는다"]}, {"title": "계속 성장하는 유익", "points": ["더 효과적인 봉사자가 된다", "어려움을 더 잘 극복할 수 있다", "하느님께 더 가까워진다"]}]}, {"no": 131, "title": "마귀에 맞서 굳게 서 있으십시오!", "t": 3, "note": "", "sections": [{"title": "마귀는 누구 혹은 무엇인가?", "points": ["사람들은 마귀에 대해 서로 다른 견해를 갖고 있다 (「파05」 11/15 3면)", "많은 사람들은 마귀가 실제로 존재한다고 생각하지 않는다", "성경은 마귀가 눈에 보이지 않는 악한 영적 인격체라고 가르친다 (요 8:44)", "그는 한때 충실한 천사였지만 에덴동산에서 반역을 조장함으로 스스로 사탄 마귀, 즉 하느님과 인간의 적대자가 되었다 (창 3:1-5; 계 12:9; 「깨」 07/2 12면 1항—13면 4항)", "사탄은 뱀을 도구로 사용해 자신의 정체를 숨겼다 [시각 자료1]", "그는 거짓말과 속임수를 사용해 하와에게 잘못된 생각을 심어 주었다", "후에 다른 영적 인격체들도 그의 편에 가담하여 악귀가 되었다 (유 6)"]}, {"title": "마귀가 우리의 삶에 영향을 미칠 수 있는가?", "points": ["사탄은 배후에서 “온 세상”을 조종하고 있다 (요1 5:19; 요 12:31) [시각 자료 2]", "그의 영향력은 유독한 공기처럼 온 세상에 퍼져 있다 (고전 2:12)", "그는 세상의 정치, 종교, 상업 제도를 이용해 사람들을 잘못된 길로 인도하고 있다 (「파18.05」 23면 6-7항)", "마귀는 하느님을 기쁘게 해 드리기를 원하는 사람들에게 실제로 위험한 존재이다 [베드로 전서 5:8 낭독]", "그는 여러 가지 “교활한 행위”를 통해 우리를 여호와에게서 멀어지게 하려고 한다 (엡 6:11, 12)"]}, {"title": "우리는 어떻게 마귀를 대적할 수 있는가?", "points": ["성경은 우리가 마귀를 대적하는 것이 가능하다고 알려 준다 [야고보서 4:7 낭독]", "성경은 우리가 마귀의 계략을 알아차리고 물리치는 데 도움이 된다 (고후 2:11)", "어떻게 그의 거짓말과 속임수로부터 우리 자신을 보호할 수 있는가? [아래의 요점들 중에서 해당 지역의 상황에 가장 잘 맞는 요점에 초점을 맞춘다]", "모든 형태의 영매술을 피한다 (신 18:10-12; 「행누」 24과 요점 3)", "어떤 형태이든 영매술에 조금이라도 관심을 갖는 것은 하느님을 불쾌하시게 한다", "거짓 종교에서 벗어난다 (고후 6:15-17; 딤전 4:1, 2)", "여호와께서는 전적인 정성을 요구하시므로 우리는 비성경적인 가르침과 관습을 멀리해야 한다", "거짓 교리를 가르치는 사람들은 사탄처럼 자신의 정체를 숨긴다 (고후 11:14, 15)", "정치적인 중립을 유지한다 (요 15:19; 「행누」 45과)", "예수의 참제자들은 하느님의 왕국을 온전히 지지한다 (요 18:36)", "물질주의에 빠지지 않도록 조심한다 (마 6:24; 요1 2:15-17; 「파16.07」 8면 3-5항)", "부를 추구하는 것은 세상이 약속하는 지속적인 행복을 가져다주지 못한다", "성도덕에 관한 성경의 표준을 옹호한다 (엡 4:17-19; 「파11」 11/1 7면 1-4항)", "하느님의 도덕 표준에 대한 세상의 견해에 “잘못 인도되지 말라” (고전 6:9-11; 「파19.05」 22면 6-7항)", "잘못된 정보에 속지 않는다 (잠 14:15; 그밖주 기사 32; 「파18.08」 3-4면 3-4항)", "반대자들의 거짓말에 속지 말라 (마 15:14; 「행누」 58과 요점 1)"]}, {"title": "계속 마귀에 맞서 굳게 서 있으라", "points": ["사탄의 영향력은 곧 사라질 것이다 (롬 16:20; 「파15」 5/15 18면 18항)", "그때까지 우리는 계속 그와 맞서 싸워야 한다 [베드로 전서 5:9, 10 낭독]", "여호와의 도움으로 우리는 이길 수 있다! (「파05」 11/15 7면 2-3항)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 131 10/25"]}]}, {"no": 132, "title": "부활—죽음에 대한 승리!", "t": 6, "note": "", "sections": [{"title": "죽음은 적이다", "points": ["성경은 죽음을 우리의 적으로 묘사한다 (고전 15:26)", "사람은 계속 살고 싶은 자연스러운 욕구가 있다. 우리는 건강을 유지하고 가능한 한 오래 살기 위해 최선을 다한다", "우리는 사랑하는 사람과 사별할 때 고통을 느낀다", "전능하신 하느님 여호와께서는 죽음에 대해 완전한 승리를 약속하신다 (사 25:8)", "머지않아, “더 이상 죽음이 없고” 죽은 사람들이 부활될 것이다 (계 21:3, 4)"]}, {"title": "부활이란 무엇인가?", "points": ["성경에서 하느님은 죽은 사람을 다시 살리겠다고 약속하신다 (호 13:14)", "제한된 수의 사람들은 하늘에서 살도록 부활될 것이다 (계 20:6)", "그들은 예수와 함께, 인류를 하느님께서 원래 의도하신 완전한 상태로 회복시킬 것이다", "훨씬 더 많은 수의 사람들은 땅에서 살도록 부활될 것이다", "의로운 사람들과 불의한 사람들이 부활될 것이다 [사도행전 24:15 낭독] (「파22.09」 26면)", "“의로운 사람들”은 살아 있을 때 여호와를 충실히 섬긴 사람들이다", "“불의한 사람들” 가운데는 여호와에 대해 배울 충분한 기회를 갖지 못하고 죽은 사람들이 있다", "두 부류의 사람들은 낙원이 된 땅에서 영원히 살 기회를 갖게 될 것이다 (계 20:12, 13; 「파22.09」 18면 17항)", "모든 사람이 부활될 것인가? 아니다. 하느님의 기억 속에 있는 사람들만 부활될 것이다 (요 5:28, 29; 「파22.05」 18면 17항; 「파09」 6/1 30면 2항)", "우리는 여호와께서 자비롭고 의롭게 판단하실 것이라고 확신할 수 있다 (신 32:4)", "땅에서 부활이 있을 때 얼마나 기쁠지 상상해 보라! (사 26:19) [시각 자료 1]"]}, {"title": "부활이 실제로 있을 것이라고 확신할 수 있는 이유는 무엇인가?", "points": ["여호와께서는 사람들을 사랑하신다", "그분은 영원한 생명과 부활이 가능하도록 엄청난 희생을 치르셨다 (요 3:16)", "그분은 죽은 사람들을 다시 살리기를 간절히 바라신다 (욥 14:14, 15)", "여호와께서는 죽은 사람을 살릴 능력이 있으시다 (시 36:9)", "그분의 능력과 기억력은 무한하다 (사 40:26)", "그분은 각 사람의 기억과 성품을 완벽하게 되살릴 수 있으시다", "여호와께서는 죽은 사람을 부활시키는 일을 예수에게 맡기셨다 [요한복음 6:40 낭독]", "예수께서는 땅에 계실 때, 여호와께서 자신에게 죽음을 제압할 능력을 주셨음을 보여 주셨다", "[예수께서 죽은 사람을 부활시킬 열망과 능력이 있으심을 보여 주는 다음의 성경 기록들 중 하나 이상을 살펴본다. 누가복음 7:11-15 (시각 자료 2); 누가복음 8:41, 42, 49-56 (시각 자료 3); 요한복음 11:38-44 (시각 자료 4)]", "다음 동영상을 보면서, 영상에 나온 사람들이 부활에 대한 믿음을 기르는 데 무엇이 도움이 되었는지 유의해 보라"]}, {"title": "동영상", "points": []}, {"title": "부활 희망에 관한 믿음은 우리에게 어떤 유익을 주는가?", "points": ["부활 희망에 관한 강한 믿음이 있으면 여러 가지로 유익하다", "영원한 생명을 바라보기 때문에 더욱 의미 있는 삶을 살 수 있다", "현재의 즐거움에만 몰두하는 근시안적인 견해를 피하게 된다 (고전 15:32)", "사랑하는 사람과 사별했을 때 그 믿음은 위로를 준다 (살전 4:13)", "질병이나 박해와 같이 생명에 위협이 되는 상황에 직면할 용기를 얻게 된다", "가장 중요한 것으로 부활 희망은 우리가 여호와 하느님께 더 가까이 가게 해 준다 (「파20.08」 17면 13-14항)", "우리는 죽음에 대한 승리를 가능하게 해 주신 여호와와 그분의 아들 예수께 감사한다! (요 11:25, 26)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2024 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 132 10/24"]}]}, {"no": 133, "title": "신인간의 기원—부정을 받는다는 것이 중요한가?", "t": 0, "note": "", "sections": [{"title": "새 인간을 입어야 한다", "points": ["그리스도인은 새 인간을 입어야 한다 (엡 4:24)", "옛 인간의 행실을 버려야 한다"]}, {"title": "새 인간의 특성", "points": ["의로움과 거룩함으로 창조된 것이다 (엡 4:24)", "그리스도의 형상을 닮아 간다"]}, {"title": "새 인간을 입는 방법", "points": ["지속적으로 마음을 새롭게 해야 한다 (롬 12:2)", "성령의 열매를 나타내도록 노력한다"]}, {"title": "새 인간을 입음으로 얻는 유익", "points": ["하느님께 승인을 받는다", "다른 사람들에게 긍정적인 영향을 미친다"]}]}, {"no": 134, "title": "그리스도인은 안식일을 지켜야 하는가?", "t": 3, "note": "", "sections": [{"title": "안식일에 대한 서로 다른 견해들", "points": ["사람들은 안식일에 대해 서로 다른 견해를 가지고 있다", "어떤 사람들은 안식일을 단지 일을 쉬고 휴식을 취하는 날이라고 생각한다", "또 어떤 사람들은 안식일을 거룩한 날로 여기고 그날을 지켜야만 구원받는다고 생각한다", "안식일은 무엇인가? 그리스도인은 안식일에 관한 법을 따라야 하는가?"]}, {"title": "안식일은 무엇인가?", "points": ["“안식일”이라는 말은 “쉬다, 그치다, 중지하다”를 의미하는 히브리어 단어에서 유래한 것이다 (「파10」 2/1 12면 1항)", "매주 지키는 안식일은 십계명의 일부로 고대 이스라엘에게 주어진 법이었다 (출 20:8-10)", "안식일은 유대인의 주중 일곱째 날, 즉 금요일 해가 질 때부터 토요일 해가 질 때까지였다", "모세 율법에는 다양한 축제 때 여러 날을 쉬는 안식일에 관한 법도 나온다. 또 안식년 마련이 있었는데 그해에는 땅을 경작해서는 안 되었으며, 이스라엘 사람들은 빚을 면제받았다 (레 16:29-31; 23:6, 7, 32; 25:4, 11-14; 신 15:1-3)"]}, {"title": "안식일이 마련된 이유는 무엇이었는가?", "points": ["안식일은 짐스러운 것이 아니라, 축복을 주기 위한 것이었다 (막 2:27) [시각 자료 1]", "숭배를 위한 때였다 (신 5:12)", "이스라엘 사람들, 외국인 거주자들, 종들, 심지어 동물들도 일을 하지 않고 쉬어야 했다 (신 5:13, 14)", "부모들은 그때를 활용해 자녀들에게 하느님에 관해 가르칠 수 있었다 (신 6:6, 7)", "여호와 하느님께서는 그분과 이스라엘 백성 사이의 표로서 안식일을 주셨다 [출애굽기 31:16, 17 낭독]", "안식일은 하느님과 이스라엘 사이의 특별한 관계를 보여 주는 표였고, 이스라엘 백성이 전혀 쉴 수 없었던 이집트에서 해방된 것을 생각나게 해 주었다 (신 5:15)", "이스라엘은 안식일 법을 지켰을 때 축복을 받았다 (사 58:13, 14)"]}, {"title": "안식일 법이 끝나다", "points": ["예수께서는 유대인의 법 아래 태어나셨으며 안식일을 지키셨다 (갈 4:4; 「파10」 2/1 12면 3항)", "그분은 안식일에 담긴 하느님의 의도를 왜곡한 유대교 종교 지도자들을 질책하셨다 (마 12:1-8; 눅 13:10-16; 「파93」 2/15 27면 6-8항)", "예수께서 죽으셨을 때, 안식일 마련을 포함한 모세 율법은 끝나게 되었다 [로마서 10:4 낭독]", "그리스도의 대속 희생은 모세 율법을 “없앴다” (골 2:13, 14) [시각 자료 2]", "이제 하느님 앞에서 의로운 신분을 얻는 유일한 근거는 그리스도 예수에 대한 믿음이다", "[만약 청중이 안식교에 익숙하다면, 아래 세 문장의 내용점을 언급하기 바란다]", "성경에서는 십계명과 나머지 모세 율법을 따로 구분하지 않는다 (롬 7:6, 7; 「파10」 2/1 13면 3항)", "예수께서 ‘율법을 폐하러’ 온 것이 아니라고 말씀하신 것은 무슨 뜻이었는가? (마 5:17)", "율법에 완벽하게 순종하심으로 예수께서는 율법을 성취하셨고 그래서 율법은 하느님의 백성에게 더 이상 구속력이 없게 되었다 (「파10」 2/1 13면 1항)", "그리스도인들은 “그리스도의 법” 아래 있다 (갈 6:2; 「파19.05」 2면 3항)", "그리스도의 법은 더 우월한 마련이다 (롬 13:9, 10)", "그리스도인은 주중의 하루가 아니라 매일 여호와를 숭배한다 (갈 3:24, 25; 「파10」 2/1 14면 3-5항)", "진리와 일치하게 숭배하는 것이 어떤 날에 숭배를 하는가보다 더 중요하다 (롬 14:5)", "매일 여호와를 찬양하기 위해 시간을 잘 활용해야 한다 (엡 5:15, 16)", "우리는 일상적인 활동 때문에 여호와께 드리는 숭배가 뒷전으로 밀려나지 않게 함으로 안식일 마련에 담긴 원칙을 적용할 수 있다"]}, {"title": "축복을 가져다줄 미래의 안식일", "points": ["“안식일의 주”이신 예수께서는 곧 천년 통치를 시작하실 것이다 (마 12:8; 계 20:2-4)", "그 통치는 안식의 쉼을 누리는 기간이 될 것이다 (「통」 “안식일” 17항) [시각 자료 3]", "그 안식일 동안 인류는 대속으로부터 더 많은 유익을 얻을 것이다 (계 21:1-4)", "우리는 우리의 구원이 “안식일의 주”이신 예수 그리스도에 대한 믿음에 달려 있다는 점을 알고 있다. 미래의 안식일을 기다리며 하루하루의 삶을 통해 그 점을 나타내기 바란다", "[골자에 밀접히 고착하고, 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 134 1/25"]}]}, {"no": 135, "title": "생명의 진실함", "t": 6, "note": "생명의 소중함을 인식하고 하느님의 법에 따라 생명을 대하도록 격려한다", "sections": [{"title": "생명은 소중하다", "points": ["하느님께서 생명을 창조하셨다 (창 2:7)", "각 사람의 생명은 고유한 가치가 있다"]}, {"title": "생명을 위협하는 현대적 요소들", "points": ["폭력과 전쟁", "낙태와 안락사에 관한 잘못된 견해", "부주의한 생활 습관"]}, {"title": "생명에 대한 하느님의 견해", "points": ["피는 생명을 상징한다 (창 9:4)", "살인을 금하신다 (출 20:13)", "모든 생명을 소중히 여기신다"]}, {"title": "생명을 존중하는 방법", "points": ["우리 자신의 건강을 돌본다", "다른 사람의 생명을 귀하게 여긴다", "생명을 주신 하느님께 감사한다"]}]}, {"no": 136, "title": "지혜로운 태도로 하느님을 섬기기 위한 조건", "t": 5, "note": "", "sections": [{"title": "지혜가 필요한 이유", "points": ["현명한 결정을 내리기 위해 지혜가 필요하다 (잠 4:7)", "지혜 없이는 하느님을 올바르게 섬길 수 없다"]}, {"title": "진정한 지혜의 원천", "points": ["여호와를 경외하는 것이 지혜의 근본이다 (잠 9:10)", "성경을 통해 지혜를 얻는다", "기도로 지혜를 구한다 (약 1:5)"]}, {"title": "지혜롭게 섬기는 방법", "points": ["시간과 자원을 지혜롭게 사용한다", "올바른 우선순위를 정한다", "다른 사람들을 도울 때 지혜를 발휘한다"]}, {"title": "지혜의 열매", "points": ["더 효과적으로 섬길 수 있다", "어려운 상황을 더 잘 헤쳐 나간다", "다른 사람들에게 유익을 준다"]}]}, {"no": 137, "title": "성서가 하느님의 말씀임을 확신할 수 있는가?", "t": 4, "note": "성경이 하느님의 말씀임을 입증하는 증거들을 제시한다", "sections": [{"title": "성경에 대한 공격", "points": ["많은 사람들이 성경의 신뢰성에 의문을 제기한다", "비평가들의 주장에는 어떤 것들이 있는가?"]}, {"title": "성경이 하느님의 말씀임을 보여주는 증거", "points": ["예언의 성취가 증거가 된다 (사 46:10)", "내적 일관성과 조화", "과학과의 일치", "고고학적 발견들"]}, {"title": "성경의 유익한 영향", "points": ["수백만 명의 삶을 변화시켜 왔다", "도덕적 인도와 위로를 준다", "실생활 문제에 대한 지혜로운 조언을 담고 있다"]}, {"title": "성경에 근거한 삶", "points": ["성경을 규칙적으로 읽고 묵상한다", "성경의 원칙을 실생활에 적용한다"]}]}, {"no": 138, "title": "타락한 세상에서 진전한 정신으로 살라", "t": 3, "note": "도덕적으로 타락한 세상에서 건전한 정신을 유지하는 방법을 설명한다", "sections": ections": [{"title": "현재 삶에 대한 하느님의 전망", "points": ["하느님은 우리가 행복한 삶을 살기를 원하신다 (요일 5:3)", "현재의 고통은 일시적이다"]}, {"title": "미래 생명에 대한 하느님의 전망", "points": ["영원한 생명이 하느님의 목적이다 (요 3:16)", "부활을 통해 죽은 자들도 이 목적에 포함된다", "새 세상에서 완전한 삶이 기다린다"]}, {"title": "하느님의 전망을 받아들이는 방법", "points": ["성경을 통해 하느님의 목적을 이해한다", "현재의 어려움을 일시적인 것으로 본다", "미래의 복을 기대하며 살아간다"]}, {"title": "이 전망이 우리의 삶에 미치는 영향", "points": ["더 의미 있는 삶을 살게 된다", "어려움 속에서도 소망을 가진다", "하느님의 목적을 위해 기꺼이 희생한다"]}]}, {"no": 147, "title": "여호와의 구원의 능력을 신뢰하라", "t": 0, "note": "", "sections": [{"title": "우리에게는 여호와의 구원의 능력이 필요하다", "points": ["우리는 고난 많은 세상에 살고 있다 (롬 8:22)", "수많은 사람들이 폭력, 환경 문제, 경제적 불안정으로 어려움을 겪고 있다", "신체적, 감정적 건강 문제로 고통받고 있는 사람들도 많다", "하지만 인간 역사에서 가장 힘든 시기가 곧 있을 것이다 (마 24:21)", "여호와 하느님은 전능하시다. 그분은 자신을 신뢰하는 사람들을 구원할 무한한 능력을 갖고 계시다 [이사야 12:2 낭독]", "여호와께서 과거에 어떻게 구원의 능력을 보여 주셨는지 살펴보면 그분의 구원의 능력에 대한 믿음을 강하게 할 수 있다"]}, {"title": "여호와께서는 과거에 구원의 능력을 보여 주셨다", "points": ["여호와께서는 노아와 그의 가족을 대홍수에서 구해 주셨다 [시각 자료 1]", "땅은 “폭력으로 가득 찼다” (창 6:5, 11, 12)", "하느님께서는 악한 세상을 심판하셨지만 의로운 사람들은 보존하셨다 (창 6:13, 17; 7:11, 12, 23)", "여호와께서는 아시리아 왕 산헤립으로부터 히스기야왕과 예루살렘을 구원하셨다", "아시리아인들은 유대인들을 비웃고 여호와를 모욕했다 (왕하 18:28, 30, 33-35)", "히스기야는 여호와를 신뢰했고 구원해 달라고 그분께 기도했다 (왕하 19:14-19)", "여호와께서는 히스기야에게 구원해 주겠다고 보증해 주셨다 (왕하 19:32-34)", "여호와의 천사가 18만 5000명의 아시리아 군인들을 죽였고, 산헤립은 후에 니네베에서 죽임을 당했다 (왕하 19:35-37)", "여호와께서는 믿음을 가지고 그분을 부르는 사람들이 구원을 받을 것이라고 보증하신다 (행 2:21; 롬 10:13)", "여호와의 구원의 능력을 경험할 수 있는 세 가지 부면을 살펴보자"]}, {"title": "여호와께서는 어떻게 인류를 죄와 죽음에서 구원할 마련을 해 주셨는가?", "points": ["에덴에서 반역이 있은 후, 인류는 죄와 사탄의 통치 때문에 고통을 겪어 왔다 (요 8:44; 롬 5:12; 요1 5:19)", "여호와께서는 에덴에서 구원의 수단을 약속하셨다 (창 3:15)", "약속된 “자손”이 예수 그리스도이심이 밝혀졌다 (창 22:18; 갈 3:15, 16)", "예수라는 이름의 의미는 “여호와는 구원이시다”이다", "여호와께서는 예수가 인류를 죄와 죽음으로부터 구원할 대속물로 자신의 생명을 바치도록 마련하셨다 [마태복음 20:28 낭독] (요1 3:8; 「행누」 27과 소개말 및 요점 1-2) [시각 자료 2]", "대속을 근거로 우리는 죄를 용서받을 수 있고 여호와와 좋은 관계를 누릴 수 있다 (요 14:6; 벧전 3:18; 요1 2:1)", "예수에 대한 믿음을 나타내는 사람은 영원한 생명의 전망을 갖게 된다 (요 3:16, 36)"]}, {"title": "여호와께서는 어떻게 오늘날 자신의 백성을 보호하시는가?", "points": ["여호와께 가까이 가는 사람은 지금 그분의 구원의 능력을 경험할 수 있다", "여호와께서는 자신의 백성을 집단적으로 보호해 주신다 (시 34:7; 94:14; 「까」 73면 15항)", "그분은 자신의 종 개개인을 모든 해로부터 기적으로 보호해 주시지는 않는다 (「까」 72면 13항)", "여호와께서는 우리와 그분과의 관계에 해를 입힐 수 있는 모든 것에서 우리를 보호해 주신다", "그분은 도와 달라는 우리의 기도를 들으시고 우리의 필요를 돌봐 주신다 (시 62:7, 8)", "그분은 우리가 시련을 인내하는 데 필요한 힘을 주신다 (고후 4:7-9; 빌 4:13)", "그분은 우리가 지혜로운 결정을 내릴 수 있도록 우리에게 인도를 베푸시고 지혜를 주신다 (시 119:105; 약 1:5)", "그분은 우리가 두려움이나 염려를 느낄 때 마음의 평화를 주신다 (빌 4:6, 7)"]}, {"title": "여호와께서는 어떻게 미래에 자신의 백성을 구원하실 것인가?", "points": ["가까운 미래에 “큰 환난”이 일어날 것이다 (마24:21)", "그때에 나라들은 여호와를 숭배하는 사람들을 없애려고 할 것이다 (겔 38:14-16)", "여호와께서는 자신의 백성을 구출하심으로 그분의 구원의 능력을 보여 주실 것이다 (겔38:18, 21-23; 「파22.10」 16면 16항)", "여호와께서는 아마겟돈에서 예수를 통해 “나라들을 치실” 것이다 (계 16:14, 16; 19:11-16) [시각 자료 3]", "지금은 여호와께 가까이 가고 그분의 구원의 능력에 대한 신뢰심을 기를 때이다 (습 2:2, 3)", "[골자에 밀접히 고착하고, 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 147 1/25"]}]}, {"no": 148, "title": "당신은 하느님과 함께 전진하고 있는가?", "t": 0, "note": "하느님의 목적에 발맞추어 계속 전진하도록 격려한다", "sections": [{"title": "전진하는 것이 중요한 이유", "points": ["시대가 변하고 있으며 하느님의 목적이 이루어지고 있다", "정체되어 있으면 뒤처지게 된다"]}, {"title": "하느님과 함께 전진하는 방법", "points": ["새로운 빛과 이해를 기쁘게 받아들인다 (잠 4:18)", "충실하고 사려 깊은 종이 제공하는 것을 신뢰한다", "조직의 지시에 따른다"]}, {"title": "전진을 방해하는 것들", "points": ["과거의 방식에 집착하는 것", "변화에 대한 저항", "영적 나태함"]}, {"title": "함께 전진하는 결과", "points": ["하느님의 승인을 계속 받는다", "영적으로 성장한다", "대환난에서 보호를 받는다"]}]}, {"no": 149, "title": "이 세상도 변화를 기대할 수 없다", "t": 1, "note": "", "sections": [{"title": "세상의 문제들이 계속되는 이유", "points": ["인간 정부는 근본 문제를 해결할 수 없다", "사탄이 이 세상의 통치자이다 (요 12:31)"]}, {"title": "더 나빠질 것이라는 증거", "points": ["성경이 마지막 때의 어려움을 예언했다 (딤후 3:1-5)", "오늘날 그 예언이 이루어지고 있다"]}, {"title": "희망이 있다", "points": ["하느님의 왕국이 이 세상을 대체할 것이다 (단 2:44)", "새 세상에서 진정한 변화가 올 것이다 (계 21:1-4)"]}, {"title": "지금 어떻게 행동해야 하는가?", "points": ["세상을 바꾸려 하기보다 왕국을 전파한다", "왕국의 가치관에 따라 생활한다"]}]}, {"no": 150, "title": "이 세상은 멸망될 것인가?", "t": 1, "note": "여호와께서 얼마 안 있어 현재 인류가 겪고 있는 고난을 없애기 위해 행동하실 것이라는 확신을 심어 주라. 생존하기 위해 어떤 행동을 해야 하는지 강조하라", "sections": [{"title": "많은 사람들은 세상의 미래에 대해 두려워한다", "points": ["인간의 행동은 역사상 그 어느 때보다 지금 인류의 생존을 더 위태롭게 하는 것 같다", "인류는 세계적인 기후 변화의 위험과 핵전쟁의 위협에 직면해 있다 (「파10」 8/1 3-4면)", "경제 위기, 잔인한 폭력, 창궐하는 전염병은 이 제도가 불안정하다는 증거이다 (「깨」 05 8/8 4-7면; 「깨」03 5/22 6-11면)", "이 세상은 멸망될 것인가? 그렇다. 하지만 많은 사람들이 두려워하는 방식으로 멸망되지는 않을 것이다", "성경에 나오는 “세상”이라는 용어는 인류 전체뿐 아니라 하느님과 적대 관계에 있는 인간 사회를 가리키기도 한다 (「통」-1 1139면 5항)", "많은 사람들이 인류가 멸망될까 봐 두려워하지만, 하느님께서는 인류를 멸망시키거나 그런 일이 일어나도록 허용하지 않으실 것이다"]}, {"title": "하느님께서는 인류가 겪고 있는 고난을 알고 계시다", "points": ["여호와 하느님께서는 인류의 악화되는 상황을 온전히 알고 계시다 (시 11:4; 잠 15:3)", "그분은 인류의 상황을 악화시키는 사람들에게 책임을 물으실 것이다 (시 37:37, 38)", "하느님께서 세상의 문제들이 그처럼 극도로 악화되도록 허용하신 이유는 무엇인가?", "에덴동산에서 사탄은 하느님의 통치 방식에 의문을 제기했다 (「파07」 9/15 4-7면)", "하느님께서는 인간이 하느님으로부터 독립해서 스스로 성공적으로 통치해 왔다고 아무도 정당하게 주장할 수 없을 정도로 세상 상태가 악화되도록 허용하셨다 (렘 10:23)", "현 세상 상태는 사탄이 하느님의 통치 방식에 의문을 제기했을 때 그가 한 말이 거짓말이었음을 분명히 보여 준다", "그러한 상태에서 벗어나기를 열망하는 사람들은 하느님께서 언제 어떻게 행동하실 것인지 궁금해한다 (합 1:2, 3)"]}, {"title": "하느님께서는 어떻게 이 세상을 멸망시키실 것인가?", "points": ["여호와 하느님께서는 앞으로 이 현 악한 제도를 멸망시키실 것이다", "하느님께서 행동하실 때, “경건한 정성을 바치는 사람들”은 살아남을 것이지만 악한 인간 사회는 노아 시대의 세계적인 대홍수에서 그랬던 것처럼 사라질 것이다 (벧후 2:5, 9)", "성경에는 다가오는 “여호와의 날”에 대한 생생한 예언들이 들어 있다 [요엘 2:11, 31 낭독]", "“여호와의 날”이라는 표현은 외경심을 불러일으키는 파멸적인 심판의 때를 가리킨다. 그때 여호와께서는 자신을 반대하는 사람들을 치시고 자신을 사랑하는 사람들을 구출하실 것이다 (「통」-2 269-271면)", "그런 ‘날들’은 과거에도 있었다 (「파07」 12/15 11면 2항)", "과거에 있었던 그런 심판들은 여호와께서 지상의 상황을 아시고 조처를 취하셨다는 것을 증명해 준다", "앞으로 여호와께서는 그리스도 예수가 이끄는 하늘 군대를 사용하여 이 악한 세상을 멸망시키실 것이다 (계 19:11-16; 「파14」 2/15 6-7면 15, 16항)", "다가오는 이 “여호와의 날”은 가까웠는가?"]}, {"title": "하느님께서는 언제 이 세상을 멸망시키실 것인가?", "points": ["사도 베드로는 요엘 2:28-32에 나오는 예언을 자신이 살고 있는 시대의 “마지막 날”에 적용시켰다 [사도행전 2:16-21 낭독]", "그때 예수의 제자들은 성령에 힘입어 기적을 통해 다양한 언어로 말했다 (행 2:4-11)", "요엘의 예언은 이 세상 제도의 마지막 날인 지금도 성취되고 있다", "여호와께서 “모든 민족”을 모으신다는 것을 볼 때, 다가오는 그분의 날이 세계적인 규모임을 알 수 있다 (욜 3:2)", "요엘 2:28, 29의 성취로, 하느님의 영에 힘입어 여호와의 날이 세계적으로 선포되고 있다", "“세상 제도의 종결”에 대한 예수의 예언은 이중적으로 성취된다 (마 24:3)", "예수의 예언은 유대 제도에 먼저 성취되었으며, 현 악한 세상 제도 전체에 세계적인 규모로 성취되고 있다", "마태복음 24:29에 나오는 예수의 말씀이 요엘 2:31의 말씀과 유사하므로, 예수의 예언은 다가오는 여호와의 날과 관련이 있다", "예수께서 말씀하신 표징을 세계 전역에서 볼 수 있으므로 여호와의 날이 매우 가까웠음을 알 수 있다. 그 표징에는 세계적인 전파 활동이 포함된다. (마 24:7-14)"]}, {"title": "우리는 멸망이 정해진 이 세상의 끝을 살아남을 수 있다", "points": ["성경이 분명히 경고하고 여호와의 증인이 세계적인 전파 활동을 수행하고 있지만, “여호와의 날”은 많은 사람들에게 갑작스럽게 닥칠 것이다 (벧후 3:10)", "지금은 여호와의 이름을 부름으로 여호와의 날을 준비할 때이다 [요엘 2:32 낭독] (「활」 187면 19항)", "생존을 위한 여호와의 요구 조건을 계속 따르라 (습 2:2, 3; 「파01」 2/15 17-19면 3-8항)", "그렇게 하는 사람은 하느님께서 이 악한 세상을 멸망시키실 때 반드시 그분의 보호를 받게 될 것이다 (욜 3:16)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 150-KO 3/18\t 30분에 다룰 것"]}]}, {"no": 151, "title": "여호와는 자신의 백성을 위한 \"안전한 성\"이다", "t": 0, "note": "어려운 시대에 여호와 안에서 안전을 찾도록 격려한다", "sections": [{"title": "여호와는 \"안전한 성\"이시다", "points": ["성경은 여호와를 요새와 피난처로 묘사한다 (시 91:1, 2)", "그분은 자신의 백성을 보호하신다"]}, {"title": "과거에 어떻게 보호하셨는가?", "points": ["홍수에서 노아를 보호하셨다 (창 7:1)", "이스라엘을 이집트에서 구출하셨다", "기원 70년에 충실한 자들이 생존했다"]}, {"title": "지금 어떻게 보호를 받는가?", "points": ["여호와의 조직에 충실하게 남아 있는다", "성경의 경고를 진지하게 받아들인다", "기도와 신뢰로 하느님께 나아간다"]}, {"title": "앞으로의 보호", "points": ["대환난에서 하느님의 백성이 보호받을 것이다 (계 7:9, 14)", "여호와를 신뢰하는 자들은 안전할 것이다"]}]}, {"no": 152, "title": "실제로 어찌 하기 위한 길을 어떻게 찾을 수 있을까?", "t": 3, "note": "", "sections": [{"title": "올바른 결정을 내리는 것이 중요하다", "points": ["우리의 결정이 삶의 방향을 결정한다", "잘못된 결정의 결과는 심각할 수 있다"]}, {"title": "하느님의 인도를 구하라", "points": ["기도로 지혜를 구한다 (약 1:5)", "성경에서 원칙을 찾는다", "성숙한 그리스도인의 조언을 구한다"]}, {"title": "결정을 내리는 과정", "points": ["가능한 옵션들을 생각해 본다", "각 선택이 가져올 결과를 고려한다", "하느님의 원칙과 일치하는지 확인한다"]}, {"title": "올바른 결정을 내린 결과", "points": ["하느님의 승인을 받는다", "장기적으로 유익을 얻는다", "다른 사람들에게 좋은 영향을 미친다"]}]}, {"no": 153, "title": "“외경스러운 날”을 가깝게 여기십시오!", "t": 1, "note": "", "sections": [{"title": "하느님의 달력에 여호와의 큰 날이 표시되어 있다", "points": ["사람들은 흔히 기념일들을 지킨다", "나라들은 국가의 탄생이나 독립과 같이 역사에 이정표가 된 사건들을 기념한다", "하지만 우리가 알고 있어야 할 “날”이 하나 더 있다", "이날은 아직 오지 않은 미래의 날이지만, 지구에 사는 모든 사람에게 영향을 미칠 것이며 인간 역사의 흐름을 바꿔 놓을 것이다", "성서에서는 인간이 지금까지 경험해 보지 못한 이 중요한 기간을 가리켜 “여호와의 크고 외경스러운 날”이라고 묘사한다 (욜 2:30, 31; 말 4:5)", "이날에 여호와께서는 자신의 적들을 심판하고 자신의 백성을 위해 행동하실 것이다", "이날은 “‘사람의 아들’의 임재” 중에 있을 것이지만, 정확한 ‘날과 시간’은 인간에게 알려져 있지 않다 (마 24:36-39, 44)", "다음의 증거들은 우리가 현재 그리스도의 임재 중에 살고 있다는 사실을 보여 준다"]}, {"title": "그리스도의 임재의 표징을 구성하는 사건들", "points": ["예수께서는 자신의 임재 중에 세계적인 분쟁이 일어나고 다른 주목할 만한 상황들이 전개될 것이라고 예언하셨다 (마 24:3, 7, 8; 「파08」 10/1 6-7면)", "1914년 이래로 세계는 양차 세계 대전을 겪었다", "또한 국제 분쟁, 내전 및 테러로 수많은 사람이 피해를 입고 피난민이 되기도 한다 (「파08」 5/15 13-14면 7항; 「깨」 06/6 4-6면; 「깨01」 3/22 4면)", "잘못된 길로 인도하는 종교 지도자들이 출현할 것이었다 (마 24:11)", "그러한 종교 지도자들이 나타났지만, 사람들에게 위로도, 미래에 대한 희망도 주지 못하였다 (「파94」 3/1 9-11면 7-12항)", "불법과 범죄가 증가할 것이었다 (마 24:12)", "그 결과 세계적인 두려움과 불안이 있어 왔다", "성서는 이 “대처하기 어려운 위급한 때”에 사람들이 어떠할 것인지를 설명한다 [디모데 후서 3:1-5, 13에 나오는 적절한 점들을 고려한다]", "악한 사람들과 속이는 사람들은 “더욱더 악해져서, 잘못 인도하기도 하고 잘못 인도되기도” 한다", "그들은 누구에 의해 “잘못 인도되고” 있는가? [요한 계시록 12:9 낭독]", "사탄은 이 세상의 영에 굴복하는 모든 사람에게 영향력을 행사하고 있다 (요1 5:19)", "하느님과 사람의 대적인 이 자가 악하고 사나운 행위를 계속할 수 있는 기간은 얼마 남지 않았다 (계 12:12)", "여러 증거에 따르면, 여호와께서 심판을 집행하실 그분의 크고 외경스러운 날이 가까웠다", "자비롭게도 여호와께서는 그날에 대한 경고가 전 세계적으로 발해지도록 마련하셨다 (계 14:6, 7)", "홍수 전의 세상이 그러했던 것처럼, 많은 사람들은 유의하지 않고 있다 (마 24:38, 39)", "우리는 악화되는 세계 상태에 대해 그리고 이러한 상태로 인해 일어날 일들에 대해 긴박감을 가져야 한다"]}, {"title": "그날을 계속 염두에 두는 것이 긴급하고 지혜로운 이유", "points": ["베드로 후서 3:10-13에 기록된 말씀은 특히 관심을 끈다 [낭독 및 설명] (「파10」 7/15 3-5면 1-11항)", "현 세상 제도가 전 세계적으로 멸망될 것이다", "구성 요소들은 현재 있는 상징적 하늘과 땅이 불에 타는 듯한 멸망을 당할 때 소멸될 것이다", "‘여호와의 날을 가깝게 여긴다’는 것은, 그날이 우리 각자에게 그리고 인류 전체에게 어떤 영향을 미칠 것인지 예리하게 의식한다는 의미이다", "참그리스도인들에게는 그날을 생존할 수 있는 전망이 있다", "하지만 시대의 표징에 대해 깨어 있지 않은 사람들에게는, 그날이 “도둑같이” 올 것이다", "베드로는 우리에게 “행실을 거룩하게 하고 경건한 정성을 행동으로 나타내”라고 강력히 권한다 (「파10」 7/15 7-11면)", "그러한 행실과 행동은 그리스도인들에 대한 하느님의 요구 조건과 일치하기 때문에 거룩하고 경건한 것이다 [규정을 만들지 않으면서, 거룩한 행실의 예와 경건한 정성을 나타내는 행동의 예를 구체적으로 든다]"]}, {"title": "여호와의 날을 가깝게 여기면 축복을 받게 될 것이다", "points": ["지금은 여호와의 날을 가깝게 여기고 그분에게 받아들여질 만한 사람으로 나타나야 할 때이다 [베드로 후서 3:14 낭독]", "우리의 희망은 하셨다", "십자가에서 고통스럽게 돌아가셨다"]}, {"title": "왜 고난이 필요했는가?", "points": ["우리의 죄를 위한 속죄가 필요했다 (롬 5:8)", "하느님의 의로움이 유지되어야 했다 (롬 3:26)", "사탄의 주장을 반박하기 위해"]}, {"title": "예수의 고난이 우리에게 주는 유익", "points": ["죄 사면을 받을 수 있다 (엡 1:7)", "하느님과의 관계가 회복되었다 (롬 5:10)", "부활의 희망이 생겼다"]}, {"title": "예수의 희생에 응답하는 방법", "points": ["그분의 희생에 감사한다", "그분의 모범을 따른다", "다른 사람들에게 이 소식을 전한다"]}]}, {"no": 162, "title": "어둠의 세상으로부터의 구출", "t": 6, "note": "이 세상은 물질적인 진보와 과학의 진보에도 불구하고 깊은 영적 어둠에 빠져 있다는 것을 청중이 인식하도록 돕는다. 진리의 빛에 대한 지식을 섭취하고 그에 따라 행동해야 할 필요를 인상 깊게 설명한다. 하느님의 모든 영적 마련에 대한 인식을 세워 준다", "sections": [{"title": "많은 사람들은 현대 세상이 계몽되어 있다고 느낀다", "points": ["지난 세기에 커다란 진보가 이루어졌다", "생활수준, 교통, 통신, 보건이 향상되었다 (「깨」93 6/15 19면)", "인권에 대한 의식이 높아졌다", "의학, 농업, 과학, 기술 등의 분야에서 광범위한 연구가 계속되고 있다 (「파」99 10/15 4-5면; 「깨」89 8/1 10-12면)"]}, {"title": "현실은 세상이 어둠에 빠져 있음을 보여 준다", "points": ["물질적·과학적으로는 진보가 이루어지고 있지만, 도덕적·영적으로는 퇴보하고 있다 (「깨」99 12/8 7-12면)", "한때는 반사회적이고 악한 것으로 여겨지던 행동이 지금은 정상적인 것으로 받아들여지고 있다 (디모데 둘째 3:1-5)", "성적 부도덕이 만연해 있다", "배우자에 대한 충성, 가족에 대한 진실한 사랑, 생명에 대한 존중심이 약해지고 있다", "쾌락 추구가 우선적인 일이 되었다", "영적 어둠이 세상을 뒤덮고 있다 (「파」93 3/1 8-11면)", "그러한 영적 어둠이 땅의 거주자들 대다수에게 닥칠 것이 예언되어 있다 (이사야 60:2ㄱ)", "이른바 계몽되어 있다는 나라들에서 무신론, 진화론 등 여러 가지 혼란스럽고 상충되는 사상들과 이론들을 만들어 냈다", "많은 사람들은 하느님에 대해 정신을 닫아 두고 있다. 그들은 하느님과 성서를 일반 종교의 비합리적인 가르침과 동일시한다", "어떤 사람들은 미신과 설화를 맹목적으로 받아들이며, 그들의 생각과 행동은 영적이 아니라 육적이다 (골로새 2:8)", "증오는 전 세계에서 종교적 광신 행위, 테러, 폭력을 낳았다", "오늘날의 상태는 바울이 에베소 4:17-19에서 이야기한 상태와 비슷한 정도가 아니라 그보다 훨씬 더 나쁘다 (성구를 낭독하고 오늘날의 세상에 적용시킨다)"]}, {"title": "세상의 어둠에 대한 책임은 누구에게 있는가?", "points": ["성서는 “세상 통치자들”에게 책임이 있다고 언급한다 (에베소 6:12)", "이들은 인간 정부들이 아니라, 사람들과 나라들에 영향력을 행사하는 보이지 않는 영의 세력들이다 (고린도 둘째 11:14; 계시 12:9)", "악을 조장하는 최고의 세력가는 거짓 가르침과 증오로 사람들의 정신을 눈멀게 하는 사탄이다 (창세 3:4, 5; 고린도 둘째 4:4; 요한 첫째 2:11; 3:10-12)", "이사야 60:2ㄱ에 묘사된 상태에 대한 책임은 그에게 있다 (낭독)", "사탄의 목적은 모든 사람들을 여호와와 진리로부터 돌아서게 만드는 것이다 (욥 1-2장)", "사람들 대다수에게 악귀적인 방법은 효과를 거두고 있다 (요한 첫째 5:19)", "실제 쟁점은 주권에 관한 것이다 (탈출 9:16)"]}, {"title": "세계적인 어둠은 언제 끝날 것인가?", "points": ["하느님의 말씀은 이 어둠의 세상이 끝날 것임을 보증한다", "여호와께서는 나라들이 행하는 어둠의 일들을 질책하셨다 (요한 첫째 1:5)", "어둠 속에서 계속 걷는 모든 사람들에게는 그분의 진노가 내릴 것이다 (에베소 5:6)", "스바냐는 여호와께서 어떻게 악을 완전히 끝내실 것인지를 생생하게 묘사한다 (스바냐 1:14-18을 낭독하고 간단히 설명한다)", "성경에 예언된 사건들이 일어나고 나면, 현 사물의 제도의 끝에 주권에 관한 쟁점이 해결될 것이다 (마태 24:7, 8, 12-14, 21; 계시 18:21; 19:19-21; 20:1, 2)"]}, {"title": "당신은 세상의 어둠에서 떠나 하느님의 빛으로 들어갈 수 있다", "points": ["어둠을 예언한 바로 그 예언에는 구출을 가능하게 하는 빛에 대한 예언도 있다 (이사야 60:1, 2 낭독)", "여자는 14만 4000명의 영으로 기름부음받은 자들의 어머니를 상징한다 (갈라디아 4:26)", "이 여자를 대표하는, 지상에 남아 있는 기름부음받은 자들은 일어나 1919년 이래로 계속 빛을 비추어 왔다 (「예-2」 303-6면)", "의로운 자들을 위하여 빛의 번쩍임이 있었다 (시 97:11)", "14만 4000명의 남은 자들은 여전히 우리와 함께 있다", "통치체는 영적 양식을 나누어 주는 일을 맡은 “종”을 구성한다 (마태 24:45-47)", "구출은 영적 계몽을 위한 하느님의 통로를 인정하는 것에 달려 있다", "우리는 전파함으로 진리의 빛을 반사한다 (마태 5:14-16; 로마 10:14ㄴ; 빌립보 2:15)", "왕국의 좋은 소식은 사람들에게 빛을 좋아하는지 아니면 어둠을 좋아하는지를 나타낼 기회를 준다", "사람들은 반드시 ‘빛으로 와’야 한다 (요한 3:19-21 낭독)", "호의적인 반응을 보인다면 재방문을 통해 더 많은 지식을 얻게 된다", "성서 연구를 사회할 때 빛이 연구생의 마음을 뚫고 들어갈 기회가 생기게 된다", "이사야 60:22이 지금 성취되고 있다 (낭독)", "여호와께서는 회중의 마련들을 통하여 시기적절하게 계몽을 주신다", "(주간 집회들의 유익을 간단히 논하고, 이 모든 집회들이 영적 성장에 필수적인 이유를 제시한다)", "바울은 함께 모이는 일을 다가오는 여호와의 날과 결부시켰다 (히브리 10:25; 베드로 둘째 3:10)", "구출받기 위해서는 “빛 가운데 걷”는 것이 요구된다 (요한 첫째 1:6, 7)", "“어둠에 속한 ··· 일들”을 반드시 버려야 한다 (에베소 5:8-11)", "그러한 일들을 행하면서 여호와의 은혜를 기대할 수는 없다 (고린도 첫째 6:9, 10)", "구출을 좌우하는 또 한 가지 요인은 하느님의 이름과 목적을 선포하는 것이다 (디모데 첫째 4:16)", "하느님의 조직은 여러분이 모든 요구 조건에 달하도록 도울 준비를 갖추고 있다"]}, {"title": "어둠으로부터의 구출이 당신에게 의미하는 것", "points": ["이 어두운 세상은 머지않아 큰 환난을 겪게 될 것이다", "여호와께서는 자신의 백성을 보호해 주시겠다고 약속하신다 (시 91:14, 15; 잠언 18:10)", "왕국 통치는 어둠, 폭력, 탈취, 파괴가 더는 없을 것임을 의미한다 (이사야 60:18-20)", "온 땅에 의가 가득할 것이다 (시 37:11, 29; 이사야 60:21)", "우리의 희망은 이 어둠의 세상을 생존하는 것이다", "충실한 사람은 지금 죽을지라도 부활을 보장받게 된다", "그때 모든 사람은 영원히 하느님의 왕국의 빛 가운데서 살게 될 것이다 (요한 17:3)", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다)", "No. 162-KO 11/14\t 45분에 다룰 것"]}]}, {"no": 163, "title": "왜 참 하느님을 두려워하는가?", "t": 0, "note": "경외심으로 하느님을 섬기는 것이 왜 중요한지 설명한다", "sections": [{"title": "하느님을 두려워한다는 것은 무엇인가?", "points": ["단순한 무서움이 아 사 5:3; 이사야 57:21; 「파99」 10/1 11면)"]}]}, {"no": 178, "title": "고난의 때에 어디서든 도움을 얻을 수 있는가?", "t": 8, "note": "고난 가운데서 하느님의 도움을 구하도록 격려한다", "sections": [{"title": "우리는 고난의 때에 살고 있다", "points": ["성경은 마지막 날의 고난을 예언했다 (마 24:21, 22)", "질병, 죽음, 빈곤, 폭력 등 많은 어려움이 있다"]}, {"title": "고난을 겪을 때 도움을 얻는 것", "points": ["많은 일, 비행기, 지병, 경제적 어려움, 샤레, 분쟁, 스트레스 중, 외로움을 느낄 수 있지만, 이 그러나 도움이 여호와께 신뢰를 줌으로 유익을 얻을 수 있다 (딤전 4:8; 약 13:1 5/7항)", "이렇게 교제를 통해 \"우리의 이야기\" 여호와에게 하신 신뢰를 줌으로 이기는 방법 2 (고후 3:12)", "인간 안에서 내는 확인으로 이기는 유익성을 확인하는 방법 이 (딤도 전 1:20)"]}, {"title": "고난을 겪을 때 도움이 되는 것", "points": ["사역; 기도를 여호와께 하는 것이 가장 도움된다 (사 4:31)", "그래서 기도로 여호와를 사용하는 것이 가장 좋다, 시간 34:18;「파04」 1/15 29-30면 8-13항)", "국가한 쪽방은 떠나기 위해서는 기간도 필요하다, 시간 34:18; 「파」1면; 「파06」4-5면)"]}, {"title": "우리가 최선의 방법을 취할 수 있다", "points": ["경건한 친구를 통해 하느님의 명령을 얻을 수 있다 (갈 4:31)", "우리는 도움을 통해 형제 자매들에게 도움을 받을 수 있다 (고린도 도움 7:5-7)"]}]}, {"no": 179, "title": "승탑의 길로 정진하라", "t": 8, "note": "시편 26편에 삶에 적응한 사람들, 충탑의 길로 되는 것 및 그리고 그 주요 위험을 피하는 사항에 대해 알려 준다", "sections": [{"title": "\"승탑을\" 걷는 것의 의미", "points": ["\"승탑을 걷는다\"는 표현은 여호와를 따름하는 것을 의미한다 (「파09」 4/15 3면; 「파」 2:940-943면)", "우리가 승탑 가운데 갖는 한 기기 방법은 마음과 영과 절 마음을 따라서 여호와를 섬기라는 것이라 따른다 (마태 22:22)", "여호와의 영의 선물들을 달하고 이렇게 걷는 것 이 좋을 것 이다 (시 119:1-3낭독)"]}, {"title": "유익하게 복음을 위한 방법", "points": ["이스라엘의 왕국 중앙들을 지킨 사람이다 (시 26:1)", "이스라엘의 방법—자가기로 최 부분선으로 기 왕국을 지킨 사람이다 (시 26:2)", "그는 하느님의 말씀으로부터 사탄들을 자기 자신은 것을 가정하고 지킨 사람이다 (시 26:3)"]}, {"title": "승탑을 걷는 방법", "points": ["성서를 연구하고, 배운 내용을 다른 사람에게 전해 줌으로 (마 28:19, 20)", "하느님을 사랑하고 그분께 계속 고착하기로 결심했음을 행동으로 나타냄으로 (대상 29:17)", "마음에서 우러나온 기도를 함으로 (빌 4:6, 7)", "그리스도인 모임에 참석하는 일을 그만두지 않음으로 (히 10:24, 25)"]}, {"title": "머지않아, 현재 인간 가족을 괴롭히는 모든 문제가 영원히 사라질 것이다", "points": ["(사 65:17; 계 21:4, 5)", "우리 모두 계속해서 하느님의 말씀을 연구하고 그 말씀에 순종하면서, 여호와를 기다리며 고난이 없는 신세계로 구출하겠다는 그분의 약속을 계속 기다리기 바란다 (이사야 30:18)"]}]}, {"no": 180, "title": "부활 희망이 우리 자신에게 실제적이어야 하는 이유", "t": 6, "note": "부활 희망이 성경에 확고한 근거를 두고 있음을 확신 있고 설득력 있게 보여 준다. 적절한 강조를 사용해서 성경을 낭독하고 설명함으로 왜 우리가 이 가르침을 온전히 신뢰할 수 있는지 부각시킨다. 부활이 어떻게 우리에 대한 하느님의 사랑을 강조하는지 청중이 더욱 온전히 인식하도록 도우라", "sections": [{"title": "부활이 필요하게 된 이유", "points": ["여호와의 목적이 성취되려면 부활이 필수적이다", "사탄의 계교로 인해 죽음이 인류에게 닥쳤다 (요한 8:44)", "부활은 땅에 대한 하느님의 목적과 조화를 이룬다 (창세 1:28)", "부활은 여호와께서 풍부한 사랑과 강한 능력으로 자신의 종들을 보존하시는 분이라는 사실을 입증해 준다 (사무엘 첫째 2:6)", "여호와께서는 충실한 사람들에게 영원한 생명을 상으로 주신다 (마태 24:9; 디도 1:2; 계시 2:10)", "다른 어떤 신도 생명을 보존하거나 회복시킬 수 없다 (시 36:9)"]}, {"title": "부활이 확실한 이유", "points": ["여호와께서 부활을 보증하신다 (사도 17:31)", "예수가 부활되었다는 사실이 바로 그러한 보증이 된다 (「파83」 1/15 8-9면 2-3항)", "그리스도는 부활되신 후에 수백 명의 사람들에게 나타나셨다 (고린도 첫째 15:6)", "여호와께서 다른 사람들을 부활시키기 위해 사용하시는 예수는 적절하게도 “부활이요 생명”이라고 일컬어진다 (요한 11:25)", "예수의 부활은 수없이 많은 사람들이 부활될 수 있는 길을 열어 주었다", "예수께서는 부활이 실제로 가능한 것임을 분명히 보여 주셨다", "그분은 죽음을 잠에 비하셨다", "우리가 잠을 자고 있는 사랑하는 사람을 깨우는 것만큼이나 쉽게, 예수께서는 하느님의 능력으로 죽은자를 부활시키셨다 (요한 11:11-14)", "예수께서 부활이 확실히 있을 것이라는 확신을 표현하신 것도 놀라운 일이 아니다! (요한 5:28, 29; 「통」-1 927면 5-8항)", "1세기 그리스도인들은 이 희망에 믿음을 두었다 (히브리 6:1, 2)"]}, {"title": "견딜힘을 주는 위로의 근원", "points": ["우리는 “나타났다가 사라지는 안개”이다 (야고보 4:14)", "이 불확실한 세상에서 생명은 갑작스럽게 끝날 수 있다", "부활 희망은 우리에게 견딜힘을 주며 죽음이라는 냉엄한 현실에 부딪힐 때 위로가 된다", "여호와를 사랑하는 사람들은 많은 사람들을 얽매고 있는 죽음에 대한 병적인 두려움에 압도되지 않는다 (히브리 2:14, 15)", "하느님께 충실한 사람들에게는 죽음이 끝이 아니다", "부활이 실제로 가능한 것이라는 사실은 우리 모두에게 위로가 되고 견딜힘을 준다", "병과 사고와 죽음은 누구에게나 닥칠 수 있다 (전도 9:11)", "여러 해 동안 진리 안에 머물러 온 많은 사람들은 이 제도가 끝날 때 살아남을 것이라는 희망을 가지고 있었지만, 이제는 노령으로 인한 문제들에 직면하고 있다 (전도 12:1-7)", "이 제도에서의 생명은 일시적인 것이므로 우리는 “참된 생명” 즉 “영원한 생명”에 초점을 맞추어야 한다 \n(디모데 첫째 6:12, 19)", "하느님께 드리는 봉사 때문에 시련에 직면할 때, 바울처럼 우리는 부활 희망으로부터 견딜힘을 얻는다 (고린도 둘째 1:8, 9)", "우리가 경험하는 그러한 어려움들은 부활에 대한 우리의 믿음에 시험이 된다", "우리의 생명이 위태로운 상황에 처할 때, 부활 희망은 우리가 충실을 유지하고 타협을 거부하는 데 도움이 된다", "이 희망은 많은 사람들이 피에 대한 하느님의 법에 순종하고 그리스도인 중립을 유지하는 데 도움이 되었다"]}, {"title": "부활에 대한 믿음을 나타내는 방법", "points": ["여호와의 종들이 심지어 죽음에 직면해서도 충절을 지키는 것은 그들의 봉사가 믿음과 사랑에 근거한 것임을 증명한다 (계시 12:11)", "우리가 여호와께 전적인 정성을 드리는 이유는 그분의 놀라운 특성들 때문이다 (계시 4:11)", "여호와와 우리에 대한 마귀의 고발이 거짓임을 증명하는 데 참여하는 것은 영예로운 일이다 (욥 2:4; 잠언 27:11)"]}, {"title": "“영원한 생명을 바라보면서” 계속 기다리라", "points": ["여호와께서 충실한 사람들을 부활시키기를 간절히 원하신다는 사실을 아는 것은 참으로 위로가 된다 [욥 14:14, 15 낭독]", "우리는 순종하는 인류에게 영원한 생명을 주시려는 여호와의 목적의 확실한 성취를 참을성 있게 기다리는 가운데 “하느님의 사랑 안에서” 자신을 지켜야 한다 (유다 21)", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-54, 116-119면 참조)", "No. 180-KO 5/11\t 30분에 다룰 것"]}]}, {"no": 181, "title": "끝은 우리가 생각하는 것보다 가까운가?", "t": 1, "note": "청중에게 “사랑을 근거로” 권고하라. 특히 무활동자들에게 적용되는 마지막 부분에서는 더욱 그렇게 해야 한다 (빌레몬 9; 「익」 266면 2-4항)", "sections": [{"title": "“우리에게 말씀해 주십시오. 언제 이런 일들이 있겠습니까?”", "points": ["최근에 우리는 예수의 죽음을 기념하면서 그분과 여호와 하느님께 영광을 돌렸다", "기념식 연설을 통해, 우리는 여호와와 예수께서 죄인인 우리에게 크나큰 사랑을 나타내신다는 사실을 일깨움받았다 (로마 5:8; 요한 첫째 4:9)", "우리가 매년 기념식을 지키면서 주의 죽으심을 공포할수록 이 사물의 제도의 끝은 더욱 가까워진다 (고린도 첫째 11:26)", "예수께서 마가복음 13:1-4에서 하신 흥미로운 예언은 많은 관심과 추측의 대상이 되어 왔다 [성구 낭독]", "예수께서는 제자들에게 사탄의 악한 사물의 제도의 마지막 날을 식별하게 하는 복합적인 표징을 주셨다 [마가 13:8 낭독]", "이 예언은 1세기에 성취되었을 뿐만 아니라 우리 시대에도 성취된다는 면에서 이중적 의미가 있다", "마가복음 13:8은 지금 성취되고 있는가? 증거들은 무엇을 알려 주는가? 우리는 정말 마지막 날에 살고 있는가? 끝은 우리가 생각하는 것보다 가까웠는가?"]}, {"title": "마지막 날의 복합적인 표징", "points": ["예수께서 밝혀 주신 5가지 구체적인 특징을 살펴보자", "(1) “나라가 나라를 대적하고 왕국이 왕국을 대적하여 일어날 것이다” (「파08」 5/15 13-14면 7항)", "1914년 이래 전쟁으로 죽은 사람은 1억 명이 넘는다!", "(2) “곳곳에 지진이 있을 것이다” (「파11」 5/1 4면)", "(3) “식량 부족이 있을 것이다” (「파11」 5/1 5면)", "(4) “곳곳에 역병이 ··· 있을 것이다” (누가 21:11; 「파11」 5/1 6면)", "(5) “불법의 증가”가 있다 (마태 24:12)", "불법이란 하느님의 법과 원칙을 노골적으로 무시하는 태도를 가리킨다. 점점 더 많은 사람이 간음이나 동성애와 같은 죄를 용인한다 (이사야 5:20; 「파02」 3/1 9면 8항)", "우리는 복합적인 표징의 특징 가운데 5가지만을 간단히 살펴보았다", "어떻게 생각하는가? 우리는 정말 마지막 날에 살고 있는가?", "이전 어느 때에도 이러한 특징들이 오늘날처럼 두드러진 적은 없었다", "이러한 증거들을 볼 때, 대부분의 사람들이 생각하는 것보다 끝은 훨씬 더 가깝다!"]}, {"title": "지금 돌아와 우리 영혼의 목자를 활동적으로 섬기라", "points": ["우리는 여호와께서 언제까지 화해의 문을 열어 놓으실지 모른다 (고린도 둘째 5:18-20; 「파98」 12/15 17-18면 9-11항)", "하지만 악인들이 멸망될 때가 얼마 남지 않았다는 것은 알고 있다 [베드로 둘째 3:11, 12 낭독]", "이렇게 자문해 보라. ‘나는 “남아 있는 때가 단축되었다”는 것을 믿고 있음을 행동으로 나타내고 있는가?’ (고린도 첫째 7:29-31)", "여호와께서는 생명을 주는 성서 지식을 얻을 수 있도록 모든 부류의 사람들을 초대하신다 (계시 22:17)", "그러한 지식을 섭취하고 그와 일치하게 행동한다면, 낙원이 된 땅에서 영원히 살 수 있을 것이다", "그러한 전망에 마음이 이끌리는가?", "지체하지 말고 바로 지금 행동을 취해야 한다", "여호와의 증인은 당신이 하느님의 뜻과 일치하게 살아가는 방법을 배울 수 있도록 기꺼이 도와줄 것이다", "또한 여호와께서는 무활동이 된 양들이 돌아와 한정 없이 존속하는 자신의 팔에 안기게 되기를 바라신다 (신명 33:27; 애가 3:40)", "만약 당신이 한때 여호와를 활동적으로 섬겼다면, 베드로 첫째 2:25의 말씀을 마음에 새기기 바란다 [성구 낭독] (「예레」130면 5항)", "당신이 이곳에 오기 위해 노력을 기울인 것은 우리의 목자와 그분의 계명들을 잊지 않았다는 증거이다 [시 119:176 낭독]", "사람들이 무활동이 되는 데는 여러 가지 이유가 있다 (「파08」 11/15 13-15면 5-13항)", "어떤 이유로 무활동이 되었든지 간에, 당신이 필요한 도움을 받아들여 우리의 사랑 많으신 목자를 다시 활동적으로 섬기게 되기를 바란다 (「예레」 72-76면 13-16항; 152-153면 22-25항)", "하느님의 말씀과 우리의 그리스도인 출판물을 통해 영적인 힘을 얻으라 (시 119:105)", "당신은 여호와의 사랑 많은 회중의 도움을 받게 될 것이다 (베드로 첫째 5:2; 「파08」 11/15 16면 19-22항)", "과거에는 예언자들이 하느님의 백성에게 필요한 것들을 일깨워 주었고 다가오는 하느님의 심판을 경고해 주었다 (아모스 3:7)", "오늘날 여호와께서는 자신의 기름부음받은 종들을 사용하셔서 의로운 사람들을 포함한 우리 모두에게 대부분의 사람들이 생각하는 것보다 끝이 가까웠음을 일깨워 주신다 (에스겔 3:21)", "이 종들은 요새 도시에 있는 철 기둥처럼 확고한 입장을 취해 왔다 (예레미야 1:17-19)", "기름부음받은 자들은 ‘허리를 졸라맸으며’, 자신들이 맡은 임무를 완수하기 위해 하느님의 말씀을 통해 힘을 얻는다", "당신도 그러한 열심을 나타내고 그들을 지원하는 일을 목표로 삼으라", "우리가 “들은 것들에 보통 이상의 주의를 기울”이는 것은 매우 중요하다 (히브리 2:1; 누가 21:34-36)", "과거, 임박한 멸망의 경고를 무시했던 사람들은 자신들이 생각하는 것보다 끝이 일찍 왔다는 것을 곧 깨달았다", "오늘날에는 훨씬 더 긴급한 경고가 발해지고 있으며, 아마겟돈이 가깝다는 명백한 증거가 있다", "수많은 사람들이 경고를 무시하고 있지만, 시간은 얼마 남지 않았다", "끝은 사람들이 생각하는 것보다 가깝다! 당신은 끝이 가깝다고 생각하는가?", "하늘에 계신 아버지에 대해 깊이 생각해 보라. 그분은 끝이 얼마나 남았다고 말씀하실 것 같은가?", "위대한 목자이신 여호와의 따뜻한 품에서 안전을 발견하기를 바란다! (이사야 40:11)", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-54, 116-119면 참조)", "No. 181-KO 6/11\t30분에 다룰 것"]}]}, {"no": 182, "title": "하느님의 왕국이 지금 우리를 위해 하고 있는 일", "t": 0, "note": "하느님의 왕국이 실재하고 있으며 지금 통치하는 활동적인 정부라는 점을 알려 주는 증거를 명확히 제시하라. 왕국이 지금 하고 있는 일뿐 아니라 왕국 시민이 될 사람들에게 무엇이 기대되는지도 알려 주라", "sections": [{"title": "많은 증거는 왕국이 1914년에 통치하기 시작했음을 알려 준다", "points": ["예수께서는 우리에게 “당신의 왕국이 오게 하십시오”라고 기도하라고 가르치셨다 (마태 6:10)", "그 하늘 왕국은 결국 지상 전역을 낙원으로 만들 것이었지만, 인간 정부들이 여전히 땅을 통치하고 있을 때에 설립될 것이었다 (다니엘 2:44; 계시 21:4) [시 110:1, 2 낭독]", "성서의 예언과 연대는 왕국이 설립된 해가 1914년임을 지적한다 (계시 12:10, 12)", "“나라들의 지정된 때”가 끝났다 (누가 21:24; 에스겔 21:26, 27; 「실」 217면)", "그리스도께서 왕국 권위를 가지고 임재해 계시다는 복합 표징이 현재 성취되고 있다 (마태 24:3; 「실」 88-92면)", "우리는 지금 “마지막 날”의 특징을 이루는 “대처하기 어려운 위급한 때”를 경험하고 있다 (디모데 둘째 3:1-5)", "계시록 6장에 나오는 네 명의 말 탄 자의 질주는 우리가 왕국이 통치하는 때에 살고 있음을 확증한다 (계시 6:2, 4-6, 8; 「파86」 2/15 3-7면)", "예언된 ‘땅에 있을 화’가 사람들과 나라들의 고난 가운데 명백히 나타나 있다 (계시 12:12)"]}, {"title": "왕국이 우리 시대에 해 온 일", "points": ["수백만 명의 충성스러운 신민을 모아 왔다 (잠언 14:28)", "그들은 235여 개 나라와 지역에서 살고 있지만 하느님의 왕국을 열정적으로 지지한다 (시 110:3)", "지난 봉사 연도에 그들은 자진적으로 왕국 소식을 전파하는 데 15억 시간 이상을 사용했다 [가장 최근 수치를 사용하라]", "하늘 정부로서 왕국은 기록된 법을 시행해 왔다", "왕국 통치 아래 있는 사람들을 다스리는 기록된 법은 하느님의 말씀에 들어 있다 (시 19:7)", "왕국은 사랑의 법을 가진 유일한 정부이다 (요한 13:34, 35)", "성서의 법은, 그리스도인들이 세상 정부 권위의 법 아래 살고 있으며, 따라서 카이사르에게 상대적인 복종을 해야 함을 참작한다 (로마 13:1, 7)", "하느님의 왕국 신민은 법을 가장 잘 준수하는 시민들 가운데 속한다 (「파02」 11/1 12-13면; 「깨00」 6/8 28면; 「깨97」 8/22 26면)", "관리들이나 그 밖의 사람들이 왕국 통치에 순종하는 사람들의 선한 행실에 대해 칭찬하는 경우가 자주 있다 (베드로 첫째 2:12; 「파02」 11/1 12-13면; 「깨」 07/4 27면; 「깨00」 6/8 28면; 「연94」 166-167면)", "하느님의 법이 왕국 통치 아래 시행되고 있다", "하느님의 법을 고의로 범하고 회개하지 않는 사람은 회중에서 내보내지며, 따라서 회중은 깨끗하게 유지된다 (고린도 첫째 5:11-13; 「파24.08」 15-17면 4-8항)", "하느님의 왕국은 교육 제도를 마련해 왔다", "성서 그리고 「파수대」와 「깨어라!」 같은 성서에 근거한 출판물을 통해 위대한 교육자께서는 ‘우리에게 유익하도록 가르치신다’ (이사야 30:20; 48:17)", "가정에서 각자는 하느님께서 맡기신 역할을 수행하는 방법을 배움으로써 유익을 얻는다", "가족 숭배 마련은 가족 성원 각자의 필요에 맞게 도움을 베푼다", "성서에 근거한 교육 프로그램은 신권 교육을 증진한다", "[조직에서 운영하는 다양한 학교들이 어떻게 수많은 사람들이 가장 중요한 일을 위해 준비를 갖추게 해 주고 있는지 지적한다 (「익」 8면; 「사」 11/10 5-6면)]", "세계 전역에서 관심 있는 사람들에게 베풀어지는 무료 가정 성서 교육", "매주 수백만 건의 성서 연구가 사회되고 있다", "600개가 넘는 언어로 발행되는 우리의 출판물은 이 중요한 활동을 수행하는 도구 역할을 해 왔다", "하느님의 왕국에는 그 신민을 돌보고 보호하기 위해 보이는 대표자들이 있다 (이사야 32:1, 2; 「파06」 7/15 5면)", "장로들은 목자와 가르치는 사람으로 섬기면서, 양 떼에게 새 힘을 준다 (마태 11:28-30)"]}, {"title": "왕국 통치는 현재 우리가 인내하는 데 도움이 된다", "points": ["왕국이 지금 우리를 위해 하고 있는 일에 대해 곰곰이 생각해 보면 믿음이 강화된다 (시 77:12; 145:11)", "우리의 마음을 움직여 열심히 전파하게 만든다 (로마 10:11, 13-15)", "우리는 천사의 지원을 받고 있음을 확신한다 (계시 14:6, 7; 「파09」 5/15 24-25면)", "역사 전체를 통해 사람들은 불완전한 인간 정부를 위해 희생해 왔지만, 결국 환멸을 느낄 뿐이었다", "그와는 대조적으로 하느님의 왕국은 그 신민을 결코 실망시키지 않을 것이다", "우리는 지금도 왕국 통치로부터 유익을 얻고 있다", "왕국은 우리가 하느님께 가까이 가고 세계적 형제 관계 안에서 사랑과 지원을 경험하도록 도와 준다 (야고보 4:8; 베드로 첫째 2:17)", "성서에 근거한 우리의 모든 희망이 하느님의 왕국 통치 아래 곧 실현될 것이다 (시 145:16; 로마 8:24, 25; 계시 21:5)", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-54, 166-169면 참조)", "No. 182-KO 2/25\t 30분에 다룰 것"]}]}, {"no": 183, "title": "무가치한 것들을 보지 말고 물리치십시오!", "t": 9, "note": "주요 성구들을 적절한 열정을 가지고 낭독하고 성구를 근거로 추리하여 청중의 마음을 감동시키기 위해 노력한다. 우리의 눈을 고정시킬 수 있는 훌륭한 것들이 무엇인지, 그리고 여호와를 숭배하는 일에 자제가 얼마나 중요한 역할을 하는지 청중 모두가 인식하도록 돕는다", "sections": [{"title": "우리는 보는 것의 영향을 받을 수 있다", "points": ["시각만큼 우리의 정신에 강한 영향을 미치는 것은 아마 없을 것이다", "정신으로 정보를 전달하는 이 통로는 우리의 감정과 행동에 강력한 영향을 준다 (「통」-1 374면)", "눈으로 보는 것은 좋게든 나쁘게든 우리 마음에 야심이나 욕망이 생기게 하거나 그러한 것들이 강렬해지게 할 수 있다 (「파10」 4/15 20-21면; 「파86」 6/15 10-14면)", "좋은 영향: 우리의 눈은 우리가 아름다운 것들을 감상하고, 경이로운 창조물을 인식하고, 하느님의 존재와 그분의 영광에 대한 증거를 접하고, 그분께 순종하려는 마음을 품게 해 줄 수 있다 (시 8:3, 4; 19:1, 2; 104:24; 로마 1:20)", "나쁜 영향: 하와와 불순종한 천사들과 아간은 자신들에게 금지된 것을 지나친 것이 아니라 그것들을 눈으로 보고 마음으로 갈망했다 (창세 3:6; 6:1, 2; 여호수아 7:20, 21)", "현대의 광고 업계는 시각에 호소하는 전략이 오래전부터 대단한 힘을 발휘해 왔다는 것을 잘 알고 있다 (「파10」 4/15 21면)", "그러므로 보는 것을 통제하는 일은 참으로 중요하다!", "시편 필자의 이러한 말을 마음에 새길 필요가 있다 [시 119:37 낭독]"]}, {"title": "하느님께 순종하고 무가치한 것에서 눈을 돌리라", "points": ["참그리스도인이라고 해서 눈의 욕망과 육체의 욕망에 영향을 받지 않는 것은 아니다", "우리는 자신이 보고 갈망하는 것과 관련하여 자기 징계를 하도록 권고받고 있다 (고린도 첫째 9:25ㄱ, 27; 요한 첫째 2:15-17)", "욥은 보는 것이 욕망에 강한 영향을 준다는 점을 알았다. 그래서 자신의 눈과 계약을 맺었다 [욥 31:1 낭독]", "그는 여자와 부도덕한 방식으로 접촉하지 않으려 했을 뿐만 아니라 아예 그런 생각조차 마음에 품지 않겠다고 결심했다", "노아 시대에 불순종한 천사들에게 일어난 일은 불법적인 성관계에 대한 정욕을 품는 것의 위험성을 보여 준다 (창세 6:4-7)", "예수께서는 그렇게 하지 말라고 경고하셨다 [마태 5:28 낭독]", "‘계속 바라보는’ 것은 마음이 제어되고 있지 않으며 불법적인 욕망을 죽일 필요가 있음을 드러내는 것이다 (골로새 3:5, 6)", "오늘날 많은 사람은 세속 간행물이나 인터넷을 통해 음란물을 은밀히 ‘계속 바라본다’ [에베소 5:3, 4, 12 낭독] (「파10」 4/15 21-22면)", "심지어 일시적으로 또는 우연히 음란물을 흘끗 보기만 해도 좋지 않은 결과를 초래할 수 있다", "그 결과로 양심의 가책을 느끼거나 자신이 무가치하게 여겨질 수 있고, 정신에서 부도덕한 장면을 지우기가 매우 어려울 수 있다", "우리의 정신은 그리스도에게 사로잡혀 있어야 한다. 그러려면 하느님의 말씀을 연구하고 기도하고 그리스도인 집회에 참석하여 우리의 정신과 마음에 자양분을 공급해야 한다 (고린도 둘째 10:5; 골로새 3:9, 10)", "어떤 오락물은 건전할 수 있지만, 물질주의와 마법을 미화하는 오락물이나 폭력과 유혈과 살인이 난무하는 오락물은 “쓸모없는” 것 즉 무가치한 것이다 (시 101:3; 「파10」 4/15 22면)", "여호와 앞에서 그리스도인 부모에게는 가족이 오락물을 선택적으로 시청하게 해야 할 책임이 있다", "영화, 텔레비전 프로, 비디오 게임, 어린이용 서적에 있는 위장된 형태의 신비술을 조심하라 (「파02」 10/15 11면)", "나이가 많든 적든 우리의 눈은, 끔찍하게 죽는 장면을 실감나게 묘사하고 폭력이 난무하는 비디오 게임을 보며 즐거워해서는 안 된다 [시 11:5 낭독] (「깨00」 7/8 28면)", "우리는 건전하고 격려적인 것들에 우리의 눈을 고정해야 하며, 여호와께서 정죄하시는 그 어떤 일에도 정신을 집중하지 않도록 해야 한다", "사탄은 우리의 생각을 부패시키려고 노리고 있다 (고린도 둘째 11:3)", "받아들여질 만한 것으로 여겨지는 오락물이라도 그것을 보는 데 너무 많은 시간을 보낸다면 매일의 성서 읽기와 집회 준비를 할 시간을 빼앗기게 된다 (빌립보 1:9, 10)"]}, {"title": "무가치한 것을 물리치겠다고 결심하라", "points": ["안타깝게도 무가치한 것들을 전혀 보지 않을 수는 없다. 심지어 예수께서도 뜻하지 않게 그런 것들을 보신 일이 있다 (마태 4:8)", "마귀가 그분에게 세상 왕국들을 보여 주었을 때, 예수께서는 마음이 자극을 받아 그릇된 욕망을 품는 것을 허용하지 않으셨고, 마귀의 제의를 거절하기 위해 그 제의에 대해 생각해 볼 필요조차 없으셨다", "예수께서는 즉시 대응하셨다 [마태 4:10 낭독]", "그분의 대답은 직접 언명하셨던 자신의 인생의 목적 즉 하느님의 뜻을 행하려는 목적과 조화를 이루는 것이었다 (히브리 10:7)", "예수 그리스도의 제자인 우리는 무가치한 것을 물리치겠다고 개인적인 결심을 한다 [시 119:101 낭독]", "성경에서 명백히 정죄하는 문제에 대해 어떻게 대처할지 결정을 내리지 않은 채, 그러한 상황이 발생할 때까지 기다리는 것은 위험하다", "우리는 성경에 대한 지식과 하느님의 뜻을 행하려는 열망을 바탕으로, 어떻게 대응할 것인지를 미리 정해 두어야 한다 (「파10」 1/15 3면)", "‘단순한’ 눈, 즉 하느님의 뜻을 행하는 데 전적으로 초점을 맞추고 있고 다른 것들로 인해 초점을 잃지 않는 눈을 유지하는 것에 대해 후회하는 일은 결코 없을 것이다 (마태 6:22, 23; 히브리 10:36)", "이 자리에 있는 많은 사람들은 단순한 눈을 유지하기 위해 노력을 기울여 왔으며, 오랫동안 무가치한 것들을 보지 않고 물리쳐 왔다", "그러한 노력은 칭찬받아 마땅하다. 하늘에 계신 의로우신 아버지께서도 매우 기뻐하실 것이다", "계속 그렇게 하여 회중 내의 새로운 사람들과 청소년들에게 훌륭한 본을 보이도록 하라", "“무가치한 것을 보지 않고 지나치”는 면에서 순종하여 여호와의 길에서 생명을 보존받게 되기를 바란다 (시 119:37)", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-54, 166-169면 참조)", "No. 183-KO 8/12\t30분에 다룰 것"]}]}, {"no": 184, "title": "죽으면 모든 것이 끝나는가?", "t": 6, "note": "여호와의 대속 마련과 왕국이 아니었다면 인류는 참으로 희망 없는 상태에 있게 되었을 것임을 청중이 이해하도록 돕는다 기념식 때 다루는 진리에 대해 절대적인 믿음을 나타내야 할 필요성을 강조한다 모든 인간의 끝 7분 전 세계적으로 매년 수많은 사람들이 죽는다 죽은 사람들이 어떤 식으로인가 계속 살아 있다는 믿음에 기초해서 사별한 사람들을 위로하는 것을 흔히 볼 수 있다 그러한 믿음에는 매우 다양한 형태가 있다 「파99」 41 910면 17항 죽음이 인간에게 자연스러운 일이라고 주장하는 사람들조차도 죽음이 최종 단계라는 사실을 받아들이기 어려워한다 성서에서는 사람의 죽음을 가리켜 그 끝에 이른 것으로 말한다 신명 215 여호수아 1020 참으로 죽음은 모든 인간의 끝이다 전도 72 낭독 우리는 이러한 사실을 어떻게 이해해야 하는가 죽으면 정말 모든 것이 끝나는가 죽음의 정의 7분 죽음은 창세기 27에서 묘사하는 과정의 역순으로 일어난다 낭독 호흡이 멈추면 생명력이 사라지고 생각도 소멸된다 시 1464 인간의 죽음은 동물의 죽음보다 우월함이 없다 죽음은 동일하다 전도 319 20 죽으면 모든 의사소통과 감정과 생각 그리고 존재 자체가 끝나게 된다 전도 95 6 10 죽음에 관한 이러한 사실이 우리를 괴롭히는 이유는 우리가 영원히 살도록 만들어졌기 때문이다 전도 311 그리스도의 죽음의 연례 기념식에서 고려하는 진리는 우리가 희망을 가질 수 있는 근거가 된다 예수의 죽음이 끝이 아니었던 이유 9분 죽음은 죄에 대한 형벌이다 로마 623 예수께서는 죄를 짓지 않으셨다 따라서 그분은 인간으로서 영원히 살 법적 권리를 유지하셨다 요한 1018 사도 224 「파09」 915 29면 15항 「파80」 11 46면 25항 영적 피조물의 생명으로 부활되신 예수께서는 자신의 완전한 인간 생명의 가치를 여호와께 바치셨다 베드로 첫째 318 그렇게 함으로 우리가 죄인으로서 여호와께 빚진 값이 지불되었다 고린도 둘째 514 15 유전받은 죄에 따르는 결과를 없앨 근거가 생기게 된 것이다 여호와께서는 대속을 근거로 모든 사람을 사면하시는가 그렇지 않다 순종이 요구된다 요한 336 여호와 하느님과 예수 그리스도에 대한 지식을 계속 섭취하고 그 지식과 일치하게 행동하라 요한 173 여호와께서 예수를 무덤에서 풀려나게 하신 것은 하느님의 심판 날이 있을 것임을 모든 사람에게 보증하는 역할을 하며 부활이 있을 것이라는 보증이 된다 사도 1731 2415 끝은 당신에게 어떤 의미가 있을 것인가 7분 죽으면 모든 것이 끝나는가 하느님과 예수 그리스도가 아니었다면 그러할 것이다 미소 과학 기술나노 기술과 같은 고도의 과학 기술로도 인간은 생명을 창조하거나 복원할 수 없다 「파99」 1015 5면 34항 여호와께서만 그런 일을 하실 수 있다 하느님의 고대 종들은 부활에 대한 희망을 나타냈다 욥 14715 다니엘 1213 예수께서는 하느님께서 죽은 사람들을 부활시키려는 열망과 능력을 갖고 계심을 보여 주셨다 누가 71117 84956 요한 113844 이제 하느님의 법에 불순종할 때 어떤 결과가 따르는지 모두가 알 만큼 충분한 시간이 지났으므로 이 땅의 문제를 바로잡으실 그분의 정해진 시간이 급속히 다가오고 있다 그 일에는 죽은 사람들을 일으키고 인류를 영원한 지상 생명으로 인도하는 일이 포함된다 「파07」 515 2630면 자신의 종들을 부활시키실 여호와의 목적은 매우 확실해서 그들이 마치 살아 있는 것처럼 언급될 정도이다 마태 2231 32 「따」 106107면 2021항 영원히 살게 되면 여호와 하느님에 관해 더 많은 것을 배우고 그분을 사랑하는 사람들과 벗 관계를 누릴 무한한 기회를 갖게 될 것이다 욥 2614 전도 310 11 「파11」 51 27면 여호와를 충성스럽게 섬기라 그러면 현재에도 풍성한 축복을 받고 그 결과는 영원한 생명이 될 것이다 로마 622 골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다 참조된 성구를 모두 낭독하거나 설명할 필요는 없다 「전도 학교」 5254 166169면 참조 No 184KO 712\t\t\t\t\t\t\t\t30분에 다룰 것", "sections": []}, {"no": 185, "title": "진리가 우리의 생활에 영향을 미치는가?", "t": 4, "note": "집회에 처음 참석한 사람들도 이해할 수 있는 표현을 사용하라. 성서 원칙을 적용하면 어떻게 현 세상 제도 가운데서도 여러 부면에서 더 나은 삶을 누릴 수 있는지 설명하라", "sections": [{"title": "진리란 무엇인가", "points": ["예수께서는 돌아가시기 얼마 전에 본디오 빌라도에게 자신이 “진리에 대하여 증거하기” 위해 세상에 왔다고 말씀하셨다 [요한 18:37 낭독]", "빌라도는 예수께서 왕국 진리에 대해 하시는 말씀을 들을 마음이 없었다 (요한 18:38; 「파07」 10/1 32면)", "예수께서는 빌라도가 생각하던 진리가 아닌 특정한 “진리”에 대해 말씀하셨는데, 그것은 일반적인 진리가 아니라 하느님으로부터 나온 진리 곧 여호와 하느님과 그분의 목적에 관한 진리이다 [요한 17:17 낭독] (「파02」 3/1 13면)", "그 진리는 하느님의 영감받은 말씀인 성경에 기록되어 있다 (디모데 둘째 3:16, 17)", "성경에 대한 정확한 지식을 가지면, 진리를 분별할 수 있을 뿐만 아니라 속박으로부터 자유롭게 된다 (요한 17:3) [요한 8:31, 32 낭독]", "요한복음 8:32에서 예수께서 언급하신 자유는 주로 죄로부터의 자유를 말한다 (로마 8:1, 2)", "진리는 또한 죄의 특정한 결과로부터 우리를 자유롭게 해 준다"]}, {"title": "진리는 믿음을 가진 사람이 속박에서 벗어나게 해 준다", "points": ["오랜 세월 동안, 수많은 사람들이 노예로 팔려 자유를 박탈당하였다 (「깨02」 6/22 4-6면)", "오늘날, 인류는 다양한 형태의 노예 상태에 처해 있다. 하지만 우리 각자는 하느님을 섬기기로 선택할 수 있다 [신명 30:19 낭독] (「파10」 1/15 11면)", "진리가 우리의 생활에 영향을 미치는 몇 가지 부면을 살펴보자", "[연사는 연설이 제공될 지역의 필요에 맞는 예를 선택해야 한다]", "진리에 따라 산다면, 현 세상 상태에 대한 두려움과 절망으로부터 자유로워질 수 있다", "성서 예언은 머지않아 이 땅에서 악이 깨끗이 없어진 뒤 평화가 풍부해질 것이라고 알려 준다 (시 37:10, 11; 디모데 둘째 3:1)", "진리를 알면, 죽은 자의 상태에 대한 가르침과 같은 거짓 종교의 가르침의 속박으로부터 자유롭게 된다", "수많은 사람들이 죽은 자를 두려워하며 도움을 구하려고 주술사나 영매나 교직자를 찾아간다 (「깨96」 8/8 19면)", "진리는 죽은 자가 우리에게 해를 끼칠 수 없을 뿐더러 영원한 고초 가운데 고통을 겪고 있지도 않다는 것이다 (전도 9:5, 6)", "알코올 의존증에 빠져 있거나 담배와 마약의 노예가 된 사람들도 많이 있다", "하느님과 좋은 관계를 누리고자 하는 마음에 진리의 힘이 더해지면 그러한 나쁜 습관에서 벗어날 수 있다 (고린도 둘째 7:1; 「깨02」 6/22 7-8면)", "한때는 화를 터뜨리고 욕설을 하고 불경건한 행실에 사로잡혀 있던 사람들이 진리 덕분에 놀랍게 변화하였다 (에베소 4:31, 32; 5:25, 33)", "하느님과 함께 걷고 싶은 열망에서 우러나와 그들은 친절을 사랑하고 경건한 특성들을 나타내는 방법을 배웠다 (미가 6:8)", "장차 이 땅의 모든 참숭배자들은 “부패의 종 상태에서 자유롭게 되어 하느님의 자녀의 영광스러운 자유를 가지게” 될 것이다 (로마 8:20, 21; 「파99」 5/1 6면)", "이것은 인간 가족에게 큰 고통과 고난을 가져온 모든 것으로부터 해방되는 참다운 자유일 것이다 (요한 8:36; 로마 6:22, 23)"]}, {"title": "진리를 택하여 진정한 자유를 누리라", "points": ["여호와 하느님을 섬기고 평화와 의가 깃든 신세계에서 살 희망을 갖는 것은 얼마나 좋은 일인가! (베드로 둘째 3:13)", "하느님의 신세계에서 살기 위해서는 그분의 진리를 택하고, 그것을 온전히 받아들이고, 새 인간성을 입어야 한다 (에베소 4:20-24; 데살로니가 첫째 2:13)", "여호와께서는 결코 우리가 할 수 있는 것 이상을 요구하시지 않는다", "진리와 일치하게 살기 위해 노력한다면 영적 보호를 받고 하느님으로부터 승인의 미소를 얻게 될 것이다 (시 5:11, 12; 요한 셋째 3, 4)", "빌라도 앞에서 예수께서는 누구든지 진리의 편에 있는 사람은 그분의 음성을 듣는다고 말씀하셨다 (요한 18:37ㄴ)", "예수의 음성을 주의 깊게 들음으로 두려움 없이 진리 즉 하느님의 진리의 편에 서고 여호와께 순종하도록 하자 (누가 9:35)", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-54, 166-169면을 참조)", "No. 185-KO 11/12\t 30분에 다룰 것"]}]}, {"no": 186, "title": "하느님의 행복한 백성과 연합하십시오", "t": 9, "note": "따뜻함과 확신을 가지고 연설하여, 지속적이고 진정한 행복의 기초는 영성 및 하느님의 조직의 보이는 부분과 연합하여 그분의 뜻을 행하는 것임을 청중이 인식하도록 돕는다", "sections": [{"title": "진정한 행복을 누리는 유일한 백성", "points": ["지속적이며 진정한 행복은 행복하신 하느님을 충성스럽게 섬기는 사람들만이 누리는 것이다 (디모데 첫째 1:11)", "이스라엘 사람들은 여호와를 섬겼을 때 행복을 누렸다 (시 33:12)", "예수의 제자들은 영적 필요가 충족되었기 때문에 행복하였다 (마태 5:3)", "오늘날 여호와의 증인은 연합 가운데 행복을 누리는 독특한 사람들로 알려져 있다", "여호와를 충실히 섬기는 사람들에게는 행복이 보장되어 있다", "하느님의 행복한 백성은 다른 사람들도 자신들과 연합하도록 기꺼이 돕는다", "사람들은 하느님의 백성과 함께 기뻐하라는 초대를 받고 있다 (로마 15:10)", "여호와의 백성이 누리는 행복은 무엇에 기초해 있는가?", "하느님의 행복한 백성과 연합하게 되는 사람들은 어떤 유익을 얻는가?", "새로운 사람들이 참숭배자들과 연합해야 하는 이유는 무엇인가?"]}, {"title": "하느님의 가르침은 우리를 그분의 백성으로 연합시키며 행복을 얻게 해 준다", "points": ["여호와는 우리의 위대한 스승이시며, 예수는 우리의 선생님이시다 (이사야 30:20; 요한 13:13)", "우리는 하느님의 말씀에 따라 살기 때문에 행복하다 (누가 11:28)", "새로운 사람들은 성서 진리를 적용함에 따라 우리와 연합하게 된다", "세계 어디서든 하느님의 백성은 연합과 행복을 누린다. 우리 모두가 여호와의 조직을 통해 영적 양식을 공급받기 때문이다", "다양한 배경에도 불구하고 우리의 생각과 행동은 연합되어 있으며 이것은 우리에게 기쁨이 된다 (이사야 2:3)", "심지어 이전에 서로 적이었던 사람들도 성서 진리를 적용함으로 생활을 변화시킨 결과 지금은 하느님의 행복한 백성 가운데서 연합되어 있다 [우리 출판물에 나오는 최근 예들을 언급한다]", "여호와의 증인은 거의 1000개 언어로 성서 출판물을 발행하며, 이것은 우리가 일치된 생각을 하는 데 도움이 된다 (고린도 둘째 13:11)", "세계적인 교육 프로그램을 통해, “영원한 생명에 합당한 성향을 가진” 사람들은 기쁨을 누리게 해 주는 지혜를 얻게 된다 (사도 13:48; 잠언 3:13-18)"]}, {"title": "하느님의 행복한 백성과 연합함으로 얻는 유익", "points": ["하느님의 백성으로 연합된 모든 사람은 그분과 개인적 관계를 누리게 된다", "여호와의 뜻을 행하는 사람들은 날마다 그분의 지원을 받게 된다 (시 68:19)", "그들은 기도를 들으시는 분에게 자유롭게 나아갈 수 있다 (시 65:2)", "그들에게는 비길 데 없는 평화가 있다 (빌립보 4:6, 7; 「파81」 3 16면)", "성서의 가르침을 적용하면 영적인 안정을 얻고 지속적인 행복을 누리게 된다", "하느님의 행복한 백성으로 연합된 사람들은 형제 사랑과 그로 인한 축복을 누린다 (요한 13:35; 골로새 3:14; 베드로 첫째 2:17)", "그들은 집회와 크고 작은 대회에서 그러한 사랑을 경험한다", "같은 지역의 동료 신자들이 어려움에 처할 때나 세계의 다른 지역에서 재난이 발생할 때에도 사랑을 나타낸다", "하느님의 백성과 연합하는 사람들 앞에는 영원한 생명의 희망이 놓여 있다", "여호와께서는 예수 그리스도의 대속 희생을 통해 그러한 생명을 누리는 일을 가능하게 하셨다 (마태 20:28; 로마 5:8; 「파92」 6/15 4-7면)", "기름부음받은 자들은 예수의 희생으로부터 유익을 얻고 그분의 왕국의 공동 상속자가 된다 (요한 첫째 2:1, 2)", "“다른 양들”도 예수의 희생으로부터 유익을 얻으며 낙원이 된 땅에서 살 수 있는 희망 가운데 기뻐한다 (요한 10:16; 누가 23:43)", "영적인 가치관이 물질적인 가치관을 대신하게 되면, 진정한 삶의 의미를 갖게 된다 (마태 6:33; 빌립보 1:9, 10)", "그리스도처럼 여호와의 백성도 그분의 권익을 첫째 자리에 둔다 (요한 6:38)", "예수처럼 그들은 여호와를 공경하고 진리에 대해 증거하면서 목적 있는 삶을 산다 (요한 18:37)", "[하느님의 백성과 연합한 사람들의 삶이 참으로 의미 있고 행복하다는 것을 보여 주는 「파수대」나 「깨어라!」의 최근 경험담을 소개한다]"]}, {"title": "하느님을 사랑하는 사람들이 그분의 백성과 연합해야 하는 이유", "points": ["하느님을 사랑하는 사람들이 그분의 백성과 연합해야 하는 이유들을 생각해 보라 (「파93」 5/15 9-10면)", "여호와는 우주의 주권자로서 전적인 정성을 받아 마땅하신 분이다 (탈출 20:4, 5)", "여호와의 주권을 입증하는 일과 그분의 이름을 거룩하게 하는 일에 깊은 관심이 있으면 그분을 섬기려는 마음을 갖게 된다", "하느님의 뜻을 행하고 그분의 계명들을 지키는 사람들과 연합함으로 그분에 대한 사랑을 나타낼 수 있다 (요한 첫째 5:3)", "우리가 하느님의 백성과 함께 그분을 섬겨야 하는 한 가지 중요한 이유는 아들을 대속 희생으로 제공하신 여호와의 사랑에 감사하기 때문이다 (요한 3:16)", "하느님께서 그분의 조직을 통해 베푸시는 영적 마련들에 감사한다면 마음이 감동되어 그분을 숭배하게 될 것이다", "하느님의 왕국에 대해 말하려는 강한 열망 역시 여호와의 백성과 함께 그분을 섬겨야 하는 또 다른 이유가 된다 (시 145:10, 11)"]}, {"title": "지체 없이 하느님의 행복한 백성과 연합하라", "points": ["스가랴의 예언은 사람들이 기름부음받은 그리스도인들 즉 영적 ‘유대인들’에게 가담할 것임을 지적하였다 [스가랴 8:23 낭독]", "오늘날 많은 사람들이 왕국 소식을 받아들임으로 그렇게 하고 있다", "만약 당신이 하느님과 의를 사랑하는 사람이라면, 지금이야말로 여호와의 종들과 연합할 때이다", "모든 나라 사람들이 하느님을 섬기는 사람들과 연합함에 따라, 하느님께서 그분의 백성을 축복하신다는 증거가 나날이 늘어나고 있다", "미래에 “큰 환난”을 생존할 여러 나라 출신의 “큰 무리”가 기쁨에 넘치는 여호와의 숭배자들로 구성된 세계적인 가족의 일부가 되고 있다 (계시 7:9, 10, 14; 21:1, 4, 5)", "하느님의 행복한 백성과 온전히 연합해 있는 사람들 가운데 당신도 있을 것인가?", "당신이 현재 연합하여 여호와를 섬기고 있는 수백만 명 가운데 한 사람이라면 많은 축복을 받게 될 것이다", "(골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조)", "No. 186-KO 3/13\t 30분에 다룰 것"]}]}, {"no": 187, "title": "사랑의 하느님께서 왜 악을 허용하시는가?", "t": 0, "note": "집회에 처음 참석한 사람들도 이해할 수 있게 답을 제시한다. 또한 개인적으로 비극적인 일을 겪고 하느님이 왜 악을 허용하시는지 의아해하고 있을 수 있는 여호와의 증인의 믿음을 강화시켜 준다", "sections": [{"title": "하느님은 사탄의 세상에 만연한 악을 미워하신다", "points": ["사고나 범죄, 전쟁, 테러, 재난의 피해자들은 흔히 “왜?”라는 질문을 하게 된다 (「깨」 06/11 3-9면)", "사랑의 하느님께서 왜 악한 일이 일어나는 것을 허용하시는지 궁금해해 본 적이 있는가?", "심지어 하느님을 충실히 섬겼던 사람들도 그런 의문을 가졌었다 [하박국 1:3 낭독]", "어떤 사람들은 하느님이 사람들에게 관심이 없다고 생각한다", "성서는 하느님이 고난과 불공정을 미워하신다는 점을 밝혀 준다 (재판관 2:18; 잠언 6:16-19)", "여호와께서는 노아 시대의 모든 악 때문에 마음 아파하셨으며, 악에 대한 그분의 미움은 변하지 않았다 (창세 6:5, 6)", "하느님은 결코 악의 근원이 아니라는 점을 확신하라 (욥 34:10; 야고보 1:13)"]}, {"title": "하느님이 악을 허용하신 이유", "points": ["그렇다면 사랑 많고 공의롭고 전능하신 하느님이 왜 사탄의 세상에 만연한 악을 허용하시는가? (「파02」 10/1 5-6면)", "하느님이 모든 상황을 직접 통제하신다는 잘못된 생각이 널리 퍼져 있다", "하지만 예수께서는 사탄 마귀가 “세상의 통치자”이며 악에 대한 책임이 그에게 있다는 점을 밝혀 주셨다 (요한 14:30; 요한 첫째 5:19)", "“거짓의 아버지”인 사탄은 악한 천사들과 인간들을 유혹하여 자신과 함께 하느님께 반역하게 만들었다 (요한 8:44; 유다 6)", "여호와께서는 사탄이 제기한 쟁점을 단번에 완전히 해결하기 위해 지난 6000년간 악을 허용해 오셨다 (창세 3:1-6)", "사탄은 여호와의 통치권에 의문을 제기했다 (「실」 109-110면 10-11항)", "하느님으로부터의 독립은 진정한 자유와 지속적인 행복을 가져다주었는가? 그렇지 않았다!", "인간의 통치는 전쟁, 압제, 고난, 죽음을 초래했다 (전도 8:9; 로마 8:22; 「파13」 9/1 3-5면)", "여호와께서는 우리가 겪는 고통을 잘 아시며 고통에서 해방시켜 주겠다고 약속하신다 (탈출 3:7; 고린도 둘째 1:3, 4)", "여호와께서는 하박국에게 그분이 불공정과 압제를 없앨 “지정된 때”를 정해 놓으셨음을 확신시켜 주셨다 (하박국 2:3-5)", "예수께서는 이미 “마귀의 일을 분쇄”하기 시작하셨다 (요한 첫째 3:8)", "모든 고난이 머지않아 끝날 것임을 아는 것은 참으로 위로가 된다! (시 37:9-11; 72:12-14; 「파13」 9/1 6-7면)", "사랑 많으신 하느님의 참으심은 “온유한 자들”에게 구원을 의미한다 (시 149:4; 예레미야 29:11, 12; 베드로 둘째 3:9)"]}, {"title": "고난이 없는 “참된 생명”을 누리라", "points": ["하느님께 간절하고도 진실한 마음으로 “왜?”라는 질문을 했다면, 그분에게서 온 위로와 희망의 소식을 마음으로 받아들임으로 그분의 말씀을 잘 들으라 [계시 21:4; 22:1, 2 낭독]", "이 세상 제도에서 입은 피해는 무엇이든 복구될 것이다 [이사야 65:17 낭독]", "그렇게 될 때까지 여호와께 희망을 두고 과거와 현재의 충실한 자들이 나타낸 참을성 있는 태도를 본받으라 (하박국 3:16-18; 히브리 6:9-12)", "하느님의 주권을 계속 옹호한다면 머지않아 악이 전혀 없는 상태에서 “참된 생명”을 누리게 될 것이다 (디모데 첫째 6:19)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 187-KO 7/13\t 30분에 다룰 것"]}]}, {"no": 188, "title": "당신은 여호와께 확신을 두고 있는가?", "t": 0, "note": "여호와를 전적으로 의지하는 것이 지혜로운 일임을 청중이 인식하도록 도와준다. 그리고 여호와께 온전한 확신을 나타내는 것이 무엇을 의미하는지 알려 준다", "sections": [{"title": "나라들은 잘못된 곳에 확신을 두어 왔다", "points": ["나라들은 자신들이 취할 행동에 대한 결정을 내릴 때 스스로의 지혜와 힘에 의존한다", "정치 지도자들은 함께 뭉쳐 여호와와 그분의 기름부음받은 왕을 대적한다 (시 2:1-3)", "종교 지도자들은 하느님의 왕국보다는 정치에 믿음을 둔다 [이사야 28:14, 15 낭독]", "정치 동맹이 제공하는 것은 허울 좋은 도피처일 뿐이다 (「예」-1 292-294면)", "그 결과 전 세계적으로 불법이 만연하고 평화가 사라지고 있다 (이사야 57:20, 21)"]}, {"title": "당신은 어디에 확신을 두고 있는가?", "points": ["사분오열이 되어 있는 이 세상과는 매우 대조적으로, 하느님의 종들은 다음과 같은 특성을 나타낸다", "정치·사회·종교적으로 분열되어 있는 이 세상에서 참숭배자들로서 연합되어 있다 (시 133:1)", "하느님의 왕국의 좋은 소식 즉 평화와 구원의 소식을 열심히 전파한다 (마태 24:14)", "하느님의 성품을 반영하여 기쁨에 넘친다 (디모데 첫째 1:11)", "성서 원칙에 근거하여 주의 깊이 행동하고 결정을 내린다 (잠언 3:5, 6)", "편견 없이 “모든 사람에게 선한 일”을 한다 (갈라디아 6:10)", "“하느님을 섬기는 자와 섬기지 않는 자의 차이”를 분명히 볼 수 있다 (말라기 3:18)", "무엇이 그러한 차이를 가져왔는가? [시 46:1-3 낭독]", "하느님의 백성은 확신을 가지고 여호와께 의지한다", "그들은 여호와께서 가까이 계시고 그 어느 적들보다 강력하시다는 것을 알고 있다", "그들에게 있어 하느님은 “고난 중에 쉽사리 찾을 수 있는 도움”이시다", "자연의 격변으로 인해 산들이 바닷속으로 사라져 버린다 해도, 하느님의 백성은 도피처인 여호와께 흔들리지 않는 확신을 둔다", "당신도 그렇게 느끼고 있는가?", "당신은 실제로 여호와께 확신을 두어 왔는가?"]}, {"title": "우리의 확신의 근원", "points": ["여호와에 대한 확신을 어떻게 증가시킬 수 있는가? [잠언 22:19 낭독]", "하느님께서 주시는 지식의 좋은 영향이 잠언 1:33에 표현되어 있다 [낭독]", "여호와를 옹호하는 입장을 취하는 사람들은 재난에 대한 무서움 때문에 불안해할 필요가 없다", "그들은 여호와의 말씀을 잘 들을 때 누리게 되는 안전을 그 어느 것도 파괴할 수 없음을 알고 있다", "느헤미야는 예루살렘 성벽을 재건하는 일과 관련하여 여호와를 의지하는 훌륭한 본을 남겼다", "[느헤미야 4:14을 읽고 그 성구의 의미를 자세히 설명한다] (「파」98 10/15 17, 18면)", "당신은 “여호와를 생각”하고 있는가?", "매일 그렇게 할 필요가 있다", "또한 우리는 “영혼을 다하여” 여호와를 섬겨야 한다 (골로새 3:23; 「파」97 10/15 13-17면)", "이것은 여호와께 드리는 봉사에서 우리의 모든 활력을 가능한 한 최대로 사용함으로 우리 자신을 드리는 것을 의미한다", "대조가 되는 두 가지 예를 통해 여호와의 견해를 배울 수 있다", "나사로의 누이 마리아는 예수의 발을 “매우 비싼” 향유로 닦음으로 “자기가 할 수 있는 일을 하였다” (마가 14:3-9; 요한 12:3)", "한 가난한 과부는 ‘가치가 아주 적은 작은 주화 두 닢’을 성전에 있는 보고의 헌금통에 넣음으로 “자기가 가진 모든 것”을 드렸다 \n(마가 12:41-44)", "예수께서는 마리아와 과부를 비교하지 않으셨다", "그분은 과부의 주화 두 닢을 마리아의 “매우 비싼” 향유만큼이나 가치 있게 여기셨다", "두 사람 다 자신이 가진 가장 좋은 것을 드렸으므로 하느님께서 보시기에 두 예물 모두 값진 것이었다", "여호와는 우리의 가장 좋은 것을 받아 마땅하신 분이다", "우리는 항상 그분의 계명을 지켜야 한다 (시 119:93)"]}, {"title": "끝까지 확신을 유지함", "points": ["여호와는 아직까지도 나라들에 대해 참을성을 나타내고 계신다", "열심 있는 왕국 선포자들이 통치자들과 그들의 백성들에게 그리스도의 통치권에 복종하라고 계속해서 강력히 권하고 있는 것을 보면 그 점을 분명히 알 수 있다 (시 2:10-12ㄱ)", "수백만 명의 여호와의 증인이 239개 나라와 지역에서 하느님의 왕국 소식을 열심히 선포하고 있다", "우리는 하느님의 아들이 나라들을 “도공의 그릇처럼 산산이 부수”기 전에 이 일을 기쁘게 수행하고 있다 [시 2:9 낭독]", "여러분이 훌륭한 일에 열심이라는 것을 증명하는 가운데, 여호와에 대한 확신을 유지하고 시편 46:7-11의 말씀의 성취를 경험하기 바란다 [낭독]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 188-KO 1/14\t 30분에 다룰 것"]}]}, {"no": 189, "title": "하느님과 함께 걸으면 지금부터 영원히 축복을 받는다", "t": 0, "note": "하느님과 함께 걷는다는 것은 생활의 길임을 청중이 이해하고, 하느님과 함께 걷는 것이 얼마나 영예로운 일인지를 깊이 깨닫도록 돕는다", "sections": [{"title": "인생길에서 우리는 인도를 받아야 한다", "points": ["걸음마를 막 시작한 아이를 혼자 걷게 내버려 두는 부모가 어디 있겠는가?", "사랑 많은 부모는 아이와 함께 걸을 것이며, 아이가 자라 감에 따라 적절한 방법으로 아이를 이끌어 줄 것이다", "성경에서는 우리가 인생을 살아가는 것을 흔히 걷는 것이나 어디로 가는 것에 비한다 (열왕기상 22:43; 전도 12:5)", "하늘에 계신 우리 아버지는 우리가 걸음마를 배우는 아이가 아님을 아시며, 우리에게 상당한 자유를 주신다 (고린도 후서 3:17)", "하지만 그분은 우리가 나이에 관계없이 반드시 인도를 받아야 한다는 것을 아신다 [예레미야 10:23 낭독]", "이 “대처하기 어려운 위급한 때”에 걷기란 쉬운 일이 아닐 수 있다 (디모데 후서 3:1)", "우리는 혼자 걷지 않아도 된다. 하느님과 함께 걸을 수 있다"]}, {"title": "하느님과 함께 걷는다는 것은 무슨 뜻인가?", "points": ["성경에 나오는 본들을 살펴보면 하느님과 함께 걷는다는 것이 무슨 뜻인지 이해할 수 있다", "에녹과 노아는 참하느님과 함께 걸었다 (창세 5:24; 6:9)", "충실한 남녀들은 하느님을 신뢰하고 그분의 인도에 의지하고 그분께 순종했다는 의미에서 하느님과 함께 걸었다", "하느님과 함께 걸었기 때문에 그들은 당시의 대다수 사람들과 어우러질 수 없었지만, 그렇게 할 만한 가치가 있었다 (「파01」 9/15 29-31면)", "하느님은 변하지 않으셨다. 그분은 오늘날 우리에게도 함께 걷자고 초대하신다 (말라기 3:6)", "성경에 예언되어 있는 대로 많은 사람이 하느님의 길로 걷고자 한다 [미가 4:1, 2 낭독]", "하지만 그렇게 하지 않는 사람들이 대다수이다. 하느님과 함께 걷는 것은 “인기 있는 행로”가 아니다 (예레미야 8:6)", "미가 4:5에서는 그 이유를 알려 준다 [낭독]", "하느님의 이름으로 걷는다는 것은 그분의 뜻을 행하고 하느님의 이름에 담긴 모든 의미와 일치하게 살아가는 것이다"]}, {"title": "어떻게 하느님과 함께 걸을 수 있는가?", "points": ["하느님의 음성을 듣고 들은 바에 따라 걸어감으로 하느님과 함께 걸을 수 있다", "모든 일에서 하느님의 말씀에 나오는 원칙을 따라야 한다 (시 119:105)", "‘진리 안에서 걷’는 것은 우리에게 생활의 길이 되어야 한다 (요한 3서 3)", "[성경 진리 덕분에 변화된 사람의 경험을 소개한다. 「파수대」 2008년 8월 1일 호부터 실리기 시작한 “성경이 생활을 변화시키다” 연재 기사에서 사례를 찾아볼 수 있다]", "그리스도의 발걸음을 따르라 (베드로 전서 2:21; 「깨86」 12/15 15면)", "예수께서는 하느님과 걷는 면에서 완전한 본을 보이셨다 (「파02」 8/15 10-14면)", "하느님과 함께 걷는 사람들과 함께 걸으라 (미가 4:2)", "그리스도인 모임에 참석하려고 온갖 노력을 기울일 만한 가치가 있다 (「연99」 254면; 「연90」 245면; 「연89」 210-211)", "결정을 할 때, 예수라면 어떻게 하셨을지 생각해 보아야 한다 (고린도 전서 2:16; 「파00」 2/15 10-11면 2-4항)"]}, {"title": "하느님과 함께 걸을 때 누리는 축복은 무엇인가?", "points": ["‘빛의 자녀로서 걷는 것’은 큰 축복이다 (에베소 5:8)", "우리는 인도를 받기 때문에 부도덕이라는 함정에 빠지지 않을 수 있다 (「파00」 7/15 28-31면)", "이 세상의 어둠 가운데 걷는 사람들은 걸려 넘어진다 (이사야 59:8-12)", "세상이 도덕적으로 어둡기 때문에 가정이 파괴되고 있다. 부도덕한 행실을 범한 사람은 흔히 죄책감이나 무가치하다는 느낌, 염려에 휩싸인다", "우리는 세상 사건들이 무엇을 의미하는지 환히 알고 있다", "대부분의 사람들은 이 시대가 왜 이토록 살기가 힘든지, 왜 많은 사람이 고난을 당하는지에 대해 캄캄할 뿐이다", "그런 문제들을 밝혀 주는 진리의 빛이 있기 때문에 우리는 희망과 기쁨 가운데 걸을 수 있다", "성령은 우리가 어떤 장애물을 만나도 계속해서 하느님과 함께 걸을 힘을 줄 수 있다 (빌립보 4:13)", "하느님과 함께 걸으면서 우리는 그분과 누리는 벗 관계 즉 우정이 깊어진다", "그런 벗이 있는데, 사람이 우리에게 무슨 일을 한다 해도 두려워할 이유가 있겠는가? (시 118:6)", "걸려 넘어지더라도 하느님을 바라본다면 그분은 우리를 일으켜 주실 것이다 (시 145:14)", "여호와께서는 죄를 짓는 사람들을 쉽게 포기하지 않으신다. 그분은 회개하는 사람들을 “너그러이” 용서하신다 (이사야 55:7; 잠언 24:16)", "깨끗한 양심을 갖게 되면 인생길을 걸어가는 일이 훨씬 더 즐거워진다"]}, {"title": "영원히 하느님과 함께 걸으라", "points": ["생명은 선물이다. 현재 짧은 인생길을 걷는 것도 축복이다", "하느님의 영감받은 말씀에는 사람이 걷는 인생길이 짧은 것을 두고 탄식하는 말씀이 있다 (욥 14:1; 시 90:10)", "여호와께서는 우리가 그분과 함께 영원히 걷기를 원하신다 (요한 3:36)", "그리스도의 발걸음을 따라 걷고 싶어 하지 않는 사람들은 오래 걷지 못할 것이다", "하느님과 함께 걷는 사람들은 영원히 걸을 것이다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 189-KO 4/14\t 30분에 다룰 것"]}]}, {"no": 190, "title": "하느님께서 약속하신 완전하고 행복한 가정", "t": 0, "note": "행복한 사람들로 이루어진 연합된 하나의 거대한 가족을 두시려는 여호와의 목적은 왕국을 통해 곧 실현될 것이다. 심지어 오늘날에도 성경 원칙을 실천하는 가정은 평화와 행복을 얻게 된다. 집회에 처음 참석한 사람들도 쉽게 이해할 수 있도록 답을 제시한다. 또한 이미 여호와의 증인인 청중의 믿음을 강화시켜 준다", "sections": [{"title": "가정—하느님께서 주신 선물", "points": ["여호와께서는 완전한 인간 가족으로 땅을 채우시려는 목적을 밝히셨다 [창세기 1:26-28 낭독]", "얼마나 놀라운 전망인가! (「파14」 1/15 8면 3-6항)", "가정 생활에서 얻는 행복은 하느님께서 주신 선물이다 (룻 1:9; 시 127:3)"]}, {"title": "가정의 행복이 깨지다", "points": ["사탄이 하느님께 반역했을 때 가정의 행복이 깨지기 시작했다", "사탄은 첫 인간 부부와 악한 천사들을 유혹하여 하늘의 아버지에게 등을 돌리게 만들었다", "전반적으로 인간 가족은 여호와의 원래 목적대로 연합과 행복을 누리는 것이 아니라, 사회적·종교적·정치적 분열을 겪고 있다", "가정 내에서조차 심각한 문제와 스트레스, 불행을 겪는다 (딤후 3:2, 3)", "아담과 하와는 여호와의 우주 가족으로부터 이탈하여 창조주의 마음을 몹시 아프게 했을 뿐 아니라 자신들의 후손 모두에게 아픔과 고난, 죽음을 초래했다 (창 3:16-19; 전 8:9; 롬 5:12)"]}, {"title": "가정의 행복이 회복될 것이다", "points": ["하늘에 계신 우리 아버지께서는 영원한 행복을 누릴 인간 가족을 두시려는 목적이 불충성스러운 반역자들 때문에 좌절되는 일이 결코 없게 하실 것이다", "여호와께서는 뱀 즉 사탄에게 심판을 선언하시면서 회복 예언도 하심으로 아버지로서의 사랑을 나타내셨다 [창세기 3:15 낭독]", "하느님께서는 여자의 “자손”의 주요 부분인 예수를 사용하여 사탄을 멸망시키고 아담의 죄로 인한 영향을 제거하실 것이다 (요 3:16; 요1 3:8)", "‘첫 아담’의 후손 가운데 충성스러운 자들은 모두 “마지막 아담” 예수의 대속 희생을 통해 영원토록 완전하고 행복한 가정 생활을 즐길 것이다 (고전 15:22, 45; 마 20:28)", "예수가 자신의 아버지에게 모든 것을 넘겨 드릴 때에는 가족과 관련된 여호와의 목적이 성취되어 있을 것이다 [고린도 전서 15:24-28 낭독]"]}, {"title": "현재 어떻게 행복한 가정을 이룰 수 있는가?", "points": ["하느님께서는 행복한 가정을 이루기 위해 실천할 수 있는 지침을 주신다 (잠 3:5, 6; 4:1-4; 「하식」 18-19면)", "[에베소서 5:28-32 낭독] 여호와께서는 남편과 아내가 서로에게 충실하고 비이기적인 사랑과 존경심을 나타내기 바라신다 (히 13:4)", "[에베소서 5:22-25, 33 낭독] 예수께서 회중의 머리로서 나타내신 태도는 그리스도인 남편들에게 모범이 된다 (벧전 3:7)", "남편은 가족을 물질적으로 부양하고 영적으로 인도함으로 희생적인 사랑을 나타내야 한다 (신 6:5-7; 딤전 5:8)", "[에베소서 6:1-3 낭독] 자녀들은 부모에게 순종하고 성경 원칙을 실천하는 법을 배울 때 행복해진다 (전 11:9, 10; 12:1)", "[에베소서 6:4 낭독] 하느님에 대한 사랑을 나타내는 면에서 부모가 보이는 본은 자녀에게 깊은 영향을 미칠 것이다", "계속 행복하게 살아가려면 자녀들은 하늘에 계신 아버지의 마음을 기쁘시게 하는 법을 배워야 한다 (딤후 3:14, 15)"]}, {"title": "곧 실현될 행복한 세계적 가족!", "points": ["행복하고 연합된 하나의 세계적 가족을 두시겠다는 하느님의 약속은 실현될 것이다 (시 37:10, 11)", "시편 89:15, 16에 묘사된 행복한 사람들 가운데 포함되고 싶지 않은가? [낭독]", "그렇다면 인류 가족을 위한 하느님의 뜻이 무엇인지 가족과 함께 계속 정확하게 알아 가기 바란다 (마 5:3; 요 17:3)", "하느님의 왕국을 통해 “땅의 모든 가족이 축복을 받을 것”이며 하느님이 약속하신 영원한 평화와 행복을 맛보게 될 것이다 (행 3:25)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 190-KO 7/14\t 30분에 다룰 것"]}]}, {"no": 191, "title": "사랑과 믿음이 세상을 이기는 방법", "t": 3, "note": "우리가 여호와에 관해 더 많이 배우고 그분을 더 많이 사랑하게 될수록 그분의 약속에 대한 우리의 믿음이 더 강해진다는 사실을 청중이 인식하도록 도우라. 그러한 강한 사랑과 흔들리지 않는 믿음은 우리가 예수처럼 세상을 이기게 해 줄 것이다", "sections": [{"title": "그리스도 예수는 세상을 이기셨다", "points": ["예수께서는 지상에서의 봉사를 거의 마치실 무렵에 이렇게 선언하셨다. “내가 세상을 이겼습니다” (요 16:33)", "그분은 이 세상 신인 사탄 마귀가 그분에게 “영향을 미치”려고 시도할 때 그것을 물리치셨다 (요 14:30; 요1 5:19)", "예수께서는 물질적인 것들을 추구하고 개인적인 명성을 얻고 여호와의 신성을 부인하게 하려는 마귀의 유혹을 물리치셨다 (마 4:4, 7, 10)", "적대적인 종교 및 정치 집단은 예수를 덫에 걸려들게 하고 하느님에 대한 그분의 봉사를 방해하는 데 실패하였다 (마 22:15, 16, 34, 46)", "여호와에 대한 흔들리지 않는 믿음과 사랑은 예수로 하여금 충절을 굳게 지키고 자신에게 맡겨진 일을 끝낼 수 있게 하였다 (요 17:4)", "그리스도는 제자들이 따라야 할 본을 남기셨다 (벧전 2:21)"]}, {"title": "예수께서는 제자들이 세상을 이길 수 있도록 준비시키셨다", "points": ["예수께서는 제자들도 “세상에 속해 있지 않”기 때문에 박해를 받게 될 것이라고 그들에게 경고하셨다 (요 15:18-20; 마 10:16-18)", "그분은 사탄이 왕국 진리의 으뜸가는 반대자라고 밝히셨다 (요 8:44)", "그리스도는 제자들에게 “악한 자”에게서 보호해 달라고 기도하도록 가르치셨으며, 아버지께 그들을 지켜 달라고 요청하셨다 (마 6:9, 13; 요 17:15, 16)", "예수께서는 하느님과 이웃을 사랑하는 것의 중요성을 강조하셨다 (마 22:37-39)", "그분은 다른 사람들을 대할 때 사랑에 찬 동정심을 나타내셨다 (막 1:40, 41; 눅 8:43-48)", "그리스도는 제자들이 여호와를 더 잘 알도록 도우심으로 그들의 믿음과 사랑을 강화시키셨다 (요 17:3, 26)", "충실한 제자들은 예수의 모범에 밀접히 고착함으로 “온전한 승리”를 거둘 수 있다 (롬 8:35-39; 「파99」 5/1 7면)"]}, {"title": "현대의 제자들은 세상을 이기는 사람들이다", "points": ["오늘날 여호와의 종들은 세상과 세상의 방식에 대해 승리를 거두어 왔다", "그리스도인 중립을 유지함으로 (「파03」 3/1 3-7면)", "가족, 이웃, 직장 동료, 학교 친구, 배교자들의 반대를 극복함으로 (「파01」 12/1 23면 18-19항)", "불순종하고 교만한 세상의 영에 맞서 성공적으로 싸움으로 (엡 2:2, 8; 「랑」 54면 7-8항)", "이기적이고 무가치한 것들을 추구하는 일을 피함으로 (딤전 6:6-12)", "우리의 모범이 되시는 분이 세상에 대해 거둔 승리와 다른 충실한 증인들에 주의를 집중하는 것은 우리가 인내하는 데 도움이 된다 (히 12:1-3)"]}, {"title": "사랑과 믿음은 우리가 세상을 이기는 사람이 될 수 있게 해 준다", "points": ["이 불경건한 세상은 여전히 “악한 자” 즉 사탄의 “지배 아래 있다” (요1 5:19)", "미움, 폭력, 종족 말살, 거짓말, 질투, 부도덕, 성적으로 도발적인 말과 옷차림은 마귀의 영을 반영한다 (「랑」 50-53면 1-6항; 56-57면 11-13항)", "믿음이 없고 하느님의 사랑에 대한 지식이 없는 사람들은 마귀의 악한 영향력에 굴복한다 (「랑」 54-56면 9-10항)", "여호와에 대한 사랑과 그분의 약속에 대한 믿음은, 그리스도인들에게 ‘손을 대어’ 영향을 끼치려는 사탄의 시도에서 그들이 벗어날 수 있게 해 준다 (요1 5:3-5, 18)", "그러한 사랑은 하느님의 명령에 순종하는 것을 짐스럽게 하는 것이 아니라 즐겁게 해 준다 (「랑」 11-13면 13-16항)", "믿음은 성경 원칙을 타협하게 할 수 있는 사람에 대한 두려움을 극복한다 (「파14」 4/15 10면 8항)", "하느님께 순종하고 세상을 이기는 사람들로서, 우리는 심지어 지금도 더 나은 삶을 누리고 있다", "“육과 영의 모든 더러운 것에서 자신을 깨끗이 하”라는 명령에 순종하면, 우리를 노예로 만드는 담배와 마약과 음란물 같은 것들에서 자유롭게 된다 (고후 7:1)", "집회에 참석하라는 훈계를 청종하면, 우리는 믿음 안에 굳건히 서 있도록 서로를 격려하게 된다 (히 10:24, 25)", "전파하고 가르치고 제자를 삼으라는 예수의 교훈을 따르면 우리는 참다운 행복을 누리며, 자기중심적인 사탄의 세상에서 자유롭게 된다 (마 24:14; 28:19, 20; 행 20:35)"]}, {"title": "세상을 이긴 그리스도인들은 영원한 축복을 상속받는다", "points": ["예수 그리스도는 세상을 이기셨으며 “하느님의 오른편”에서 큰 권위를 받으셨다 (벧전 3:22)", "그분은 머지않아 아마겟돈에서 온전한 승리를 거두실 것이다 (계 6:2; 16:16)", "그분의 발자취를 따르는 기름부음받은 충실한 사람들은 하늘 왕국을 상속받게 된다 (눅 12:32; 22:28-30)", "“다른 양들”은 그 왕국의 지상 영역을 상속받게 된다 (요 10:16; 마 25:34)", "세상을 이기는 자들로서 굳건히 서고 두려움 없이 하느님의 왕국을 전파함으로, 우리는 다른 사람들이 세상을 이기고 여호와의 영원한 축복을 받도록 도울 수 있다 (계 12:11)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 191-KO 4/15\t30분에 다룰 것"]}]}, {"no": 192, "title": "당신은 영원한 생명에 이르는 길을 걷고 있는가?", "t": 6, "note": "영적으로 더 발전해야 하는 이유와 그 방법을 성서 연구생과 관심자가 이해하도록 도우라. 도움을 받을 수 있는 방법이 많이 있음을 강조하고, 지체 없이 행동하도록 따뜻하게 격려하라", "sections": [{"title": "‘생명에 이르는 길’이란 무엇인가?", "points": ["여호와 하느님께서는 영원한 생명을 얻을 전망을 모두에게 제시하신다 (롬 6:23)", "수많은 사람들이 하느님의 원래 목적대로 지상 낙원에서 영원한 생명을 누리기를 간절히 바라고 있다", "생명을 얻으려면 대다수의 사람들과는 다른 길을 가야 한다 [마태복음 7:13, 14 낭독] (「파09」 8/1 3-4면)", "성경은 생명을 얻기 위해 달해야 하는 하느님의 요구 조건을 알려 준다 (요 17:3; 요1 2:3; 5:3)", "하느님의 요구 조건은 합리적이다. 하느님의 요구 조건은 그분의 사랑을 반영하고 우리에게 많은 유익을 준다"]}, {"title": "‘생명에 이르는 길’로 걸으려면", "points": ["우선, 정확한 성경 지식에 근거한 믿음을 키워야 한다", "주위 사람들과 반대되는 길을 가려면 성경에 대한 강한 확신이 있어야 한다", "성경이 하느님의 말씀이라는 것을 온전히 확신하지 못한다면 증거를 조사해 보라 (「깨」 07/11 5-9면)", "성경을 사용해서 현재 자신이 가지고 있는 믿음을 주의 깊이 조사해 보라", "예수께서는 우리의 믿음이 진리에 근거해 있어야 한다는 점을 강조하셨다 [요한복음 4:23, 24 낭독]", "증거가 제시되면 사도 바울처럼 기꺼이 자신의 생각을 바꿔야 한다 (행 26:9-20)", "하느님을 기쁘시게 하기 위해서는 우리의 성품이나 생활 방식을 바꿀 필요가 있다는 점을 인식하게 될 수 있다", "여호와께 가까이 가고 믿음이 자람에 따라, 우리는 그러한 변화를 할 힘을 갖게 된다 [야고보서 4:8 낭독]", "하느님께서 불결하게 여기시는 습관과 행위를 버리게 된다 (갈 5:19-21; 엡 4:17-19)", "여호와와 예수를 본받아 “새 인간성”을 입게 된다 (엡 4:20-29; 5:1, 2)", "많은 사람이 큰 변화를 하는 데 성공했다 (「파15」 5/1 10-11면; 「파14」 7/1 8-9면)", "지식이 많아지고 믿음이 커짐에 따라, 우리는 예수께서 명령하신 대로 사람들을 제자로 삼는 일에 참여할 필요가 있다 (마 28:19, 20)", "‘생명에 이르는 길’로 걸으려면, 우리는 여호와께 헌신하고 침례를 받아야 한다 (마 16:24; 벧전 3:21)"]}, {"title": "‘생명에 이르는 길’은 지나치게 어렵지 않다", "points": ["우리의 상황은 이스라엘 민족이 약속의 땅에 들어갈 무렵에 처해 있던 상황과 비슷하다 [신명기 30:11 낭독] (「파09」 11/1 31면)", "‘생명에 이르는 길’은 제한이 많아 보일 수 있지만 실제로는 자유와 행복을 가져다 준다 (「파06」 10/1 8-10면)", "여호와 하느님께서는 우리가 ‘생명에 이르는 길’에 들어서고 계속 그 길로 걷는 데 필요한 도움을 베푸신다", "하느님께서는 자신에게 기도하라고 우리에게 권하시며 도움이 필요할 때 우리를 도와주겠다고 약속하신다 (시 145:18; 사 41:13)", "하느님께서는 우리에게 자신의 성령을 주시며, 성령은 우리를 인도하고 강화해 준다 (눅 11:10-13; 「파10」 4/15 9면 11항; 11면 15항)", "우리는 그리스도인 집회에서 격려를 받고 건전한 교제를 할 수 있다 (히 10:24, 25)"]}, {"title": "영적으로 계속 발전하라", "points": ["하느님의 요구 조건에 달하도록 우리의 생활을 조정하려면 시간을 내고 참을성을 나타내야 하지만 그렇게 하는 것은 긴급한 일이다", "여호와를 섬기면 축복을 받고 기쁨을 누리게 된다. 따라서 그분을 섬기는 것은 그만한 노력을 기울일 가치가 있는 일이다", "장애물에 부딪히거나 문제를 겪게 되더라도 낙담해서는 안 된다 (막 4:26-29; 「파14」 12/15 12-13면 4-8항)", "이 세상과 그 통치자도 나름대로 행복해지는 방법을 제시하지만, 그러한 거짓 주장에 속아 넘어가서는 안 된다 (요1 2:17; 5:19)", "이 제도의 “마지막 날”은 영원히 계속되지 않을 것이다 (딤후 3:1; 벧후 3:4, 9, 10)", "지금은 ‘생명에 이르는 길’로 걸으라는 하느님의 권고를 따라야 할 때이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 192-KO 8/15\t 30분에 다룰 것"]}]}, {"no": 193, "title": "세계적 고난의 때에 있을 구출", "t": 8, "note": "다가오는 구출에 관한 성서의 약속을 따뜻하면서도 확신 있는 태도로 설명한다. 연사가 그 약속을 신뢰하고 있음을 표현하고, 여호와께서 현 악한 세상 제도를 멸망시키실 때 우리가 구원받기 위해 반드시 해야 할 일이 무엇인지 설명한다", "sections": [{"title": "구출에 관한 성서의 약속", "points": ["노아 시대에 여호와께서는 불경건한 사람들을 땅에서 깨끗이 제거하셨으며, 하느님의 말씀은 오늘날 땅을 파멸시키고 있는 모든 자들을 그분이 곧 멸망시키실 것임을 보증한다 (벧후 2:5; 3:5-7; 계 11:18)", "그분은 대홍수 때 노아와 그의 가족을 보존하겠다는 자신의 계약, 즉 약속을 성취시키셨다 (창 6:18; 7:1; 「통」-1 130면 5항; 131면 7항)", "우리는 여호와께 도피하는 모든 이를 그분이 구출하실 것이라는 성서의 약속을 확신할 수 있다 (시 37:39, 40)"]}, {"title": "앞으로 닥칠 일의 본보기", "points": ["여호와께서 소돔과 고모라에 집행하신 심판은 앞으로 “닥칠 일의 본보기”가 된다 [베드로 후서 2:6-8 낭독]", "여호와께서는 동정심에서 우러나와 천사들을 보내어 롯과 그의 가족에게 그곳을 즉시 떠나라고 촉구하셨다. 그분은 소돔과 고모라를 재가 되게 하셨지만 “의로운 롯을 구출하셨다” (창 19:12-17, 24, 25)", "사도 베드로는 롯의 구출이 여호와께서 경건한 정성을 바치는 사람들을 구출할 능력과 열망을 가지고 계심을 확증하는 부인할 수 없는 증거라고 여겼다 [베드로 후서 2:9 낭독]", "현대에도 하느님의 종들은 동정심을 가지고 열정적으로 모든 지역의 사람들에게 구출의 좋은 소식을 전하면서, 끝이 오기 전에 여호와를 찾으라고 촉구하고 있다 (습 2:2, 3; 마 24:14)"]}, {"title": "다가오는 “고난의 때”에 생존함", "points": ["여호와께서는 예언자 다니엘에게 영감을 주어 현 악한 세상 제도가 멸망되기 전에 있을 “고난의 때”에 관해 기록하게 하셨다 [다니엘 12:1 낭독]", "다가오는 그 고난의 때는 “큰 환난”이라고도 불린다 (마 24:21)", "큰 환난의 시작은 많은 사람에게 충격을 줄 것인데, 성경에서는 국제 연합을 상징하는 “짐승”이 거짓 종교 세계 제국인 “큰 바빌론”을 공격할 것이라고 예언한다 (계 17:5, 16-18; 「파13」 7/15 4-5면 6-7항)", "이 일은 “큰 환난”과 세계적 고난의 때가 시작되었다는 표시가 된다", "세계적 고난이 있을 바로 “그때에” 여호와를 섬기는 사람들에게는 ‘피할’ 길이 마련될 것이다", "구출은 하느님의 말씀과 조직에서 알려 주는 지시에 순종하는지에 달려 있을 것이다 (「파12」 4/15 26면 16항)", "예언된 “고난의 때”는 아마겟돈 전쟁에서 절정에 이를 것이다 (계 16:14, 16)", "그때에 미가엘 즉 하늘의 권능 가운데 계시는 예수 그리스도께서는 무적의 용사이자 왕으로서 여호와의 이름으로 행동하기 위해 “일어설 것”이다 (살후 1:6-8; 「파10」 4/1 19면; 「단」 288-289면 4-6항)", "그분은 땅에서 악을 없애시고 “큰 무리”가 아마겟돈을 안전하게 통과하여 신세계로 들어가도록 길을 열어 주실 것이다 (계 7:9, 10, 14)"]}, {"title": "구출을 위해 지금 준비하라", "points": ["다니엘의 예언에는 피하는 자들의 이름이 “책에 기록되어 있는” 것으로 묘사되어 있다 (단 12:1; 「단」 290면 7항)", "이 “책”은 여호와의 뜻을 행하는 사람들에 대한 그분의 기억을 상징한다", "여호와께서는 자신의 충성스러운 자들을 결코 잊거나 버리지 않으실 것이다 (시 37:28)", "여호와의 날은 “도둑같이” 오기 때문에, 우리는 영적으로 계속 깨어 있어야 한다 [베드로 후서 3:10-13 낭독] (「파10」 7/15 3-7면)", "경건한 정성을 행동으로 나타냄으로 그렇게 할 수 있다 (「파10」 7/15 11면 17-19항)", "성서를 연구하고, 배운 내용을 다른 사람에게 전해 줌으로 (마 28:19, 20)", "하느님을 사랑하고 그분께 계속 고착하기로 결심했음을 행동으로 나타냄으로 (대상 29:17)", "마음에서 우러나온 기도를 함으로 (빌 4:6, 7)", "그리스도인 모임에 참석하는 일을 그만두지 않음으로 (히 10:24, 25)", "머지않아, 현재 인간 가족을 괴롭히는 모든 문제가 영원히 사라질 것이다 (사 65:17; 계 21:4, 5)", "우리 모두 계속해서 하느님의 말씀을 연구하고 그 말씀에 순종하면서, 여호와를 기다리며 고난이 없는 신세계로 구출하겠다는 그분의 약속을 계속 기다리기 바란다 (이사야 30:18)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 193-KO 11/15\t 30분에 다룰 것"]}]}, {"no": 194, "title": "경건한 지혜는 우리에게 어떻게 유익을 주는가?", "t": 9, "note": "성경이 어떻게 참지혜가 담긴 책인지, 어떻게 나이에 관계없이 모든 사람에게 실용적인 지침을 주는지에 대해 따뜻하면서도 확신 있는 태도로 설명한다. 살면서 겪는 어려움에 대처할 때 하느님의 지혜를 적용함으로 얻게 되는 유익들을 강조한다", "sections": [{"title": "“지혜는 그것이 한 일로 의롭다는 것이 증명된다”", "points": ["인간이 과학, 의학, 기술에서 놀라운 발전을 이루어 내긴 했지만 전쟁, 범죄, 가난을 없애지는 못했다. 인간의 지혜는 사람들이 사랑, 평화, 합리적인 태도를 더 많이 나타내게 하지 못했다 (약 3:13-16)", "인간의 지혜가 성공하지 못하는 이유는 참지혜의 근원이신 여호와 하느님을 배척하기 때문이다 (잠 9:10; 렘 8:9; 고전 1:19-21)", "경건한 지혜는 기록된 여호와의 말씀인 성경에 담겨 있다", "그러한 지혜는 “그것이 한 일로 의롭다는 것이 증명된다.” 그 지혜에 따라 살기로 한 사람들의 삶에서 좋은 결과를 산출하기 때문이다 (마 11:19ㄴ; 약 3:17, 18)"]}, {"title": "경건한 지혜는 청소년들에게 유익을 준다", "points": ["하느님의 말씀을 사랑하고 그 말씀에 따라 사는 청소년들은 행복을 누리고 진정한 의미에서 성공적인 삶을 살게 된다 (시 1:1, 2)", "그러한 청소년들은 여호와 하느님께서 그들을 사랑하신다는 사실과 그분이 그들에게 도덕적으로 깨끗한 삶을 살고 젊음의 활력을 그분을 섬기는 데 사용하라고 권하시는 이유가 그들이 잘되기를 바라시기 때문임을 알고 있다 (전 12:1; 사 48:17)", "여호와의 조언에 따라 사는 청소년은 나쁜 교제와 저속한 오락으로 인한 고통스러운 결과를 피하게 된다 (시 119:9; 잠 13:20; 갈 6:7, 8)", "여호와를 아는 청소년들은 목적 있는 삶을 살고 안전한 장래의 전망을 갖게 된다 (시 73:28; 요1 2:17)"]}, {"title": "경건한 지혜는 부부들에게 유익을 준다", "points": ["하느님의 말씀에는 그분이 남편과 아내 모두를 존중하신다는 점이 나타나 있다. 그분은 그들이 서로를 진정으로 사랑하고 존중해야 한다고 말씀하신다 (엡 5:28, 33; 「파13」 5/15 16-18면 11-17항)", "자신보다 배우자의 필요와 유익을 더 중요하게 생각해야 한다 (마 19:4-6; 「랑」 126-128면 13-15항)", "원활하게 의사소통하면 문제를 해결할 수 있다 (엡 4:29, 31, 32; 골 4:6; 「파15」 1/15 26-27면 13-15항)", "결혼 생활에서 경건한 지혜를 적용하면 진정한 만족을 발견하며 선한 양심을 유지하게 된다. 그리고 무엇보다도 결혼의 창시자이신 여호와에 대한 사랑과 존경심을 나타내게 된다"]}, {"title": "경건한 지혜는 개인적인 어려움에 처할 때 유익을 준다", "points": ["경건한 지혜는 문제가 생길 때 절망하거나 허둥대지 않도록 우리에게 힘을 줄 수 있다", "(시 23:1-4)", "경제적인 어려움을 겪을 때", "왕국과 여호와의 의를 첫째로 구하며 살고, 하느님께서 “빠져나갈 길을 마련”하실 것임을 온전히 확신하라 (고전 10:13; \n마 6:33; 「파14」 4/15 21면 17항)", "가족과 떨어져 살아야 하는 일자리를 제의받을 경우, 경건한 지혜를 청하는 기도를 드리고 여호와의 명령과 원칙을 따르라 (잠 28:6)", "어떤 사람들은 배우자와 자녀와 떨어져 사는 것의 위험성을 무시하여 고통스러운 결과를 겪었다 (「파14」 4/15 19-20면 8-11항)", "가족의 영적 필요를 우선순위에 두어야 한다 (신 6:6, 7; 「파14」 4/15 18-19면 7항)", "심각한 건강 문제에 시달릴 때", "인내할 수 있도록 힘을 달라고, 그리고 치료법을 선택할 때 성경 원칙을 따를 수 있도록 도와 달라고 여호와께 계속 청하라 \n(잠 14:15; 「파15」 12/15 26면 14-16항; 「파06」 3/1 25면 12-13항)", "스스로를 고립시키지 말라. 우리에게는 형제들의 사랑과 그리스도인 모임에서 받는 격려가 필요하다 (잠 18:1; 마 18:20; 히 10:24, 25)", "여호와께서 우리가 현재 처한 상황을 잘 알고 계신다는 것을 잊지 말라 (나 1:7; 막 12:41-44)", "스트레스나 외로움과 싸울 때", "하느님을 섬기는 사람들도 독신, 이혼, 사별과 같은 일로 외로움을 느낄 수 있다", "미래의 희망에 초점을 맞추고 계속 활동적으로 봉사에 참여하라 (행 20:35; 고후 4:18)", "경건한 지혜는 절망감으로 인해 잘못된 결정을 내리는 일이 없도록 우리를 지켜 줄 수 있다 (시 55:22; 딤전 5:5)", "낙담할 때 여호와께 그분의 평화를 주실 것을 간구하라", "주저하지 말고 영적 형제 자매들에게 도움을 청하라 (빌 4:6, 7; 「파14」 6/15 9면 4항)"]}, {"title": "여호와께서 우리가 지혜를 얻고 적용하도록 도와주실 것이다", "points": ["여호와의 지혜는 언제나 의롭다는 것이 증명되며 우리가 어떤 상황에 처해 있든지 유익을 준다 [야고보서 1:5 낭독]", "하느님께 지혜를 달라고 기도하고, 그 지혜를 적용하고, 그분이 우리가 살면서 겪는 문제들을 이겨 나가도록 도와주실 것임을 확신하라 (약 3:13)", "여호와와 맺는 관계에서 지금 그리고 앞으로도 영원히 기쁨을 얻으라 (렘 9:23, 24)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 194-KO 5/16\t 30분에 다룰 것"]}]}]

function rPt2(n,si,pi){var up=coTk(n);if(!up||!up.sections[si])return;up.sections[si].points.splice(pi,1);var i=TALKS.findIndex(function(t){return t.no===n});if(i>=0)TALKS[i]=up;var ed=led();ed[n]=up;sed(ed);rEd()}
function exEd(){var ed=led();if(!Object.keys(ed).length){alert('수정 없음');return}var b=new Blob([JSON.stringify(ed,null,2)],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='골자수정본.json';a.click();URL.revokeObjectURL(u);toast('내보내기 완료!')}
function imEd(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var ed=JSON.parse(ev.target.result);sed(ed);try{Object.keys(ed).forEach(function(k){if(k.slice(0,4)==='del_')return;var n=parseInt(k);if(isNaN(n))return;var i=TALKS.findIndex(function(t){return t.no===n});if(i>=0&&ed[k]&&ed[k].title)TALKS[i]=ed[k]})}catch(e2){}bMap();bList();rEd();toast('가져오기 완료!')}catch(e3){alert('파일 오류')}};r.readAsText(f)};inp.click()}

// 토스트
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._to);t._to=setTimeout(function(){t.style.opacity='0'},2200)}

window.setV=setV;window.onQ=onQ;window.fTh=fTh;window.tgS=tgS;window.shP=shP;window.closeP=closeP;
window.stT=stT;window.goC=goC;window.sQM=sQM;window.sTM=sTM;window.sTF=sTF;window.tgOp=tgOp;
window.ckT=ckT;window.rtQ=rtQ;window.nxT=nxT;window.rsT2=rsT2;window.rsTs=rsTs;window.svTs=svTs;
window.sMF=sMF;window.opMT=opMT;window.opMS=opMS;window.mBk=mBk;window.edTg=edTg;window.dlTk=dlTk;
window.svTk=svTk;window.rsTk=rsTk;window.adTk=adTk;window.aScn=aScn;window.rScn=rScn;window.aPt=aPt;
window.rPt2=rPt2;window.exEd=exEd;window.imEd=imEd;window.rEd=rEd;window.doFl=doFl;window.dnC=dnC;window.rnC=rnC;
try{
  Object.defineProperty(window,'edE',{get:function(){return edE},set:function(v){edE=v}});
  Object.defineProperty(window,'edS',{get:function(){return edS},set:function(v){edS=v}});
  window.TALKS=TALKS;
}catch(e){}

// 초기화
bTabs();bMap();bList();
setV('map');
})();
