<script id="DATA" type="application/json">
[{"no": 1, "title": "당신은 하느님을 얼마나 잘 아는가?", "t": 9, "note": "단지 하느님에 관해 몇 가지 사실을 안다고 해서 그분을 안다고 할 수는 없다. 우리는 여호와께서 하신 일들과 그분의 특성들을 철저히 파악하고 그러한 지식과 일치하게 행동해야 한다. 청중에게 여호와를 잘 알고 그분의 승인을 얻으려는 동기를 심어 주라", "sections": [{"title": "“영원한 생명에 이르는 길”은 하느님을 알아 가는 것이다", "points": ["여호와 하느님과 그분의 아들을 알아 가는 사람들은 영원한 생명을 얻을 전망을 갖게 된다 [요한복음 17:3 낭독]", "단지 하느님의 존재를 인정하거나 그분에 관한 몇 가지 사실을 안다고 해서 영원한 생명을 얻게 되는 것은 아니다 (약 2:19)", "하느님과 예수를 안다고 주장한다고 해서 우리의 숭배가 자동으로 받아들여지는 것은 아니다 (마 7:21-23)", "사마리아인들은 여호와에 대한 지식이 어느 정도 있었지만 ‘자기들이 모르는 것’을 숭배했다 (요 4:22-24; 「파02」 7/15 15면 1-3항)"]}, {"title": "어떻게 여호와를 알아 갈 수 있는가?", "points": ["정기적으로 성경을 읽는다. 하느님의 특성, 감정, 결정, 행동을 유의하고 그 점에 관해 묵상한다 (시 77:11, 12)", "읽으면서 ‘이 내용은 여호와에 대해 어떤 점을 가르쳐 주는가?’ 하고 자문해 본다 (「까」 312면 7-8항)", "결정을 내릴 때 여호와를 본받으려고 노력한다 (엡 5:1)", "하느님을 본받는 결정을 내릴 때 좋은 결과가 나타나는 것을 보면, 여호와께서 우리가 특정한 방식으로 살아가기를 원하시는 이유를 분명히 알 수 있다", "여호와께 자주 기도한다 (「파14」 2/15 25면 18-21항)", "여호와에 대한 지식을 증가시키고 배운 것을 적용하도록 도와 달라고 그분께 요청한다 (눅 11:13; 「파11」 12/15 16-17면 18-19항; 「파04」 12/15 14-15면 12-14항)", "여호와와 개인적으로 친밀한 관계를 발전시킨다", "그러한 관계를 맺는 사람들은 여호와께서 그들에게 사랑 넘친 관심을 갖고 계시며 그들의 행동이 그분에게 영향을 미친다는 사실을 인식한다 (「파15」 4/15 22-23면 14, 16항; 「파11」 7/1 10면)", "하느님과 벗 관계를 맺은 사람 가운데 아브라함이 있다 (약 2:23; 「파14」 2/15 21-22면 3-5항)"]}, {"title": "하느님을 안다는 것을 나타내라", "points": ["하느님을 알려면 반드시 그분의 명령에 순종해야 한다 [요한 1서 2:4 낭독]", "고대 이스라엘 민족은 하느님께 자주 불순종했다", "그들은 여호와께서 어떤 분인지 잊지는 않았지만 여호와를 진정으로 알지 못한다는 것을 행동으로 드러냈다 (호 4:1, 6; 「통-2」 856 1항; 「활」 57-59면 4-6항)", "그와는 대조적으로, 요시야 왕은 “공의와 의를 행”했으며 하느님을 안다는 것을 행동으로 나타냈다 (렘 22:15, 16; 「예레」 140-142면)", "우리는 가정생활과 같은 개인적인 문제를 포함하여 생활의 모든 부면에서 하느님의 인도를 따름으로 그분을 안다는 것을 나타낸다 (「랑」 41-43면 12-14항)", "남편은 다른 사람이 보든 안 보든 아내에 대해 그리스도와 같은 사랑을 나타내야 한다 (엡 5:28, 29; 「파09」 5/15 19-20면)", "아내는 남편의 권위를 존중하고 남편이 가장 역할을 하도록 도와야 한다 (엡 5:22; 「파09」 7/15 9면 8-10항)", "자녀는 부모가 보지 않을 때에도 성경의 법을 따르고 부모에게 순종해야 한다 (엡 6:1-3; 「묻2」 136-141면)", "여호와를 알고 그분을 사랑하는 사람들과 교제해야 한다", "여호와께서 배척하시는 사람들과 교제하면 우리는 여호와와 멀어지게 된다 (시 15:1-5)", "그중에는 오락을 통해 집으로 초대하는 사람들도 포함된다 (시 97:10)", "여호와께서 사랑하시는 사람들을 사랑하는 것은 하느님에 대한 사랑을 나타내는 것이다 (요1 4:8)", "진정으로 하느님을 안다는 것을 나타내면 하느님께서도 우리를 알게 되신다 (갈 4:9; 딤후 2:19; 「파11」 9/15 25면 1-4항)"]}, {"title": "하느님을 아는 사람들은 축복을 누린다", "points": ["하느님께서 우리를 아신다는 것은 그분이 우리를 승인하시는 것을 의미한다", "여호와께서는 자신이 아는 사람들을 충성스럽게 돌보신다 (대하 16:9ㄱ; 「파14」 4/15 31면 17-20항)", "지금 여호와를 알게 되면 그분을 영원히 알 전망을 갖게 된다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 1-KO 9/15\t 30분에 다룰 것"]}]}, {"no": 2, "title": "당신은 마지막 날의 생존자가 될 것인가?", "t": 1, "note": "우리 시대의 긴급성을 알리라. 우리가 마지막 날에 살고 있다는 것을 확실하게 증명하라. 생존자가 되기 위해 적극적인 행동을 취하려는 동기를 청중에게 심어 주라", "sections": [{"title": "우리는 마지막 날을 생존하는 데 관심을 가져야 한다", "points": ["여호와의 증인은 세계 전역에서 우리가 마지막 날에 살고 있다고 가르친다", "오늘날은 정말로 현 세상 제도의 마지막 날인가? 그렇다는 증거가 있는가? 생존하기 위해서는 무엇이 필요한가?", "1세기에 예수께서는 유대 제도의 멸망이 가까웠다고 경고하셨다", "우리는 유대 제도의 마지막 날을 분별하여 생존한 사람들로부터 배울 수 있다"]}, {"title": "예수께서는 유대 제도의 멸망을 예언하셨다", "points": ["예수께서는 유대 제도가 멸망되기 전에 있을 일들에 관해 경고하셨다 [마태복음 24:1-8 낭독]", "그분은 예루살렘이 “진을 친 군대에게 포위되는” 것을 보면 도망치라고 제자들에게 말씀하셨다 (눅 21:20-22; 「파15」 7/15 14-15면 1-3항)", "예수의 예언이 1세기에 성취되었다는 것이 역사적으로 확증되었다 (「파07」 4/1 8-11면)", "케스티우스 갈루스 휘하의 로마군이 기원 66년에 왔다가 퇴각함으로 예수의 제자들에게 도망칠 기회가 생겼다\n(「파12」 4/15 25-26면 13-15항)", "기원 70년에 로마군이 돌아오자 마지막 날이 절정에 이르러 유대 제도가 멸망되었다", "예수의 예언을 들은 사람들은 그 예언이 성취되었다는 충분한 증거를 갖게 되었고, 충실한 제자들은 행동하여 생존했다", "또한 예수는 많은 사람들이 분별력이 부족하여 경고에 유의하지 않을 것이라고 예언하셨다 [누가복음 19:43, 44 낭독]"]}, {"title": "제도의 종결에 대한 예언은 오늘날에 적용된다", "points": ["마태복음 24장의 많은 부분이 기원 33년부터 기원 70년 사이에 첫 번째로 성취되었다는 것이 역사적으로 증명되었다 (마 24:4-22)", "예수의 예언은 1914년에 하느님의 왕국이 설립된 이래 세계적인 규모로 더 크게 성취되었다 (「깨」 12/10 26-28면)", "요한 계시록 6장은 예수께서 면류관을 쓰실 때 땅에 전쟁과 식량 부족과 역병이 있게 될 것이라고 알려 준다 (「파14」 1/15 28-29면 4-7항)", "요한 계시록은 유대 제도가 멸망되고 나서 약 25년 후에 기록되었다", "마태복음 24장과 요한 계시록 6장의 내용이 일치한다는 것은 마태복음 24장이 미래에 또 성취될 것이라는 증거가 된다", "성경과 역사는 마태복음 24장의 주된 성취가 지금 이루어지고 있음을 보여 준다"]}, {"title": "우리가 “마지막 날”에 살고 있다는 더 많은 증거", "points": ["“마지막 날”에 대한 또 다른 예언이 디모데 후서 3:1-7에 나온다 [1절 낭독]", "바울은 마지막 날에 만연할 행동과 태도를 언급한다 [디모데 후서 3:2-5 설명]", "바울은 유대 제도의 마지막 날을 언급한 것이 아니다 (「파94」 4/15 10-11면 14-17항; 「통-1」 603면 4항)", "이 예언은 오늘날에 적용된다 (「파14」 1/15 29-30면 8-13항; 「파06」 9/15 5-6면)", "따라서 성경 예언은 우리가 이 세상 제도의 마지막 날에 살고 있다고 분명히 알려 준다"]}, {"title": "마지막 날에 생존하려면 행동해야 한다", "points": ["증거가 있는데도 불구하고, 비웃는 자들이 많다. 기원 70년에 예루살렘이 멸망되기 직전에도 예루살렘에 비웃는 자들이 분명히 많았을 것이다 (벧후 3:3, 4)", "우리가 사탄의 세상의 마지막 날 끝부분에 살고 있음을 알고 있다는 것을 경건한 행실과 정성으로 나타내는 것이 매우 중요하다 [베드로 후서 3:11, 12ㄱ 낭독]", "이 멸망이 임박했다는 것을 알게 되는 많은 사람들은 생활을 변화시킬 필요가 있다", "여호와의 증인은 무료 성경 공부를 통해 그러한 사람들을 기꺼이 돕는다", "이미 여호와를 섬기는 사람들은 반드시 계속 깨어 있어야 하며 일상생활에 몰두하지 않아야 한다 (「파06」 12/15 18-19면 17-18항)", "지금은 생존자가 되기 위해 행동하고 확고함을 유지할 때이다 [베드로 후서 3:14 낭독] (「파10」 7/15 9면 10-11항)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 2-KO 9/15\t 30분에 다룰 것"]}]}, {"no": 3, "title": "여호와의 연합된 조직과 함께 전진하라", "t": 0, "note": "여호와의 조직의 하늘 부분과 지상 부분에 대한 인식을 세워 주라. 여호와의 조직과 함께 영원히 전진하기 위해 그 조직의 일부가 되도록 청중에게 동기를 심어 주라!", "sections": [{"title": "여호와는 조직의 하느님이시다", "points": ["물질적 하늘은 여호와께서 조직의 하느님이심을 알려 준다 (욥 38:31-33; 「파11」 7/1 26-28면)", "별은 은하로 조직되어 있으며, 은하는 은하단과 초은하단으로 조직되어 있다 (「파14」 5/15 21-22면 3항)", "충실한 영적 피조물들도 조직되어 있다 (시 103:20, 21; 단 7:10)", "땅에 있는 여호와의 백성들도 조직되어 있다 (고전 14:33, 40)"]}, {"title": "여호와의 조직은 연합되어 있다", "points": ["여호와의 조직의 하늘 부분과 지상 부분은 연합하여 그분의 뜻을 행한다", "그들은 협력하여 모든 부류의 사람들에게 좋은 소식을 선포한다 (딤전 2:3, 4; 계 14:6, 7; 「철」 57-59면 14-18항)", "그렇게 하기 위해서는 좋은 소식을 수많은 언어로 번역해야 한다", "여호와의 목적은 하늘과 땅에 있는 모든 창조물을 연합시키는 것이다 [에베소서 1:8-10 낭독] (「파12」 7/15 27-28면 3-5항)", "첫 번째 단계는 “하늘에 있는 것들” 즉 하늘에서 그리스도와 함께 다스릴 기름부음받은 자들을 모으는 것이다", "두 번째 단계는 “땅에 있는 것들” 즉 낙원이 된 땅에서 살 사람들을 모으는 것이다", "현재 이루어지고 있는 연합에 개인적으로 어떻게 기여할 수 있는가?", "지성 있는 피조물을 연합시키는 여호와의 마련에 협조하라 [에베소서 4:1-3 낭독]", "겸손, 온화함, 참을성, 사랑과 같이 연합과 평화에 도움이 되는 특성을 기르라", "그와는 대조적으로 국가, 인종, 부족, 문화에 대한 자부심은 분열을 일으킨다 (「파15」 5/15 15-16면 4-8항)", "그러한 자부심을 극복하여 여호와와 그분의 조직과 연합을 누리는 것은 가능하다 (잠 16:5; 약 4:6)"]}, {"title": "여호와의 조직은 역동적이다", "points": ["에스겔은 여호와의 조직의 하늘 부분에 관한 놀라운 환상을 보았다 (겔 1:1-28; 「파13」 4/15 23-24면 6항)", "여호와의 하늘 수레는 엄청난 속도로 움직이고 즉시 방향을 바꿀 수 있다 (겔 1:12-19)", "수레를 타신 영광스러운 분은 여호와이시며 그분은 강력한 성령을 사용하여 수레의 움직임을 인도하신다", "여호와께서 그분의 조직의 지상 부분도 인도하신다는 어떤 증거가 있는가?", "조직상의 정련 [이사야 60:17 낭독] (「국」 120-125면 11-18항)", "수적 증가 [이사야 60:22 낭독] (「국」 96-97면; 최신 연감의 통계)"]}, {"title": "여호와의 조직과 함께 계속 전진하라", "points": ["여호와의 조직의 지상 부분을 구성하는 사람들이 불완전한 것은 사실이지만, 우리가 평화롭고 연합된 형제 관계를 누리는 것이 기적이라는 점에 초점을 맞추는 것이 훨씬 더 낫다! (시 48:12-14; 미 2:12; 「파15」 7/15 9면 13항)", "크고 작은 대회와 회중 집회에 모일 때 그러한 연합을 경험하게 된다", "사탄의 제도가 멸망되고 나면 하늘과 땅에 하나의 조직, 즉 여호와의 조직만 존재하게 될 것이다!", "우주에 평화와 조화가 가득할 때가 매우 가까웠다", "반역자인 사탄과 그의 조직의 편에 서는 자들은 존재하지 않게 될 것이다", "여호와의 조직은 영원히 계속 전진할 것이다", "현재에도 매우 빠른 속도로 상황이 진행되고 있지만, 얼마 안 있어 중대한 사건들이 일어나면서 그 속도가 더 빨라질 것이다\n(벧후 3:10-13)", "신세계에서 두루마리들이 펼쳐지면서 인류에 대한 하느님의 목적에 관한 세부점들이 더 밝혀질 것이다 (계 20:12; 「계」 298-299면 14항)", "여호와의 연합된 조직과 함께 영원히 앞으로 나아가기로 결심하기 바란다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 3-KO 9/15\t 30분에 다룰 것"]}]}, {"no": 4, "title": "우리 주위 세계에 나타나 있는 하느님에 대한 증거", "t": 9, "note": "창조물과 성경은 하느님의 존재에 대한 증거가 된다. 또한 여호와를 알고 섬기게 된 일부 사람들이 한 극적인 변화는 인간의 지혜와 능력으로는 불가능한 일이다. 청중에게 이 증거에 따라 행동하고 여호와의 인도에 따라 살도록 동기를 심어 주라", "sections": [{"title": "하느님의 존재에 대한 증거를 검토하는 것은 중요하다", "points": ["많은 사람들은 노골적으로 하느님의 존재를 의심하거나 부정한다", "하지만 창조주가 존재한다는 많은 증거가 있다", "하느님의 존재를 믿는가에 따라 삶의 의미가 크게 달라진다 (「깨」 15/3 4면 1-4항)"]}, {"title": "창조물은 창조주에 대한 증거가 된다", "points": ["질서 정연한 물질세계는 목적을 가진 설계자가 있다는 증거가 된다", "질서 정연한 체계는 저절로 생겨날 수 없다 [히브리서 3:4 낭독]", "우주가 생겨나는 데 막대한 에너지가 사용되었다", "우주는 고도로 조직되어 있다 (「파11」 2/15 6-7면 5-7항)", "여호와 하느님은 우리가 우주에서 보는 에너지와 질서 정연함의 근원이시다 (사 40:26, 28)", "우주의 물리적 특성은 생물이 살 수 있도록 정밀하게 조정되어 있다 (「깨」 09/12 5-7면; 「심」 17-21면)", "무엇이든 정밀하게 조정되어 있으려면 지성을 가진 인격체가 조정하는 일을 해야 한다", "태양계와 지구는 생물이 살 수 있는 곳에 정확히 위치해 있고 생물이 살 수 있도록 설계되었다 (「파13」 10/15 8면 6-7항; 「심」 22-24면; 「명」 4-7면)", "논리적으로 생각해 볼 때, 복잡한 생물이 저절로 생겨날 수는 없다 (「깨」 15/1 4-5면)", "세포가 살고 복제하는 데 필요한 복잡한 분자(예: RNA와 단백질)가 어떻게 동시에 존재하게 되었는지 과학자들은 설명하지 못한다 (「질」 4-7면)", "진화론자들은 단순한 생물에서 복잡한 생물이 생겨났다고 주장한다", "사실, 살아 있는 세포 중에 단순한 것은 없다 (「질」 8-12면)", "DNA의 놀라운 정보 수용 능력을 볼 때 설계자가 있음을 알 수 있다 (시 139:14-16; 「깨」 11/11 4-6면; 「질」 15-17면)"]}, {"title": "창조물은 하느님의 특성을 알려 준다", "points": ["창조물을 관찰하면 여호와 하느님의 성품을 알 수 있다 [로마서 1:20 낭독]", "지구를 깨끗하게 해 주는 자연계의 순환에서 여호와의 지혜 를 엿볼 수 있다 (「파13」 10/15 8-9면 8-9항; 「명」 8-9면)", "하느님께서 모든 인간에게 심어 주신 양심에는 그분의 공의 가 나타나 있다 (롬 2:14, 15; 「파07」 10/15 20-21면 5-8항)", "여호와의 가장 큰 특성은 사랑 이다", "많은 사람들이 하느님을 무시하거나 그분의 존재를 부정하지만, 그분은 모든 사람을 부양하심으로 사랑을 분명히 나타내신다 (행 14:16, 17)"]}, {"title": "성경에는 하느님께서 저자라는 증거가 들어 있다", "points": ["성경에 기록되어 있는 정확한 예언은 하느님이 존재한다는 증거가 된다 (사 46:9, 10)", "바빌론이 정복되기 약 200년 전에 그에 관한 자세한 점이 예언되었다 (「깨」 07/11 9면)", "예수가 메시아로 나타날 때와 그분의 지상 생애에 관한 자세한 점이 정확히 예언되었다 (「깨」 12/7 22-24면)", "고대의 다른 책들과는 달리, 성경은 과학적인 내용에 있어서도 정확하다 (「깨」 11/2 22-23면)", "성경의 지혜로운 조언에는 사람들을 변화시키는 힘이 있다 [「파수대」에 나오는 “성경이 생활을 변화시키다” 연재 기사 참조]", "이 점은 인류와 의사소통해 오신, 관심을 가진 창조주가 계시다는 것을 알려 준다 (사 48:17, 18)"]}, {"title": "창조주의 인도에 따라 살라", "points": ["성경 원칙을 배우고 적용함으로 여호와의 인도로부터 개인적으로 유익을 얻을 수 있다 (시 19:7-11)", "가까운 미래에 여호와께서는 자신의 원래 목적에 따라 악을 없애고 땅을 회복시키실 것이다 (계 21:5)", "지금은 여호와를 알고 그분의 뜻을 행하는 법을 배울 때이다", "그렇게 하는 사람들은 영원한 축복을 누릴 수 있다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 4-KO 9/15\t 30분에 다룰 것", "© 2015 Watch Tower Bible and Tract Society of Pennsylvania"]}]}, {"no": 5, "title": "행복한 가정생활을 위한 확실한 조언", "t": 2, "note": "가정에 사랑이 넘치는 따뜻한 관계를 형성하는 데는 시간과 노력이 들지만 그렇게 하는 것은 가능하다. 가정의 행복에 방해가 되는 요인들을 현실적으로 고려하라. 성경 원칙을 적용함으로 문제를 해결할 수 있다는 확신을 심어 주라", "sections": [{"title": "하느님께서는 가정이 행복하기를 원하신다", "points": ["모든 가정은 행복하기를 열망하지만 어떤 가정은 상처 주는 말, 존중심 부족, 불충실, 냉랭한 태도 때문에 문제를 겪는다", "그러한 문제는 “마지막 날”의 일반적인 특징이다 (딤후 3:1-5)", "여호와 하느님께서는 가정이 행복하기를 원하시기 때문에 가정을 위한 지침을 마련해 주셨다 (사 48:17, 18)", "성경의 조언을 적용하면 심각한 가정 문제도 극복할 수 있다"]}, {"title": "가정이 행복해지려면 비이기적인 태도가 꼭 필요하다", "points": ["많은 가정 문제의 근본 원인 중에는 이기적인 태도가 있다", "사탄은 자신의 이익을 추구해야 행복해진다는 생각을 조장한다", "하지만 주는 일을 해야 더 큰 행복을 누리게 된다 (행 20:35)", "비이기적인 사랑은 강력한 연합의 띠이다 [골로새서 3:14 낭독]", "진정한 사랑은 감정에 불과한 것이 아니라 비이기적인 행동으로 나타나는 것이다", "(고전 13:4-7)", "비이기적인 남편은 자신보다 가족의 필요와 이익을 앞자리에 둔다 [골로새서 3:19, 21 낭독]", "남이 보든 안 보든, 그는 가족을 존중심 있고 부드럽고 친절하게 대한다", "비이기적인 아내는 남편을 지원하고 가정의 복지를 위해 열심히 노력한다 [골로새서 3:18 낭독]", "고집이 세지 않고 순종적인 자녀는 평화롭고 행복한 가정에 기여한다 [골로새서 3:20 낭독]"]}, {"title": "가정의 행복에 방해가 되는 요인들은 극복할 수 있다", "points": ["가정이 종교적으로 분열되어 있거나 어쩌면 가족 가운데 성경의 조언을 적용하지 않는 사람이 있을지 모른다", "여호와께서는 어려운 상황에서도 평화를 추구하는 사람들을 축복하실 것이다 (골 3:23, 24)", "믿는 배우자는 믿지 않는 배우자에게 좋은 영향을 줄 수 있다 (벧전 3:1, 2; 「파10」 5/15 13-14면 6-10항)", "때때로 자녀는 부모의 훈련에 대해 반응이 더디거나 부모에게 반항하기까지 할지 모른다", "계속 자녀와 솔직하게 의사소통하고 잘 들어 주고 참을성 있게 추리하라 (「깨」 11/10 16-20면; 「깨」 07/8 8면)", "부모는 포기해서는 안 되며 참을성 있고 확고하게 계속 자녀를 도와야 한다 (갈 6:9)", "어떤 가정에는 논쟁하고 불친절한 말을 하는 것과 같이, 깊이 뿌리박힌 나쁜 습관이 있다", "성경 원칙을 적용함으로 그러한 습관을 극복할 수 있다 [골로새서 3:12 낭독]", "의견 차이와 문제를 평화로운 방법으로 다루는 법을 배우라 (「파08」 5/1 10-12면; 「깨」 13/2 4-5면)", "참을성을 나타내고, 새로운 습관을 들이는 데는 시간이 걸린다는 점을 인정하라", "과거의 잘못에 대한 반감을 떨쳐 버리기로 결심하라 [골로새서 3:13 낭독]", "부부 간의 신뢰가 손상되었다 하더라도 회복하는 것은 가능할 수 있다", "어쩌면 한 배우자가 음란물을 보았거나 배우자가 아닌 다른 사람과 부적절한 감정적 유대를 키워 왔을지 모른다", "신뢰를 회복하려면, 잘못한 배우자가 행실을 변화시키고 사과할 필요가 있다 (골 3:5, 9)", "부부는 솔직성과 정직성을 키움으로 계속 신뢰를 쌓을 수 있다", "간음은 신뢰를 저버리는 심각한 행위이다", "무고한 배우자는 용서할 것인지 이혼할 것인지 신중하게 결정해야 한다 (마 5:32)", "용서하면 결혼 생활을 강화하기 위해 부부가 함께 노력해야 한다 (「파12」 5/1 12-15면)"]}, {"title": "가족과 함께하려는 결심을 강화하라", "points": ["성공적인 가정생활을 하기로 굳게 결심했음을 말과 행동으로 나타내라 (「깨」 15/6", "8-9면)", "가족과 함께하겠다는 확고한 생각은 문제를 해결하는 튼튼한 기초가 된다", "여호와 하느님께서 당신의 노력을 축복하실 것이다 (잠 16:3)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다.\n「전도 학교」 책 52-55, 166-169면 참조]", "No. 5-KO 9/15\t 30분에 다룰 것"]}]}, {"no": 6, "title": "노아 시대에 무슨 일이 있었는가?", "t": 9, "note": "성경을 사용하여 청중에게 (1) 홍수가 실제로 일어난 역사적인 사건이고, (2) 여호와께서 현 악한 세상을 멸망시키실 것이며, (3) 생존하려면 노아와 같은 믿음을 기르고 나타내야 한다는 것을 확신시키라", "sections": [{"title": "세계적인 홍수는 역사적인 사건이었다", "points": ["우리에게 최고의 권위는 성경인데, 성경은 홍수가 실제로 있었던 사건이라고 알려 준다", "성경은 홍수에 관해 자세히 알려 준다 (창 7:11; 8:4, 13, 14)", "하느님의 아들인 예수께서는 홍수를 목격하셨으며 그에 관해 증언하셨다 (마 24:37-39; 「파03」 5/15 6면 6항)", "홍수 기록과 일치하는 증거가 존재한다. (1) 지질학적 증거, (2) 화석 증거, (3) 홍수에 관한 많은 전설 (「파08」 6/1 8면; 「파02」 3/1 4면; 「깨」 09/5 16-17면)", "홍수가 실제로 있었는지가 중요한 이유는 무엇인가?"]}, {"title": "불경건한 세상의 멸망은 우리 시대를 위한 본보기가 된다", "points": ["예수께서는 “노아의 날”을 “ ‘사람의 아들’의 임재”에 비하셨다 [마태복음 24:37 낭독]", "홍수 전의 상황은 어떠했는가? 우리는 그에 비할 만한 무엇을 마지막 때에 보고 있는가?", "만연해 가는 냉담 (마 24:38, 39)", "오늘날에는 좋은 소식을 전하는 사람들이 조롱당하는 경우가 많다 (벧후 3:3, 4)", "악귀의 영향 (창 6:1, 2; 「파08」 6/1 5면 3-5항)", "영매술을 소재로 하는 텔레비전 프로와 영화가 많다", "많은 나라에서 사람들은 홍수로 악한 사람들이 멸망된 때와 거의 같은 날에 죽은 자들을 위한 축제를 해마다 기념한다 (「파02」 3/1 4면 2항; 「추」 393면 1-2항)", "성적 타락 (창 6:4; 「파03」 12/15 16면 10-12항)", "오늘날에는 음란물, 혼전 성관계, 간음, 동성애가 흔하다 (롬 1:26, 27)", "널리 퍼져 있는 폭력 (창 6:11; 「파03」 12/15 16-17면 13-15항)", "오늘날 뉴스 매체는 종종 폭력적인 행동을 주요 뉴스로 다룬다 (딤후 3:3, 13)", "여호와께서는 우리 시대에 땅에 존재하는 악을 어떻게 하실 것인가? [베드로 후서 3:5-7 낭독]", "그분은 불경건한 사람들을 멸망시키시고 땅에서 모든 불의를 없애실 것이다 (벧후", "3:13)"]}, {"title": "생존하기 위해 노아의 믿음을 본받으라", "points": ["다가오는 멸망을 생존하기 위해서는 노아의 믿음을 본받아야 한다 [히브리서 11:7 낭독]", "그는 방주를 지었으며 “의의 전파자”였다 (벧후 2:5)", "우리도 “행실을 거룩하게 하고 경건한 정성을 행동으로 나타내”야 한다 (벧후", "3:11, 12)", "우리는 개인적인 관심사를 추구하는 일에 몰두해서는 안 된다 (마 24:38, 39)", "노아는 불경건한 세상과 달라지는 데 필요한 믿음과 용기가 있었다 (창 6:9; 「파08」 6/1 6면)", "달라지려면 용기가 있어야 한다", "‘나의 행실은 세상의 타락한 행위를 정죄하는가?’ 하고 자문해 보라 (벧전 4:3, 4)", "노아가 여호와의 말씀이 이루어질 것이라는 강한 믿음을 가질 수 있었던 이유는 무엇인가? (창 6:13, 17)", "노아는 아마 여호와께서 이전에 하신 예언의 말씀들이 성취되었다는 것을 알고 있었을 것이다 (창 2:16, 17; 3:16-19)"]}, {"title": "홍수 기록의 목적을 잊지 말라", "points": ["여호와께서는 모세에게 영감을 주시어 우리의 유익을 위해서 홍수에 관해 기록하게 하셨다", "이 기록은 모세가 나중에 겪게 된 어려움을 견디도록 분명히 그의 믿음을 강화해 주었을 것이다", "우리는 믿음을 강화하기 위해 이 영감받은 성경 기록을 읽고 묵상할 수 있다", "이 기록은 행동을 촉구할 뿐만 아니라 여호와께서 불의한 세상에서 우리를 곧 구출하실 것임을 생각나게 해 준다 (벧후 2:9)", "여호와의 목적과 일치하게, 순종하는 인류는 얼마 안 있어 땅을 채우고 낙원으로 만들어 그곳에서 영원히 살 기회를 갖게 될 것이다 (창 1:28; 9:1)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 6-KO 9/15\t 30분에 다룰 것"]}]}, {"no": 7, "title": "“부드러운 자비의 아버지”를 본받으라", "t": 9, "note": "성경을 사용하여 자비의 정의를 설명한다. 성경에 나오는 예들을 사용하여, 여호와와 예수께서 어떻게 자비를 나타내셨는지 보여 준다. 마지막으로, 우리가 여호와의 자비를 본받을 수 있는 방법들을 고려한다", "sections": [{"title": "자비란 무엇인가?", "points": ["자비는 때때로 잘못을 용서해 주는 것과 관련되지만 도움이 필요한 사람들에게 친절하게 배려를 나타내는 것을 가리키는 경우가 더 많다 (시 103:3, 4; 「파07」 9/15 22면 7항; 「파04」 11/1 12면 13-14항; 「까」 225면 15항)", "자비를 나타내는 데는 두 가지 요소가 필요하다. (1) 동정심을 느끼거나 불쌍히 여기는 감정, (2) 필요한 도움을 베푸는 행동"]}, {"title": "여호와는 부드러운 자비의 근원이시다", "points": ["동정심과 자비는 여호와로부터 나오는 것이며 그분의 본성의 일부이다 [고린도 후서 1:3 낭독] (「파08」 9/1 18면, 각주)", "도움이 필요한 사람들에게 그분이 가지시는 부드러운 감정은 갓 태어난 자녀에게 어머니가 갖는 감정과 같다 (사 49:15)", "그분의 자비는 편파적이 아니다 (눅 6:32-36)", "그분은 “악한 사람에게나 선한 사람에게나” 해가 떠오르게 하시고 비를 내려 주신다 (마 5:45)", "성경에는 여호와께서 하나의 집단으로서 이스라엘 백성에게 자비를 나타내신 많은 예가 나온다 (시 78:38-41)", "그들이 자신들의 잘못 때문에 곤경에 처했을 때에도 도와 달라고 부르짖자 여호와께서는 종종 그들을 “불쌍히 여기셨”다\n(삿 2:17, 18; 3:7-9, 12-15)", "하지만 북쪽 이스라엘 왕국의 열 지파가 빗나간 행로를 고집하자 그분의 자비는 한계에 달했다 (호 1:6, 각주; 「파05」 11/15 18면 8-9항)", "개인이 회개하고 행실을 변화시키면 여호와께서는 기꺼이 용서하고 자비를 나타내신다 (출 34:6, 7)", "그렇다고 해서 그분이 자신의 공의를 자비로 누그러뜨리시는 것은 아니다. 하느님의 공의와 자비는 완벽하며 함께 작용하여 온전히 조화를 이룬다 (「파07」 9/15 24면 14항)", "다윗이 심각한 죄를 짓고 회개하자 여호와께서는 그에게 자비를 보이셨다 (시 32:1-5; 51:1-4)", "다윗이 사울에게 자비를 나타낸 것도 어쩌면 그가 용서받은 한 가지 이유였을지 모른다 (「파12」 11/15 23면 10항)"]}, {"title": "예수께서는 자비를 보이는 면에서 아버지를 완벽하게 본받으셨다", "points": ["예수께서는 자비가 중요한 이유와 자비를 적절하게 나타내는 방법을 알려 주셨다", "우리는 여호와와 좋은 관계를 유지하기 위해 자비를 보여야 한다 (마 9:13; 「활」 146-147면 13항)", "여호와를 기쁘시게 하려면 자비를 베푸는 동기가 순수해야 한다 (마 6:1-4)", "자비를 나타내려면 적극적인 행동을 해야 한다 (눅 10:29-37; 「파07」 9/15 26면 1-2항)", "여호와처럼, 예수께서도 적절한 경우에는 언제나 자비를 보이셨다", "그분은 기적을 행할 때 감정이 결핍되어 있지 않으셨다", "그분은 부드러운 동정심을 나타내셨다 (마 20:30-34; 막 1:40-42; 「파08」 8/15 15면 15항)", "예수께서는 다른 사람들에 대한 부드러운 감정이 동기가 되어 “그들에게 많은 것을 가르치”셨다 (막 6:34)"]}, {"title": "여호와를 본받아 계속 자비를 나타내라", "points": ["여호와께서는 우리가 그분의 자비를 본받아 다른 사람에게 자비를 나타내기를 원하신다 [누가복음 6:36 낭독]", "어떻게 그렇게 할 수 있는가?", "여호와를 본받아 용서하라 (마 18:23-35)", "시련을 겪는 사람들에게 격려의 말을 하여 위로하라 [고린도 후서 1:4 낭독] (「파08」 9/1 18면 6항; 「파98」 2/15 26면 5항)", "다른 사람에게 선을 행하고 자신이 가지고 있는 것을 함께 나누라 (히 13:16; 요1 3:17, 18)", "다른 사람에게 좋은 소식을 전함으로 그들의 영적인 필요를 채워 주기 위해 노력하라", "우리가 다른 사람에게 자비를 보이면 여호와께서도 우리에게 자비를 보이실 것이다 (마 5:7; 약 2:13; 「파07」 9/15 25면 19항)", "또한 우리는 자비로우신 하느님을 본받는다는 사실을 알게 되어 만족감을 얻게 될 것이다 (시 116:5)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 7-KO 12/15\t 30분에 다룰 것"]}]}, {"no": 8, "title": "자신을 위해서가 아니라 하느님의 뜻을 행하기 위하여 생활함", "t": 0, "note": "인간이 어떻게 죄의 종이 되었는지 그리고 어떻게 그리스도의 대속에 대한 믿음을 나타내어 자유롭게 될 수 있는지 설명한다. 생활 방식을 통해 대속에 대한 믿음을 나타내려는 인식을 심어 주라", "sections": [{"title": "현대 사회에는 독립적인 태도가 만연해 있다", "points": ["어느 정도의 독립은 바람직하다. 다른 사람들에게 전적으로 의지하기를 원하는 사람은 아무도 없다", "하지만 오늘날 세상에는 하느님으로부터 독립하려는 균형 잡히지 않은 불경스러운 태도가 널리 퍼져 있다", "널리 퍼져 있는 이러한 영 즉 태도는 사탄에게서 나온다 (엡 2:2)", "이러한 악귀적인 견해는 사람들이 모든 권위에 그리고 원하는 대로 하지 못하도록 제한하는 모든 것에 반항하려는 마음을 심어 준다 (「랑」 54면 7-8항)"]}, {"title": "진정한 자유를 누리려면 하느님과 예수를 의지해야 한다", "points": ["대다수의 사람들은 자신이 자유롭다고 생각하지만 사실은 죄의 종 상태에 있다 [로마서 6:16 낭독]", "죄인이라는 개념이 제대로 형성되어 있지 않은 나라에서 자란 사람들이 있는가 하면, 죄란 없다고 믿는 사람들도 있다\n(「파11」 6/15 8-9면 9-12항)", "성경은 아담과 하와가 죄 없이 창조된 실존 인물이었다고 알려 준다", "하느님께 순종했다면 그들은 영원히 살 전망이 있었다 (창 2:16, 17)", "아담은 불순종함으로 고의적으로 하느님으로부터 독립하는 길을 선택하여 죄인이 되었다 (딤전 2:14)", "그로 인해 아담 자신뿐만 아니라 그의 후손들도 영원히 살 수 있는 전망을 잃어버렸다 (창 3:19; 롬 5:12)", "여호와 하느님께서는 사랑에서 우러나와 인간이 죄와 죽음에서 벗어날 수 있도록 대속을 마련하셨다 [로마서 6:23 낭독]", "대속은 죄를 용서받을 수 있는 근거가 된다. 우리는 대속에 대한 믿음을 나타내야 한다 (「파10」 8/15 13-14면 8-11항)", "대속을 통해 우리는 진정한 자유를 누리게 되며 영원히 살 전망을 갖게 된다"]}, {"title": "날마다 여호와의 뜻을 행하기 위해 생활하라", "points": ["우리 모두는 생명의 근원이신 여호와 하느님과 인류를 위해 생명을 바치신 그분의 아들 그리스도 예수께 감사를 나타내야 한다\n(마 20:28; 행 17:26-28)", "우리는 자신의 뜻이 아니라 하느님의 뜻을 행함으로 감사를 나타낸다 [고린도 후서 5:14, 15 낭독]", "하느님의 뜻을 행하기 위해서는 여호와의 헌신하고 침례받은 증인이 되는 단계를 밟아야 한다. 아직 그렇게 하지 않았다면, 그러한 단계를 밟아야 한다", "단지 성경의 가르침을 좋아하고 하느님의 뜻을 행하는 사람들과 교제하는 것만으로는 부족하다", "침례를 받는 데 필요한 단계들에는 자신의 죄를 회개하는 것과 나쁜 행실을 버리는 것이 포함된다 (「파13」 3/15 17면 네모)", "하느님께 헌신하기 위해서는 기꺼이 자신을 부인해야 한다 (마 16:24; 「파05」 3/15 11-12면 8항)", "기도로 그러한 헌신을 한 다음, 그 헌신을 공개적으로 나타내는 물침례를 받아야 한다 (마 28:19; 롬 10:10)", "이미 침례를 받았든 침례를 목표로 발전하고 있든 우리는 이기적인 행로를 계속 배척해야 한다", "성적 부도덕을 피하라 [고린도 전서 6:18-20 낭독]", "불결한 생각과 행실을 조장하는 교제와 오락을 멀리하라 (엡 5:3 「깨」 13/9 5면)", "부를 추구하거나 소유물에 대한 사랑을 키우지 말라 (딤전 6:9, 10)", "예수께서는 “하느님과 재물을 함께 섬길 수는 없”다고 말씀하셨다 (마 6:19-24)", "예수를 본받아 우리의 시간과 활력을 다른 사람을 돕는 데 사용해야 한다", "여호와 하느님과 그분의 왕국에 관한 진리를 알도록 도우라 (마 9:36-38)", "다른 사람을 기꺼이 겸손하게 도우라. 그들의 필요를 돌보라 (요 13:3-5, 12-15; 「파15」 2/15 8-9면 14-16항)"]}, {"title": "하느님의 뜻을 위해 살고자 하는 결의를 강화하라", "points": ["우리는 하느님과 예수께 의존해 있다는 사실을 항상 기억할 필요가 있다", "기도할 때, 우리의 생명이 하느님으로부터 왔으며 미래에 대한 우리의 희망이 대속에 대한 믿음에 달려 있음을 인정하라", "독립적으로 결정을 내리지 말고 참하느님의 종으로서 그분께 의지하여 결정을 내리라", "하느님의 뜻을 행하려는 결심을 강화한다면 영원한 축복을 누리게 될 것이다 [로마서 6:22 낭독]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 8-KO 9/15\t 30분에 다룰 것"]}]}, {"no": 9, "title": "하느님의 말씀을 듣고 행하는 사람이 되십시오", "t": 9, "note": "여호와의 교훈을 주의 깊이 듣고, 그 의미를 깨닫고, 생활에 적용하는 것이 매우 중요하다는 점을 이해하도록 돕는다. 연구할 때나 집회에 참석해서 자신이 어떻게 듣는지에 주의를 기울여야 한다는 점을 강조한다", "sections": [{"title": "“귀가 있는 사람은 들으라”", "points": ["예수께서는 자신의 말을 듣는 사람들에게 잘 들으라고 반복해서 권고하셨다 (마 11:15; 13:9, 43; 15:10)", "오늘날 성경의 소식을 어느 정도 들어 본 사람은 많이 있다. 하지만 예수 시대와 마찬가지로, 그 소식에 주의를 기울이는 사람은 별로 없다", "그런 사람들은 여러 가지 편견이나 철학이나 주의를 빼앗는 것들에 영향을 받았을지 모른다", "구원을 받으려면 하느님의 말씀을 겸손하게 잘 듣는 것이 매우 중요하다", "우리는 여호와 하느님과 예수 그리스도에 관한 지식을 얻어야 한다 (요 3:16; 17:3; 롬 10:17)", "모든 일에서 하느님의 말씀으로부터 지침을 얻어야 한다 (마 4:4)"]}, {"title": "말씀을 듣는 것에 더해 행하는 사람이 되어야 한다", "points": ["성경 지식을 쌓는 것만으로는 충분하지 않다. 배우는 것을 반드시 적용해야 한다 [야고보서 1:25 낭독]", "하느님의 영의 도움을 받으면 깊이 뿌리박힌 습관도 극복할 수 있다 (고전 6:9-11; 「파10」 4/15 9면 11항)", "여호와와 그분의 가르침에 감사하는 마음이 생기면 변화하려는 동기를 갖게 된다 (사 48:17, 18)", "[「파수대」의 “성경이 생활을 변화시키다” 연재 기사에 나오는 경험담을 언급한다]", "왕국의 축복은 자신이 생각하기에 하느님이 기뻐하실 만한 일을 한다고 해서 받을 수 있는 것이 아니다 (마 7:21-23)", "예수를 따른다고 주장하는 많은 사람은 좋은 일들을 하고 있지만, 하느님이 하라고 하신 일은 하지 않고 있다 (「따」 185-186면 10-12항)"]}, {"title": "말씀을 행하는 사람은 왕국 소식을 사람들에게 전한다", "points": ["예수께서는 자신이 “진리를 증거하기” 위해 세상에 왔다고 말씀하셨다 (요 18:37)", "그분은 아버지에게서 하느님의 말씀을 선포하고 가르치라는 사명을 받으셨다 (눅 4:18-21)", "그분은 갈릴리와 유대 전역을 다니면서 사람들을 가르치셨고 자신의 말을 잘 듣는 사람들을 제자로 삼으셨다 (마 9:35-38)", "예수께서는 제자들에게 왕국의 좋은 소식을 전파하고 더 많은 사람을 제자로 삼으라는 사명을 주셨다 (마 10:5-7; 28:19, 20; 눅 10:1, 2, 8, 9)", "초기 그리스도인들은 예수께서 가르치신 것과 동일한 왕국 소식을 가르쳤다 (행 28:30, 31)", "예수께서는 그리스도인들이 결국 이 땅 전역에서 전파 활동을 할 것이라고 예언하셨다 (행 1:8; 「통」-2 744면)", "예수께서는 왕국 소식을 듣고 좋은 반응을 보이는 사람들을 “좋은 흙”에 비하셨다 (마 13:18-23)", "그런 사람들은 ‘열매를 맺고 결실을 낸다.’ 즉 그들 자신도 왕국을 선포하는 사람이 된다", "좋은 소식을 전파하는 것은 하느님의 뜻을 행하는 일에서 매우 중요한 부분을 차지한다 (롬 10:13-15)", "오늘날 여호와의 증인은 하느님의 왕국을 선포하라는 예수의 명령을 따르고 있다", "세계 전역에서 ‘열매를 거두어들이는’ 이 일은 이전 어느 때보다 긴급하다 (계 14:14-16; 「국」 88-89면 5-6항)"]}, {"title": "‘자신이 어떻게 듣는가에 주의를 기울이라’", "points": ["이 시대가 긴박한 시기이지만, 우리는 “듣기만 하는” 함정에 빠질 위험이 있다 (약 1:22-24)", "사도 바울은 히브리 그리스도인들에게 “듣는 일에 둔해”지는 것에 대해 경고했다 (히 5:11)", "여호와께서 우리의 영적 건강을 위해 조직을 통해 해 주시는 모든 마련을 활용하라", "예수께서는 그리스도인 회중을 적극적으로 인도하고 계신다. 그분은 “충실하고 슬기로운 종”을 사용해 영적 양식을 공급하신다 (마 24:45-47; 「파13」 7/15 20면 2항)", "그리스도인 집회와 출판물은 우리가 하느님의 말씀을 연구하여 “모든 선한 일을 할 준비를 완전히 갖추도록” 도와준다 (딤후 3:14-17)", "정기적으로 가족 숭배와 개인 연구를 하기 위해 확정적인 계획을 세우고 그 계획에 고착하라", "이러한 마련들을 계속 온전히 활용함으로 ‘자신이 어떻게 듣는가에 주의를 기울일’ 수 있다 (눅 8:18)"]}, {"title": "하느님의 말씀을 적용하는 사람은 축복을 받을 것이다", "points": ["예수께서는 오늘날 모든 사람이 어떤 두 가지 결말 중 하나를 맞게 될 것인지 설명하셨다 (마 7:13, 14)", "지금은 예수의 가르침을 행동으로 옮겨야 할 때이다 [마태복음 7:24 낭독]", "그렇게 하는 사람은 험난한 세상에 살면서도 평화와 진정한 행복을 누린다 (「파06」 5/15 27-30면 4-16항)", "하느님의 말씀에 순종하면 여호와의 승인을 받고 미래에 영원한 생명을 누리게 될 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 9-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 10, "title": "언제나 정직하게 말하고 행동하십시오", "t": 3, "note": "“진리의 하느님”인 여호와를 본받도록 격려한다. 정직하게 말하고 행동하면 여호와와 가까워질 수 있고 그분에게 영예가 돌아가며 그 밖에도 많은 유익이 있다는 점을 강조한다", "sections": [{"title": "당신도 하느님처럼 정직성을 중요하게 생각하는가?", "points": ["정직하다는 것은 진실한 것, 다른 사람을 대할 때 속이지 않고 솔직하고 신뢰할 만한 태도를 보이는 것을 의미한다", "안타깝게도 오늘날 세상에는 속임수와 부정직이 널리 퍼져 있다 (딤후 3:5, 13; 「깨」 10/10 3면)", "그로 인해 일부 사람들은 자신도 부정직하게 살 수밖에 없다고 생각한다 (「깨」 12/1 4-5면)", "여호와는 “진리의 하느님”이시다. 반면에 사탄은 “거짓의 아버지”이다 (시 31:5; 요 8:44)", "여호와께서는 부정직을 매우 심각한 잘못으로 여기신다 (잠 6:16, 17; 계 21:8)", "하느님의 참숭배자라고 주장하는 사람이라면 누구나 모든 일에서 정직해야 한다 [히브리서 13:18 낭독]", "우리는 진실하신 여호와를 본받아 그분께 영예를 돌리기를 원한다"]}, {"title": "자신에게 정직하라", "points": ["불완전한 인간은 자신을 속이는 경우가 자주 있다 (잠 16:25; 렘 17:9)", "우리 모두는 자신이 한 좋은 행동이나 나쁜 행동에 대해 답변하게 될 것이다 (딤전 5:24, 25; 히 4:13)", "우리는 여호와께 우리를 살피고, 바로잡고, 인도해 달라고 간절히 기도해야 한다 [시편 139:23, 24 낭독]", "자신을 겸손히 평가해 보고 필요하다면 어떤 변화라도 하겠다고 결심해야 한다 (약 1:22-25)", "도움이 더 필요하거나 심각한 죄를 저지른 경우라면 그리스도인 장로들에게 도움을 요청해야 한다 (약 5:14, 15)"]}, {"title": "가족과 다른 사람들에게 정직하라", "points": ["정직함은 모든 그리스도인 가족의 두드러진 특징이 되어야 한다", "남편과 아내는 서로에게 솔직하고 정직해야 한다. 그러면서도 서로를 따뜻하고 친절하게 대해야 한다 (엡 4:25-27, 29-32)", "정직한 사람은 음란물을 보거나 다른 이성과 은밀한 관계를 발전시켜 나가지 않는다 (시 26:4)", "부모는 자녀가 모든 말과 행동에서 정직하도록 가르쳐야 한다", "정직의 중요성을 가르치기 위해 성경에 나오는 좋은 예와 나쁜 예를 활용할 수 있다 (창 43:12; 수 6:17-19; 7:11-25; 왕하 5:14-16, 20-27; 「랑」 162-163면 7-8항)", "또한 직접 본을 보여 가르쳐야 한다 (롬 2:21)", "우리는 동료 그리스도인이나 그 밖의 사람들을 대할 때 정직해야 한다", "우리는 다른 사람에 대해 사실이 아닌 말을 하거나 악의적인 소문을 퍼뜨리지 않는다 (레 19:16; 잠 6:16, 18, 19)", "우리는 처벌을 피하거나 이득을 얻기 위해 진실을 왜곡하거나 상대방이 오해하게 만들지 않는다", "사회에서 일반적으로 따르는 기준이나 대다수의 사람들이 갖고 있는 견해에 영향을 받아, 정직하게 살아가려는 결심이 약해져서는 안 된다", "우리는 세상에서 여러 가지 활동을 할 때도 늘 정직하게 행동해야 한다", "여호와께서는 사업이나 일을 할 때 부정직하게 행동하는 것을 혐오하신다 [잠언 11:1 낭독] (「랑」 168-169면 15항)", "우리는 자신이 한 약속을 지키기 어려울 때도 그 약속을 지켜야 한다 (시 15:4; 잠 6:1-5)", "정부 당국을 상대할 때도 정직하게 행동해야 한다 (마 22:21; 롬 13:1, 7; 「파16.05」 30-31면; 「랑」 169면 16항)", "정직하게 사업을 하는 사람들은 정직한 것이 실제로 도움이 되고 유익하다는 것을 경험하고 있다 (「깨」 12/1 6면)"]}, {"title": "정직할 때 얻는 유익", "points": ["정직한 사람은 선한 양심을 갖게 되고 사람들과 좋은 관계를 맺게 된다 (「파배16.1」 7면)", "우리가 정직하면 그로 인해 다른 사람이 진리에 이끌리게 될 수 있다 (고후 6:4, 7; 「파13」 5/15 11-12면 15항)", "정직한 사람은 여호와와 친구가 될 수 있다 (시 15:1, 2; 잠 3:32)", "여호와께서는 탐욕을 물리치고 늘 정직하게 행동하는 사람을 돌봐 주겠다고 약속하신다 (히 13:5, 6)", "거짓말하실 수 없는 분인 여호와께서는 성경 원칙을 충실히 따르는 사람들에게 영원한 생명을 주겠다고 약속하셨다 (딛 1:2)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 10-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 11, "title": "그리스도를 본받아 ‘세상에 속하지 마십시오’", "t": 0, "note": "그리스도가 남기신 모범을 살펴본다. 세상에 속하지 않는다는 것을 실생활에서 어떻게 나타낼 수 있는지 이해하도록 도와준다. 가능한 경우 해당 지역의 경험담들을 활용한다", "sections": [{"title": "왜 ‘세상에 속하지 않아야’ 하는가?", "points": ["그리스도인들은 예수 그리스도를 본받아 ‘세상에 속하지 않아야’ 한다 [요한복음 17:16 낭독]", "이 성구에서 말하는 “세상”은 하느님으로부터 멀어진 불의한 인간 사회를 가리킨다 (「통」-1 1139면)", "이 세상은 사탄 마귀의 지배를 받고 있다 (요1 5:19)", "세상의 영은 사람들이 마귀의 특성들을 나타내도록 조장한다 (요 8:44; 엡 2:1-3)", "그 영은 여호와의 표준에 어긋나는 일을 하도록 부추긴다 (갈 5:19-21)"]}, {"title": "예수께서는 ‘세상에 속하지 않는’ 방법을 알려 주셨다", "points": ["예수께서는 정치에 관여하기를 거부하셨다 (요 6:15; 18:36)", "우리는 정치적으로 중립을 유지해야 한다 (「랑」 52면 네모)", "예수께서는 물질주의를 멀리하셨다 (마 8:20)", "우리는 하느님의 왕국을 첫째로 구해야 하며 만족하는 법을 배워야 한다 (마 6:31-33; 딤전 6:8)", "예수께서는 모든 면에서 세상의 영향을 물리치셨다 (요 14:30)", "우리는 세상이나 세상에 있는 것들을 사랑해서는 안 된다 (요1 2:15, 16)", "예수께서는 세상에 있는 유혹적인 것들을 물리치는 방법을 본을 통해 보여 주셨다 (「파13」 8/15 24-26면 7-12항)", "그분은 육체의 욕망에 휘둘리지 않으셨다 (눅 4:1-4)", "그분은 눈에 보이는 것의 유혹에 빠지지 않으셨다 (눅 4:5-8)", "그분은 자신을 과시하기를 거부하셨다 (눅 4:9-12)", "예수처럼 모든 생각과 행동에서 하느님의 말씀을 지침으로 삼으라 (「파13」 8/15 26-27면 13-17항)", "하느님의 말씀을 사용해 유혹을 물리치라 (고후 10:3-5; 「파11」 1/15 22-24면 5-10항)"]}, {"title": "예수처럼 세상을 이기는 사람이 되라", "points": ["“세상에 속해 있지 않은” 사람은 세상의 미움을 받는다 (요 15:18, 19)", "예수께서는 세상을 이기는 것이 가능하다고 보증하셨다 [요한복음 16:33 낭독] (「파03」 3/15 4-6면)", "예수의 제자들은 교만을 이긴다", "예수께서는 제자들에게 겸손해지고 다른 사람들을 기꺼이 섬기라고 가르치셨다 (눅 22:24-27; 요 13:3-5, 12-15)", "우리는 명성을 얻으려는 세상적인 욕망을 물리쳐야 한다 (「파12」 12/15 6-7면 9-12항)", "또한 스포츠 스타나 연예인을 우상화하는 함정에 빠지지 말아야 한다", "예수의 제자들은 증오를 이긴다", "두려움, 무지, 편견은 세상에 분열을 초래한다", "그와는 반대로, 자기희생적인 사랑은 예수의 참제자들을 연합시킨다 (요 13:34, 35; 15:12, 13; 요1 3:15)", "예수께서는 그리스도인이 원수까지도 사랑해야 한다고 가르치셨다 (마 5:43-45)", "세상을 이기려면 믿음이 꼭 필요하다 [요한 1서 5:3, 4 낭독]", "우리는 그리스도가 현재 왕으로 다스리고 계시며 머지않아 이 악한 세상을 멸망시키실 것이라는 믿음을 가져야 한다", "그런 믿음이 있다면 하느님의 명령에 순종하고 이 세상의 태도나 사고방식을 물리치겠다는 결심이 흔들리지 않을 것이다"]}, {"title": "이 악한 세상은 곧 끝날 것이다!", "points": ["머지않아, 이 세상의 통치자는 더 이상 사람들을 잘못된 길로 인도하지 못할 것이다 (요 16:11; 계 20:1-3)", "사탄의 세상과 세상의 욕망은 영원히 사라질 것이다! [요한 1서 2:17 낭독]", "언제나 하느님의 뜻을 행하겠다고 결심하라", "약속된 축복이 실현되면 ‘세상에 속하지 않기’ 위해 힘겨운 싸움을 벌이던 기억은 사라질 것이다 (고후 4:17, 18)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 11-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 12, "title": "하느님은 권위에 대한 우리의 생각을 중요하게 여기신다", "t": 4, "note": "최고 권위자인 여호와 하느님은 자신이 허용한 권위를 우리가 존중하기 바라신다. 청중이 그 점을 이해하고 태도와 행동으로 그러한 존중심을 나타내도록 격려한다", "sections": [{"title": "왜 권위를 존중해야 하는가?", "points": ["“마지막 날”인 오늘날 권위에 대해 존중심을 보이지 않는 사람들이 계속 늘어나고 있다 (딤후 3:1-3)", "많은 사람은 어떠한 권위에도 거의 존중심을 보이지 않는다", "권위가 남용되는 것에 반발하여 그런 태도를 보이는 경우도 있다 (잠 28:15; 29:2; 전 8:9)", "하느님의 말씀은 우리에 대해 권위를 가진 사람들을 존중하라고 가르친다 [잠언 24:21 낭독]", "법과 권위는 평화와 질서에 기여한다 (고전 14:33, 40; 「랑」 39-41면 9-10항)"]}, {"title": "가정에서 권위에 대한 존중심을 나타내라", "points": ["여호와께서 가정을 마련하신 이유는 가족 모두의 유익을 위한 것이다 (엡 3:14, 15)", "예수께서는 남편과 아내와 자녀가 따라야 할 완벽한 모범을 남기셨다", "그리스도인 남편은 아내를 존중하고 사랑해야 한다 (엡 5:25-29; 벧전 3:7; 「파09」 7/15 8-9면 4-7항)", "남편은 가족을 위해 희생하고 영적인 교훈을 베푼다", "그리스도인 아내는 남편을 깊이 존경해야 한다 (엡 5:24, 33; 「파09」 7/15 9-10면 8-10항)", "아내도 권위를 가지고 있다. 하지만 아내는 남편에게 협조하고 남편을 지원한다 (잠 1:8)", "자녀는 부모에게 순종함으로 여호와와 부모를 기쁘게 해 드릴 수 있다 (잠 23:15, 24, 25; 눅 2:51; 「파09」 7/15 11면 16-18항)"]}, {"title": "“위에 있는 권위”에 존중심을 나타내라", "points": ["여호와께서는 우리가 정부 권위에 존중심을 나타낼 것을 요구하신다 [로마서 13:1, 2 낭독] (「파10」 1/15 24면 3항; 「랑」 44면 18항)", "그러한 권위는 무질서와 범죄를 억제하는 역할을 한다 (롬 13:3, 4)", "우리는 자신의 양심 때문에 “위에 있는 권위”가 정한 법에 순종해야 한다 (롬 13:5)", "우리는 정부 단체나 공무원들이 하는 일을 통해 그 밖에도 여러 가지 유익을 얻는다 (롬 13:6, 7; 「파11」 9/1 22면 2-3항)", "정부 관리들에게 합당한 존중심을 보이면 하느님께 영광이 돌아간다 (마 5:16; 「랑」 44-45면 19-20항)"]}, {"title": "최고의 권위를 가진 분께 존중심을 나타내라", "points": ["여호와 하느님은 최고의 권위를 가진 분이다 (시 83:18)", "그분은 자신의 모든 백성에게 항상 최상의 방법으로 권위를 행사하신다 (신 10:17, 18)", "우리는 다른 어떤 권위보다 여호와께 순종해야 한다 (마 22:21)", "하느님이 금지하시는 일을 하라는 명령을 받거나 하느님이 요구하시는 일을 하지 말라는 명령을 받을 때, 여호와의 종들은 그런 명령을 따르지 않는다 (출 20:4, 5; 단 3:16-18; 마 28:19, 20; 행 5:28, 29)", "하지만 그런 상황에서도 세상의 권위에 존중심을 나타낸다 (벧전 3:15; 「교」 20면 네모)", "우리는 회중에서 인도하는 사람들에게 복종함으로 여호와께 존중심을 나타낸다 [히브리서 13:17 낭독]", "장로들이 불완전하기는 하지만, 그들에게 순종하지 않는 것은 여호와의 권위를 존중하지 않는 것이다 (민 16:1-3, 28-35; 26:9; 「파12」 10/15 13-14면 4-8항)"]}, {"title": "여호와의 권위는 영원할 것이다", "points": ["여호와께서는 메시아 왕국을 설립하고 자신의 아들이 왕으로 다스리게 하셨다 (계 11:15)", "인간의 통치는 머지않아 끝날 것이다 (단 2:44; 마 6:9, 10; 「국」 8-9면 8-9항)", "왕국은 땅에 평화와 공의를 가져올 것이다 (시 72:7, 8, 12-14, 16; 「국」 26-27면)", "왕국의 백성들이 여호와의 권위를 깊이 존중할 것이기 때문에 신세계에서는 경찰이 필요 없을 것이다 (「깨02」 7/8 12면)", "천년 통치가 끝나면 그리스도는 왕국을 여호와께 넘겨 드릴 것이다 (고전 15:28)", "우리가 지금 여호와의 권위에 복종하는 법을 배운다면, 하느님의 통치를 받으며 영원히 행복한 삶을 살게 될 것이다 (시 37:27-29)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 12-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 13, "title": "성과 결혼에 대한 하느님의 견해", "t": 2, "note": "품위 있으면서도 솔직하게 이 주제를 다루어야 한다. 자제를 기르고 여호와의 사랑이 담긴 균형 잡힌 지침을 따르는 것이 지혜로운 일임을 깨닫도록 도와주어야 한다", "sections": [{"title": "성과 결혼은 창조주께서 사랑으로 주신 선물이다", "points": ["오늘날 세상은 성을 지나치게 강조한다. 따라서 많은 사람은 거리낌 없이 자신의 욕망에 따라 행동한다", "성과 결혼은 여호와에게서 비롯된 것이므로 그분이 어떤 견해를 갖고 계신지 살펴보는 것이 합리적이다", "하느님은 최초의 인간 남녀를 결혼이라는 영예로운 마련을 통해 직접 부부로 맺어 주셨다 (창 2:21-24)", "부부간의 자연스러운 성관계는 하느님의 마련이었다 (창 1:27, 28)", "성이 가장 중요한 것은 아니었다. 부부는 친밀하게 지내면서 서로를 지원하고 각자의 특성으로 서로를 보완해 주게 되어 있었다 (창 2:18)", "하느님의 표준에 기초한 결혼 생활은 많은 축복을 가져다준다", "부부는 서로를 위해 무언가를 주는 데서 큰 기쁨을 느낀다 (행 20:35)", "결혼은 자녀가 법적, 사회적, 도덕적으로 안정을 누리고 도움을 받으며 성장할 수 있는 환경을 조성해 준다", "결혼한 사람이든 독신이든 성적 욕망을 제어함으로 유익을 얻을 수 있다 [골로새서 3:5, 6 낭독]", "여호와께서 창시하신 결혼 마련 안에서만 성적 욕망을 충족시켜야 한다"]}, {"title": "하느님의 조언을 따르면 행복한 결혼 생활을 할 수 있다", "points": ["성과 결혼에 대한 성경의 법과 교훈은 하느님의 사랑의 표현이다", "따라서 부부는 성관계를 가질 때 비이기적인 사랑을 나타내야 한다 [고린도 전서 7:3-5 낭독]", "서로를 진심으로 아낀다면 남편과 아내 모두 성관계를 통해 만족감을 느낄 수 있다 (벧전 3:7; 「파12」 5/15 5면 10항; 「파89」 6/1 14면 18항)", "여호와께서는 배우자와만 성관계를 가져야 한다고 명령하셨다 [히브리서 13:4 낭독]", "간음은 하느님께 심각한 불경을 나타내는 것이다 (창 39:9)", "간음을 저지르면 당사자들은 물론 다른 사람들도 고통을 겪게 된다 (잠 6:27-29, 32)", "결혼한 사람은 간음을 범하게 만들 수 있는 것은 무엇이든 피하는 것이 지혜롭다 (마 5:27-29; 「파15」 1/15 24면 4-7항)", "결혼한 부부가 영원히 함께하는 것이 여호와의 목적이었다 (마 19:4-6)", "여호와께서는 이혼을 미워하신다 (말 2:14-16; 「활」 126-128면 5-7항)", "극단적인 상황 때문에 별거를 선택하는 사람들도 있지만, 그들에게는 재혼의 자유가 없다 (고전 7:11; 「랑」 219-221면)", "배우자가 성적 부도덕을 저지른다면, 무고한 배우자는 성경적 근거에 따라 이혼을 하기로 선택할 수 있다 [마태복음 19:9 낭독]", "본인이 주의 깊이 생각해 보고 직접 결정을 내려야 한다 (「깨」 10/2 4-8면)", "결혼과 이혼이 얼마나 심각한 일인지 인식하는 것은 부부가 행복한 결혼 생활을 하는 데 도움이 된다"]}, {"title": "성에 대한 하느님의 견해는 독신에게 유익하다", "points": ["하느님의 법은 모든 형태의 성적 부도덕을 금지한다 [데살로니가 전서 4:3-5 낭독] (「파08」 12/15 9면 10항)", "하느님이 사랑으로 마련하신 이 법은 신체적으로나 감정적으로 해를 입지 않도록 보호해 준다 (「파15」 5/15 17-18면 13-16항; 「파07」 4/1 5-6면)", "독신은 순결을 유지함으로 선한 양심을 지킬 수 있다", "사탄의 세상에서는 많은 사람이 동성애를 받아들이지만 하느님은 동성애를 정죄하신다 (고전 6:9, 10)", "청소년들은 그릇된 욕망을 물리치고 “성적 부도덕을 피할” 수 있다 (고전 6:18; 「묻2」 231-236면)", "부도덕한 생활을 하고 있는 사람들도 자신의 생각을 조정하고 잘못된 행동을 중단함으로 하느님의 승인을 받을 수 있다. 과거에 일부 사람들도 그렇게 하여 그리스도인이 되었다 (고전 6:11)", "자위행위는 불결한 습관이며 그 습관에 빠지면 자기중심적인 태도가 강해진다", "여호와의 도움을 받는다면 그 습관을 극복할 수 있다 (「묻1」 178-182면)", "이 싸움에서 이기려면 음란물과 그릇된 욕망을 불러일으키는 모든 것을 철저히 피해야 한다 (시 101:3)", "부모는 이러한 문제들에 대해 자녀와 이야기를 나누고 하느님의 견해를 알려 주어야 한다", "자녀가 학교 친구나 그 밖의 사람들의 부도덕한 견해에 영향을 받기 전에 도움을 베풀라"]}, {"title": "하느님과 같은 견해를 가지면 평화와 행복을 누리게 된다", "points": ["여호와께서는 우리가 따르기 불가능한 일이나 우리의 행복을 빼앗는 일을 하라고 요구하지 않으신다", "하느님의 지침을 받아들이고 따르면 여러 가지 문제와 슬픈 일을 겪지 않게 된다 [시편 19:9-11 낭독]", "부부는 순결하고 사랑이 넘치는 결혼 생활을 하면서 만족감을 느낄 수 있다", "부부든 독신이든 모든 그리스도인은 깨끗한 양심을 갖고 언제나 정신의 평화를 누리며 영원한 생명의 전망을 가질 수 있다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 13-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 14, "title": "깨끗한 백성은 여호와께 영예가 된다", "t": 0, "note": "여호와의 종들이 신체적인 깨끗함을 유지하고 더러운 습관에서 벗어나는 것이 왜 필요하고 유익한지 설명한다. 해당 지역의 필요와 상황에 맞게 내용을 전개하면서 여호와의 높은 표준을 강조한다", "sections": [{"title": "여호와께서 거룩하시므로 우리도 거룩해야 한다", "points": ["여호와는 거룩한 하느님이다 (「통」-1 78면)", "그분이 인류를 위해 하시는 모든 일은 의롭고 유익하다. 그런 하느님을 섬긴다는 것은 영예로운 일이다", "여호와께서는 자신을 숭배하는 사람들도 거룩할 것을 요구하신다 [베드로 전서 1:15, 16 낭독]", "성경에서는 거룩함을 깨끗함과 자주 연관 짓는다 (레 10:10)", "우리가 여호와를 숭배한다고 주장하면서도 깨끗함에 관한 그분의 표준을 따르지 않는다면 그분께 불명예를 돌리는 것이다", "우리는 영적, 도덕적, 정신적으로 깨끗함을 유지하는 것에 더해 신체적으로도 깨끗해야 한다 (고전 10:21; 엡 5:5; 빌 4:8)"]}, {"title": "외적으로 깨끗하고 질서 있는 상태를 유지하라", "points": ["여호와께서는 고대 이스라엘 백성에게 신체적으로 깨끗할 것을 요구하셨다 (출 19:10, 11; 29:4; 30:18, 19)", "이스라엘 백성은 진영을 깨끗하게 유지해야 했다 (신 23:12-14)", "하느님이 그들에게 주신 법에는 그분의 거룩함이 반영되어 있었으며 그 법은 그분이 자신의 백성에게 관심이 있으시다는 표시였다 (시 33:12)", "오늘날 하느님의 종들도 자신의 몸과 옷을 깨끗한 상태로 유지해야 한다 (「랑」 90-92면 14-16항)", "생활의 모든 부면에서 질서 있고 깔끔해야 한다 [고린도 전서 14:33, 40 낭독]", "집과 자동차는 내부나 외부 모두 깨끗하고 정리 정돈이 잘 되어 있어야 한다", "쓰레기를 올바른 방법으로 처리하여 자신이 사는 지역을 깨끗하게 유지하는 데 기여해야 한다 (「깨」 07/12 10, 11면)", "이 세상 제도의 영을 반영하는 단정하지 않고 극단적인 스타일의 옷을 입어서는 안 된다 (롬 12:1, 2)", "여가 시간에도 “건전한 정신”을 반영하는 옷차림과 몸단장을 해야 한다 (딤전 2:9, 10)", "다른 사람들의 양심을 고려하여 자신의 기호를 포기해야 할지도 모른다 (「파12」 8/15 13면 8항)", "우리가 깨끗함을 유지하고 정리 정돈을 잘하면 여호와 하느님께 영예가 돌아가고 우리가 전하는 소식이 돋보이게 된다 (마 5:16)"]}, {"title": "“육과 영의 모든 더러운 것”에서 벗어나 있으라", "points": ["여호와의 사랑과 관심에 감사하는 마음을 갖게 되면 더러운 습관을 피하려고 할 것이다 [고린도 후서 7:1 낭독] (고후 6:17, 18; 「랑」 93-95면 20-21항)", "흡연이나 과음이나 마약 사용은 생명을 주신 분인 여호와를 존중하지 않는 것이다 (시 36:9; 「랑」 95면 22-24항)", "자신의 정신과 몸에 해를 입히는 행동을 하면서 영혼을 다해 하느님을 섬길 수는 없다 (마 22:37; 「파14」 6/1 5면; 「파10」 1/1 5면)", "저속하거나 모욕적인 말은 깨끗하지 않은 말이며, 하느님을 사랑한다고 주장하는 사람은 결코 그런 말을 해서는 안 된다 (골 3:8; 「랑」 136-138면 9-14항)", "하느님의 도움을 받으면 깊이 뿌리박힌 나쁜 습관도 극복할 수 있다 (빌 4:13)", "여호와의 증인은 그런 습관에서 벗어나기 원하는 사람들에게 성경에 근거한 조언과 지원을 베푼다 (「깨」 10/5 4-9면; 「깨」 09/5 8-10면)", "많은 사람이 도움을 받아 나쁜 습관에서 벗어나 깨끗한 생활을 하고 있다 [「파수대」의 “성경이 생활을 변화시키다” 연재 기사에 나오는 한두 가지 예를 언급한다]"]}, {"title": "하느님 보시기에 깨끗한 상태를 유지하라", "points": ["사탄의 세상에 영향을 받고 있지 않은지 자신을 정기적으로 검토해 보라 (고후 13:5; 약 1:23-25)", "깨끗한 상태를 유지하는 데 도움이 되는 사람들을 친구로 사귀라 (고전 15:33; 「파06」 3/15 23면 8-10항)", "여호와 보시기에 깨끗한 상태를 유지하려고 노력하다가 실패하는 일이 있더라도 포기하지 말라", "대속을 근거로 여호와께 기도로 나아가 용서와 도움을 구하라 (요1 2:1; 「까」 159-160면 7항)", "계속 노력을 기울인다면 하느님의 승인과 축복을 받게 될 것이다 (벧후 3:13, 14; 「파03」 7/15 13면 13-15항)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 14-KO 10/18\t 30분에 다룰 것"]}]}, {"no": 15, "title": "“모든 사람에게 선한 일을 하십시오”", "t": 9, "note": "여호와의 선함을 본받아 어떻게 다른 사람에게 실제적인 방법으로 관심을 나타낼 수 있는지 설명한다. 선함이 하느님의 성령의 열매를 이루는 특성임을 강조한다", "sections": [{"title": "여호와께서는 어떻게 다른 사람에게 선한 일을 할 수 있는지 본을 통해 가르치신다", "points": ["여호와 하느님은 선함을 나타내는 면에서 가장 탁월한 본이 되신다 (막 10:18)", "선함은 도덕적으로 훌륭하거나 뛰어난 것을 가리키며, 다른 사람에게 선하고 유익한 행동을 하는 것으로 표현된다 (「통」-1 1101면)", "하느님은 우리가 안락하고 행복하게 사는 데 필요한 것들을 지구에 풍부히 마련하셨다", "여호와께서는 자신의 말씀인 성경을 통해 우리가 어떻게 지혜로운 삶을 살고 문제들에 대처할 수 있는지 가르쳐 주신다 (사 48:17, 18)", "그분은 사랑에서 우러나와 우리를 지원하고 도와주신다 (시 55:22; 사 41:10, 13)", "여호와께서는 우리가 다른 사람에게 선한 일을 할 때 기뻐하신다 [히브리서 13:16 낭독]", "하느님의 영은 우리가 그분의 선함을 본받도록 도와줄 수 있다 (갈 5:22)"]}, {"title": "가족에게 선한 일을 하라", "points": ["우리는 우리와 가장 가까운 사이인 가족에게 반드시 선한 일을 해야 한다", "우리는 가족에 대한 자연스러운 사랑이 식어 가는 때에 살고 있다 (딤후 3:3)", "가족 간에는 따뜻한 애정이 두드러지게 나타나야 한다 (엡 5:33; 6:4)", "부모는 어린 자녀를 부양할 책임이 있으며, 성인이 된 자녀는 연로한 부모와 조부모를 돌볼 의무가 있다 (막 7:10-13; 딤전 5:4, 8)", "자녀에게 선물을 지나치게 많이 사 주는 것은 해로울 수 있으며 진정으로 선한 일을 하는 것이 아니다 (「깨」 13/1 11면)", "부모는 자녀를 사랑으로 교육해야 한다 (신 6:6, 7; 「파15」 11/15 4-5면 3-6항; 「파14」 4/15 18-19면 4-7항)", "우리는 믿지 않는 가족에게 성경 진리를 알려 줌으로 선한 일을 할 수 있다 (「파14」 3/15 3-6면)", "재치와 존중심을 나타내면 좋은 결과를 거두게 될 것이다 (벧전 3:1, 2, 15)"]}, {"title": "동료 그리스도인에게 선한 일을 하라", "points": ["우리는 특히 동료 그리스도인에게 선한 일을 해야 한다 [갈라디아서 6:10 낭독]", "예수께서는 자신의 참제자들이 서로에게 나타내는 사랑으로 식별될 것이라고 말씀하셨다 (요 13:34, 35)", "우리는 동료 그리스도인들을 친절하게 대하고 그들이 우리에게 잘못을 저지를 때 용서해 준다 (엡 4:31, 32)", "우리와 배경이 다른 형제 자매들에게도 선한 일을 해야 한다 (고후 6:11-13; 「파09」 11/15 20-22면 5-10항)", "우리는 동료 그리스도인이 물질적으로 어려운 처지에 있을 때 도움을 베푼다 (약 2:15, 16; 「국」 209-210면)"]}, {"title": "모르는 사람에게도 선한 일을 하라", "points": ["오늘날 많은 사람은 자기 자신에게만 관심을 갖거나, 가족이나 친구에게만 관심을 갖는다 (마 5:46, 47)", "일부 사람들은 인종, 국가, 부족, 사회적 배경이 다른 사람에게 선한 일을 하지 않는다", "예수께서는 그런 잘못된 생각을 바로잡아 주셨다 (눅 10:29-37)", "우리는 사람들이 우리를 대해 주기를 바라는 방식대로 그들을 대해 주어야 한다는 예수의 명령에 순종한다 [마태복음 7:12 낭독]", "[지역의 상황에 맞게 내용을 적용한다]", "사람들이 우리를 어떻게 대하든 우리는 그들에게 선함을 나타내야 한다 (마 5:44, 45; 롬 13:8-10)"]}, {"title": "왕국을 전파함으로 사람들에게 선한 일을 하라", "points": ["우리가 사람들에게 선한 일을 하는 주된 방법은 그들이 여호와를 알고 그분의 뜻을 행하도록 돕는 것이다", "일부 종교 단체들은 자선 활동은 하지만 예수께서 주신 사명에 따라 하느님의 왕국을 선포하는 일은 등한히 하고 있다 (마 7:21-23; 24:14; 「따」 185-187면 10-13항)", "그들은 진실한 마음으로 그런 활동을 할지 모르지만, 사람들이 영적 필요를 채우고 영원한 생명을 얻도록 돕는 일은 하고 있지 않다", "모든 적절한 기회를 활용하여 여호와와 그분의 왕국에 대해 말하겠다는 목표를 가지라", "성경 진리를 배우기 시작한 지 얼마 안 되었다 해도, 자신이 알게 된 내용을 사람들에게 알려 줄 수 있다", "“모든 부류의 사람에게” 담대하게 말함으로 편파성 없는 태도를 나타내라 (고전 9:20-23)", "여호와 하느님은 우리가 사람들에게 한 선한 일에 대해 분명 축복과 상을 주실 것이다 (잠 11:25)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 15-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 16, "title": "하느님과 계속 가까워지십시오", "t": 0, "note": "하느님과 더 튼튼하고 가까운 관계를 맺어 나가도록 격려한다. 양심을 훈련하여 영적으로 장성해 나가야겠다는 마음을 갖도록 도와준다", "sections": [{"title": "하느님과 좋은 관계를 맺는 것은 가능하다", "points": ["여호와께서는 창조를 시작하실 때부터 사람들이 그분과 좋은 관계를 맺을 수 있는 토대를 마련하셨다", "그분은 사람이 완벽한 환경에서 살게 해 주셨고 끝없이 살 수 있는 전망도 주셨다 (창 2:9, 15-18)", "하느님은 사람을 창조하실 때 사랑과 공의 같은 그분의 특성들을 반영할 수 있는 능력을 주셨다 [창세기 1:27 낭독]", "사람들이 불완전하여 죄를 짓지만 하느님은 여전히 그들에게 자신과 좋은 관계를 맺자고 권하신다 (약 4:8)"]}, {"title": "양심을 훈련하라", "points": ["하느님과 좋은 관계를 맺으려면 그분의 의로운 표준에 따라 행동해야 한다", "하느님은 사람이 옳은 일을 하는 데 도움이 되는 양심을 주셨다 [로마서 2:14, 15 낭독] (「랑」 15-17면 3-7항)", "양심이 우리를 올바로 인도하게 하려면 양심을 훈련해야 한다 (「통」-2 150면 3항)", "적절하게 훈련받은 양심은 우리의 행동이 하느님의 표준과 어긋날 때 경고를 발한다. 또한 하느님과 멀어지게 만들 수 있는 행동에 대해 미리 경고해 준다", "여호와께서는 성경의 법과 원칙을 통해 우리를 인도하신다. 따라서 우리가 양심의 기능을 활용하는 것이 중요하다", "성경에는 특정한 행동을 금지하는 법이 들어 있다. 그러한 법은 도덕적으로 그릇된 일이 무엇인지 명확히 알려 준다 (고전 6:9, 10)", "우리가 성경의 법에 순종하는지에 따라, 특히 사람들이 보지 않을 때도 그렇게 하는지에 따라 그 법을 주신 분에 대한 우리의 태도가 드러난다", "대부분의 문제는 성경 원칙에 근거해서 결정해야 한다. 따라서 양심의 기능을 더 많이 활용할 필요가 있다", "원칙이란 도덕적 지침 역할을 하는 기본적인 진리를 가리킨다 (「파02」 4/15 19면 4-6항)", "성경 원칙을 분석해 보면 여호와의 성품과 생각을 배울 수 있다", "원칙을 배우고 적용하려면 규칙을 따르는 것보다 더 많은 노력을 기울여야 한다", "우리는 원칙에 얼마나 민감하게 반응하는지를 통해 우리의 마음 상태가 어떠한지 여호와께 보여 드리게 된다 (「파02」 4/15 19-21면 7-12항)"]}, {"title": "영적으로 장성해 나가라", "points": ["침례를 받은 뒤에도 영적으로 장성해 나가려는 목표를 가지라 [히브리서 5:14–6:1 낭독] (「통」-2 718면)", "깊이 있는 성경 진리를 이해하기 위해 힘써 노력하라 (「파09」 5/15 9-10면 5-6항)", "하느님의 말씀이 알려 주는 지침을 온전히 따르라 (「파09」 5/15 10-11면 7-11항)", "그렇게 하지 않는다면 영적으로 약한 상태에 머무르게 될 수 있다 (히 5:11-13)", "영적으로 장성한 사람들은 그리스도교 진리 전체를 받아들이고 적용한다 [에베소서 4:13, 15 낭독]", "그들은 옛 인간성 가운데 여전히 남아 있는 특성들은 무엇이든 벗어 버린다 (엡 4:22-24)", "그들은 생각에 있어서 동료 그리스도인들과 하나로 연합을 이룬다 (「파01」 8/1 13-14면 6-11항)", "반면에 영적인 아기는 불안정하고 건전한 판단을 내릴 능력이 없다 (엡 4:14)", "우리는 영적인 어린아이에서 어른이 되어 감에 따라 여호와 하느님과 점점 더 가까워진다", "우리는 사탄의 세상에 도사리고 있는 함정에 빠지지 않도록 보호를 받는다 (고전 14:20; 「파09」 5/15 12면 14-16항)", "우리는 자신의 생각을 여호와의 생각과 더욱더 일치시켜 나가면서 그분의 형상을 더 온전히 반영하게 된다"]}, {"title": "하느님과 계속 가까워지라", "points": ["영적 장성에 이른다고 해서 영적 성장이 끝나는 것은 아니다", "디모데는 장성한 그리스도인이었지만 진보해 나가라는 권고를 받았다 (딤전 4:15)", "그는 태도, 말, 행실에서 하느님의 형상을 더 온전히 반영하기 위해 노력할 수 있었다 (딤전 4:12, 13)", "하느님에 대한 지식을 쌓고 그분의 길을 더 잘 알기 위해 계속 노력하라 (시 25:4, 5)", "영의 열매를 맺는 면에서 계속 발전해 나가라 (갈 5:22, 23)", "하느님과 더 튼튼한 관계를 맺어 감에 따라 큰 만족감을 느끼게 될 것이다", "하느님과 좋은 관계를 맺고 있는 사람들은 영원히 그분과 더 튼튼한 관계를 맺어 나갈 전망을 갖고 있다", "여호와에 관해 배우는 일에는 결코 끝이 없다 (롬 11:33)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 16-KO 12/16\t 30분에 다룰 것"]}]}, {"no": 17, "title": "자신이 가진 모든 것으로 하느님께 영광을 돌리십시오", "t": 3, "note": "왜 하느님을 영광스럽게 해야 하는지 그리고 그렇게 하는 것이 어떻게 우리의 삶 전체에 영향을 미쳐야 하는지 설명한다. 또한 그리스도인 회중 성원들은 자기 자신을 내세우거나 개인의 영광을 구하지 않는다는 점을 새로 연합한 사람들이 이해하도록 도와준다", "sections": [{"title": "여호와께서는 영광을 받아 마땅한 분이시다", "points": ["하느님께 영광을 돌리는 것에는 그분께 “숭배를 통한 찬양과 영예와 감사”를 드리는 것이 관련된다", "여호와 하느님께서는 그 누구보다도 영광을 받기에 합당한 분이시다 [요한 계시록 4:11 낭독]", "강력한 영적 피조물들이 여호와께 기꺼이 영광을 돌린다 (계 7:11, 12)", "인간이 하느님께 영광을 돌리는 것은 더욱 당연한 일이지 않겠는가! (시 8:3-9)", "대다수의 인류는 이기심이 가득한 이 세상의 신인 사탄에 의해 눈이 멀어 있다 (고후 4:4)", "많은 사람은 하느님께 영광을 돌리는 것이 아니라 오히려 자신을 드높이고 다른 사람들에게서 영광을 받으려고 한다 (요 12:43; 롬 1:20, 21)", "우리는 어떻게 하느님께 그분이 받아 마땅한 영광을 돌릴 수 있는가? (시 96:7, 8)"]}, {"title": "하느님께 영광을 돌리신 예수의 본을 따르라", "points": ["예수의 겸손을 본받으라 (빌 2:5-8)", "예수께서는 사탄의 유혹을 받으셨을 때도 자신의 영광을 구하기를 거부하셨다 (마 4:5-10; 「파11」 5/15 18면 10-11항)", "예수께서는 자신의 가르침과 자신이 행한 강력한 일의 근원이 아버지임을 인정하셨다 (요 7:16; 14:10)", "우리는 자신의 능력과 자신이 이룬 일에 대해 마땅히 여호와께 영예를 돌려야 한다 (고전 4:7)", "예수께서는 다른 사람들을 위해 기꺼이 비천한 일을 하셨다 (요 13:3-5)", "예수께서 보이신 의에 대한 사랑을 본받으라 (히 1:9)", "자기 멋대로 행동하는 많은 사람들은 하느님의 도덕법을 노골적으로 무시한다 (롬 1:24, 28, 32; 벧후 2:10)", "우리는 여호와께서 우리를 틀 잡으실 권리를 가지고 계심을 인정하고 그분의 명령에 순종함으로 그분께 영예를 돌린다 (사 64:8)", "다른 사람들이 우리의 좋은 행실을 칭찬할 때 여호와께 영광이 돌아간다 (벧전 2:12)", "예수께서 보이신 하느님에 대한 영혼을 다한 정성을 본받으라 (요 4:34; 8:28, 29)", "자신의 뜻이 아니라 하느님의 뜻을 행하는 삶을 살라 (마 16:24; 롬 12:1, 2; 「파06」 4/1 23면 9항)", "다른 사람들에게 왕국의 좋은 소식을 전하라 [요한복음 15:8 낭독] (마 28:19, 20)", "다른 사람들에게 선한 일을 하면 그들도 마음이 움직여 하느님께 영광을 돌리게 될 수 있다 (마 5:16; 「파08」 5/15 5-6면 12-16항)"]}, {"title": "우리가 가진 모든 것으로 하느님께 영광을 돌리는 방법", "points": ["여호와에 대한 사랑은 우리가 가진 모든 것으로 그분께 영광을 돌리려는 마음을 갖게 한다 [마가복음 12:30 낭독]", "우리 각자는 하느님께 영광을 돌리는 데 사용할 수 있는 다양한 자산을 가지고 있다. 예를 들어 재능이나 교육, 힘, 경험, 시간, 물질 등을 사용해 그렇게 할 수 있다 (잠 3:9)", "여호와께 영광을 돌리는 데 있어 중요한 것은 우리가 얼마나 많이 가지고 있는가가 아니라 우리가 가진 것을 어떻게 사용하는가 하는 것이다 (눅 21:1-4)", "여호와께서는 우리 각자의 상황과 한계를 알고 계신다 (시 103:14)", "봉사를 확장하거나 회중에서 더 많은 책임을 맡을 기회가 주어진다면, 다른 사람들에게 유익을 주고 여호와께 영광을 돌리기 위해 그러한 기회를 잘 활용하라", "자신이 가진 능력이나 특권에 대해 부당한 자부심을 갖거나 자신의 영광을 구하는 일이 결코 없도록 조심하라 (잠 16:18; 25:27)", "자신을 내세우지 말고 직책에 연연하지 말라 (마 23:10-12)"]}, {"title": "하느님께 영광을 돌리면 축복을 받는다", "points": ["하느님께 영광을 돌리기 위해 노력하면 좋은 결과가 따른다", "당신은 “드높이 찬양받으실 분”께 영광을 돌리는 데서 오는 만족감을 얻게 될 것이다 (시 145:3)", "그렇게 할 때 여호와께서는 당신에게 가까이 오시고 당신을 영광스럽게 해 주실 것이다 (시 73:23, 24; 138:6; 「파13」 2/15 25-26면 2-5항)", "당신은 영원히 살면서 여호와께 영광을 돌릴 전망을 갖게 될 것이다 (시 86:12)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 17-KO 4/18\t 30분에 다룰 것"]}]}, {"no": 18, "title": "여호와를 당신의 산성으로 삼으십시오", "t": 0, "note": "여호와를 우리의 산성으로 삼는 것이 생활의 모든 부면과 관련이 있다는 점을 설명한다. 지금 하느님의 인도에 순응하고 그분을 온전히 신뢰한다면 그분의 은혜를 누리고 큰 환난 때 생존할 전망을 갖게 된다", "sections": [{"title": "미래에 생존하려면 여호와를 우리의 산성으로 삼아야 한다", "points": ["성경은 앞으로 “큰 환난”이 닥칠 것이라고 예언한다 (마 24:21)", "큰 환난은 거짓 종교의 멸망으로 시작될 것이다 (「파15」 7/15 15면 4항)", "나라들의 연합체가 하느님의 백성을 없애려고 시도할 것이다 (「파15」 5/15 29-30면)", "여호와 하느님을 대적하는 모든 사람이 멸망될 것이다 (계 19:11-21)", "이처럼 두려움을 불러일으키는 일들이 벌어질 때 누가 생존할 것인가?", "합당한 대상을 산성으로 삼는 사람들만 생존할 것이다", "산성이란 방어 시설이 갖추어진 곳으로서 안전 또는 생존의 장소이다", "큰 환난 때 대부분의 사람은 인간 조직들이 자신을 보호해 주기를 바랄 것이다 (계 6:15-17; 「파15」 7/15 16면 7항)", "여호와께 “도피하는” 사람들만 생존할 것이다 [나훔 1:6, 7 낭독]", "미래에 여호와께서 우리의 산성이 되어 주시기를 원한다면 지금 그분을 우리의 산성으로 삼아야 한다"]}, {"title": "여호와의 승인을 얻기 위해 노력하라", "points": ["여호와의 승인을 얻으려면 생활의 모든 부면에서 그분의 인도에 기꺼이 순응해야 한다 (잠 3:5, 6)", "자신의 생각에 의지하거나 세상에 만연한 태도를 따라서는 안 된다 (잠 14:12)", "하느님의 도덕법과 원칙을 옹호하라", "하느님의 은혜를 누리려면 도덕적으로 올바르게 살아야 한다 [잠언 10:29 낭독]", "여호와를 산성으로 삼는 사람은 “성적 부도덕”과 “해로운 욕망”을 멀리한다 (골 3:5)", "결혼하지 않은 그리스도인들은 데이트를 단지 재미 삼아 하는 것으로 생각하지 않는다 (「묻2」 14-20면)", "데이트를 한다면 더러운 행실을 하지 않도록 주의해야 한다 (살전 4:4-7; 「파15」 1/15 32면 16항)", "결혼한 그리스도인들은 배우자가 아닌 사람에게 관심 있는 척 행동하거나 부적절한 관계를 발전시켜서는 안 된다", "물질을 하느님과의 관계보다 앞자리에 두어서는 안 된다", "일부 사람들은 물질적인 부가 안전을 보장해 줄 것으로 생각하지만 그러한 견해는 잘못된 것이다 [잠언 18:11 낭독]", "예수께서는 “하느님과 재물을 함께 섬”기는 것이 불가능하다고 말씀하셨다 (마 6:24)", "여호와를 신뢰하는 사람은 사업 계약을 준수하며 부정직한 행동을 하지 않는다 (잠 11:1; 히 13:18)", "하느님의 뜻을 행하는 것을 우선순위로 삼으라", "가정생활이나 쾌락이나 여가 활동에 지나치게 몰두한 나머지 하느님의 뜻을 행하는 것을 소홀히 해서는 안 된다", "우리가 긴박한 시대에 살고 있다는 것을 기억하라 (고전 7:29-31; 「파15」 10/15 20면 7-8항)"]}, {"title": "어려움을 겪을 때 여호와를 의지하라", "points": ["여호와께서는 특히 우리가 시련을 겪을 때 산성이 되어 주실 수 있다 [시편 37:39, 40 낭독]", "심각한 건강 문제를 겪고 있다면 여호와께 지혜와 도움을 청하라", "바울과 디모데도 하느님을 충성스럽게 섬겼지만 질병과 건강 문제를 겪었다 (갈 4:12-15; 딤전 5:23)", "하느님께서는 바울과 디모데를 기적으로 치료해 주지는 않으셨지만 그들이 계속해서 그분을 섬길 수 있도록 도와주셨다 (빌 4:13)", "동료 그리스도인과의 갈등으로 인해 어려움을 겪고 있다면 겸손하게 여호와의 인도를 구하라", "평화를 이루는 방식으로 상황에 대처하라 (골 3:13; 「랑」 33-34면 16-18항)", "반대나 박해를 받고 있다면 하느님께서 당신을 강하게 하고 구출해 주실 것임을 확신하라", "당신이 도와 달라고 부르짖을 때 여호와께서 귀 기울이실 것임을 믿으라 (시 18:2, 6)", "그 어떤 반대자도 여호와께서 자신을 신뢰하는 자들을 구출하시는 것을 막을 수 없다 (시 18:16-19)"]}, {"title": "여호와께서는 자신을 산성으로 삼는 사람들에게 충성을 보이실 것이다", "points": ["여호와께서는 지금도 우리에게 매일 필요한 것들을 공급해 주실 수 있으며, 우리에게 영원한 생명을 주실 것을 약속하신다", "하느님께서는 사망할 때까지 충실을 지킨 자들을 부활시키심으로 그들에게 충성을 보이실 것이다 (행 24:15, 16)", "지금 여호와를 실제로 우리의 산성으로 삼는다면 영원히 기뻐할 수 있을 것이다 (시 5:11, 12)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 18-KO 4/18\t 30분에 다룰 것"]}]}, {"no": 19, "title": "당신의 미래—어떻게 알 수 있는가?", "t": 6, "note": "", "sections": [{"title": "미래를 알면 큰 유익이 있다", "points": ["대부분의 사람은 미래에 있을 일에 대해 관심이 많다", "[일기 예보나 경제 동향 등에 관심을 갖는 것과 같은 몇 가지 예를 간단히 언급한다]", "미래에 있을 일을 확실히 알 수 있다면 지금 우리가 삶을 사는 방식은 크게 달라질 것이다", "미래에 대해 알게 되었다 해도 그러한 지식을 통해 유익을 얻으려면 그에 맞게 자신의 결정을 기꺼이 조정해야 한다"]}, {"title": "여호와 하느님께서 미래를 밝혀 주시다", "points": ["하느님께서는 자신의 영감받은 말씀인 성경을 통해 미래에 대해 정확한 정보를 알려 주신다 [이사야 42:9 낭독]", "다니엘 2장에는 우리의 미래와 관련된 흥미진진한 예언이 나온다", "이 예언은 약 2600년 전, 바빌론이 주도적인 세계 강국이었을 때 주어졌다 (단 2:1-13)", "이 예언의 성취는 과거 하느님의 종들에게 큰 영향을 미쳤으며 앞으로도 계속 그러할 것이다", "느부갓네살왕은 꿈에서 한 거대한 형상을 보았는데 그것은 산산조각이 나고 말았다 (단 2:31-35)", "하느님께서는 다니엘에게 예언적 의미가 담긴 그 꿈의 의미를 밝혀 주셨다 (단 2:14-30)", "다니엘은 왕이 꾼 꿈이 차례로 등장하는 세계 강국들에 관한 것이라고 설명했다 [시각 자료 1]", "다니엘은 바빌론 제국을 대표하는 느부갓네살이 “금으로 된 머리”라고 밝혀 주었다 (단 2:36-38)", "메디아-페르시아 제국이 은으로 된 가슴과 팔 부분임이 드러났다 (단 2:39ㄱ)", "기원전 539년에 메디아-페르시아 제국이 바빌론을 정복했다", "구리로 된 배와 넓적다리인 그리스에 대한 다니엘의 해석도 정확하게 성취되었다 (단 2:39ㄴ)", "“첫 번째 왕”인 알렉산더 대왕의 뒤를 이어 네 명의 장군이 통치했다 (단 8:20-22)", "형상의 철로 된 다리로 묘사된 네 번째 왕국은 로마 제국임이 드러났다 (단 2:40)", "철과 같은 로마는 유대인들의 반란을 진압하고 기원 70년에 예루살렘을 무너뜨렸다", "철과 진흙이 섞여 있는 발은 영미 세계 강국을 의미한다 (단 2:41-43; 「파12」 6/15 16면 9항)", "영미 세계 강국은 로마 제국 내에서 성장해 나와 제1차 세계 대전 때 연합된 세계 강국으로 활동하기 시작했다 (「파12」 6/15 15면 5항, 각주)", "이 예언적인 꿈의 이 부분이 지금 성취되고 있다"]}, {"title": "하느님의 왕국이 홀로 영원히 서 있을 것이다", "points": ["느부갓네살이 꾼 꿈의 마지막 부분은 가까운 장래에 있을 일을 보여 준다", "이 꿈은 산에서 돌 하나가 잘려 나와 형상을 부서뜨리는 것으로 끝이 난다 [다니엘 2:44, 45 낭독]", "“산”은 하느님의 우주 주권을 상징한다. “돌”은 메시아 왕국이다", "하느님의 왕국은 꿈에 나온 형상이 상징하는 왕국들을 부서뜨릴 것이다 (「파12」 6/15 17면 네모)", "요한 계시록에서는 하느님의 왕국이 모든 인간 정부를 없앨 것이라고 알려 준다 (계 16:14; 17:12-14)", "다니엘 2장의 예언 가운데 상당 부분이 이미 성취되었다는 사실은 나머지 부분도 조만간 성취될 것이라는 확신을 갖게 해 준다"]}, {"title": "미래에 대한 하느님의 약속에 믿음을 나타내라", "points": ["하느님의 왕국의 통치를 받으며 사는 삶은 매우 행복할 것이다", "완벽한 법에 의해 인류가 평화 가운데 연합될 것이다", "식량 부족이나 영양실조가 사라지고 풍부한 양식이 있을 것이다 (시 72:7, 8, 16)", "모두가 완전한 건강을 누릴 것이다 (사 33:24)", "죽음도 사라질 것이다 (요 5:28, 29; 계 21:3, 4)", "지금이야말로 하느님의 왕국을 믿고 지지하고 있음을 행동으로 나타내야 할 때이다 (마 7:24-27)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 19  6/20"]}]}, {"no": 20, "title": "지금은 하느님께서 세상을 통치하실 때인가?", "t": 0, "note": "하느님의 왕국이 1914년에 설립되었다는 성경적인 증거를 분명히 제시하고, 왕국이 가까운 장래에 어떤 일을 할 것인지 설명한다", "sections": [{"title": "인류는 더 나은 통치를 필요로 한다", "points": ["인간 정부들은 왜 국민의 필요를 충족시키지 못하는가? (잠 29:2)", "인간에게는 스스로 다스릴 권리가 없고 성공적으로 그렇게 할 능력도 없다 (렘 10:23)", "그렇게 하려는 인간의 노력은 수많은 불공정과 고통을 초래했다 (전 8:9, 11)", "성경은 머지않아 하느님의 왕국이 인간 통치권을 대치할 것이라고 예언한다 (단 2:44; 7:13, 14)", "하느님의 왕국은 언제 통치하기 시작했으며, 언제 온 땅을 다스릴 것인가?"]}, {"title": "다니엘 4장—통치권과 관련이 있는 예언적인 꿈", "points": ["여호와께서는 느부갓네살왕이 한 가지 꿈을 꾸게 하셨는데, 그 꿈은 통치권과 관련이 있었다 (단 4:10-17)", "하느님께서는 다니엘에게 영감을 주셔서 그 꿈을 해석하게 하셨다 [다니엘 4:20-27의 주요 부분들을 낭독한다]", "그 꿈은 느부갓네살 자신에게 1차적으로 성취되었다 (단 4:28-37; 「단」 82-94면)", "그 꿈은 누가 인류를 다스릴지 결정할 권리가 여호와 하느님에게 있음을 강조한다"]}, {"title": "느부갓네살이 꾼 꿈은 하느님의 왕국의 통치에 관해 알려 준다", "points": ["이 예언은 하느님의 왕국의 설립과 관련하여 더 크게 성취된다 (「통」-1 300-303면)", "그 꿈이 느부갓네살이 당한 굴욕에 관한 흥미로운 이야기에 불과한 것이 아니라고 말할 수 있는 어떤 이유들이 있는가?", "(1) 이 꿈이 주어진 시기는 하느님께서 그분의 지상 왕국이 정복되도록 허용하시고 나서 얼마 지나지 않은 때였다", "(2) 이 꿈을 꾼 사람은 하느님께서 예루살렘의 통치권에 끝을 가져오기 위해 사용하신 바로 그 사람이었다", "(3) 이 꿈의 주제는 “인간 왕국” 전체를 다스릴 권리가 하느님에게 있다는 것이다 (단 4:17, 25, 32)", "(4) 이 꿈의 문맥이 되는 다니엘서는 반복해서 하느님의 왕국의 통치에 주의를 이끈다", "(5) 다니엘의 예언들은 “마지막 때”가 되어야 온전히 이해될 것이었다 (단 12:4, 8, 9)", "이 꿈의 더 큰 성취에서 나무는 여호와의 통치권을 상징한다", "한동안 여호와의 통치권은 예루살렘에서 통치한 이스라엘 왕들에 의해 대표되었다 (대상 29:23)", "여호와께서는 다윗에게 그의 후손 중 한 명이 영원히 통치할 것이라고 약속하셨다 (삼하 7:16)", "에스겔은 하느님의 통치권을 대표하는 지상의 왕권이 끊어질 것이며 나중에 하느님께서 새로운 통치자를 임명하실 것이라고 예언했다 [에스겔 21:26, 27 낭독]", "기원전 607년에 여호와께서는 느부갓네살을 사용하여 예루살렘을 멸망시키셨다. 이 일은 하느님의 통치권이 중단되는 기간인 “일곱 때”의 시작점이 되었다 (단 4:16)", "이 기간은 얼마나 지속될 것이었는가?", "[누가복음 21:24 낭독] 예수께서는 하느님의 통치권을 대표하는 예루살렘이 “나라들의 정해진 때”가 차기까지 “짓밟힐 것”이라고 말씀하셨다 (「파06」 7/15 6면 1-4항)", "“나라들의 정해진 때”는 다니엘 4장에 나오는 “일곱 때”와 동일한 기간이다", "예수의 말씀을 보면 그분이 지상에서 봉사하실 때에도 “나라들의 정해진 때”가 계속되고 있었음을 알 수 있다. 따라서 “일곱 때”는 기원전 607년에 시작된 문자적인 7년이 아니다", "“일곱 때” 즉 성경상의 일곱 해는 2520일에 해당한다 (「파06」 7/15 7면 1-2항)", "“하루를 1년으로”라는 규칙에 따라 기원전 607년부터 2520년을 계산하면 기원 1914년이 된다 (민 14:34; 겔 4:6)", "1914년에 예수께서는 하느님의 왕국의 임명된 왕으로서 하늘에서 통치하기 시작하셨다", "다윗왕의 후손으로서 예수께서는 통치할 “법적 권리를 가진 자”이시다 (겔 21:27; 눅 1:32, 33)"]}, {"title": "하느님의 왕국은 머지않아 온 땅을 다스릴 것이다", "points": ["1914년 이래로 벌어진 일들은 하느님의 왕국이 설립되었음을 분명히 증명한다 (마 24:3, 7-14; 「파15」 6/15 22-24면 12-14항)", "예수께서는 지금 “적들 가운데서” 통치하고 계시며, 머지않아 “온전한 승리”를 거두실 것이다 (시 110:2; 계 6:2)", "하느님의 왕국에 의한 통치는 순종하는 인류에게 축복을 가져다줄 것이다 (「파14」 10/1 5-7면)", "바로 지금 우리는 하느님의 왕국을 지지하는 편에 서야 한다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 20-KO 7/18\t 30분에 다룰 것"]}]}, {"no": 21, "title": "왕국 마련 안에서 자신의 위치를 소중히 여기십시오", "t": 7, "note": "왕국이 이루고 있는 일과 왕국 안에서 우리의 영예로운 위치에 대해 청중이 더 깊은 인식을 갖도록 돕는다. 새로운 사람들이 왕국 시민으로서 자격을 갖추어 곧 오게 될 축복을 누리도록 격려한다", "sections": [{"title": "하느님의 왕국은 지금 통치하고 있다", "points": ["하느님의 왕국이란 무엇인가?", "하느님의 왕국은 하늘에 있는 정부로서, 다른 모든 정부를 대치하고 하느님의 뜻이 하늘과 땅에서 이루어지게 할 정부이다\n(단 2:44; 마 6:9, 10; 「파12」 6/15 17면 네모; 「국」 26-27면)", "성경 예언과 세상 상태를 보면 왕국이 1914년에 하늘에서 설립되었음을 알게 된다 (계 11:15)", "여호와의 증인은 그렇게 말할 수 있는 성경적인 증거를 기꺼이 알려 줄 것이다 (「실쉬」 217-220면)", "하늘 왕국은 땅에 있는 국민들의 영적·신체적 필요를 잘 돌봄으로 인간 정부들보다 훨씬 더 뛰어나다는 것을 이미 증명해 왔다 [재해 구호 활동에 관한 사례를 간단히 언급한다 (「국」 211, 218-219면 네모들)]"]}, {"title": "왕과 공동 통치자들", "points": ["그리스도 예수께서 왕이자 심판관으로 임명되셨다 [이사야 9:6, 7 낭독] (요 5:22)", "불완전한 인간 통치자와 재판관들과는 달리 그분은 결코 부패하지 않으신다 (사 11:1-3)", "예수께서는 14만 4000명의 공동 통치자와 함께 일하실 것이다 [요한 계시록 14:1 낭독]", "땅에 있는 동안 기름부음받은 남은 자들은 사람들이 하느님의 승인을 얻도록 돕는 일을 한다 (고후 5:20)", "하늘 생명으로 부활된 후에 그들은 왕 겸 제사장으로 일할 것이다 (계 20:6)", "기름부음받은 그리스도인들은 왕국 마련 안에서 자신의 위치를 소중히 여긴다 (빌 3:14)"]}, {"title": "왕국의 충성스러운 국민들", "points": ["하느님의 왕국은 지상에 국민을 둘 것이다. 국민 가운데는 하느님의 왕국을 반대하는 모든 사람이 멸망될 때 살아남는 사람들이 포함될 것이다 (계 7:9, 13, 14)", "예수께서 말씀하신 양과 염소의 비유를 살펴보면 우리가 생존하기 위해 어떻게 해야 하는지 이해할 수 있다 [마태복음 25:31-33 낭독] (「파15」 3/15 26-27면 6-7항)", "양 같은 사람들은 그리스도의 형제들인 기름부음받은 자들을 충성스럽게 지원한다 [마태복음 25:34-40 낭독]", "세계적인 전파 활동에서 기름부음받은 자들을 지원하려면 그 활동에 열심히 참여해야 한다 (마 28:19, 20; 「파15」 3/15 27-29면 11-15항)", "왕국 시민이 될 기회를 소중히 여기라 (빌 1:27, 각주; 「파12」 8/15 11-13면 1-6항)", "왕국의 언어를 배우고, 역사를 연구하고, 법에 대해 알아야 한다", "집회와 크고 작은 대회들에 정기적으로 참석하라", "배우는 내용을 적용함으로 왕국의 의로운 표준을 밀접히 따르라 (습 2:3; 「국」 110-112면 4-13항)"]}, {"title": "왕국 축복은 영원히 계속될 것이다", "points": ["이 마지막 날에 “왕국의 좋은 소식”이 전파되고 있다 (마 24:14)", "머지않아 땅에 사는 모든 사람이 왕국 통치 아래 연합될 것이다", "하느님의 교육을 통해 지금도 땅에 있는 수많은 왕국 국민들이 연합을 누리고 있다 (사 2:2-4; 고전 1:10)", "부활되는 사람들은 왕국의 국민이 될 기회를 갖게 될 것이다 (요 5:28, 29; 행 24:15)", "지금 하느님의 왕국의 편에 서라", "그렇게 한다면 틀림없이 영원한 축복을 누리게 될 것이다 (계 21:1-4; 「계」 301-303면 1-5항)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 21-KO 4/18\t 30분에 다룰 것"]}]}, {"no": 22, "title": "당신은 여호와의 마련을 통해 유익을 얻고 있는가?", "t": 0, "note": "우리를 영적으로 먹이기 위한 여호와의 마련이 얼마나 소중한지 청중이 인식하도록 돕는다. 관심을 가진 새로운 사람들이 모든 영적 마련을 최대한 활용하도록 격려한다", "sections": [{"title": "극명하게 대비되는 영적 풍요와 영적 굶주림", "points": ["여호와 하느님께서는 진리를 알고 그분의 승인을 얻고자 하는 모든 사람에게 필요한 것을 풍부히 마련해 주신다", "성경에서는 그러한 마련들 중 일부를 “음식”으로 묘사하는데, 그것들이 우리에게 영적 자양분을 공급해 주기 때문이다 (히 5:14)", "성경은 우리 시대에 여호와의 백성이 영적 풍요를 누릴 것이라고 예언한다 (사 2:2, 3; 25:6)", "한편 그 밖의 사람들은 영적 굶주림에 시달리고 있다 [이사야 65:13, 14 낭독] (암 8:11)"]}, {"title": "여호와께서는 어떻게 자신의 백성에게 필요한 것을 마련해 주시는가?", "points": ["영적 양식을 잘 공급받기 위해서는 오늘날 여호와께서 사용하고 계신 통로를 분별해야 한다", "여호와께서는 예수 그리스도를 그리스도인 회중의 머리로 임명하셨다 (마 28:18; 요 6:26, 27; 골 1:18)", "예수께서는 영적 ‘양식을 제때에’ 나누어 주도록 “충실하고 슬기로운 종”을 임명하셨다 [마태복음 24:45-47 낭독] (「파13」 7/15 20-22면 2, 8-10항)"]}, {"title": "여호와께서는 어떤 것들을 마련해 주셨는가?", "points": ["하느님의 말씀은 그분이 우리에게 마련해 주신 탁월한 것들 중 하나이다 (시 119:105; 요 17:17; 딤후 3:16)", "성경은 현 세상의 상태를 설명해 주며 미래에 어떤 일이 있을 것인지 밝혀 준다 (딤후 3:1; 계 1:1)", "하느님의 말씀은 우리에게 “새 인간성을 입”는 방법을 가르쳐 준다 (엡 4:23, 24; 히 4:12)", "성령은 우리가 하느님의 말씀을 이해하고 의로운 열매를 맺을 수 있게 도와준다 (갈 5:16, 22-25)", "충성스러운 장로들은 우리를 교훈하고 도와준다 (엡 4:8, 11, 12)", "충실하고 슬기로운 종에 속한 성원들은 하느님의 말씀과 영의 인도를 따라 우리에게 필요한 것들을 더 마련해 준다", "성경에 근거한 출판물들을 마련해 수백 개의 언어로 번역한다", "jw.org와 JW 방송을 통해 영적인 교훈을 베푼다", "집회와 크고 작은 대회는 우리가 정기적으로 교훈을 받고 격려적인 교제를 나눌 기회를 갖게 해 준다 (히 10:24, 25)", "여행하는 감독자들이 회중들을 방문해 힘을 불어넣어 준다 (롬 1:11, 12)"]}, {"title": "여호와의 마련들에 대해 감사함을 나타내라", "points": ["여호와께서 마련해 주시는 모든 것을 온전히 활용하라", "영적 마련들을 이용하기 위해 필요하다면 기꺼이 조정하고 희생하라 (마 13:44-46)", "이스라엘 백성은 순결한 숭배를 드리러 모이기 위해 노력을 기울여야 했다", "여호와께서는 영적인 일을 첫째 자리에 두기 위해 힘쓰는 사람들을 돕고 축복하겠다고 약속하셨다 (출 34:24; 「파98」 9/1 20면 5항)", "예수를 본받아 영적인 것을 물질적인 것보다 앞자리에 두라 (요 4:31-34)", "매일 여호와의 영적인 마련들을 통해 자양분을 얻으라 (수 1:8; 시 119:97)", "여호와의 마련들에 대해 비평적인 태도를 피하라", "성경에는 불평하는 태도를 나타낸 사람들에 관한 경고의 본이 기록되어 있다 (민 21:5, 6; 요3 9; 「파99」 8/15 26면)", "여호와께서는 불완전한 남자들을 사용해 우리에게 영적 도움을 베푸신다. 불완전하기는 하지만 그들은 우리의 존중을 받아 마땅하다 (살전 5:12, 13; 히 13:17)"]}, {"title": "오직 여호와의 식탁에서만 먹으라", "points": ["여호와께서는 서로 다른 교리들을 가르치는 여러 조직을 통해 영적 양식을 공급하지 않으신다 (엡 4:4, 5)", "우리는 결코 여호와의 식탁에서 먹으면서 동시에 거짓 숭배에 참여할 수 없다 (고전 10:21)", "거짓 종교는 영적 양식을 공급하는 데 실패해 왔다 (딤후 4:3, 4)", "자신을 섬기는 사람들의 필요를 만족시켜 주시는 분인 여호와를 바라보는 사람들 곁에 계속 머무르라 (시 145:15-18)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 22-KO 4/18\t 30분에 다룰 것"]}]}, {"no": 23, "title": "우리의 삶에는 분명 목적이 있다", "t": 9, "note": "창조주의 존재를 의심하는 사람들에게 목적을 가진 설계자가 있다는 증거를 제시하면서 그 증거를 토대로 추리하도록 돕는다. 청중이 하느님의 목적과 일치하게 살도록 격려한다", "sections": [{"title": "우리는 삶에 목적이 있는지 알기를 원한다", "points": ["우주의 광활함과 나이에 비할 때 우리의 삶은 너무 미소해 보일 수 있다 (「파15」 6/1 5면; 「파14」 5/15 21-22면 3항)", "성경 필자인 다윗도 비슷한 생각을 했다 (시 8:3, 4)", "생명의 경이로움에 대해 생각할 때 우리는 자연히 삶에 과연 목적이 있는지 알고 싶은 마음이 든다", "우리는 왜 존재하는가? 우리의 삶이 과연 의미가 있는가?"]}, {"title": "땅에 대한 하느님의 목적은 무엇인가?", "points": ["우리는 그저 우연에 의해 존재하게 된 것이 아니다. 우리를 지으신 창조주가 계신다 [이사야 40:26, 28 낭독]", "여호와 하느님이 만드신 창조물을 살펴보면 그분이 창조물을 목적을 가지고 설계하셨다는 증거를 보게 된다", "태양계와 지구는 생명체가 살아가는 데 꼭 알맞은 위치에 있다 (「명」 4-7면)", "지구에 있는 자연계의 순환은 환경을 계속 좋은 상태로 유지시킬 수 있도록 설계되어 있다 (「명」 8-9면)", "여호와께서는 땅을 인류가 영원히 거주할 아름다운 집으로 창조하셨다 [이사야 45:18 낭독] (시 115:16)", "하느님은 땅이 사람이나 자연재해에 의해 파괴되도록 내버려 두지 않으실 것이다 (시 104:5; 「깨」 14/12 15면)"]}, {"title": "인류에 대한 하느님의 목적은 무엇인가?", "points": ["사람의 몸에서 볼 수 있는 놀라운 설계는 하느님이 목적을 가지고 사람을 창조하셨음을 알려 준다 (「깨」 10/2 23-25면)", "동물과 달리 사람에게는 창조주를 알고 숭배할 수 있는 능력이 있다", "사람은 하느님의 형상대로 창조되었으며, 그 때문에 독특한 특성들을 지니고 있다 [창세기 1:27 낭독] (「깨」 13/5 15면)", "하느님의 목적은 사람이 땅에서 영원히 사는 것이었다 (「파06」 2/15 16면 3항)", "여호와께서는 첫 인간 부부를 아름다운 낙원인 에덴동산에 두셨다. 그분은 그들에게 땅을 돌보고, 자손들로 땅을 가득 채우고, 낙원을 넓혀 나가라는 임무를 주셨다 [창세기 1:28 낭독]", "여호와께서는 아담과 하와가 그분과 사랑 넘친 개인적 관계를 누릴 수 있게 하셨다 (「파01」 7/1 7면 1항)", "아담과 하와는 하느님께 순종하기로 선택하는 한 영원히 살 수 있는 전망을 가지고 있었다 (창 2:15-17)", "그러면 왜 지금 땅은 낙원이 아닌가?", "하느님께서는 사람에게 자유 의지라는 선물을 주셨는데 아담과 하와는 그 선물을 잘못 사용했다 (창 3:6)", "아담은 하느님에 대한 사랑을 길러 나가지 못했다 (「파08」 10/1 27면)", "불순종했기 때문에 아담과 하와는 에덴에서 쫓겨났고 결국 죽게 되었다 (창 3:23; 5:5)", "아담의 모든 후손은 불완전성과 죽음을 물려받았다 (롬 5:12)", "전능하시고 거짓말하실 수 없는 하느님께서는 자신의 목적이 결코 실패하지 않는다는 사실을 자신이 창조한 자연계의 순환에 빗대어 분명히 밝히셨다 [이사야 55:10, 11 낭독]", "머지않아 그분은 악을 없애고 땅과 순종하는 인류를 원래 상태로 회복시키실 것이다 (시 37:10, 11, 29; 계 21:3, 4)", "하느님은 “땅을 파멸시키는 자들을 멸망시키실” 것이다 (계 11:18)"]}, {"title": "하느님의 목적은 우리가 의미 있는 삶을 살게 해 줄 수 있다", "points": ["사람들은 삶의 의미를 찾기 위해 다방면으로 노력을 기울인다", "쾌락이나 돈이나 명예를 추구하는 사람들은 흔히 실망하게 된다 (전 2:1-11)", "여호와 하느님의 목적과 일치한 삶을 살기로 선택할 때 진정 우리의 삶은 목적을 갖게 된다", "아담의 후손이지만 우리는 하느님과 좋은 관계를 누릴 수 있다 (약 2:23; 4:8)", "하느님께 순종하고 그분의 뜻을 행함으로 자유 의지를 지혜롭게 사용하기로 선택하라 [전도서 12:13 낭독]", "그렇게 한다면 의미 있고 만족스러운 삶을 살게 될 것이다 (「파11」 11/1 21면)", "하느님께서 처음에 땅과 인류에 대해 가지셨던 목적을 이루실 때, 우리는 목적 있는 삶을 영원히 누리게 될 것이다 (시 37:34)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 23-KO 6/18\t 30분에 다룰 것", ""]}]}, {"no": 24, "title": "당신은 “값진 진주”를 발견했는가?", "t": 9, "note": "", "sections": [{"title": "인류가 겪는 문제들의 해결책을 찾으려는 노력", "points": ["오늘날 세상은 문제와 고통으로 가득하다", "사람들은 해결책을 찾기 위해 상당한 노력을 기울이지만 많은 경우 문제를 완전히 해결하지는 못한다", "예수께서는 인류가 겪는 문제들의 진정한 해결책은 하느님의 왕국이라고 가르치셨다", "그분은 두 가지 비유를 사용해 하느님의 왕국에 관한 진리가 얼마나 가치 있는지 보여 주셨다 [마태복음 13:44-46 낭독] (「파14」 12/15 10면 16-18항)", "첫 번째 비유에서는 밭에서 일하던 사람이 숨겨진 보물을 우연히 발견했다 [시각 자료 1]", "두 번째 비유에서는 여행하는 상인이 좋은 진주를 찾기 위해 열심히 노력했다 [시각 자료 2]", "두 사람 모두 더 가치 있는 것을 얻기 위해 희생을 치렀다", "예수의 비유는 우리가 왕국에 관한 진리에 어떤 반응을 보일 것인지 생각해 보게 한다"]}, {"title": "“하늘 왕국”이란 무엇인가?", "points": ["하느님의 왕국은 예수의 가르침의 핵심이었다 (눅 8:1)", "왕국은 하느님이 하늘에 세우신 정부로서 모든 인간 정부를 대체할 것이다 (단 2:44)", "여호와께서는 예수 그리스도를 그 왕국의 통치자로 임명하셨다 (계 11:15)", "하느님께서는 모든 사람에게 왕국의 백성이 되어 왕국이 인류에게 가져올 축복을 누릴 기회를 주신다 (행 10:34, 35)"]}, {"title": "왕국 진리가 그토록 가치 있는 이유는 무엇인가?", "points": ["하느님께서는 왕국을 사용해 땅과 인류에 대한 자신의 뜻을 이루실 것이다 (마 6:10)", "예수께서는 기적들을 행하심으로, 왕국이 앞으로 할 일들을 보여 주셨다", "그분은 폭풍을 잠잠하게 하심으로, 앞으로 왕국이 자연의 힘을 제어하여 자연과 관련된 문제들을 해결할 것임을 보여 주셨다 (막 4:37-39) [시각 자료 3]", "그분은 기적을 통해 수천 명이 훨씬 넘는 사람들에게 식품을 공급하심으로, 앞으로 왕국이 굶주림을 없앨 것임을 보여 주셨다 (마 14:19-21) [시각 자료 4]", "그분은 사람들의 병을 고쳐 주심으로, 앞으로 왕국이 모든 사람들의 건강을 완전히 회복시켜 줄 것임을 보여 주셨다 (마 9:35) [시각 자료 5]", "그분은 죽은 사람을 부활시키심으로, 앞으로 왕국이 죽음이 가져온 비극적인 결과를 되돌려 놓을 것임을 보여 주셨다 (눅 7:12-15) [시각 자료 6]", "예수께서는 우리가 왕국의 통치를 받으며 영원히 살 수 있는 방법을 가르쳐 주셨다 (요 3:16)"]}, {"title": "왕국 진리를 어떻게 살 수 있는가?", "points": ["예수의 비유에 나오는 사람들은 자신이 발견한 보물을 얻기 위해 자신이 가진 모든 것을 팔았다", "여러분은 자신의 삶에서 왕국을 최우선순위에 둠으로 왕국에 관한 진리를 가치 있게 여긴다는 것을 나타낼 수 있다 (마 6:33)", "하느님과 그분의 왕국에 관해 배울 시간을 따로 떼어 놓으라 (엡 5:15, 16)", "이 일을 돈을 벌거나 교육을 받거나 직업을 구하는 일보다 앞자리에 두라 (마 6:24; 눅 9:62)", "성경에서 배운 내용을 생활에서 실천하라 (요 13:17)", "왕국이 가져올 축복을 누리지 못하게 만드는 행실을 멀리하라 (갈 5:19-21)", "가족이나 친구들이 여러분의 결정을 좋아하지 않더라도 하느님의 왕국을 지지하라 (마 10:36, 37)", "하느님의 왕국이 가져다줄 축복은 여러분이 치르는 그 어떤 희생보다 더 큰 가치가 있다 [누가복음 18:29, 30 낭독]"]}, {"title": "당신은 “값진 진주”를 살 것인가?", "points": ["예수의 비유에 나오는 사람들은 자신들이 발견한 보물을 신속하게 샀으며 기쁜 마음으로 그렇게 했다 (마 13:44, 46)", "그 사람들처럼 여러분도 보물을 얻기 위해 치르는 희생이 아니라 보물의 가치에 초점을 맞추라", "성경 시대에 많은 사람들은 왕국 진리를 가치 있게 여겼기 때문에 필요한 변화를 했다", "삭개오는 부정직한 행동을 중단하고 가난한 사람들에게 재산을 기부했다 (눅 19:2, 5-8)", "사도 바울은 출세할 수 있는 기회를 포기했고 어려서부터 믿어 온 종교를 떠났다 (갈 1:14; 빌 3:8)", "오늘날 많은 사람들도 왕국을 첫째로 구하면서 기쁨을 얻고 있다", "[청중에게 3분짜리 동영상을 보여 준다. 동영상에는 예수의 비유에 나오는 두 사람처럼 행동한 사람들의 이야기가 나온다. 동영상을 시청한 후, 진리를 찾고 얻게 된 기쁨이 어떻게 그들이 치른 희생보다 더 컸는지 간단히 강조한다]", "예수께서는 여러분에게 자신의 제자가 되라고 따뜻하게 권하신다 (마 11:28-30)", "지금도 그분의 제자가 될 수 있는 기회가 열려 있지만 그러한 기회는 무한정 남아 있지 않을 것이다 (고후 6:2)", "여러분이 “값진 진주”를 산다면 결코 실망하는 일이 없을 것이다 (롬 10:11)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 24  6/20"]}]}, {"no": 25, "title": "세상의 영을 물리치십시오!", "t": 9, "note": "", "sections": [{"title": "“세상의 영”이란 무엇인가?", "points": ["오늘날 이기적이고 교만하고 반항적인 태도를 보이는 사람들이 이토록 많은 이유는 무엇인가?", "인간 사회는 보이지 않는 강력한 힘의 영향을 받고 있는데, 그 힘은 바로 “세상의 영”이다 [고린도 전서 2:12 낭독]", "세상의 영이란 사탄이 부추기는 사고방식과 행동을 가리킨다 [에베소서 2:2 낭독] (「랑쉬」 63-64면 7-8항)\n[시각 자료 1]", "세상의 영은 사탄의 교만하고 이기적인 특성을 반영한다", "그 영은 사람들이 하느님으로부터 독립하도록 부추기고 이기적으로 행동하게 만든다 (「파12」 10/15 13면 4항)"]}, {"title": "왜 세상의 영을 물리쳐야 하는가?", "points": ["사탄은 여호와의 주권에 도전했으며 인간이 하느님으로부터 독립할 권리를 가지고 있다고 주장했다 (창 3:1-5)", "사탄은 세상의 영을 이용해 사람들이 그의 반역에 가담하도록 유인한다", "사탄이 조장하는 생활 방식은 위험하고 해롭다 (갈 6:7, 8)", "여호와의 인도를 따르면 성공적이고 행복한 삶을 살게 된다 (시 32:8; 34:8)", "“하느님께 가까이 가기”를 원하는 사람은 “세상의 벗”이 되어서는 안 된다 (약 4:4, 8)"]}, {"title": "세상의 영을 물리치는 방법", "points": ["권위에 대해 존중심을 나타낸다", "세상의 영에 영향을 받은 많은 사람들은 권위를 존중하지 않는다", "여호와 하느님과 아들 예수 그리스도는 사랑으로 다스리신다. 그분들의 통치를 받기로 선택하라 (사 33:22;\n엡 4:15)", "여호와께서 정하신 가정과 회중의 머리 직분 마련은 평화와 연합을 증진한다 (고전 11:3; 히 13:17)", "하느님의 법에 어긋나지 않는 한 세속 권위에 순종하라 (행 5:29; 롬 13:1, 2)", "여호와의 도덕 표준에 따라 생활한다", "세상의 영에 영향을 받은 사람들은 옳고 그른 것에 대한 표준을 자신이 정해야 한다고 생각한다 (엡 4:17-19)", "여호와의 표준을 배우고 적용하라. 세상의 영이 부추기는 “육체의 일”을 배척하라 (갈 5:19-21; 골 3:5-10)", "그렇게 하면 신체적으로, 감정적으로 더 건강하고 행복해진다 (시 19:8)", "하느님의 뜻을 행하는 데 초점을 맞춘 단순한 생활을 한다", "사탄은 “눈의 욕망”을 이용해 탐욕을 조장하고 많은 사람들이 하느님을 섬기는 데 집중하지 못하게 만든다 \n(요1 2:15, 16)", "부와 소유물을 추구하지 말라 (마 6:22, 24, 33; 「파11」 5/15 12면 4항)", "여호와께서는 분명히 우리의 물질적 필요를 돌봐 주실 수 있다"]}, {"title": "성령의 인도를 따르라", "points": ["성령은 우리가 세상의 영을 물리치도록 도와줄 수 있다 [갈라디아서 5:16 낭독] (「신세」 1703면, “성령”)", "하느님의 영은 육적인 특성들을 배척할 수 있도록 우리에게 동기를 부여하고 우리를 강화시켜 줄 수 있다\n(고전 6:11; 엡 2:3; 3:16) [시각 자료 2]", "성령을 달라고 하느님께 간절히 기도하라 (눅 11:13)", "하느님의 영이 자신의 생각과 행동을 인도하게 하라 (「파18.02」 25면 12항)", "세상의 영을 조장하는 것은 모두 멀리하라", "자신이 누구와 교제하고 어떤 오락을 즐기는지 자주 살펴보고, 필요하다면 기꺼이 조정하라 (시 101:3;\n잠 13:20)", "하느님의 성령이 자신의 삶에서 그 무엇보다도 강한 힘을 발휘하게 하라", "그렇게 한다면 여호와와 계속 우정을 나누게 될 것이며 사탄의 주장이 거짓임을 증명하는 영예를 누리게 될 것이다 \n(잠 27:11)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 25 10/20"]}]}, {"no": 26, "title": "하느님은 당신을 소중히 여기시는가?", "t": 9, "note": "", "sections": [{"title": "하느님은 사람들에게 관심이 있으신가?", "points": ["우리는 사랑이 없는 냉혹한 세상에 살고 있다", "다른 사람들이 우리에게 무관심한 것처럼 보이면, 우리는 하느님도 그러실 것이라고 생각할지 모른다", "여호와 하느님이 우리에 대해 어떻게 느끼시는지는 사람들이 우리에 대해 느끼는 감정에 영향을 받지 않는다 \n[이사야 55:8, 9 낭독]", "여호와께서 하시는 모든 일의 동기는 사랑이다 (요1 4:8)", "하느님이 인류를 위해 해 주신 일들에는 그분의 사랑이 분명히 나타나 있다 (행 14:16, 17)", "그러한 선한 일들은 인종과 국적과 종교와 개성에 관계없이 모두에게 유익을 준다 (시 145:9)", "그분은 지구를 만드실 때 다양하고 아름다운 것들로 가득 채워 주셨다", "우리의 감각 기관들은 하느님이 주신 선물들을 즐길 수 있게 해 준다 (시 139:14; 약 1:17)", "근본적으로, 우리가 살면서 경험하는 행복한 순간들은 모두 하느님의 사랑 덕분에 가능한 것이다", "사랑에서 우러나와 여호와께서는 불완전한 인간이 자신과 가까운 관계를 누릴 수 있도록 솔선해서 길을 열어 주셨다 [요한 1서 4:9, 10, 19 낭독]", "그분은 모든 인류의 구원을 위해 자신의 아들을 보내심으로 가장 큰 선물을 주셨다 (요 3:16)", "대속이 모든 사람을 위한 마련이기는 하지만 그 선물을 받아들일지는 각자 결정해야 한다"]}, {"title": "하느님은 당신에게도 관심이 있으신가?", "points": ["당신이 여호와의 사랑에 호응하기 위해 행동하면 그분은 당신에게 가까이 오실 것이다 [야고보서 4:8 낭독]", "하느님은 성경과 성령을 통해 당신을 자신에게로 이끄신다 (요 6:44; 「파13」 5/1 14면)", "하느님은 자신에게 기도하라고 권하시며, 당신의 기도를 이해심을 가지고 들어 주신다 (시 65:2; 사 63:9)", "하느님은 당신에게 대속의 가치를 적용해서 당신의 죄를 용서해 주신다 (시 86:5; 갈 2:20)", "여호와께서는 자신에게 가까이 오는 한 사람 한 사람을 매우 소중히 여기신다 (마 10:29-31)", "하느님의 말씀은 그분이 우리 각자에게서 무엇을 눈여겨보시는지 알려 준다 (대상 28:9)", "여호와께서는 우리의 단점이 아니라 장점에 초점을 맞추시며, 우리가 하는 선한 일과 우리의 좋은 특성들을 소중히 여기신다 (히 6:10)", "여호와께서는 자신이 자신의 숭배자들을 얼마나 소중히 여기는지를 그들이 알기 바라신다", "자신이 쓸모없다는 생각은 낙담이 되고 위험할 수 있다 (잠 24:10)", "예언자 다니엘이 기운이 빠졌다고 느꼈을 때 천사는 다니엘이 여호와께 귀중한 사람이라는 점을 일깨워 주었다 (단 10:16-19)", "당신이 여호와를 섬기고 있다면, 당신이 그분께 소중한 사람이라는 사실을 마음 깊이 확신할 수 있다! \n(요1 3:19, 20)"]}, {"title": "지금 하느님께 더 가까이 가기 위해 어떻게 할 수 있는가?", "points": ["사랑 많은 아버지로서 여호와께서 하시는 말씀을 잘 들으라", "그분의 말씀이 담긴 성경을 공부하고 묵상하라. 성경을 읽을 때마다 그 내용이 아버지이신 여호와에 대해 무엇을 알려 주는지 생각해 보라 (요 17:3)", "이렇게 자문해 보라. ‘여호와의 말씀과 행동 하나하나에서 우리의 마음을 끄는 그분의 어떤 특성들을 볼 수 있는가?’", "당신도 여호와를 사랑함으로 그분의 사랑에 호응하라", "성경을 공부하면서 하느님이 당신에게 하라고 하시는 일들을 어떻게 실천할 수 있을지 생각해 보라 \n(약 1:22-25)", "하느님의 특성들을 본받아 그분께 더 가까이 가기 위해 당신은 어떤 노력을 기울일 수 있는가? (엡 5:1)", "하늘에 계신 아버지 여호와에 대한 사랑을 기르기 위해 계속 노력하고 영원토록 그 사랑을 더 강하게 키워 나가기 바란다 (시 16:11)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 26 10/21"]}]}, {"no": 27, "title": "결혼 생활의 행복한 출발", "t": 2, "note": "", "sections": [{"title": "결혼은 하느님이 중요하게 여기시는 서약이다", "points": ["결혼은 여호와 하느님께서 주신 선물로서 남편과 아내 모두에게 큰 기쁨을 줄 수 있다 [창세기 2:23, 24 낭독] \n(창 2:18-22)", "하느님께서는 결혼 마련을 제정하실 때 그것이 존귀하고 영속적인 결합이 되게 하셨다 (막 10:9; 히 13:4; 「랑쉬」 148면 5항)", "여호와께서는 신혼부부들이 튼튼한 결혼 생활을 할 수 있도록 성경을 통해 지혜로운 조언을 베푸신다"]}, {"title": "결혼 생활에 맞춰 기꺼이 자신을 변화시키라", "points": ["결혼을 하고 나면 전에는 몰랐던 배우자의 단점들을 알게 될 수 있다", "참을성을 보이고 신속히 용서하라 [고린도 전서 13:4, 5 낭독] [시각 자료 1]", "배우자의 실수나 잘못이 아니라 좋은 특성에 초점을 맞추라", "자신의 유익보다 배우자의 유익을 앞자리에 두는 법을 배우라 (고전 10:24)", "융통성과 기꺼이 양보하는 태도를 나타내라", "배우자의 성적 필요를 세심히 배려해 주고, 이기적으로 행동하지 말라 (고전 7:3-5; 「파16.08」 15면 7-9항)", "독신 때처럼 살려고 하지 말라. 이제 배우자와 당신은 한 팀이다 (전 4:9, 10; 7:10)", "배우자를 다른 사람과 비교하거나, 배우자가 아닌 사람에게 이성적인 관심을 나타내지 말라 \n(잠 5:15-18)", "이제 부모님이나 가족이나 친구들과의 관계보다 배우자와의 관계를 앞자리에 두어야 한다 (「파11」 10/15 17면 18항; 「파11」 1/15 14면 9항)"]}, {"title": "의사소통을 잘하는 법을 배우라", "points": ["서로의 생각과 감정을 솔직히 이야기하라. 문제가 생길 때에도 그렇게 하라 [에베소서 4:26, 27 낭독] [시각 자료 2]", "문제에 대해 허심탄회하게 대화하면서, 서로의 말을 존중심 있게 잘 들어 주라 (잠 25:11; 약 1:19; 「파13」 5/15 15-16면 4-8항)", "자신이 무엇을 필요로 하고 무엇을 원하는지 지혜롭게 표현하라. 말을 안 해도 배우자가 알아줄 것이라고 생각하지 말라", "의견 차이가 생길 때 사랑을 나타내는 방식으로 해결하라 (골 3:14)", "현실적인 기대를 가지라. 어떤 부부도 항상 의견이 일치할 수는 없다", "성경의 실용적인 조언을 적용하여 평화롭게 의견 차이를 해결하라 (잠 12:18; 26:20)"]}, {"title": "성경 원칙을 적용하여 튼튼한 결혼 생활을 하라", "points": ["성경 원칙에 따라 결혼 생활을 하면 부부 모두가 안정감을 느끼고 여호와께 영예가 돌아간다", "결혼 생활에 항상 여호와께서 함께하시게 하라 [전도서 4:12 낭독] [시각 자료 3]", "정기적으로 함께 성경을 연구하면 부부 사이가 더 가까워질 것이다 (「파08」 3/15 10면 11항)", "매일 함께 기도하라", "여호와의 도움이 있다면 행복한 결혼 생활을 계속해서 즐길 수 있다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 27  1/20"]}]}, {"no": 28, "title": "결혼 생활에서 존중심과 사랑을 나타내십시오", "t": 2, "note": "", "sections": [{"title": "많은 부부들이 결혼 생활에서 존중심과 사랑을 나타내지 않는다", "points": ["성경은 오늘날의 사람들이 “자기를 사랑하고” “비정”할 것이라고 예언했다 (딤후 3:1-3)", "안타깝게도 많은 부부들이 서로를 대할 때 이기적으로 행동한다", "하지만 성경은 남편과 아내에게 결혼 생활에서 존중심과 사랑을 나타내라고 권한다 [에베소서 5:33 낭독]"]}, {"title": "결혼 생활에서 어떻게 존중심을 나타낼 수 있는가?", "points": ["누군가를 존중한다는 것은 그 사람의 좋은 특성 때문에 그를 높이 평가하는 것이다", "존중심이 있는 사람은 다른 사람들을 중요하게 여기고 그들의 감정을 이해하려고 노력한다 \n(「파11」 8/1 10면)", "남편은 존경받는 것을 매우 중요하게 여긴다 (「깨16.6」 8면 4항)", "아내 역시 존중받기를 원한다 (벧전 3:7; 「깨16.6」 8면 5항)", "말로 존중심을 나타내라 [잠언 12:18 낭독] [시각 자료 1]", "[부부가 어떻게 말로 존중심을 나타낼 수 있는지 설명한다. 「워치 타워 출판물 색인」 “결혼 (생활)” 제하의 소제목 \n“존중심을 나타냄” 참조]", "행동으로 존중심을 나타내라 [빌립보서 2:3, 4 낭독] [시각 자료 2]", "[부부가 어떻게 행동으로 존중심을 나타낼 수 있는지 설명한다. 「깨어라!」 2016년 제6호 9면 참조]"]}, {"title": "결혼 생활에서 어떻게 사랑을 나타낼 수 있는가?", "points": ["성경은 우리에게 사랑이 있을 때 다른 사람을 어떻게 대하게 되는지 알려 준다 (고전 13:4-7)", "비이기적인 행동이 우리의 습관이 되게 함으로 진정한 사랑을 나타낼 수 있다 (고전 10:24)", "남편이든 아내든 모두 배우자가 자기에게 자주 사랑을 표현해 주기를 바란다", "나에게 사랑을 나타낼 것을 요구하기보다 ‘배우자가 사랑받는다는 느낌을 갖도록 내가 뭘 할 수 있을까?’ 하고 자문해 보라", "배우자의 말을 잘 들어 줌으로 사랑을 나타내라 [야고보서 1:19 낭독] [시각 자료 3]", "[부부가 어떻게 서로의 말을 잘 듣는 기술을 발전시킬 수 있는지 설명한다. 「깨어라!」 2013년 12월호 13면 참조]", "배우자를 소중히 여긴다는 것을 표현함으로 사랑을 나타내라 [에베소서 4:29 낭독] [시각 자료 4]", "[부부가 어떻게 서로를 소중히 여긴다는 것을 표현할 수 있는지 설명한다. 「깨어라!」 2017년 제1호 15면 참조]"]}, {"title": "성경의 신뢰할 만한 지침을 따르라", "points": ["완벽한 결혼 생활이란 없다. 모든 남편과 아내는 실수를 한다 (약 3:2)", "남편과 아내 모두 불완전하지만, 성경의 신뢰할 만한 지침을 따른다면 튼튼하고 행복한 결혼 생활을 할 수 있다 \n[골로새서 3:13, 14 낭독]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 28 6/20"]}]}, {"no": 29, "title": "자녀를 기르는 일에 따르는 책임과 축복", "t": 2, "note": "", "sections": [{"title": "성공적으로 자녀를 기르는 비결", "points": ["요즘 같은 세상에서 어떻게 성공적으로 자녀를 잘 기를 수 있는가?", "인간의 조언은 신뢰할 수 없다. 여호와 하느님의 조언을 따를 때 최상의 결과를 얻는다 (사 48:17, 18)", "자신이 사는 곳의 문화나 관습이 아니라 성경의 원칙을 따르라", "여호와의 인도를 구한다면, 그분은 여러분이 성공적으로 자녀를 기르도록 도와주실 것이다 (삿 13:8, 9; 시 32:8)"]}, {"title": "부모로서 여러분이 가진 책임", "points": ["자녀는 여호와께서 맡기신 재산이므로, 부모는 자녀를 기르는 방식에 대해 하느님 앞에 책임이 있다 (시 127:3, 4)", "부모는 자녀를 물질적으로 부양해야 한다. 하지만 자녀를 기르는 책임에는 훨씬 더 많은 일이 포함된다 (딤전 5:8)", "자녀가 여호와와 친밀한 관계를 발전시키도록 도우라 [신명기 6:6, 7 낭독]", "집안 분위기를 항상 평화와 사랑이 가득한 상태로 유지하라. 그래야 자녀가 잘 성장할 수 있을 것이다 \n(골 3:12-14) [시각 자료 1]", "조부모나 다른 친족에게 부모 역할을 떠넘기지 마라 (「파14」 4/15 20-21면 13-16항)", "아버지는 책임감을 가지고 솔선하여 자녀에게 영적인 훈련을 베풀고 사랑으로 징계해야 한다 (엡 6:4)", "자녀는 아버지의 사랑과 보호와 돌봄을 느낄 수 있어야 한다 (「파08」 10/1 19, 21면)", "어머니는 자녀를 신체적 그리고 감정적으로 돌보는 면에서 매우 중요한 역할을 한다 (살전 2:7)", "성경은 어머니가 자녀를 가르치고 징계하는 것이 중요함을 강조한다 (잠 1:8)", "자녀를 돌보는 책임은 허드렛일이 아니라 매우 가치 있고 의미 있는 일이다", "홀어버이는 자녀를 기르는 면에서 남다른 어려움들이 있지만 여호와의 도움으로 성공할 수 있다 (「파03」 11/1 16-17면 14-15항)", "의붓부모는 자녀를 차별하거나 편애하지 않음으로 가정의 연합과 평화를 증진할 수 있다 (롬 2:11)", "가족 모두 마음을 터놓고 이야기하도록 도우라. 참을성을 보이고, 새로운 가족 상황에 적응할 시간을 주라"]}, {"title": "사랑으로 훈련하고 징계하라", "points": ["자녀를 유아기부터 훈련하라 (딤후 3:15; 「파13」 8/15 16면)", "자녀에게 올바른 도덕 가치관을 가르치라 (「깨19.2」 14-15면)", "어린 자녀와 십 대 자녀를 훈련하는 데 도움이 되는 성경 자료를 jw.org에서 찾을 수 있다", "필요한 징계를 베풀라 [잠언 3:12 낭독]", "징계에는 사랑으로 베푸는 지도, 훈련, 시정, 때로는 징벌이 포함된다 (잠 13:24; 29:15)", "여호와를 본받아 사랑으로 징계하라. 결코 화가 나서 감정에 휩싸인 채 징계해서는 안 된다 [시각 자료 2]", "자녀에게 확실한 한계를 정해 주라. 일관성 있고 합리적인 태도를 나타내라", "자녀에게 좋은 본을 보이라. 흔히 자녀는 부모의 말보다 행실에 더 큰 영향을 받는다"]}, {"title": "자녀를 기르는 일에서 얻는 큰 축복", "points": ["여호와께서는 자녀가 책임감 있는 성인이 되도록 여러분이 기울이는 노력을 축복하실 것이다", "자녀가 부모의 노력에 감사하며 잘 따라 줄 때 부모는 큰 기쁨을 얻게 된다 (잠 23:24, 25)", "여러분은 하느님이 맡기신 재산을 그분이 승인하시는 방식대로 잘 돌보았다는 뿌듯함을 느낄 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 29 6/20"]}]}, {"no": 30, "title": "가족 간의 의사소통을 개선하는 방법", "t": 2, "note": "", "sections": [{"title": "가족 간의 원활한 의사소통—쉽지 않은 일", "points": ["가족이 행복하려면 서로 사랑과 존중심을 보이는 가운데 마음을 터놓고 대화하는 것이 필수적이다 (잠 15:22)", "가족 간의 원활한 의사소통에 방해가 되는 여러 가지 요인이 있다 [시각 자료 1]", "여기에는 바쁜 일정, 전자 기기의 사용, 개인의 불완전한 성향 등이 포함된다", "성경 조언을 적용하면 가족 간에 의사소통이 원활해지고 관계가 더 튼튼해질 수 있다 (잠 24:3)"]}, {"title": "남편과 아내 사이의 의사소통", "points": ["흔히 남편과 아내는 대화하는 방식에 차이가 있다 (「파13」 5/15 15면 4-5항; 「깨16.3」 10면)", "남편 여러분, 아내의 말을 공감하면서 들어 주고 아내의 감정적 필요를 헤아려 주라 [베드로 전서 3:7 낭독] \n(골 3:19) [시각 자료 2]", "엘가나는 한나가 감정적으로 심한 스트레스를 받고 있다는 것을 알아채고 한나를 위로했다 (삼상 1:4-8; 잠 25:11)", "아내 여러분, 남편에게 자신의 필요와 감정을 솔직하면서도 존중심 있게 표현하라 [잠언 31:26 낭독] (잠 14:1)", "리브가는 자신의 고통스러운 감정을 이삭에게 털어놓았고, 그 결과 이삭은 상황을 바로잡기 위해 조처를 취했다 (창 27:46; 28:1, 2)", "깊이 있고 솔직한 대화를 하려면 시간을 내야 한다", "여러분은 부부가 대화할 시간을 정기적으로 따로 떼어 놓는가?", "문제가 생길 때 겸손을 나타내는 것은 원활한 의사소통을 유지하는 데 도움이 된다 (벧전 3:8; 「파13」 5/15 17-18면 13-15항)", "신속하게 사과하고 신속하게 용서하라 (골 3:12, 13)"]}, {"title": "부모와 자녀 사이의 의사소통", "points": ["부모 여러분, 자녀가 쉽게 다가갈 수 있는 부모가 되고 자녀의 말을 참을성 있게 잘 들으라 [야고보서 1:19 낭독] \n(「파13」 5/15 21-22면 7-8, 11항) [시각 자료 3]", "자녀가 겪는 문제를 대수롭지 않게 여기지 말고, 자녀가 하는 말에 과민 반응을 보이지 말라 (골 3:21)", "십 대 자녀들은 분위기가 딱딱하지 않고 편안할 때 속마음을 더 잘 털어놓는 경우가 많다 (잠 20:5)", "아무리 바빠도 자녀와 대화할 시간을 내고, 전자 기기 때문에 의사소통이 방해받지 않도록 하라 (엡 5:15, 16; \n「파13」 5/15 20면 5항)", "자녀 여러분, 부모님은 여러분이 잘되기를 바라신다. 따라서 부모님의 말씀을 잘 듣는 것이 지혜로운 일이다 (잠 1:5; 「파13」 5/15 22면 14항)", "때때로 부모님이 여러분을 잘 이해하지 못한다는 느낌이 들 수 있지만, 그렇다 해도 여러분의 생각과 감정을 주저하지 말고 말씀드리라", "여러분이 부모님의 말씀을 잘 듣고 존중심 있게 말씀드린다면 부모님도 여러분의 말을 더 잘 들어 주실 것이다 \n(잠 10:19; 엡 4:31)"]}, {"title": "함께 여호와를 숭배하면 가족 간의 의사소통이 더 원활해진다", "points": ["가족이 함께 여호와께 숭배를 드리면 자연스럽게 서로 더 가까워진다 (신 6:6, 7)", "매주 가족 숭배를 하라 [시각 자료 4]", "가족이 함께 그리스도인 집회에 정기적으로 참석하라", "영적 활동에 더해, 가족이 함께 건전한 여가 활동을 즐기라 (전 3:1, 12, 13)", "가족이 모두 여호와를 섬기지는 않더라도, 여러분이 성경 원칙을 적용하기 위해 노력한다면 가족 간의 의사소통이 원활해질 것이다", "어려움이 있더라도 가족 간의 의사소통을 개선하기 위해 계속 노력하라", "여호와께서 여러분을 인도하고 여러분의 노력을 축복하실 것이다 (시 32:8)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 30 6/20"]}]}, {"no": 31, "title": "당신은 영적 필요를 느끼는가?", "t": 5, "note": "영적 필요를 채울 수 있는 올바른 방법을 강조한다. 영적 발전에 방해가 되는 것들을 극복하도록 격려하고 그렇게 할 수 있는 실용적인 방법을 제안한다", "sections": [{"title": "사람은 누구나 영적인 것을 필요로 한다", "points": ["예수의 말씀을 보면 사람은 누구나 영적 필요를 타고난다는 점을 알 수 있다 [마태복음 5:3 낭독]", "우리는 삶의 진정한 의미를 찾으려 하고, 삶에 관한 중요한 질문들에 대한 답을 알고 싶어 한다 (「파13」 4/1 6면)", "사람들은 다양한 방법으로 영적 필요를 채우려 한다 (「파07」 8/1 3면)", "영적인 것에 대한 여러 종교적 가르침과 사상들은 서로 상충된다", "논리적으로 볼 때, 그런 가르침과 사상들이 전부 진실일 수는 없다. 따라서 그것들 모두가 우리의 영적 필요를 채울 수 있는 것은 아니다"]}, {"title": "영적 필요를 채우는 방법", "points": ["예수께서는 “의에 굶주리고 목마른 사람들”이 배부르게 될 것이라고 약속하셨다 [마태복음 5:6 낭독]", "의에 목마르다는 표현은 하느님이 보시기에 올바른 것을 갈망한다는 뜻이다", "영적 필요를 채우기 위해서는 창조주께 인도를 구해야 한다", "여호와 하느님께서는 사람들이 영적 진리를 찾기를 바라신다 (시 32:8; 행 17:26, 27)", "인류를 위한 하느님의 영감받은 지침을 성경에서 찾을 수 있다 (딤후 3:16)", "예수께서는 하느님의 기록된 말씀에 자주 주의를 이끄셨다 (마 4:4, 7, 10; 눅 10:25-28)", "성경은 다른 어떤 책보다도 훨씬 뛰어나다 (「파12」 6/15 27-28면 8-9항)", "영적 필요를 채우기 위해서는 성경을 부지런히 연구하고 그 말씀을 생활에 적용해야 한다 (약 1:22-25)", "창조주께서는 무엇이 우리에게 가장 유익한지 알고 계신다. 따라서 그분의 도덕 표준을 따를 때 우리는 더 행복한 삶을 살게 된다 (시 19:7-10)", "하느님의 인도를 따르면 그분의 승인을 얻고 그분과 친구가 될 수 있다 (시 15:1, 2; 약 2:23)", "다른 방식으로 영적 필요를 채우려고 하면 그런 만족감을 얻지 못할 것이다", "올바른 방법으로 영적 필요를 채울 때 우리는 미래에 대한 확실한 희망을 갖게 된다", "예수께서는 “하늘 왕국”이 “영적 필요를 느끼는 사람들”의 것이라고 말씀하셨다 (마 5:3)", "제한된 수의 사람들은 하느님의 하늘 왕국에서 예수와 함께 통치할 것이다 (눅 12:32)", "훨씬 더 많은 수의 사람들은 하느님의 왕국의 통치를 받으며 낙원이 된 땅에서 영원히 살게 될 것이다 (마 25:34)"]}, {"title": "영적 필요를 채우는 데 방해가 되는 것들", "points": ["오늘날 많은 사람은 영적인 것을 필요로 하면서도 그 필요를 적절히 채우지 못한다", "예수께서 예언하신 것처럼, 어떤 사람들은 일상적인 생활에 몰두하느라 주의를 빼앗긴다 (마 24:3, 37-39)", "성경 예언을 살펴보면, 지금이 “마지막 날”이며 긴급하게 행동을 취해야 할 때라는 확신이 강해진다 (딤후 3:1-5)", "어떤 사람들은 성경 말씀을 듣고 처음에는 좋은 반응을 보이다가도 영적으로 계속 발전하지 못한다", "[마태복음 13:3-8, 19-23을 낭독하고 그 구절들에 나오는 여러 가지 방해 요소를 설명한다]", "성경 진리에 담긴 지혜를 마음으로 깊이 받아들인다면 그런 방해 요소를 극복할 수 있다 (「파03」 2/1 8-13면)", "어떤 사람들은 성경에 나오는 도덕적 지침이 요즘 시대에 맞지 않다거나 그에 따라 살아가기가 너무 힘들다고 생각한다", "세상의 도덕관은 점점 더 방임적이 되어 가고 있다. 그것은 인류의 사고방식이 발전했기 때문이 아니라 악한 영들이 인류에게 큰 영향을 미치고 있기 때문이다 (요1 5:19; 계 12:9, 12)", "여호와의 도움을 받는다면 그분의 의로운 표준과 일치하게 정결하고 행복한 삶을 살 수 있다 (고전 6:11)"]}, {"title": "영적 필요를 채우는 일을 가장 앞자리에 두라", "points": ["영적 필요를 채우는 데는 노력이 들지만, 그런 노력을 기울일 때 행복을 누리게 된다 (마 5:3)", "성경을 공부하고 그리스도인 집회에 정기적으로 참석하는 것을 가장 앞자리에 두라 (마 6:33)", "가족과 다른 사람들이 영적 필요를 느끼고 그 필요를 채울 수 있게 도와주라 (계 22:17)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 31-KO 8/18\t 30분에 다룰 것"]}]}, {"no": 32, "title": "일상생활의 염려에 어떻게 대처할 수 있는가?", "t": 9, "note": "", "sections": [{"title": "여호와 하느님께서는 우리가 염려에 대처하도록 도와주신다", "points": ["우리 모두는 걱정거리들을 안고 살아간다 (딤후 3:1)", "경제적인 어려움, 건강, 또는 가족 문제와 같은 염렷거리가 있을지 모른다", "일부 사람들은 여러 가지 이유로 부정적인 감정에 시달린다", "여호와 하느님께서는 우리에게 관심을 갖고 계시며 우리가 염려에 대처하도록 도와주실 것이다 \n[베드로 전서 5:7 낭독]", "하느님께서는 어떤 도움을 베푸시며, 우리는 그러한 도움을 어떻게 활용할 수 있는가?"]}, {"title": "하느님께서는 우리에게 평화를 주신다", "points": ["하느님께 기도로 자신의 필요와 염려와 감정을 솔직하게 털어놓으라 [빌립보서 4:6, 7 낭독]", "그러면 여호와께서 우리에게 “하느님의 평화”를 주실 것이다 (「파17.08」 10면 7항) [시각 자료 1]", "여호와께서는 우리가 어려움을 인내하는 데 필요한 힘을 항상 주실 것이다 (빌 4:13)", "어쩌면 그분은 행동을 취해 우리의 상황을 바꾸어 주실 수도 있다 (「파17.08」 10-12면 10-15항)", "‘자신의 무거운 짐을 여호와께 내맡겼다면’ 더는 그 문제에 대해 염려하지 말라 (시 55:22)", "긍정적이고 힘이 될 만한 것들을 생각하기 위해 노력하라 (빌 4:8, 9)", "기도할 때, 자신이 누리는 축복에 대해 감사드리기를 잊지 말라"]}, {"title": "하느님께서는 우리에게 위로와 인도를 베푸신다", "points": ["하느님께서는 자신의 영감받은 말씀인 성경을 통해 우리에게 위로를 베푸신다 [시편 94:19 낭독]", "성경에는 염려에 시달렸지만 하느님께 위로를 받은 충실한 사람들의 이야기가 나온다 (롬 15:4)", "[한나, 엘리야, 다윗과 같은 사람들을 예로 들어 설명한다 (삼상 1:10, 16-18; 2:8; 왕상 19:1-18;\n시 18:6, 19)]", "성경은 하느님이 우리를 사랑하신다는 것을 분명히 알려 준다 (마 10:29-31)", "성경의 인도를 따르면 지혜롭고 합리적인 결정을 내릴 수 있다 (시 119:105)", "어려운 결정을 내려야 할 때는 어떤 성경 원칙이 적용되는지 조사하거나, 관련된 성경 원칙을 알기 위해 필요하다면 경험 많은 그리스도인에게 도움을 구하라 (잠 15:22)", "자신이 할 수 있는 실제적인 조처를 취하라. 그러고 나서는 문제를 여호와의 손에 맡기라"]}, {"title": "하느님께서는 우리에게 필요한 것들을 공급해 주신다", "points": ["하느님께서는 우리가 그분의 뜻을 행하는 것을 삶에서 첫째 자리에 둘 때 우리의 생활에 필요한 것들을 공급해 주겠다고 약속하신다 [마태복음 6:33, 34 낭독]", "아직 일어나지 않은 일에 대해 염려하지 말고, 여호와의 도움을 구하면서 그날그날의 염려를 해결하는 데 집중하라 (마 6:11)", "기도와 일치한 노력을 기울이고 여호와께서 주시는 것들로 만족하라 (히 13:5)", "예수께서는 자신의 말을 듣고 있던 사람들에게 지나치게 염려하지 말라고 가르치셨다 (마 6:25-32;\n「파배16.1」 15면)", "그러한 염려는 아무 소용이 없으며 하느님과 가까워지는 데도 방해가 될 수 있다 (마 13:22)"]}, {"title": "하느님께서는 사랑에 찬 지원을 베푸신다", "points": ["우리는 그리스도인 회중에서 우리에게 진실한 관심을 가진 진정한 친구들을 찾을 수 있다 [잠언 17:17 낭독] \n[시각 자료 2]", "신뢰할 만한 친구에게 자신의 감정을 털어놓는 것은 큰 도움이 될 수 있다 (잠 12:25)", "그리스도인 모임에서 우리는 새 힘을 주는 교제를 나누고 격려를 얻게 된다 (히 10:24, 25)"]}, {"title": "여호와에 대한 믿음을 기르라", "points": ["여호와께서는 우리에게 힘을 주겠다고 약속하시며, “걱정하지 마라” 하고 말씀하신다 (사 41:10)", "하느님에 대한 믿음을 기르기 위해 노력하라 (약 4:8)", "하느님께서 베푸시는 도움을 잘 활용하면서 그분이 우리를 위해 어떻게 행동하시는지 유의해 보라 (시 37:5)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 32  1/20"]}]}, {"no": 33, "title": "정의로운 세상—과연 올 것인가?", "t": 9, "note": "", "sections": [{"title": "우리는 불공정이 가득한 세상에 살고 있다", "points": ["인류 역사 전체에 걸쳐 불공정은 끊임없이 있어 왔다 [전도서 4:1 낭독]", "오늘날에도 불공정, 편견, 학대, 압제가 만연해 있다 (전 8:9)", "여러분도 불공정을 겪고 있다면 틀림없이 그러한 불공정에서 하루빨리 벗어나고 위로를 얻기를 바랄 것이다"]}, {"title": "맞서 싸우는 것이 해결책인가?", "points": ["압제에서 벗어나려고 애쓰는 것은 자연스러운 일이다 (욥 35:9)", "어떤 사람들은 불공정을 해결하기 위해 맞서 싸우는 길을 택한다 (「깨」 13/7 7-8면) [시각 자료 1]", "맞서 싸우는 것은 불공정의 근본 원인을 바로잡지 못한다 (전 1:15)", "불공정은 하느님의 공의롭고 의로운 표준을 따르지 않는 사람들 때문에 일어난다 (신 32:4, 5)", "하느님의 도움 없이 참다운 정의를 실현하려는 인류의 시도는 실패할 수밖에 없다 (시 146:3; 렘 10:23)"]}, {"title": "하느님이 마련하신 해결책은 무엇인가?", "points": ["하느님은 참다운 정의를 실현할 하늘 왕국을 설립하셨다 (단 7:13, 14)", "머지않아 이 왕국은 인간이 세운 정부들을 대체하고 온 땅을 다스릴 것이다", "예수 그리스도는 하느님의 왕국의 통치자이다. 그분의 통치는 “공의” 즉 정의와 “의”를 실현할 것이다 [이사야 9:6, 7 낭독] (사 32:1; 「파07」 8/15 25면 14-15항)", "이 땅에서 봉사하시는 동안 예수께서는 사회적, 정치적 개혁을 선동하지 않으셨다. 그분은 제자들에게 하늘 왕국에 믿음을 두라고 가르치셨다 (마 4:23; 6:9, 10)", "예수께서 행하신 기적들은 그분이 하느님의 왕국의 왕으로서 하실 일들을 미리 보여 주었다 (마 14:17-21; 눅 18:35-43)", "하느님의 왕국이 통치할 때 불공정, 편견, 학대, 압제가 모두 사라질 것이다 (시 72:12-14) [시각 자료 2]", "땅의 자원을 모두가 공평하게 이용할 것이므로 경제적 측면에서 불공정이 사라질 것이다 (시 72:16)", "모든 인종과 민족이 평등한 대우를 받을 것이다 (행 10:34, 35)", "모두가 연합하여 여호와를 섬기도록 가르침받을 것이므로 종교적 분열이 사라질 것이다 (사 11:9)", "가정은 평화로운 안식처가 될 것이다"]}, {"title": "지금 불공정을 겪고 있다면 어떻게 대처할 수 있는가?", "points": ["어쩌면 지금도 일부 형태의 불공정에서 어느 정도 벗어날 방법이 있을지 모른다", "불공정한 일을 당할 만한 상황을 분별하는 법을 배우고, 가능하다면 그런 상황을 피하려고 노력하라 (잠 22:3)", "피해를 입었다면 사법 제도의 도움을 받을 수도 있다 (롬 13:4)", "상황이 개선되지 않더라도 여호와 하느님께 기도로 자신의 감정을 쏟아 놓으라 [베드로 전서 5:6, 7 낭독]", "그분은 여러분에게 위로를 베푸시고 견딜힘을 주실 것이다 (롬 12:12)", "그분은 자신이 정하신 때에 악한 자들을 처벌하실 것이다 (롬 12:19)", "오래 참음, 친절, 자제와 같은 특성들을 기르라 (갈 5:22, 23)", "이러한 특성들이 있다면 불공정한 일을 겪을 때에도 차분함을 유지할 수 있고, 그 결과 상황을 악화시키는 일을 피할 수 있다 (롬 12:17)", "또 우리를 부당하게 대하는 사람의 마음이 누그러져서 우리를 더 잘 대해 줄지 모른다 (롬 12:20, 21)", "현재 불공정한 일을 겪고 있더라도 우리는 기쁨과 평화를 누릴 수 있다 (롬 15:13)", "참다운 정의를 실현할 하느님의 왕국에 대한 믿음을 기르라", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 33 6/20"]}]}, {"no": 34, "title": "당신은 생존을 위한 표를 받을 것인가?", "t": 1, "note": "", "sections": [{"title": "하느님께서는 악을 미워하신다", "points": ["오늘날 세상은 도덕적으로 타락해 있으며 폭력과 불공정으로 가득 차 있다 (전 4:1)", "하느님께서는 이 땅에서 벌어지는 온갖 악한 일들을 다 보고 계시며, 그것을 매우 미워하신다 \n[시편 5:4, 5 낭독]", "당신은 선과 악에 대해 하느님과 같은 생각을 가지고 있는가?", "하느님의 생각을 받아들이는 사람은 영원히 살 전망을 갖게 된다 (시 37:29)"]}, {"title": "하느님께서 악하게 여기시는 행동은 무엇인가?", "points": ["성경 에스겔서는 하느님께서 악하게 여기시는 행동이 무엇인지 알려 준다", "고대 유다에서 여호와를 섬긴다고 주장했던 사람들이 행했던 몇 가지 일들을 생각해 보자", "[각각의 행위를 이야기하면서, 그 행위가 왜 여호와를 불쾌하시게 하는지 설명하고 그에 해당하는 오늘날의 사례들을 언급한다]", "우상 숭배 (겔 8:5, 9, 10, 16; 「순」 53-54면 7-9항; 54-55면 11-12항; 58-59면 15-17항) [시각 자료 1]", "이교에서 유래한 종교적 관습 (겔 8:13, 14; 「순」 58면 13-14항)", "힘없는 사람을 이기적으로 이용하는 행위 (겔 22:6, 7; 「파12」 8/1 27면 3-6항)", "성적 부도덕 (겔 22:11; 고전 6:9, 10; 「순」 60면 20항)", "다른 사람을 착취하고 뇌물을 받는 행위 (겔 22:12)", "하느님께서는 그러한 일들을 행하는 사람들에게 “분노하여 행동하겠다”고 에스겔에게 말씀하셨다 (겔 8:17, 18)"]}, {"title": "하느님께서 악을 없애실 것이다", "points": ["에스겔 시대에 하느님께서는 고대 예루살렘에 심판을 집행하셨다 (렘 25:9)", "가까운 장래에 하느님께서는 자신의 아들 예수 그리스도를 통해 온 땅에서 악을 모두 없애실 것이다 (계 16:14, 16; 19:11-16)", "에스겔은 다가오는 하느님의 심판에 관한 환상을 보았다. 우리는 그 환상에서 무엇을 배울 수 있는가?", "[에스겔 9:1-6에서 선택된 부분들을 낭독하고 설명한다]", "2절: “또 한 사람이 있는데, 그는 · · · 비서관의 잉크통을 차고 있었다” [시각 자료 2]", "아마겟돈 직전에 예수께서는 생존할 사람들에게 표를 하실 것이다 (마 25:31-33, 46; 「순」 179면 18항)", "4절: “한숨짓고 신음하는 사람들”", "이 세상에서 벌어지는 악한 일들 때문에 슬퍼하고 고통스러워하는 사람들이 생존을 위한 표를 받을 것이다", "2절: “여섯 사람이 · · · 저마다 파괴하는 무기를 손에 들고 있었다”", "아마겟돈 때 예수께서는 강력
