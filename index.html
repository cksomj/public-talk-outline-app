}]}, {"no": 70, "title": "왜 하느님을 신뢰해야 하는가?", "t": 8, "note": "", "sections": [{"title": "당신은 여호와를 신뢰할 것인가?", "points": ["오늘날 세상에서 많은 사람은 남을 쉽게 신뢰하지 못한다", "신뢰할 수 없는 사람이 너무나 많기 때문에 그것은 이해할 만한 일이다", "여호와 하느님은 우리에게 그분을 신뢰할 것을 권하신다 [잠언 3:5, 6 낭독]", "우리가 확신을 가지고 자신의 삶을 여호와의 손에 맡길 수 있는 이유는 무엇인가? 그분을 신뢰한다는 것을 어떻게 나타낼 수 있는가?"]}, {"title": "왜 여호와를 마땅히 신뢰해야 하는가?", "points": ["여호와의 특성은 우리가 그분을 신뢰해야 할 강력한 이유가 된다", "그분은 무한한 능력을 가지고 계시므로 우리가 어떤 상황에 처해 있든 언제나 우리를 도와주실 수 있다 (사 40:26-29)", "그분은 지혜로우시기 때문에 우리에게 최상의 유익을 주는 것이 무엇인지 언제나 아신다 (잠 2:6, 7)", "그분은 공의로우시기 때문에 언제나 옳은 일을 하시고 언제나 우리를 공정하게 대하실 것이다 (신 32:4)", "그분은 사랑이 많으시기 때문에 우리를 결코 버리지 않으실 것이다 (사 49:15)", "하느님의 이름의 의미는 우리가 그분을 신뢰할 수 있는 이유를 분명히 보여 준다 (출 3:14, 15)", "그분이 이루고자 하시는 일은 그 무엇도 막을 수 없다 (사 46:10, 11; 「파20.06」 9면 5-6항)", "한 성경 필자는 영감을 받아 여호와에 관해 이렇게 썼다. “당신을 신뢰하는 사람은 행복합니다” (시 84:11, 12)"]}, {"title": "어떻게 여호와를 신뢰한다는 것을 나타낼 수 있는가?", "points": ["“스스로 지혜롭다고 여기지 말고” [잠언 3:7, 8 낭독]", "일부 사람들은 여호와의 표준에 따라 사는 것이 정말 행복을 가져다줄지 의문을 갖는다", "여호와의 지혜로운 인도를 받아들임으로 그분을 신뢰한다는 것을 나타내라 [시각 자료 1]", "여호와의 도덕 표준은 우리를 신체적으로나 감정적으로 보호해 준다", "여호와의 지혜를 얻고 그것을 적용하는 것은 행복과 생명을 의미한다 (잠 3:13-18)", "‘가치 있는 것들로 여호와를 공경하여라’ [잠언 3:9, 10 낭독]", "“가치 있는 것들”에는 우리의 시간, 재능, 활력이 포함된다", "일부 사람들은 너무 많은 시간과 활력이 든다고 생각하기 때문에 여호와를 섬기기를 주저한다", "여호와에 대한 숭배를 우선순위에 둠으로 그분을 신뢰한다는 것을 나타내라 [시각 자료 2]", "여호와께서는 자신을 기꺼이 바쳐 그분을 섬기는 사람들을 돌봐 주겠다고 약속하신다 (마 6:31-33)", "우리는 여호와와 다른 사람들에게 자신의 것을 기꺼이 줌으로 큰 행복을 맛볼 수 있다 (눅 6:38; 행 20:35)", "“여호와의 징계를 배척하지 말고” [잠언 3:11, 12 낭독]", "우리는 모두 불완전하므로 여호와의 사랑에 찬 징계가 필요하다 (「파18.03」 23면 1항; 24면 5항)", "여호와의 훈련과 시정을 기꺼이 받아들임으로 그분을 신뢰한다는 것을 나타내라 [시각 자료 3]", "일부 사람들은 나중에 잘못을 저지를까 봐, 헌신하고 침례받기를 주저한다", "여호와의 훈련을 받아들이고 그분이 우리를 틀 잡으시게 한다면 심각한 죄를 저지르지 않을 수 있다 (사 64:8)", "유혹을 받을 때, 옳은 일을 할 힘을 달라고 여호와께 청하라 (눅 11:13; 갈 5:16)", "누군가가 심각한 죄를 짓더라도 여호와께서는 여전히 그를 간절히 돕고 싶어 하신다 (히 12:11-13)", "여호와께서는 자신의 잘못을 바로잡는 죄인들을 “기꺼이 용서”하신다 (시 86:5; 요1 1:9)"]}, {"title": "여호와를 “확신의 근원”으로 삼으라", "points": ["여호와에 대해 더 많이 배울수록 그분을 더 신뢰하게 될 것이다", "지식과 지혜를 얻기 위해 계속 노력하라 (잠 2:1-5)", "배운 점을 적용한다면 “여호와께서 [우리]의 확신의 근원이 되어 주”실 것이다 (잠 3:26)", "우리가 여호와를 신뢰한다면 그분이 우리를 보호하고 풍성한 상을 주실 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 70 10/23"]}]}, {"no": 71, "title": "“깨어 있으십시오”—왜 그리고 어떻게?", "t": 4, "note": "", "sections": [{"title": "“깨어” 있다는 것의 의미", "points": ["의심의 여지없이 우리는 이 세상 제도의 “마지막 날”에 살고 있다 (딤후 3:1-5; 마 24:3, 7, 8)", "노아 시대처럼 오늘날 대부분의 사람들도 유의하지 않는다 (마 24:37-39)", "어떤 사람들은 이 세상 제도가 끝날 것이라는 생각을 비웃는다 (벧후 3:3, 4)", "우리는 비유적인 의미에서 “깨어” 있어야 한다 [데살로니가 전서 5:6 낭독] (「파12」 3/15 10-11면 1-5항)", "우리는 끝이 매우 가깝다는 사실을 기억하고, 여호와의 뜻을 행하는 데 계속 초점을 맞춰야 한다"]}, {"title": "“깨어” 있기가 어려운 이유", "points": ["사탄은 자신이 지배하는 세상을 사용하여 사람들의 주의를 빼앗고 비유적인 잠에 빠지게 한다 (요1 2:15-17; \n5:19)", "예수께서는 여호와를 섬기는 일에서 우리의 주의를 빼앗을 수 있는 것들에 대해 경고하셨다 [「연구용 성경」 누가복음 21:34, 35 및 각주 낭독] [시각 자료 1]", "“일상생활에 대한 걱정” 가운데에는 경제적인 어려움, 가정 문제, 건강 문제 등이 있을 수 있다", "우리는 직업이나 고등 교육, 소유물, 오락과 여가 활동 때문에 주의를 빼앗길 수 있다 (눅 8:14; 「파03」 12/15 23면 16-17항)", "예수께서는 “과식과 과음”에 대해서도 경고하셨다 (「파08」 9/15 22면 12-14항)"]}, {"title": "“깨어” 있을 수 있는 방법", "points": ["예수께서는 제자들에게 “깨어 있으라”고 강력히 권하셨다 [누가복음 21:36 낭독] (「파10」 7/15 11면 16항)", "여호와와 튼튼한 관계를 길러 나가라", "그 무엇도 기도, 성경 읽기, 개인 연구, 가족 숭배, 집회 참석을 뒤로 밀어내지 못하게 하라 (빌 1:10; \n벧후 3:11-14)", "이 세상에 있는 것들 때문에 주의를 빼앗기거나 유혹에 빠지지 않도록 조심하라", "이 세상을 “온전히” 이용하지 말라 (고전 7:31; 「파15」 10/15 20면 7-8항)", "이 세상의 영향을 받아 자신의 도덕 표준을 낮추는 일이 없게 하라 (롬 13:11-14)", "성경 예언의 성취에 계속 주의를 기울이라 (막 13:32-37; 「파03」 1/1 18-19면 5-6항)", "[현재 성취되고 있거나 앞으로 곧 성취될 성경 예언 한 가지를 강조한다]", "다른 사람들이 잠에서 깨어나도록 도우라", "좋은 소식을 전하고 성경 진리를 가르치면 우리 자신이 깨어 있는 데 도움이 된다 (롬 10:13-15; \n딤전 4:16; 「파12」 3/15 11면 8-9항)"]}, {"title": "“여호와의 날”이 다가오고 있으므로 계속 깨어 있으라", "points": ["많은 사람에게 “여호와의 날”은 갑작스럽게 닥칠 것이다 [데살로니가 전서 5:1-3 낭독] (「파19.10」 8-9면 3-6항) [시각 자료 2]", "많은 사람들은 인간이 “평화”와 “안전”을 이루었다는 착각에 빠질 것이다", "거짓 종교의 멸망은 “큰 환난”의 첫 단계가 될 것이다 (마 24:21; 「국」 222-223면 3-5항)", "일단 큰 환난이 시작되면 잠에서 깨어 여호와를 찾기에는 너무 늦을 것이다 (마 25:31-33, 46)", "바로 지금이 “깨어” 있고 여호와의 사랑이 담긴 조언들에 반응을 나타내야 할 때이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 71  6/21"]}]}, {"no": 72, "title": "사랑—참그리스도인 회중을 알아볼 수 있는 표", "t": 3, "note": "", "sections": [{"title": "사랑—예수의 참제자들이 누구인지 알려 주는 표", "points": ["전 세계에서 진실한 마음을 가진 많은 사람들이 참종교를 찾고 있다", "많은 경우, 그들은 진정한 사랑을 가르치지 않거나 실천하지 않는 종교들 때문에 실망한다 (마 7:15)", "예수께서는 사랑이 자신의 참제자들을 알아볼 수 있는 표가 될 것이라고 말씀하셨다 [요한복음 13:34, 35 낭독]", "이제 더는 영에 의한 기적의 선물들이 아니라, 결코 없어지지 않는 사랑이 바로 참그리스도인들을 알아볼 수 있는 표가 된다 (고전 12:31; 13:8; 「까」 308면 21항)"]}, {"title": "오늘날 진정한 사랑을 어디에서 발견할 수 있는가?", "points": ["여호와의 증인들은 서로에게 진정한 사랑을 나타낸다 [로마서 12:10 낭독] [시각 자료 1]", "그들은 인종, 민족, 나이, 교육 수준이나 경제 수준에 따라 서로를 차별하지 않기 위해 힘써 노력한다", "그들은 서로를 친절하게 대하고 어려울 때 서로를 돕는다 (갈 6:10)", "[연로하거나 병약한 사람들을 돕는 일이나 재해 구호 활동과 같은 예들을 언급한다]", "그 결과, 그들은 연합을 이루고 평화를 누린다 (엡 4:3)", "또한 그들은 증인이 아닌 사람들에게도 사랑을 나타낸다", "그들은 여호와에 대해 배우도록 모든 사람에게 차별 없이 권한다 (사 2:2, 3; 행 10:34, 35; 「파19.09」 30면 17항)", "그들은 폭력 행위나 전쟁에 참여하지 않는다 (사 2:4; 「파14」 9/15 7-8면 1-4항)"]}, {"title": "당신은 여호와의 증인들에게서 완벽함을 기대해야 하는가?", "points": ["여호와의 증인들은 모두 불완전하며, 따라서 사랑을 나타내는 면에서 완벽할 수는 없다 (롬 3:23)", "여호와께서는 불완전한 사람들에게 완벽을 요구하지 않으시며, 우리도 그래서는 안 된다 (시 130:3)", "사도들을 포함해 1세기 그리스도인들도 불완전했다", "베드로는 사람들을 차별한 적이 있었다 (갈 2:11-14)", "바울과 바나바는 심하게 다투기도 했다 (행 15:36-41)", "하느님께서는 과거와 마찬가지로 오늘날에도, 불완전하지만 겸손하게 잘못을 바로잡고 약점을 극복하기 위해 노력하는 사람들을 계속 사용하신다"]}, {"title": "다른 사람을 용서함으로 사랑을 나타내라", "points": ["다른 사람의 불완전성 때문에 감정이 상해 있을 것이 아니라 기꺼이 용서함으로 사랑을 나타낼 수 있다 \n[골로새서 3:13 낭독] (「파99」 10/15 13면 8-9항) [시각 자료 2]", "우리는 누구나 다른 사람들에게 용서를 받아야 할 때가 생긴다 (약 3:2)", "우리가 여호와께 용서받으려면, 반드시 다른 사람들을 용서해야 한다 (마 6:14, 15)", "그리스도인 사랑이 있다면 심지어 “많은 죄”도 덮어 줄 수 있다 (벧전 4:8; 마 18:21, 22)", "물론, 용서하기가 언제나 쉬운 것은 아니다. 하지만 여호와께서 도와주실 수 있다", "기도로 하느님께 성령을 청하라. 성령은 평화, 오래 참음, 온화, 사랑을 기르는 데 도움이 된다 (갈 5:22, 23)", "하느님의 말씀을 연구하고 그 말씀에 담긴 교훈을 적용하라 (엡 4:32; 5:1; 「파99」 10/15 13면 7항; 14-15면 14-15항)"]}, {"title": "진정한 사랑을 나타내는 사람들과 함께 하느님을 숭배하라", "points": ["하나로 연합되어 진정한 사랑을 나타내는 사람들과 함께할 수 있다는 것은 정말 큰 축복이다! [골로새서 3:14 낭독] [시각 자료 3]", "이 자리에 참석한 모두가 참그리스도인 회중과 함께 하느님을 숭배하고, 진정한 사랑을 나타내라는 예수의 명령에 순종하기를 바란다 (요1 3:23)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 72 6/21"]}]}, {"no": 73, "title": "“지혜의 마음”을 얻으십시오", "t": 3, "note": "", "sections": [{"title": "왜 우리에게는 지혜의 마음이 필요한가?", "points": ["현재 인생은 짧고 자주 예상치 못한 문제들이 생긴다 (시 90:10; 전 9:11)", "어떻게 우리 자신에게 유익이 되고 하느님을 기쁘시게 하는 좋은 결정을 내릴 수 있는가?", "불완전한 우리의 마음은 믿을 수 없다. 따라서 그것을 따라서는 안 된다 (렘 17:9)", "우리는 “지혜의 마음을 얻”어야 한다 [시편 90:12 낭독] (「파05」 5/1 32면)"]}, {"title": "어떻게 지혜의 마음을 얻을 수 있는가?", "points": ["성경에서 “마음”이라는 단어는 일반적으로 속사람을 가리킨다 (「파01」 10/15 17-18면 3-5항)", "마음에는 우리의 행동을 좌우하는 생각, 동기, 감정이 포함된다", "우리는 여호와 하느님의 생각에 맞춰 자신의 속사람을 틀 잡아 나가고 그분의 생각에 따라 행동함으로 “지혜의 마음을 얻”는다 (잠 4:7)", "여호와는 참지혜의 근원이시다 (잠 2:6; 9:10; 「까」 219-220면 3-5항)", "지혜는 지식과 분별력과 이해력을 한데 모아 함께 작용하게 한다 (「까」 171면 8항)", "지혜를 얻으려면 시간과 노력이 필요하다 (잠 2:1-5; 23:23; 「통」-2 868면 5-6항)", "우리는 하느님과 예수를 ‘알아 가야’ 한다 (“알아 가는” 요 17:3 「신세연」 연구 노트)", "우리는 그분들의 특성들에 관해 배우고 그분들의 생각을 본받아야 한다 (고전 2:16; 벧전 2:21; 「파18.02」 22면 15-16항)", "우리는 성경을 연구하고, 성경에 근거한 출판물들을 읽고, 집회와 크고 작은 대회들에 참석하고, 「JW 방송」을 시청함으로 계속해서 지식을 얻을 수 있다 (엡 5:15, 16)", "우리는 배운 것을 적용함으로 ‘지혜롭게 걸을’ 수 있다 (잠 3:5, 6; 28:26; 「파05」 11/1 22면 7항)"]}, {"title": "실망스러운 일을 겪을 때 어떻게 지혜롭게 행동할 수 있는가?", "points": ["지혜는 우리가 실망스러운 일을 겪을 때 우리를 보호해 줄 수 있다", "우리는 불완전한 경향 때문에 경솔한 반응을 보일 수 있다 [잠언 19:2, 3 낭독]", "그러다 보면 여호와와의 관계에 해를 입힐 수 있는 나쁜 결정을 내릴 수 있다", "지혜의 마음이 다음 두 가지 문제에 대처하는 데 어떻게 도움이 되는지 살펴보자", "다른 형제 자매들에게 실망할 때", "하느님의 백성이 완벽할 것이라고 기대하는 것은 현실적이지 못하다 (전 7:20-22; 약 3:2)", "사도 바울은 데마에게 실망했다 (딤후 4:10; 「통」-1 454면)", "유오디아와 순두게는 서로 불화를 겪었다 (빌 4:2, 3) [시각 자료 1]", "불완전한 사람 때문에 여호와에게서 떠나가는 일이 없게 하라 (히 3:12)", "다른 사람의 결점에 초점을 맞추는 경향을 물리치라 (「파19.08」 9-10면 7-8항)", "예수께서 나타내신 충성과 참을성을 본받으라 (벧전 2:22, 23; 「따」 62-64면 19-21항)", "기대가 이루어지지 않아서 실망할 때", "여호와의 증인은 영감을 받지도 않으며 완전무결하지도 않다", "우리는 때때로 잘못된 기대를 가졌던 적이 있다 (「파13」 1/1 8면 네모)", "성경 진리에 대한 이해는 계속 더욱더 명확해지고 있다 (잠 4:18; 「파00」 5/15 22면 5항–23면 1항)", "특정한 가르침을 받아들이기 힘들다면 그것을 이해하도록 도와 달라고 여호와께 겸손하게 요청함으로 지혜롭게 행동하라 (요 6:68; 「파06」 2/15 30면 21-22항)"]}, {"title": "지혜를 달라고 “하느님께 계속 청하라”", "points": ["지혜의 마음을 얻게 도와 달라고 “하느님께 계속 청하라” [야고보서 1:5 낭독] (「파21.02」 28-29면 9-10항)", "살면서 겪는 시련들을 우리가 훌륭한 특성들을 기를 수 있는 기회로 삼으라 (약 1:2-4)", "매일매일 하느님을 기쁘시게 하는 방식으로 살겠다고 결심하라", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 73 5/22"]}]}, {"no": 74, "title": "여호와께서는 우리를 살펴보고 계신다", "t": 0, "note": "", "sections": [{"title": "여호와께서는 모든 것을 보신다", "points": ["많은 사람은 하느님이 자신들이 하는 일을 모르시거나, 자신들이 무슨 일을 하든 관심이 없으시다고 생각한다 \n(시 10:13; 14:1)", "여호와 하느님은 우리가 사람들과 함께 있을 때든 혼자 있을 때든 우리의 모든 행동을 보신다 [잠언 15:3 낭독]", "그분은 우리의 성향과 동기를 포함해 우리의 내면이 어떠한지 보신다 (삼상 16:7)", "그분은 우리가 가진 좋은 점들을 찾으시고 소중히 여기신다 (대하 16:9; 「파02」 10/15 14면 4-5항)", "그분은 우리의 잘못을 찾기 위해 우리를 살피시는 것이 아니다 (시 130:3)", "세 가지 면에서 어떻게 우리가 여호와를 기쁘시게 할 수 있는지 살펴보자"]}, {"title": "언제나 가족을 사랑으로 대하라", "points": ["여호와께서는 우리가 사람들 앞에서든 가족끼리만 있을 때에든 가족을 어떻게 대하는지에 관심이 있으시다 \n(벧전 3:1, 2, 7; 「랑쉬」 150-151면 10-12항)", "우리는 결코 가족을 신체적으로 학대해서는 안 되며, 항상 가족들에게 친절하게 말해야 한다 \n[에베소서 4:31 낭독]", "가족에게 사랑과 존중심을 나타내기 위해 힘써 노력하라 (롬 12:10) [시각 자료 1]", "자신이 좋은 특성들을 길러서 더 화목한 가정을 만들 수 있게 도와 달라고 여호와께 청하라", "나쁜 습관이 있더라도 극복할 수 있다 [경험담을 한 가지 들어 설명한다. 예를 들어 「파수대」 2016년 제3호 10-11면 참조]"]}, {"title": "과음을 피하라", "points": ["성경은 술을 마시는 것이 잘못이라고 말하지 않는다 (전 9:7)", "술을 마시기로 결정한다면, 너무 많이 마시거나 너무 자주 마셔서는 안 된다 (눅 21:34; 엡 5:18)", "어떻게 과음을 피할 수 있는가?", "때때로 자신의 음주 습관을 솔직하게 점검해 보라 (애 3:40; 「파10」 1/1 8면 네모)", "술을 줄이거나 술을 아예 끊을 필요가 있다면 다음과 같이 하라", "여호와께 도와 달라고 청하라 (빌 4:13)", "음주 습관을 바로잡기 위해 어떻게 할지 계획을 세우라 (「파10」 1/1 7-9면)", "계획을 실천할 때 얻을 유익을 기억하면서 자신이 세운 계획을 잘 지키라 (빌 2:13)", "여호와의 도움을 받으면 성공할 수 있다 [경험담을 한 가지 들어 설명한다. 예를 들어 「파수대」 2012년 5월 1일호 20-21면 참조]"]}, {"title": "불결한 생각과 습관을 떨쳐 버리기 위해 힘써 싸우라", "points": ["여호와께서는 우리가 도덕적인 깨끗함을 유지하는 것이 쉽지 않다는 것을 이해하신다 (시 103:13, 14)", "우리는 불결한 행동만이 아니라 부도덕한 생각도 피해야 한다 (마 5:28)", "불결한 생각을 제어하지 않는다면 불결한 행동으로 이어질 수 있다 (골 3:5)", "해로운 욕망과 싸우고 있다면 단호한 조처를 취하라 [마태복음 5:29, 30 낭독] (「파09」 2/15 11-12면 \n8-11항) [시각 자료 2]", "해로운 욕망에 다시 굴복하는 일이 생기더라도 싸움에서 완전히 패배한 것은 아니다 (「깨」 06/11 19면 \n네모)", "유혹을 한 번 물리칠 때마다 한 번의 큰 승리를 거두는 것이다", "당신도 이 싸움에서 이길 수 있다 [경험담을 한 가지 들어 설명한다. 예를 들어 「파수대」 2016년 제4호 12-13면 참조]"]}, {"title": "여호와께서 관심을 가지고 우리를 살펴보시는 것은 우리에게 유익하다", "points": ["여호와께서 우리를 살펴보고 계시는 것에 대해 우리는 기뻐하고 감사해야 한다", "그 누구보다 여호와께서 우리를 가장 잘 아시며, 그분은 우리를 진심으로 돕고 싶어 하신다 \n(시 139:1, 23, 24)", "그분은 우리가 옳은 일을 하기 위해 마음을 다해 노력하는 모습을 보시고 기뻐하신다 (잠 27:11)", "여호와께서는 우리가 그분을 기쁘게 해 드리기 위해 계속 노력할 때 풍성히 축복해 주실 것이다 (시 25:14)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 74 9/21"]}]}, {"no": 75, "title": "개인 생활에서 여호와의 통치권을 지지하십시오", "t": 0, "note": "", "sections": [{"title": "여호와께서는 사랑으로 자신의 통치권을 행사하신다", "points": ["여호와께서는 모든 창조물을 다스릴 정당한 권리를 가지신 분이다 (시 145:13; 계 4:11; 「파17.06」 27면 3항)", "여호와께서는 사랑 많은 통치자이시고, 그분의 통치 방식은 압제적이지 않다 (고후 3:17; 「파17.06」 28-29면 8-10항)", "그분은 처음에 아담과 하와에게 모든 것을 완벽히 갖춰 주셨으며, 그들에게 폭넓은 자유를 주셨다 (창 2:8, 9, 15-17)"]}, {"title": "사탄이 여호와의 통치권에 도전하다", "points": ["마귀는 여호와를 중상하고 그분의 통치권에 도전했다 [창세기 3:1-5 낭독] (「파20.06」 4면 9-10항)", "아담과 하와는 하느님에 맞서는 사탄의 통치권을 지지하기로 선택했다 (「파17.06」 28면 4항; \n「통」-1 1048면 3항)", "이 세 반역자는 하느님에 대해 사랑과 감사하는 마음이 없음을 드러냈다 (「통」-2 831면 2-4항)", "사탄은 첫 인간 부부에게만이 아니라 그들의 모든 후손에게도 불행과 죽음을 가져왔다 (롬 5:12; 8:22)"]}, {"title": "여호와께서 사탄이 제기한 문제를 해결하기 위해\n시간을 허용해 오신 이유", "points": ["여호와께서는 사탄이 자신의 주장을 증명하도록 충분한 시간을 허용해 오셨다 (요1 5:19)", "인류는 온갖 형태의 통치 방식을 시도해 보았지만, 그 모든 인간 통치는 실패했다 (렘 10:23; 「파10」 1/15 28면 1-2항)", "여호와께서는 사람들이 진리를 배우고 그분을 섬길 수 있도록 참을성을 나타내고 계신다 (요 4:23; 벧후 3:9)", "그 기간 동안, 그분은 사탄의 통치가 초래하는 고통을 인내하도록 우리를 도우신다 (고전 10:13)"]}, {"title": "여호와의 통치 방식을 사랑한다는 것을 나타내라", "points": ["사탄은 또한 우리 각자가 과연 여호와의 통치권을 지지하기로 선택할 것인지에 대해 의문을 제기한다 (욥 2:4; 「파16.04」 15면 8항)", "다른 어떤 통치 방식보다 여호와의 통치 방식을 지지한다는 것을 나타내라 (「통」-2 830면 9항)", "여호와께서 권위를 행사하시는 방식을 본받으라 (엡 5:1, 2; 「파17.06」 30면 14항) [시각 자료 1]", "하느님께서 정하신 머리 직분에 복종하라 (엡 5:22, 23; 6:1-3; 히 13:17; 「파17.06」 30면 15항) \n[시각 자료 2]", "개인적인 결정을 내릴 때 여호와의 생각과 일치한 결정을 내리라 (고전 10:31; 「파17.06」 31면 16항) \n[시각 자료 3]", "다른 사람들이 마음을 끄는 여호와의 특성들에 대해 배우도록 도우라 (사 63:7; 「파20.06」 7면 19항)", "당신은 여호와의 통치권을 지지함으로 그분을 기쁘게 해 드릴 수 있다 (잠 27:11; 「통」-1 270면)"]}, {"title": "여호와께서는 자신의 통치권을 지지하는 사람들을 축복하실 것이다", "points": ["하느님의 왕국은 온갖 해악을 초래하는 사탄의 통치를 곧 끝낼 것이다 (단 2:44; 요 12:31; 계 20:1-3)", "그리스도 예수는 “마귀의 일을 산산이 부숴 버리”실 것이다 (요1 3:8; 「순」 229면 19항)", "고통스러운 일들은 ‘기억나지도’ 않을 것이다 (사 65:17, 18; 「파18.12」 31면 4-5항)", "여호와의 통치 방식에 대해 사랑과 감사하는 마음을 계속 길러 나가고 그분의 통치권을 항상 지지하라 \n(대상 29:10-13)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2021 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 75 9/21"]}]}, {"no": 76, "title": "종교가 인간 사회에서 빛 역할을 충족하고 있는가?", "t": 4, "note": "세상 종교는 사회를 개선하지 못하지만 참종교는 그렇게 한다는 것을 보여 준다", "sections": [{"title": "종교에 대해 사람들이 기대하는 바", "points": ["사람들은 종교가 사회를 더 낫게 만들기를 기대한다", "종교는 도덕성과 정의를 증진해야 한다"]}, {"title": "세상 종교들은 이러한 기대에 부응하지 못한다", "points": ["종교는 전쟁과 갈등에 가담해 왔다 (계 18:24)", "종교 지도자들은 사람들을 착취해 왔다", "종교는 점점 영향력을 잃어가고 있다"]}, {"title": "참종교는 빛의 역할을 한다", "points": ["참 그리스도인들은 세상의 빛이다 (마 5:14-16)", "회중 안에서 사랑과 단합이 있다 (요 13:35)", "도덕적으로 청결하고 정직하게 생활한다"]}, {"title": "우리가 지금 할 수 있는 일", "points": ["올바른 행실로 여호와를 영화롭게 한다 (벧전 2:12)", "지속적으로 왕국 소식을 선포한다"]}]}, {"no": 77, "title": "“후대에 힘쓰십시오”", "t": 3, "note": "", "sections": [{"title": "왜 후대를 나타내야 하는가?", "points": ["후대를 잘하는 사람은 자신이 잘 모르는 사람도 반갑게 맞이하고 관대하게 베풀 줄 안다", "하느님은 후대를 중요하게 여기시며 그리스도인들이 후대를 잘하기를 바라신다 [로마서 12:13 낭독] (벧전 4:9)", "그분은 후대를 우리가 드리는 숭배의 일부로 여기신다 (히 13:16; 「파20.03」 28면 14항)", "우리가 사람들을 후대하면 그들은 행복을 느끼고 사랑받는다고 느끼게 된다 (「파18.03」 14면 2-3항)", "우리가 후대를 잘하면 회중이 더 따뜻하고 사랑이 넘치는 곳이 된다", "후대를 하면 우리 자신도 행복해진다 (행 20:35)"]}, {"title": "여호와께서는 후대를 나타내는 면에서 완벽한 본이 되신다", "points": ["여호와께서는 모든 사람에게, 심지어 그분을 모르는 사람들에게도 좋은 것들을 관대하게 공급해 주신다 \n(마 5:45; 행 14:17; 「까」 272-273면 8-9항)", "여호와께서는 인종, 국적, 성별에 따라 사람들을 결코 차별하지 않으신다", "그분은 특히 어려움에 처한 사람들에게 친절하고 관대하시다 (신 10:17, 18)", "여호와께서는 우리의 복지에 관심이 있으시며 우리의 걱정거리를 자신에게 이야기하라고 권하신다 (시 62:8; 145:18)", "하느님은 후대를 나타내는 면에서 완벽한 본이 되시며, 자신을 섬기는 사람들이 그분을 본받을 때 기뻐하신다 \n(잠 19:17)"]}, {"title": "성경에 나오는 후대의 예들에서 배울 수 있는 교훈", "points": ["아브라함은 낯선 사람들을 보았을 때 달려가 그들을 맞이하고 그들을 후대했다 (창 18:2-8; 「파12」 1/1 9면)", "그는 그 방문객들이 발을 씻을 수 있게 해 주고 음식을 차려 줌으로 그들에게 필요한 것들을 마련해 주었다 [시각 자료 1]", "그는 아내와 종들에게 모든 일을 맡긴 것이 아니라 앞장서서 그들을 후대했다", "예수께서는 다른 사람들의 유익을 위해 자신의 능력을 관대하게 사용하셨다 (「파15」 6/15 4면 3-4항; 5면 8-9항)", "그분은 신혼부부가 손님들을 후대할 수 있도록 도와주셨다 (요 2:3, 6-10) [시각 자료 2]", "그분은 동정심에서 우러나와 자신이 모르는 가족들의 필요를 돌봐 주셨다 (마 14:14-21)", "마르다와 마리아는 예수를 후대했고 그분은 그들과 친한 친구가 되셨다 (요 11:5)", "마르다는 손님들의 신체적 필요를 돌보는 것도 중요하지만 영적인 격려를 주고받는 것이 더 중요하다는 교훈을 배웠다 (눅 10:39-42; 「믿본」 172-175면 4-13항)"]}, {"title": "오늘날 우리는 어떻게 후대를 나타낼 수 있는가?", "points": ["다른 사람들을 집으로 초대함으로 후대할 수 있다", "후대는 거창할 필요가 없다 (잠 15:17; 「파18.03」 16면 12항) [시각 자료 3]", "후대할 때 우리의 목표는 깊은 인상을 주는 것이 아니라 격려하는 것이어야 한다 (롬 1:11, 12)", "가족이나 친구들만 초대할 것이 아니라 가난하거나 연로하거나 수줍음이 많거나 어린 사람들도 포함시켜야 한다 (눅 14:12-14; 고후 6:13)", "형제들이 어려움을 겪을 때 그들을 위로하고 도와줄 수 있다 (요1 3:17; 「파20.07」 24면 14항) [시각 자료 4]", "집회에 새로운 사람이 참석하면 따뜻하게 환영할 수 있다 (롬 15:7; 「파18.03」 15면 5항; 「연16」 69면 \n1-2항)", "우리는 우리가 모르는 사람들에게 성경 진리를 전함으로 후대를 나타낸다", "우리는 진리를 전해 줌으로 사람들에게 영적으로 새 힘을 준다. 예수께서도 땅에 계실 때 그렇게 하셨다 \n(마 11:29)", "다양한 문화와 배경을 가진 사람들을 환영할 수 있다 (「파16.10」 10-11면 13-17항)", "후대를 하는 것도 중요하지만, 후대를 받을 때에도 감사를 나타내야 한다 (살전 5:18)", "우리는 후대를 하는 사람들의 집에 너무 자주 가거나 그곳에 너무 오래 머물러서 그들의 후대를 지나치게 이용하려 하지 않는다 (잠 25:17)", "우리는 배려심 있고 새 힘을 주는 손님이 되기 위해 노력한다 (「파18.03」 18면 20-21항)"]}, {"title": "후대하면 축복을 받는다", "points": ["후대를 나타낼 수 있는 방법들을 계속 찾으라 (잠 3:27; 「파09」 10/15 19면 7항)", "후대하면 자신과 다른 사람들 모두 유익을 얻는다 (잠 11:25)", "우리를 보고 다른 사람들도 관대하게 후대하려는 마음을 갖게 될 수 있다", "우리는 새로운 친구들을 사귀고, 이미 친구로 지내는 사람들과도 더 가까워지게 될 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 77 11/21"]}]}, {"no": 78, "title": "기쁜 마음으로 여호와를 섬기십시오", "t": 0, "note": "", "sections": [{"title": "여호와와 그분의 숭배자들은 기쁨을 누린다", "points": ["살면서 문제들을 겪을 때에도 기쁨을 누리는 것이 가능한가?", "여호와는 “행복하신 하느님”이시며 그분을 숭배하는 사람들도 기쁨을 누리도록 도우신다 (딤전 1:11)", "예수와 천사들도 기쁨을 누리고 있다 (욥 38:7; 잠 8:30, 31)", "현재 “온 땅”에서 많은 사람들이 “기쁨으로 여호와를 섬기”고 있다 [시편 100:1, 2 낭독]", "당신이 여호와와 친밀한 관계를 발전시켜 나간다면, 기뻐할 이유들을 많이 발견하게 될 것이다"]}, {"title": "여호와를 섬길 때 기쁨을 누릴 수 있는 이유", "points": ["우리는 하느님을 숭배하도록 창조되었다. 따라서 하느님을 숭배하는 일을 삶에서 첫째 자리에 둘 때 기쁨을 누리는 것이 당연하다 (시 112:1; 전 12:13)", "여호와를 섬기는 것은 결코 짐스럽지 않으며, 오히려 새 힘을 주고 기운을 북돋워 준다", "여호와께서는 자신의 숭배자들에게 성령을 주시며, 성령은 그들이 진정한 기쁨을 누리게 도와준다 (갈 5:22; 살전 1:6; 「파18.02」 28면 5항)", "하느님을 섬길 때 누리는 기쁨은 우리 자신이 처한 상황에 좌우되지 않는다", "우리는 살면서 문제들을 겪을 수 있지만, 그럴 때에도 기쁨을 누릴 수 있다 (「파18.02」 28면 4항)", "[시련을 겪을 때에도 기쁨을 유지한 사람에 관한 경험담 한 가지를 언급한다. 예를 들어, 「파수대」 2018년 2월호 29면 4항 참조]"]}, {"title": "여호와의 사랑과 관심은 우리에게 기쁨을 준다", "points": ["우리는 여호와께서 항상 우리를 돌봐 주실 것임을 알기 때문에 기쁨을 누린다 [시편 100:3 낭독]", "여호와께서는 우리가 삶의 즐거움을 느끼는 데 필요한 모든 것들을 관대하게 공급해 주셨다", "그분은 우리를 위해 잘 설계된 인체, 아름다운 색깔, 맛있는 음식 그리고 그 밖에도 매우 많은 것들을\n주셨다", "여호와께서는 따뜻한 목자로서 “그분 목초지의 양들”에게 깊은 관심을 나타내신다 [시각 자료 1]", "그분은 자신의 숭배자들을 인도하고 보호하고 영적으로 먹이신다 (시 23:1-6)", "하느님께서는 우리가 문제와 염려에 대처하도록 도와주신다 (시 34:6-8; 94:17-19)", "그분은 자신의 말씀인 성경을 통해 위로와 도움을 베푸신다 (롬 15:4)"]}, {"title": "하느님을 찬양하고 그분께 감사를 드림으로 기쁨을 얻으라", "points": ["우리에 대한 여호와의 사랑을 느끼면, 그분을 찬양하고 그분께 감사드리려는 마음이 생긴다 [시편 100:4 낭독]", "시편 100편은 “감사의 시가”이다 (시 100, 머리글)", "오늘 이 집회와 같은 모임에 정기적으로 참석함으로 여호와를 찬양할 수 있다", "하느님께 찬양의 노래를 부르면 기쁨과 열정과 힘을 얻게 된다 (엡 5:19) [시각 자료 2]", "다른 사람들에게 여호와와 그분의 특성들에 대해 알려 줌으로 “그분의 이름을 찬양하라” (히 13:15) \n[시각 자료 3]", "사람들이 좋은 반응을 보이지 않더라도 기쁨을 잃지 말라", "여호와께서 사랑으로 베푸시는 인도를 따름으로 그분이 당신을 위해 해 주신 모든 것에 대해 감사하고 있음을 나타내라 (눅 11:28)"]}, {"title": "당신은 영원히 기쁨으로 여호와를 섬길 수 있다", "points": ["여호와께서는 우리를 위해 이미 많은 선한 일들을 해 오셨고, 앞으로 더 많은 일들을 해 주실 것이다 \n[시편 100:5 낭독]", "기쁨을 유지하기 위해, 여호와께서 지금 하고 계시는 선한 일들에 초점을 맞추고 미래에 있을 더 큰 축복들을 고대하라", "여호와의 “충성스러운 사랑은 영원하다”", "그분은 자신의 충실한 숭배자들을 결코 실망시키지 않으신다", "그분은 자신의 왕국을 통해 오늘날 우리에게 고통을 초래하는 모든 문제를 없애실 것이다 (계 21:4, 5)", "그분 곁에 계속 가까이 머물라. 그러면 영원히 기쁨으로 그분을 섬길 수 있을 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 78 11/21"]}]}, {"no": 79, "title": "당신은 하느님의 친구가 될 것인가, 세상의 친구가 될 것인가?", "t": 9, "note": "", "sections": [{"title": "당신은 하느님의 친구가 될 것인가, 세상의 친구가 될 것인가?", "points": ["좋은 친구를 선택하면 큰 유익을 얻을 수 있다 (잠 17:17; 전 4:9)", "여호와 하느님은 우리가 사귈 수 있는 가장 좋은 친구이시며, 자신에게 가까이 오라고 우리에게 권하신다\n(약 4:8)", "여호와는 완전하고 거룩한 분이시지만, 불완전한 사람들이 그분의 친구가 될 수 있는 길을 열어 주셨다 \n(요1 4:10)", "우리는 하느님의 친구가 될지 세상의 친구가 될지 선택해야 한다 [야고보서 4:4 낭독]", "세상의 친구가 되는 사람들은 세상의 통치자인 사탄의 영향력 아래 있게 된다 (요1 5:19)"]}, {"title": "어떻게 하느님의 친구가 될 수 있는가?", "points": ["여호와의 친구가 되려면 먼저 그분을 알아 가야 한다 (요 17:3)", "우리는 그분의 특성과 표준에 대해 배워야 한다", "우리는 예수의 삶을 연구함으로 그분의 아버지 여호와를 더 잘 알아 갈 수 있다 (요 12:45; 요1 5:20)", "여호와의 친구들은 그분의 의로운 표준에 따라 살아간다 [시편 15:1, 2 낭독]", "그들은 여호와께서 원하시는 방식으로 사람들을 대한다 (시 15:3-5; 「파14」 2/15 23면 10-13항)", "우리는 하느님의 친구였던 성경 인물들을 본받을 수 있다", "아브라함은 여호와와 친밀한 우정을 나눴다 (사 41:8; 약 2:23)", "아브라함은 하느님께 믿음을 나타냈고 그분께 순종했다 (히 11:8-10) [시각 자료 1]", "모세는 여호와와 특별히 가까운 관계를 누렸다 (출 33:11; 신 34:10)", "모세는 이집트에서 명성을 누리고 안락한 삶을 사는 것보다 여호와를 섬기는 쪽을 선택했다 \n(히 11:24-27) [시각 자료 2, 3]"]}, {"title": "세상의 친구가 되는 일을 어떻게 피할 수 있는가?", "points": ["사탄은 “세상의 영”을 이용해 사람들에게 영향을 끼친다 (고전 2:12; 「랑쉬」 63-64면 7-10항)", "세상의 영의 지배를 받는 사람들은 하느님의 조언과 표준을 무시한다 (엡 2:1, 2)", "그러한 사람들과 가깝게 어울리지 않는 것이 지혜롭다 (고전 5:9, 10)", "세상의 영이 아니라 하느님의 영의 인도에 따라 살아간다는 것을 나타내라 (롬 12:2; 갈 5:22, 23, 25)", "부도덕한 행실과 생활 방식을 멀리하라 (고전 6:9, 10)", "여호와께서 미워하시는 것들이 포함된 오락과 여가 활동을 피하라. 유명인들을 우상화하지 말라", "이 세상에서 부나 명성을 얻으려고 애쓰지 말라 (마 6:24; 요1 2:15, 16)", "인간이 아니라 하느님께서 인류의 문제들을 해결하실 것임을 신뢰하라 (시 146:3)", "정치에 관여하기를 거부하신 예수를 본받으라 (요 17:15, 16; 18:36)"]}, {"title": "여호와의 친구가 되면 축복이 따른다", "points": ["하느님의 친구가 되면 현재는 물론 미래에도 축복이 따른다", "여호와께서는 자신을 사랑하는 사람들을 돌보겠다고 약속하신다 (마 6:31-34)", "하느님의 친구가 되면 기쁨과 마음의 평화, 안전을 누린다 (시 4:8; 사 57:20, 21)", "“세상은 지나가고 있”지만, 하느님의 친구들은 영원히 살 것이다 [요한 1서 2:17 낭독]", "우리는 여호와와 영원히 우정을 누릴 수 있으며, 그 우정은 영원히 계속 더 깊어질 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 79 11/21"]}]}, {"no": 80, "title": "과학과 성경—당신은 어느 쪽에 희망을 두는가?", "t": 4, "note": "", "sections": [{"title": "과학은 여러 가지 면에서 우리에게 유익을 준다", "points": ["고대로부터 여호와의 숭배자들은 그분의 창조 작품들을 연구하는 것을 좋아했다 (시 111:2)", "현대의 과학 연구는 하느님의 능력과 지혜를 더 깊이 이해하는 데 도움이 된다", "우주는 우리가 육안으로 볼 수 있는 것보다 훨씬 더 광대하고 복잡하다 (「파14」 5/15 21면 3항)", "살아 있는 세포에 들어 있는 DNA는 과학자들이 한때 생각했던 것보다 훨씬 더 복잡하다 (「깨」 15/8 4면 4항; 「깨」 11/11 6면)", "과학자들은 연구를 통해 생명을 구하는 의약품과 의료 장비 등 많은 유용한 발명품을 개발했다 (「파15」 6/1 3면 1-4항)"]}, {"title": "과학에는 한계가 있다", "points": ["과학자들은 인간이 관찰하고 연구한 것에 기반하여 결론을 이끌어 낸다. 따라서 그들의 노력은 인간의 오류와 한계에 영향을 받을 수밖에 없다 (렘 17:9)", "그러한 한계 때문에 인간의 기술은 많은 오염 물질과 끔찍한 무기들을 만들어 내는 부작용을 일으켜 왔다 \n[시각 자료 1]", "과학적 발전은 편견과 탐욕, 증오를 없애지 못했다", "불완전한 인간의 과학적 발견과 결론에 희망을 두는 것은 어리석은 일이다 [시편 146:3, 4 낭독]"]}, {"title": "우리는 성경을 온전히 신뢰할 수 있다", "points": ["성경에는 성경이 하느님의 영감을 받았다는 증거가 많이 들어 있다", "성경은 수천 년 전에 기록되었지만 과학적으로 정확하다", "지구는 “공중에” 떠 있다 (욥 26:7)", "물은 자연계의 법칙에 따라 순환한다 (욥 36:27, 28; 「깨17.3」 4면) [시각 자료 2]", "감정은 신체 건강에 영향을 준다 (잠 17:22)", "격리하는 것은 감염병이 퍼지는 것을 막아 준다 (레 13:46; 「통」-2 881면 6항)", "성경의 지혜로운 조언은 시대와 문화에 상관없이 언제나 유익하다는 것이 증명되었다 (딤후 3:16)", "성경 덕분에 많은 사람들은 탐욕, 편견, 약물 중독과 같은 문제들을 극복함으로 훨씬 더 나은 삶을 살게 되었다 (골 3:9-14)", "[“성경이 생활을 변화시키다” 연재 기사에 나오는 한두 가지 경험담을 간단히 이야기한다]"]}, {"title": "성경은 우리에게 확실한 희망을 준다", "points": ["성경은 하느님의 왕국만이 인류의 모든 문제를 해결할 것이라고 알려 준다 [마태복음 6:9, 10 낭독]", "그 왕국은 인간이 결코 이룰 수 없었던 일들을 이룰 것이다", "많은 해를 끼쳐 온 인간 통치가 끝날 것이다 (전 8:9; 단 2:44)", "고통, 질병, 죽음이 사라질 것이다 (사 33:24; 계 21:3, 4)", "죽은 사람들이 부활될 것이다 (행 24:15)", "땅은 모든 사람을 위한 풍부한 식품을 생산할 것이다 (시 72:16)", "인류는 영원히 함께 평화롭게 사는 법을 배울 것이다 (사 11:9)", "예수께서 행하신 기적들은 왕국 통치를 받으며 사는 삶이 어떠할지 미리 보여 준다 (마 15:30, 31; \n눅 7:11-15; 요 6:10-13)"]}, {"title": "우리는 확신을 가지고 하느님께 희망을 둘 수 있다", "points": ["과학과 성경은 둘 다 하느님의 약속을 신뢰할 수 있는 이유들을 제시한다", "우주와 자연계에서 볼 수 있는 설계는 하느님께서 우리의 문제들을 해결할 능력과 지혜를 가지고 계신다는 확신을 강화시켜 준다 (시 104:24; 사 40:26)", "성경은 하느님이 우리를 도우려는 열망을 갖고 계신다는 확신을 주며 그분이 어떻게 그렇게 하실지 알려 준다", "성경을 직접 조사해 봄으로 성경에 대한 믿음을 키워 나가라", "당신은 확신을 가지고 하느님의 약속에 희망을 둘 수 있다 [시편 146:5, 6 낭독]", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 80 11/21"]}]}, {"no": 81, "title": "누가 제자 삼는 일을 할 자격이 있는가?", "t": 7, "note": "", "sections": [{"title": "예수께서는 모든 그리스도인이 제자 삼는 일을 하기를 바라신다", "points": ["사람들은 흔히 성경을 가르치는 사람이라고 하면 고등 교육을 받았거나 특별한 직함을 가진 사람을 떠올릴지 모른다", "하느님의 말씀을 가르치는 사람이 되려면 어떤 자격이 필요한가? 당신도 그런 자격을 갖출 수 있는가?", "예수께서는 모든 참그리스도인이 제자 삼는 일을 하기를 바라신다 [마태복음 28:19, 20 낭독] [시각 자료 1]", "사람들을 제자로 삼으려면 전파하는 일과 가르치는 일을 둘 다 해야 한다 (「파21.07」 2-3면 3-5항)", "전 세계에서 여호와의 증인은 예수의 명령에 순종하고 있다", "제자 삼는 일을 하는 데 필요한 자격 요건은 여호와 하느님이 정하신다 [고린도 후서 3:5 낭독]", "하느님께서는 이 중요한 일에 참여하기 원하는 사람들을 훈련하시고 그들이 자격을 갖추게 도와주신다 \n(「파02」 2/15 24면 3-4항)"]}, {"title": "예수께서는 하느님께 훈련받고 임명받으셨다", "points": ["예수께서는 땅에서 봉사하는 데 필요한 훈련을 아버지 여호와로부터 받으셨다 (사 50:4, 5; 「국」 182-183면 4-5항)", "예수께서는 전파하고 가르칠 자격을 갖추기 위해 종교 학교에 다니실 필요가 없었다", "그분은 성경을 잘 아셨고, 성경에 근거해 가르치셨다 (요 7:14-16; 「따」 100면 6항)", "예수께서는 땅에서 봉사를 시작하시기 전에, 기꺼이 하느님의 뜻을 행하겠다는 표시로 침례를 받으셨다 \n[시각 자료 2]", "예수께서는 침례받으실 때 성령으로 기름부음을 받으셨고 하느님으로부터 메시아로 임명받으셨다 \n(눅 3:21, 22; 행 10:38)", "하느님께서는 예수에게 성령을 주셨고, 예수께서는 성령에 힘입어 자신의 사명을 완수하실 수 있었다 \n(눅 4:17-19)"]}, {"title": "당신은 어떻게 제자 삼는 일을 할 자격을 갖출 수 있는가?", "points": ["겸손하고 기꺼이 자원하는 사람이라면 누구나 하느님의 말씀을 가르칠 자격을 갖출 수 있다 (행 4:13)", "남자이든 여자이든 나이가 많든 적든 그렇게 할 수 있다", "예수처럼 그분의 참제자들도 훈련을 잘 받고 성령의 인도를 받는다 (행 1:8)", "그리스도인이라고 주장하기만 하면 모두가 제자 삼는 일을 할 자격이 있는가? 아니다. 특정한 단계들을 밟아야 한다", "단계 1: 성경에 대한 정확한 지식을 얻는다 (딤전 2:4)", "제자 삼는 일을 하는 사람은 기본적인 성경 진리를 정확하게 가르칠 수 있어야 한다 (딤후 1:13)", "모든 것을 다 알아야 하는 것은 아니다. 성경 지식은 계속해서 자라 갈 것이다 (골 1:9, 10)", "단계 2: 예수의 대속 희생과 하느님의 약속에 대한 믿음을 나타낸다 (롬 10:9, 10)", "제자 삼는 일을 하는 사람은 자신이 가르치는 것이 진리라는 굳은 확신이 있어야 한다", "단계 3: 잘못된 행실을 피하고, 옳은 일을 한다 (행 3:19; 롬 12:2)", "제자 삼는 일을 하는 사람은 자신이 가르치는 것을 실천해야 한다 (롬 2:21; 빌 1:10)", "단계 4: 회중과 함께 전파한다 (롬 10:14, 15; 고후 4:13)", "단계 5: 하느님께 헌신한다 (마 16:24; 벧전 4:2)", "단계 6: 침례를 받는다 (벧전 3:21) [시각 자료 3]", "당신이 여호와의 증인으로 침례받을 때 하느님께서는 당신이 제자 삼는 일을 할 자격을 온전히 갖추었다고 인정하신다"]}, {"title": "제자 삼는 일은 큰 기쁨을 준다", "points": ["제자 삼는 일을 하면 축복을 받는다. 지금도 보람 있는 삶을 살고 미래에 영원한 생명을 얻게 된다 (딤전 4:16)", "다른 사람들을 가르치는 일은 아마겟돈 후에도 계속될 것이다 (「파20.08」 16면 6항)", "지금 하느님의 동료 일꾼이 될 기회를 놓치지 말라 (고전 3:5-9)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 81 11/21"]}]}, {"no": 82, "title": "여호와의 그리스도—우리 일반의 입부인가?", "t": 0, "note": "메시아에 관한 예언이 이루어졌음을 보여 주고 그분의 통치에 대한 기대를 높여 준다", "sections": [{"title": "메시아에 관한 예언들", "points": ["성경은 메시아에 관해 수백 년 전에 예언했다", "탄생지, 혈통, 사역에 관한 예언들이 있다 (미 5:2; 사 9:6, 7)"]}, {"title": "이 예언들이 이루어졌다는 증거", "points": ["예수의 삶과 사역이 예언과 정확히 일치한다 (눅 4:18-21)", "역사적 증거가 이를 뒷받침한다"]}, {"title": "메시아의 통치가 시작되었다", "points": ["1914년에 메시아의 통치가 시작되었다 (단 4:17)", "이 사실을 나타내는 증거들이 있다"]}, {"title": "메시아의 통치가 우리에게 의미하는 바", "points": ["메시아는 왕국을 통해 인류의 문제를 해결하실 것이다", "그의 통치 아래 영원한 평화와 번영이 있을 것이다 (시 72:7, 8)"]}]}, {"no": 83, "title": "그리스도인은 십계명을 지켜야 하는가?", "t": 3, "note": "", "sections": [{"title": "십계명은 무엇인가?", "points": ["십계명은 하느님께서 고대 이스라엘 나라에 주신 기본적인 법이다 (신 4:13) [시각 자료 1]", "이 계명들은 하느님께서 이스라엘에게 주신 행실, 희생, 건강, 안식일에 대한 약 600개의 법의 기초가 되었다", "하느님께서 모세를 통해 이 모든 법을 전달하셨기 때문에, 이 법들은 모세의 법 또는 모세 율법이라고 불리기도 한다 (왕상 2:3)", "오늘날 그리스도인은 십계명을 지켜야 하는가?"]}, {"title": "모세 율법은 누구에게 그리고 왜 주어졌는가?", "points": ["십계명을 포함한 율법은 이스라엘에게만 주어졌다 [시편 147:19, 20 낭독]", "율법의 목적은 무엇이었는가?", "이스라엘 나라를 위한 기본법의 역할을 했다", "율법은 불완전한 인간이 죄를 쉽게 짓고 하느님의 은혜를 받으려면 그분의 도움이 필요하다는 것을 깨닫게 해 주었다 (갈 3:19; 「파03」 3/15 20면 3항)", "율법은 유대인들이 메시아이신 예수께서 오실 때 준비되어 있도록 해 주었다 (갈 3:24; 「파03」 3/15 21면 4항)"]}, {"title": "예수께서 죽으셨을 때 무슨 일이 있었는가?", "points": ["예수께서 죽으신 후에, 모세 율법은 더 이상 필요하지 않게 되었다 (롬 10:4; 갈 3:25)", "그리스도인 회중은 하느님께서 택하신 백성인 이스라엘을 대체하는 새로운 영적 나라가 되었다 (마 21:42, 43; 벧전 2:9, 10; 「통」 “나라들, 이방 사람들” 10-12항)", "유대인 그리스도인들은 율법에서 풀려났다 [로마서 7:6 낭독]", "로마서 7:7에서 사도 바울은 십계명을 인용했는데, 그것을 더 이상 효력이 없는 율법의 일부로 포함시켰다", "매주 안식일을 지키는 법도 끝나게 되었는가? 그렇다 (골 2:16, 17)", "비유대인 그리스도인들은 모세 율법 아래 있은 적이 없다", "더 이상 율법이 유대인들과 비유대인들을 갈라놓지 않았다 (엡 2:14-16; 「통」 “경계” 15항)"]}, {"title": "그리스도인들은 어떤 법을 지켜야 하는가?", "points": ["나라가 바뀌면 헌법이 바뀔 수 있듯이, 그리스도인도 새로운 법 아래 있게 되었다 (「파10」 2/1 14면 1항)", "그리스도인들은 “그리스도의 법” 아래 있다 [갈라디아서 6:2 낭독] (「파22.03」 21면 5항)", "모세 율법과 비슷하게, 그리스도의 법은 하느님에 대한 사랑과 이웃에 대한 사랑에 근거해 있다 (레 19:18; 신 6:5; 마 22:35-40)", "십계명에 들어 있는 원칙들은 그리스도의 법에도 반영되어 있다 [“성경 질문과 대답” 기사 “십계명이란 무엇입니까?”에 나오는 예들을 언급한다]", "그리스도의 법은 모세 율법이 이스라엘 사람들에게 세워 준 표준보다 더 높은 표준을 그리스도인들에게 세워 주었다", "몇 가지 예를 생각해 보자", "“살인해서는 안 된다” (출 20:13)", "그리스도인들은 미워하는 행동뿐 아니라 미워하는 감정까지도 멀리한다 (마 5:21, 22) [시각 자료 2]", "“간음해서는 안 된다” (출 20:14)", "그리스도인들은 부도덕한 행동으로 이어질 수 있는 나쁜 욕망도 물리친다 (마 5:27, 28) [시각 자료 3]", "“증인을 설 때 이웃에 대해 거짓 증언을 해서는 안 된다” (출 20:16)", "그리스도인들은 법정에서뿐 아니라 생활의 모든 부면에서 진실을 말해야 한다 (마 5:37)", "그리스도인들은 십계명이나 그 밖의 모세 율법 아래 있지 않지만 율법을 공부하는 것은 유익하다. 율법이 하느님의 생각을 밝혀 주기 때문이다 (롬 15:4)", "희생과 관련된 율법과 같이 이스라엘 백성이 지켜야 했던 일부 율법은 그리스도인에게 상징적인 의미가 있다 (히 13:15, 16; 「파07」 4/1 20면 1-2항)", "하느님에 대한 사랑과 예수에 대한 사랑이 동기가 되어 그리스도의 법을 따르도록 하자 (요 14:15; 요1 5:3)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 83 1/25"]}]}, {"no": 84, "title": "당신은 이 세계의 운명을 피할 것인가?", "t": 1, "note": "이 세계 제도의 종말이 임박했음을 알리고 생존하기 위한 행동을 취하도록 청중을 격려한다", "sections": [{"title": "이 세계의 종말이 임박했다", "points": ["성경은 이 세계 제도가 끝날 것임을 예언한다 (단 2:44)", "우리는 지금 그 마지막 때에 살고 있다"]}, {"title": "생존을 위한 준비가 필요하다", "points": ["노아는 홍수를 대비해 준비했다 (창 6:22)", "생존하기 위해 지금 행동해야 한다"]}, {"title": "생존하기 위해 무엇을 해야 하는가?", "points": ["여호와와 긴밀한 관계를 맺어야 한다", "회중과의 유대를 강화해야 한다", "왕국의 좋은 소식을 전파하는 일에 참여해야 한다"]}, {"title": "여호와께서 우리를 보호하실 것이다", "points": ["여호와는 충실한 자들을 버려두지 않으신다 (시 37:28)", "그분의 약속을 신뢰하고 앞으로 나아가자"]}]}, {"no": 85, "title": "독특한 세상에서 전파되는 좋은 소식", "t": 7, "note": "오늘날 전파되는 소식이 정말로 좋은 소식임을 청중에게 확신시켜 준다", "sections": [{"title": "독특한 소식이 전파되고 있다", "points": ["오늘날 세상에서 정말로 좋은 소식을 찾기 어렵다", "그러나 성경은 독특하게 좋은 소식을 담고 있다 (눅 4:43)"]}, {"title": "이 좋은 소식의 내용은 무엇인가?", "points": ["하느님의 왕국이 인류의 모든 문제를 해결한다", "예수께서 왕으로 통치하신다", "죽은 자들이 부활할 것이다"]}, {"title": "이 소식을 전하는 사람들", "points": ["전 세계에서 여호와의 증인들이 이 소식을 전파한다", "그들은 자원하여 기꺼이 이 일을 한다 (시 110:3)"]}, {"title": "이 소식이 당신에게 어떤 의미인가?", "points": ["이 소식은 개인적으로 당신에게 해당된다", "지금 이 좋은 소식에 귀를 기울이십시오 (계 22:17)"]}]}, {"no": 86, "title": "하느님께서 들으시는 기도", "t": 0, "note": "", "sections": [{"title": "여호와 하느님은 기도를 들으시는 분이다", "points": ["수많은 사람들은 종교가 있든 없든 기도를 한다 (「파15」 10/1 3면)", "하느님은 우리의 기도를 들으시는가? 만약 그렇다면, 우리의 기도에 응답해 주시는가?", "성경은 여호와 하느님이 “기도를 들으시는 분”이라고 보증한다 [시편 65:2 낭독]", "그분은 너무 바빠서 우리의 기도를 듣지 못하는 일이 결코 없으시다. 우리는 그분께 자주 그리고 길게 기도할 수 있다 (눅 6:12; 살전 5:17)"]}, {"title": "어떻게 하느님이 기뻐하시는 방식으로 기도할 수 있는가?", "points": ["기도는 숭배 행위이다. 우리는 여호와 하느님께만 기도해야 한다", "“성인”이나 우상에게 기도하는 것은 헛된 일이다 (출 20:4, 5; 「깨」 10/11 20-21면)", "우리는 예수께가 아니라 예수의 이름으로 기도해야 한다 (마 6:9; 요 14:6; 히 7:25)", "우리는 겸손하고 존중심 있게 믿음을 가지고 하느님께 나아가야 한다 (히 11:6; 「파14」 12/1 5면 2항)", "하느님은 우리가 암기한 기도를 반복하는 것이 아니라 마음에서 우러나와 기도하기를 바라신다 (마 6:7)", "어떤 의식을 따르거나 특정한 자세로 기도할 필요는 없다. 우리는 소리 내어 기도할 수도 있고 속으로 할 수도 있으며 어디에서나 기도할 수 있다 (「실쉬」 177면 10항) [시각 자료 1]", "하느님이 우리의 기도를 들으시려면 우리는 그분의 표준에 따라 살기 위해 최선을 다해야 한다 (잠 15:29; 벧전 3:12)", "하느님은 이기적이거나 폭력적인 사람들의 기도는 듣지 않으신다 (사 1:15; 약 4:3)"]}, {"title": "무엇에 대해 기도할 수 있는가?", "points": ["우리는 우리와 관련이 있는 어떤 문제에 대해서든 하느님께 말씀드릴 수 있다 [요한 1서 5:14, 15 낭독]", "하느님이 우리의 기도를 들으시려면 그분의 뜻과 일치한 기도를 드려야 한다", "예수께서 알려 주신 모범 기도에는 우리가 기도할 수 있는 중요한 주제들이 들어 있다 (마 6:9-13; 「파10」 10/1 7-8면)", "가장 중요한 것으로 우리는 하느님의 이름이 거룩해지고 그분의 왕국이 오기를 바라는 우리의 열망을 기도로 표현해야 한다", "우리의 기도에는 하느님에 대한 찬양과 감사가 포함되어야 한다 [빌립보서 4:6 낭독]", "우리는 기도를 통해 여호와와의 우정을 더 키울 수 있다", "우리는 고통과 슬픔을 포함해 자신의 마음속 깊은 감정을 표현할 수 있다 (삼상 1:15; 시 62:8)", "우리는 하느님께 우리의 죄를 용서해 달라고 청할 수 있다 (시 32:5)", "우리는 하느님의 뜻을 행하기 위해 필요한 힘과 용기를 달라고 기도할 수 있다 (시 51:10, 12; 행 4:29)"]}, {"title": "하느님은 우리의 기도에 어떻게 응답하시는가?", "points": ["여호와께서는 우리가 요청할 때 우리를 도와주시며 우리의 진정한 필요를 채워 주신다 (눅 11:11-13; 「파14」 4/1 6면)", "하느님이 우리의 어려움을 모두 없애 주실 것이라고 기대해서는 안 된다. 그분은 우리에게 필요한 힘을 주심으로 우리의 기도에 응답해 주실 수 있다 (고후 12:7-9)", "여호와께서는 우리에게 무엇이 가장 유익한지 아시며, 꼭 알맞은 때에 우리의 기도에 응답해 주신다 (벧전 5:6, 7)", "그분은 우리의 예상을 뛰어넘는 방법으로 응답해 주실지 모른다 (엡 3:20)", "여호와께서는 우리가 그분의 인도를 구할 때 그분의 말씀인 성경을 통해 응답해 주실 수 있다 (시 119:105; 약 1:5)", "우리는 기도와 일치하게 행동해야 한다 (「실쉬」 176면 8항)", "하느님이 당신의 기도를 들으신다는 것을 확신하면서 하느님께 기도로 계속 가까이 가라 (시 145:18; 잠 15:8)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 86 5/22"]}]}, {"no": 87, "title": "그리스도로 인해 담대하게 행동하십시오", "t": 7, "note": "청중이 그리스도의 이름을 위해 담대히 행동하도록 격려한다", "sections": [{"title": "담대함이 필요한 이유", "points": ["우리는 어려운 시대에 살고 있다 (딤후 3:1)", "많은 사람들이 좋은 소식을 거부한다"]}, {"title": "담대함의 원천", "points": ["기도와 성경 연구를 통해 힘을 얻는다", "예수의 모범을 본받는다 (행 4:13)", "형제들의 지원을 받는다"]}, {"title": "담대함을 어떻게 나타내는가?", "points": ["전도 활동에 적극적으로 참여한다", "진리를 변호할 준비가 되어 있다 (벧전 3:15)", "어떤 상황에서도 자신의 신앙을 공개적으로 나타낸다"]}, {"title": "담대하게 행동한 결과", "points": ["좋은 소식이 더 많이 전파된다", "다른 사람들이 감명을 받는다", "여호와를 영화롭게 한다"]}]}, {"no": 88, "title": "성경의 표준에 따라 생활해야 할 이유", "t": 4, "note": "", "sections": [{"title": "성경의 도덕 표준은 하느님이 주신 것이다", "points": ["대부분의 사람들은 적어도 삶의 일부 부면에서는 표준이 필요하다는 것을 인정한다 (「파06」 10/1 8면 4항)", "신뢰할 만하고 유익한 도덕적 지침을 어디에서 찾을 수 있는가?", "행실에 대한 성경의 표준은 여호와 하느님께서 주신 것이다 (딤후 3:16)", "인간의 표준과는 달리 하느님의 표준은 변하지 않는다 (말 3:6)", "성경의 표준에 여호와의 특성들이 어떻게 반영되어 있는지, 그리고 그 표준을 따를 때 어떤 유익을 얻을 수 있는지 살펴보자"]}, {"title": "여호와의 표준은 사랑에 기초해 있다", "points": ["여호와는 사랑이 많은 하느님이시다. 그분은 모든 일을 사랑에서 우러나와 하신다 (요1 4:7, 8)", "그분은 우리를 사랑하시기 때문에 우리에게 도덕적인 인도를 베푸신다 [이사야 48:17, 18 낭독]", "가정생활을 위한 성경의 표준은 비이기적인 사랑을 나타내도록 권한다 (엡 5:22-25, 28, 33; 6:1-4) [시각 자료 1]", "가족 구성원들이 하느님의 인도를 따르면 가족 전체가 유익을 얻는다", "[“성경 질문과 대답” 항목의 “성경이 가정의 행복에 도움이 될 수 있습니까?” 기사 참조]"]}, {"title": "여호와의 표준은 지혜롭다", "points": ["여호와의 지식과 지혜는 우리보다 훨씬 더 우월하다 (사 55:8, 9)", "우리 스스로의 표준을 따르는 것은 위험하다 (잠 14:12; 렘 10:23; 17:9)", "하느님의 지혜로운 인도를 따르는 것은 우리가 해를 입지 않게 보호해 준다 [잠언 2:6, 7 낭독]", "성도덕에 대한 성경의 표준을 따르는 사람들은 유익을 얻는다 (고전 6:9, 10, 18; 「파11」 11/1 8면)", "성경의 그러한 표준은 현실과는 동떨어진 것인가? 아니다", "여호와께서는 그분의 표준에 따라 살기 원하는 사람들이 그렇게 할 수 있도록 도와주신다 (고전 6:11; 「파10」 4/15 9면 11항)"]}, {"title": "여호와의 표준은 공의롭다", "points": ["여호와는 항상 옳은 일을 하시는 공의의 하느님이다 [신명기 32:4 낭독]", "그분은 모든 사람을 편파적이지 않고 공정하게 대하신다 (행 10:34, 35)", "여호와께서는 우리가 “옳고 공의로운 일을 하”기 바라신다 (잠 21:3)", "다른 사람을 어떻게 대해야 하는지에 대한 성경의 표준은 평화와 행복에 기여한다 (시 106:3)", "우리가 정직하고 공정하게 행동하면 다른 사람의 신뢰를 얻게 된다 (엡 4:25, 28; 히 13:18; 「랑쉬」 194면 18항) [시각 자료 2]", "오늘날처럼 부패한 세상에서 정직하게 산다는 것은 비현실적인 일인가? 아니다", "여호와께서는 그분의 표준에 따라 사는 사람들을 돌보아 주시겠다고 약속하신다 (시 5:12; 마 6:33)"]}, {"title": "하느님과 그분의 표준에 대한 사랑을 계속 길러 나가라", "points": ["당신이 여호와를 더 잘 알고 더 사랑하게 될수록, 그분의 표준에 따라 사는 것이 더 쉬워질 것이다 (요1 2:3; 5:3)", "성경을 읽으면서 여호와의 특성들과 그분이 특정한 표준을 세우신 이유를 묵상해 보라", "성경의 표준을 생활에 적용하면서 그것이 자신에게 얼마나 유익한지 유의해 보라 (시 34:8; 119:138)", "성경을 통해 자신의 표준을 알려 주신 여호와께 우리는 정말 감사드린다! (시 40:5)", "언제나 그분의 인도를 따르겠다고 결심하라", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 88 5/22"]}]}, {"no": 89, "title": "진리에 목마른 사람은 오십시오!", "t": 4, "note": "", "sections": [{"title": "당신은 진리를 목마르게 찾고 있는가?", "points": ["세상에는 서로 다른 교리를 가르치는 수많은 종교들이 있다", "이러한 종교적인 혼란 때문에 많은 사람들은 좌절하고 실망한다", "당신은 하느님과 그분의 목적에 대한 참되고 만족스러운 답을 목마르게 찾고 있는가?", "오직 하느님의 영감받은 말씀인 성경에서만 종교적인 진리를 발견할 수 있다 (요 17:17; 딤후 3:16; 「행누」 14과 요점 1; 「파배20.1」 5면)", "여호와의 증인이 믿는 신앙은 전적으로 성경에만 근거해 있다 (요 4:24)", "성경을 보면 우리가 하느님께 가까이 가고 영원한 생명을 얻을 수 있다는 점을 배우게 된다 (약 4:8; 요 17:3)", "당신은 하느님의 말씀에 들어 있는 진리에서 개인적으로 어떻게 유익을 얻을 수 있는가?"]}, {"title": "하느님은 “생명수를 거저 마시라”고 당신을 초대하신다", "points": ["성경에는 생명을 주는 “물”을 마시라는 가슴 벅찬 초대가 나온다 [요한 계시록 22:17 낭독]", "이 상징적인 “물”에는 순종하는 인류가 영원한 생명을 얻게 해 주는 하느님의 모든 마련이 포함된다", "그중 가장 중요한 마련은 예수의 대속 희생이다 (요 3:16; 「파10」 2/15 15면 4항)", "또한 생명을 주는 이 물에는 하느님의 말씀에 들어 있는 진리도 포함된다", "여호와 하느님은 그 물과 그 물을 마시라는 초대의 근원이시다 (계 22:1; 「파10」 2/15 15면 5항) [시각 자료 1]", "그 초대는 땅에서 영원히 살 전망을 가진 사람들에게 발해진다", "그 초대를 듣고 받아들이는 사람들은 다른 사람들에게도 동일한 초대를 한다"]}, {"title": "당신은 하느님의 초대를 받아들일 것인가?", "points": ["하느님은 “누구든지 목마른 사람”은 “생명수를 거저 마시라”고 초대하신다", "여호와의 증인은 당신이 무료로 성경 진리를 배울 수 있게 기꺼이 도와줄 것이다", "하지만 하느님의 초대를 받아들이려면 당신의 노력도 필요하다 (눅 13:24)", "성경 진리를 배우고 여호와께 가까이 가는 것을 우선순위로 삼으라", "덜 중요한 활동을 줄여서 시간을 만들라 (엡 5:15-17; 「파18.11」 5면 7항)", "다른 사람들의 압력이나 생활의 염렷거리들 때문에 하느님께 가까이 가지 못하는 일이 없게 하라 (마 10:32-39; 13:20-23)", "거짓 종교의 가르침에서 벗어나라", "거짓 종교의 가르침이나 관습을 버리기가 쉽지 않다면 성경 진리에 대한 사랑을 계속 길러 나가라 [이사야 55:1, 2 낭독]", "하느님께 힘을 주시고 인도해 달라고 요청하라 (요 8:31, 32; 빌 4:13)", "하느님의 초대를 다른 사람들에게 전해 주라", "하느님의 초대를 받아들이는 사람들은 다른 사람들도 그렇게 하도록 초대한다 (「파11」 12/15 25면 16항)", "당신이 배운 성경 진리를 사람들에게 알려 주라 (「행누」 22과 요점 1-2)", "하느님께 헌신하고 침례를 받으라", "하느님을 사랑하고 그분이 해 주신 모든 일에 대해 감사하고 있다면 참숭배의 편에 서 있음을 분명히 나타내야 한다 (벧전 3:21; 요1 4:10, 19; 「행누」 46과 소개말 및 요점 1-2)"]}, {"title": "생명을 위한 하느님의 마련들로부터 영원히 유익을 얻으라", "points": ["지금 하느님의 초대를 받아들여서 진리에 대한 목마름을 채우라", "그렇게 하는 사람들은 이 세상의 끝을 생존하여 땅에서 영원히 살 희망을 갖게 될 것이다", "생명을 위한 하느님의 마련들은 순종하는 사람들을 완전성에 이르게 해 줄 것이다 (계 22:1, 2; 「파22.05」 18면 16항) [시각 자료 2]", "당신은 “모든 것을 새롭게” 하시겠다는 하느님의 약속의 성취를 기대감을 가지고 기다릴 수 있다 (계 21:3-5)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 89 5/22"]}]}, {"no": 90, "title": "참생명을 얻기 위해 힘써 노력하십시오!", "t": 9, "note": "참생명이 무엇이고 우리 모두가 참생명을 얻기 위해 힘써 노력해야 하는 이유가 무엇인지 설명한다. 헌신하고 침례받기를 주저하는 사람들에게 행동하려는 동기를 불어넣어 준다. 따뜻하고 긍정적인 어조로 여호와께서 사랑에 찬 관심을 갖고 계시고 도움을 베푸실 것이라는 점을 관심자들에게 확신시켜 준다", "sections": [{"title": "참생명이란 무엇인가?", "points": ["사람들은 행복과 안전과 더 좋은 미래를 가져다줄 것이라고 생각되는 여러 가지 목표를 추구한다", "성경에서는 더 나은 목표 즉 “참생명”이라는 목표를 추구하라고 알려 준다 [디모데 전서 6:19 낭독] (「실쉬」 203면 21항)", "참생명은 완전한 상태에서 누리는 영원한 생명을 말한다 (딤전 6:12)", "하느님께서 원래 뜻하신 대로, 수많은 사람이 낙원이 된 땅에서 영원한 생명을 즐길 것이다 (시 37:29)", "이 놀라운 선물은 굳게 잡기 위해 노력할 만한 가치가 있다 (딤전 6:11, 17, 18; 「실쉬」 203면 22항)"]}, {"title": "참생명을 목표로 삼아야 하는 이유는 무엇인가?", "points": ["참생명을 얻기 위해 힘써 노력하면 다른 어떤 행로를 추구할 때보다 훨씬 더 유익한 결과를 거두게 된다", "우리는 지금 유익을 얻는다. 가정생활이 더 행복해지고, 마음이 더 편안해지며, 더 건강한 삶을 살게 된다 [이사야 48:17 낭독]", "다른 행로를 추구하면 쓰라린 결과를 거두게 된다 (전 5:10; 벧후 2:19)", "우리는 미래에 놀라운 축복을 누릴 전망을 갖게 된다 (사 65:21-23)", "다른 목표를 추구하는 것은 결국 시간을 낭비하는 것이다 [요한 1서 2:17 낭독]"]}, {"title": "참생명을 굳게 잡으려면 어떻게 해야 하는가?", "points": ["참생명을 얻으려면 여호와 하느님의 그리스도인 종으로 침례를 받아야 한다 (행 8:12; 벧전 3:21)", "침례를 받는 사람들은 여호와를 사랑하는 마음이 동기가 되어 그렇게 한다 [마태복음 22:37, 38 낭독]", "침례를 받기 위해서는 어떤 단계를 밟아야 하는가?", "여호와를 알아 가고, 그분의 약속에 대한 믿음을 키운다 (요 17:3; 히 11:6)", "성서 연구를 하고 그리스도인 집회에 참석하면 그렇게 하는 데 필요한 도움을 받을 수 있다 (행 8:31; 히 10:24, 25)", "믿음이 강해지면 여호와께서 그분의 명령을 따르는 사람들을 돌봐 주실 것이라는 확신이 생길 것이다", "여호와에 대한 사랑이 자라면서 과거에 지은 죄를 후회하고 행실을 변화시킨다 (행 3:19)", "여호와와 동료 그리스도인의 도움을 받으면 필요한 변화를 할 수 있다 (잠 13:20; 고후 10:4, 5)", "여호와를 사랑하는 마음이 동기가 되어 그분께 헌신하고 그분의 뜻을 다른 무엇보다 중요하게 여긴다 [마태복음 16:24, 25 낭독] (벧전 4:2)", "하느님께 헌신했다는 것을 나타내는 상징으로 침례를 받는다 (마 28:19, 20)"]}, {"title": "당신도 참생명을 얻을 수 있다", "points": ["하느님께서 하신 약속들을 믿는다면 ‘내가 침례를 받지 못하는 이유는 무엇인가?’ 하고 생각해 보라 (행 8:35, 36)", "예수께서는 참생명을 추구하는 일을 주저하는 사람들이 있을 것이라고 말씀하셨다 (마 13:22; 「파02」 4/1 14면 21항)", "그리스도의 제자로 사는 것이 너무 어렵다고 생각하는 사람도 있고 나중에 죄를 짓게 될까 봐 두려워하는 사람도 있다 (「파06」 4/1 28-29면 12-15항)", "하느님께서는 우리에게 할 수 없는 일을 요구하지 않으시며, 그분의 요구 조건에 따라 사는 것은 너무 어려운 일이 아니다 (신 30:11-14)", "많은 사람이 성공적으로 잘해 왔으며, 당신도 해낼 수 있다", "[「참생명을 얻기 위해 힘써 노력하십시오!」라는 4분짜리 동영상을 재생한다. 이 동영상에서는 몇몇 성서 연구생이 어떻게 어려움을 이겨 내고 침례를 받았는지 보여 준다. 동영상을 시청한 후, 그들이 발전하는 데 무엇이 도움이 되었는지 언급한다. 관심자들도 그들처럼 할 수 있다고 격려해 준다]"]}, {"title": "참생명을 얻기 위해 지금 힘써 노력하라", "points": ["지금은 참생명을 얻기 위해 힘써 노력할 때다. 주저하지 말라!", "머지않아 이 세상 제도는 끝날 것이며, 사람들이 추구하는 생활 방식들은 사라질 것이다 (마 24:36-42)", "여호와 하느님께서는 당신이 참생명을 굳게 잡을 수 있도록 도와주실 것이다 (빌 2:13; 벧후 3:9)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 90-KO 8/18\t 30분에 다룰 것"]}]}, {"no": 91, "title": "메시아의 임박과 그의 통치", "t": 0, "note": "메시아에 관한 예언이 성취되었음을 증명하고 그분의 통치에 대한 신뢰를 심어 준다", "sections": [{"title": "1부 메시아의 임박 증거들", "points": ["구약 성경에 메시아에 관한 예언이 많이 있다", "그 예언들이 예수께 이루어졌다"]}, {"title": "메시아의 첫 번째 임박의 의미", "points": ["죄에서의 속죄가 가능해졌다 (요 3:16)", "부활의 희망이 생겼다"]}, {"title": "메시아 왕국의 시작", "points": ["1914년에 왕국이 설립되었다", "왕국은 현재 통치하고 있다"]}, {"title": "메시아의 통치 아래 미래", "points": ["이 땅이 낙원이 될 것이다 (계 21:4)", "메시아의 통치에 지금 복종해야 한다"]}]}, {"no": 92, "title": "세상 사회에서 종교의 역할", "t": 4, "note": "참 종교와 거짓 종교를 비교하여 참 종교에 대한 확신을 심어 준다", "sections": [{"title": "종교에 대해 무엇을 기대하는가?", "points": ["사람들은 종교가 삶에 의미를 주기를 기대한다", "종교는 도덕과 윤리의 기준을 제시해야 한다"]}, {"title": "세상 종교들은 무엇을 가르치는가?", "points": ["많은 종교들이 비성경적인 교리를 가르친다 (계 18:4)", "종교 지도자들의 행실이 가르침과 불일치한다"]}, {"title": "참종교는 어떻게 다른가?", "points": ["성경에 근거한 가르침을 전한다", "신자들의 생활 방식이 변화된다 (고전 6:9-11)", "세계적인 형제애가 있다 (요 13:35)"]}, {"title": "참종교가 사회에 미치는 영향", "points": ["신자들이 정직하고 성실하게 생활한다", "가정이 안정되고 행복해진다", "사회에 긍정적인 영향을 미친다"]}]}, {"no": 93, "title": "자연재해—언제 사라질 것인가?", "t": 1, "note": "", "sections": [{"title": "많은 사람이 자연재해로 고통을 겪는다", "points": ["전 세계적으로 이전 어느 때보다 큰 피해를 입히는 자연재해가 늘어나고 있다", "자연재해로 인해 무고한 사람들이 고통받고 사망하는 경우가 많다", "많은 사람은 그런 재난을 이해해 보려고 노력하며 그런 일이 왜 일어나는지 궁금해한다", "일부 사람들은 하느님께서 자연재해를 사용해 사람들을 벌하신다고 말한다 (「파11」 12/1 3면; 「깨」 07/9 3면)", "자연재해에 대한 책임이 하느님께 있는가? 자연재해가 언젠가 사라질 것인가?"]}, {"title": "하느님은 자연재해를 일으키는 분이 아니다", "points": ["성경은 자연재해가 우리 시대의 특징을 이룰 것이라고 예언했다 (눅 21:11)", "때때로 자연재해를 하느님의 처벌이라고 부르는 사람들이 있지만 그분은 그러한 자연재해를 일으키는 분이 아니다 (요1 4:8; 「파13」 5/1 4면; 「파08」 5/1 30면 1-3항)", "자연재해는 흔히 아무 예고 없이 일어나며 무차별적으로 사람들의 생명을 앗아 간다", "여호와 하느님은 결코 그런 일을 하지 않으신다 [욥기 34:10-12 낭독]", "왜 그렇게 많은 사람이 자연재해로 피해를 입는가?", "자연재해가 늘어나는 것에는 인간의 책임도 있다 (렘 10:23; 「파08」 5/1 30면 4-5항; 「깨」 07/9 5면 2-7항)", "어떤 사람들은 경고를 무시한 결과 자연재해에 피해를 입는다 (잠 22:3)", "어떤 사람들은 우연히 특정한 시간에 특정한 장소에 있었기 때문에 피해를 입기도 한다 (전 9:11)"]}, {"title": "하느님이 일으키신 재난인지 알아보는 방법", "points": ["때때로 하느님께서는 파괴적인 심판을 집행하셨다. 자연재해와는 달리 그러한 하느님의 심판은 무차별적인 방식이 아니었고, 분명한 목적이 있었으며, 아주 드물게 일어났다", "노아 시대에 있었던 세계적인 홍수는 분명히 하느님의 심판이었다", "노아 시대의 세상은 극도로 부도덕하고 폭력적이었다 (창 6:1-7)", "하느님께서는 홍수라는 자연의 힘을 사용해 악인들을 멸망시키셨다 (창 6:17)", "성경에 기록된 하느님의 심판들에는 다음과 같은 공통점이 있다", "(1) 하느님께서는 경고를 하신다", "노아는 다가올 홍수에 대해 사람들에게 경고했다 (벧후 2:5; 「파19.10」 6면 3-5항) [시각 자료 1]", "(2) 심판이 선택적으로 집행된다", "대홍수 때 악인들은 멸망되었지만 의인들은 생명을 보존했다 (창 6:9-14; 7:1)", "(3) 하느님께서는 생존에 필요한 지침을 주신다", "의로운 노아와 그의 가족은 하느님께 순종하여 생존했다 (창 6:17-21; 히 11:7)"]}, {"title": "하느님이 가져오실 대규모 심판에 지금 대비하라", "points": ["머지않아 하느님께서는 대규모 심판을 집행하실 것이다 [요한 계시록 16:14, 16 낭독]", "노아 시대처럼 오늘날의 세상도 극도로 부도덕하고 폭력적이다", "하느님께서는 악인들을 멸망시킴으로 의인들을 구출하실 것이다", "하느님의 심판임이 분명한 다른 사례들처럼, 앞으로 있을 심판도 다음의 성경적인 방식에 따라 진행된다", "(1) 하느님의 경고의 소식이 전 세계에서 전파되고 있다 (마 24:14) [시각 자료 2]", "(2) 경고의 소식에 따라 행동하기를 거부하는 사람들만 멸망될 것이다 (마 24:37-39; 살후 1:7-9)", "(3) 하느님께서는 생존에 필요한 지침을 주셨다 (습 2:3; 「집교17.12」 2면)", "빠르게 다가오고 있는 이 세상의 끝을 어떻게 대비할 수 있는가?", "지금은 여호와와 그분의 목적, 그분의 표준에 대해 배워야 할 때이다 (요 17:3)", "배운 것을 실천하라 (마 7:24, 25)"]}, {"title": "하느님은 머지않아 자연재해를 모두 없애실 것이다", "points": ["하느님께서 악인들을 멸망시키신 후에 세상은 아주 평화로운 상태가 될 것이다 (시 37:10, 11)", "자연재해를 비롯해 고통을 초래하는 모든 일들이 하느님의 왕국 통치 아래 곧 사라질 것이다 (계 21:3, 4)     [시각 자료 3]", "예수께서는 자연의 힘을 완벽히 통제하실 것이다 (막 4:39, 41; 「까」 95면 22항)", "왕국은 인간이 지구의 환경에 입힌 모든 해를 바로잡을 것이다 (계 11:18; 21:5; 「까」 81-82면 14-15항)", "예수께서는 하느님의 기억 속에 있는 사람들을 부활시키실 것이며, 여기에는 자연재해로 사망한 많은 사람들이 포함될 것이다 (요 5:28, 29; 「까」 84면 22항)", "사랑 많은 하느님 여호와께서 주시는 이러한 축복들을 기다리고 있기에 우리는 참으로 큰 위로를 얻는다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 93 9/22"]}]}, {"no": 94, "title": "구부러진 세대 가운데서 나무랄 데 없는 상태를 유지함", "t": 1, "note": "도덕적으로 타락한 세상에서 청결한 상태를 유지하도록 격려한다", "sections": [{"title": "우리가 사는 세상은 구부러져 있다", "points": ["성경은 이 세대를 '구부러지고 뒤틀린' 세대라고 묘사한다 (빌 2:15)", "도덕적 타락, 폭력, 부정직함이 만연해 있다"]}, {"title": "세상 풍조에 휩쓸릴 위험이 있다", "points": ["잘못된 오락과 교제가 우리에게 영향을 미칠 수 있다", "인터넷과 소셜 미디어의 위험성", "점진적으로 도덕 기준이 낮아질 수 있다"]}, {"title": "나무랄 데 없는 상태를 유지하는 방법", "points": ["성경의 도덕 기준을 굳게 붙잡는다 (빌 4:8)", "신중하게 교제를 선택한다", "영적 일과를 규칙적으로 실천한다"]}, {"title": "나무랄 데 없는 상태를 유지하는 유익", "points": ["하느님의 승인을 받는다", "다른 사람들에게 좋은 본이 된다", "어렵고 위험한 시대에 보호를 받는다"]}]}, {"no": 95, "title": "영매술에 속지 마십시오!", "t": 3, "note": "", "sections": [{"title": "하느님은 영매술을 어떻게 보시는가?", "points": ["세계 전역에서 사람들은 다양한 형태의 영매술을 행한다 (「실쉬」 221면 참조 자료 26)", "[해당 지역에서 흔히 볼 수 있는 영매술의 형태를 간단히 언급한다]", "여호와 하느님께서는 영매술 행위를 혐오하신다 [신명기 18:10-12 낭독]", "영매술은 왜 그렇게 위험한가? 어떻게 영매술을 멀리할 수 있는가?"]}, {"title": "영매술은 왜 그렇게 위험한가?", "points": ["영매술 행위는 사탄과 악귀들에게서 나온 것이며, 바로 그들이 영매술 배후에서 작용하는 힘이다", "사탄과 악귀들은 하느님께 반역한 천사이다", "그들은 우리를 잘못된 길로 인도해 여호와에게서 멀어지게 만들려고 한다 [요한 계시록 12:9 낭독]", "많은 영매술 행위는 죽은 사람이 산 사람에게 영향을 줄 수 있다는 거짓말에 근거해 있다", "사람이 죽으면 그 사람의 어떤 부분도 살아남지 않는다. 죽은 사람은 산 사람들과 의사소통할 수 없고 그들을 돕거나 해칠 수 없다 (전 9:5, 10; 「행누」 29과 요점 2)", "하느님의 승인을 받으려면 영매술 행위를 반드시 멀리해야 한다 (레 20:6; 갈 5:19-21)", "여호와께 드리는 참숭배에 영매술을 섞는 일이 있어서는 결코 안 된다 (고전 10:21)"]}, {"title": "어떻게 영매술을 멀리할 수 있는가?", "points": ["어떻게 영매술을 멀리할 수 있는가? [야고보서 4:7 낭독]", "“하느님께 복종하십시오”", "여호와를 알아 가고 사랑하라 (요 17:3)", "기도로 그분께 가까이 가라 (시 145:18)", "여호와를 온전히 신뢰하라. 그러면 그분이 당신을 악한 영들로부터 보호해 주실 것이다 (잠 18:10;  살후 3:3; 「파14」 11/1 6면)", "“마귀를 대적하십시오. 그러면 마귀가 여러분에게서 도망할 것입니다”", "영매술과 관련된 그 어떤 일에도 연루되지 말라 (레 19:31)", "신비술과 관련된 물건들을 없애라 (행 19:19; 「파19.04」 22-23면 10-11항) [시각 자료 1]", "영매술과 관련이 있는 오락을 피하라 (「랑쉬」 218면 15-16항) [시각 자료 2]", "영매술과 관련된 치료법과 장례 관습을 피하라 (「실쉬」 109면 12항; 「파06」 3/1 25면 12항)"]}, {"title": "하느님은 곧 영매술 행위를 모두 없애실 것이다", "points": ["곧 여호와께서는 영매술 행위의 근원인 사탄을 없애실 것이다 [로마서 16:20 낭독]", "이 땅은 사탄의 영향력이 모두 사라진 평화로운 곳이 될 것이다 (벧후 3:13; 계 21:3, 4)", "마귀를 대적하고 영매술 행위를 피하는 사람들은 영원히 여호와와 우정을 누릴 수 있다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 95 9/22"]}]}, {"no": 96, "title": "종교의 미래는 어떠할 것인가?", "t": 4, "note": "새로운 관심자와 성서 연구생들이 거짓 종교에서 완전히 나오고 여호와께 드리는 참숭배에 온전히 참여해야 한다는 점을 이해하도록 지혜롭게 설명한다", "sections": [{"title": "종교의 미래는 여호와 하느님께 달려 있다", "points": ["여러 나라에서 종교는 영향력을 많이 잃었으며 종교를 지지하는 사람들도 크게 줄었다 [현재 사는 지역의 상황을 설명한다]", "하지만, 독실한 신자로서 종교 단체에 속해 있는 사람들이 아직도 많이 있다", "종교 활동을 열심히 하지 않는 사람들도 자기 문화나 가족의 가치관을 구성하는 데 종교가 중요한 역할을 한다고 생각한다", "일부 사람들은 종교에 대한 지지가 줄어들고 사람들의 태도가 바뀜으로 인해 종교가 완전히 사라지는 것은 아닌지 궁금해한다", "종교의 미래는 사람들의 태도가 아니라 여호와 하느님께 달려 있다", "여호와께서는 참숭배와 거짓 숭배를 구별하신다 [요한복음 4:23, 24 낭독]", "참종교와 거짓 종교는 각각 어떤 열매를 맺느냐로 구별할 수 있다 (마 7:15-20; 약 1:26, 27)", "거짓 종교는 악한 열매를 맺기 때문에 하느님이 곧 없애 버리실 것이지만, 참종교는 영원히 번성할 것이다"]}, {"title": "거짓 종교는 어떤 열매를 맺어 왔는가?", "points": ["거짓 종교는 사람들이 여호와 하느님과 그분의 목적에 관한 진리를 알지 못하게 방해했다", "성경의 가르침을 배척하고 인간의 전통을 따랐다 (막 7:7, 8; 딤후 3:16)", "많은 경우 현대의 회의적인 견해를 받아들였고 하느님과 성경에 대한 사람들의 믿음을 약화시켰다", "여호와의 이름을 알리지 않았고 그분이 어떤 분인지 이해하기 어렵게 만들었다 (요 17:26)", "“왕국의 좋은 소식”을 전파하지 않았고 그 소식을 전하려는 여호와의 증인의 노력을 반대하는 일이 많았다 (마 24:14; 「파16.05」 10면 7항)", "거짓 종교는 성경의 도덕 표준을 지지하지 않았고 오히려 도덕의 타락을 부추겼다 (고전 6:9, 10; 딤후 3:5; 4:3, 4; 「파01」 11/1 4-5면)", "거짓 종교는 정치적 분쟁이나 전쟁이 있을 때 어느 한 편을 지지했다", "예수의 가르침과 그분이 세우신 본을 따르지 않았다 (마 26:52; 요 6:15; 17:15, 16)", "수많은 사람의 죽음에 대해 책임이 있다 (계 18:24)"]}, {"title": "하느님께서는 거짓 종교를 어떻게 멸망시키실 것인가?", "points": ["거짓 종교가 맺는 악한 열매를 생각해 보면, 성경에서 거짓 종교를 묘사하면서 강한 표현을 사용한 것도 이해할 만하다", "거짓 종교는 매춘부로 묘사되어 있으며 “큰 바빌론”이라고 불린다 [요한 계시록 17:1, 2, 4, 5 낭독]", "그러한 표현을 사용한 것은 적절하다 [「깨어라!」 2012년 11월호 13면 네모 “큰 바빌론—실체는 무엇인가?”를 사용해서 설명한다]", "하느님께서는 곧 거짓 종교에 대한 심판을 집행하여 거짓 종교를 완전히 멸망시키실 것이다", "성경은 거짓 종교가 멸망되기 전에 영향력을 잃게 될 것이라고 예언한다 (계 16:12; 17:15; 「파12」 6/15 17-18면 16항)", "여호와께서는 사탄의 제도의 정치 세력들의 마음에 큰 바빌론을 멸망시킬 생각을 넣어 주실 것이다 [요한 계시록 17:16, 17 낭독] (계 18:7, 8; 「파12」 6/15 18면 17항)"]}, {"title": "참종교의 편에 서라", "points": ["하느님을 기쁘게 해 드리고 싶다면, 거짓 종교에 대한 자신의 견해를 점검해 보아야 한다", "하느님께서 어떤 사람이 속한 종교를 승인하지 않으신다면, 그 사람을 보시는 방식도 그와 비슷하지 않겠는가?", "큰 바빌론에서 나오라는 명령을 따라야 한다 [요한 계시록 18:4, 5 낭독]", "거짓 종교의 특성을 반영하거나 거짓 종교의 영향을 받은 것은 모두 물리쳐야 한다 (「랑쉬」 98면 23항)", "성경에 예언된 “큰 환난”은 거짓 종교의 멸망으로 시작될 것이다 (마 24:3, 21; 「파15」 7/15 15면 4항)", "큰 바빌론이 멸망되고 나면, 하느님께서 승인하시는 종교 즉 참종교만 남게 될 것이다", "참숭배의 편에 서기 위해 지금 단호하게 행동해야 한다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 책 52-55, 166-169면 참조]", "No. 96-KO 5/19\t 30분에 다룰 것"]}]}, {"no": 97, "title": "모든 환난 중에서 위로를 받음", "t": 8, "note": "환난 가운데서 하느님의 위로를 받을 수 있다는 확신을 심어 준다", "sections": [{"title": "우리는 환난을 피할 수 없다", "points": ["예수께서 우리가 세상에서 환난을 당할 것이라고 말씀하셨다 (요 16:33)", "질병, 죽음, 박해, 경제적 어려움 등 다양한 환난이 있다"]}, {"title": "여호와께서 위로를 주신다", "points": ["여호와는 '모든 위로의 하느님'이시다 (고후 1:3, 4)", "기도를 통해 위로를 받는다 (빌 4:6, 7)", "성경 말씀을 통해 힘을 얻는다"]}, {"title": "형제들을 통한 위로", "points": ["회중 안의 형제 자매들이 서로 위로한다 (고후 1:4)", "방문, 편지, 연락 등을 통해 격려를 받는다"]}, {"title": "환난이 우리에게 주는 유익", "points": ["인내심과 품성이 길러진다 (약 1:2-4)", "하느님을 더 신뢰하게 된다", "다른 사람들을 위로할 수 있는 능력이 생긴다 (고후 1:4)"]}]}, {"no": 98, "title": "“이 세상의 장면은 변하고 있다”", "t": 1, "note": "급속히 변하고 있는 세상 상태 이면에 무슨 의미가 있는지 청중이 이해하도록 돕는다. 또한 가까운 장래에 무슨 일이 있을 것인지 분명히 설명하고, 모두가 생존을 위해 행동을 취하도록 격려한다", "sections": [{"title": "지난 세기에는 수많은 변화가 있었다", "points": ["기술, 보건, 교육, 교통, 인권 분야에서 발전이 있었고 그로 인해 많은 사람이 유익을 얻었다", "반면에 치솟는 범죄율, 급격히 쇠퇴하는 도덕관, 점증하는 마약 남용, 급등하는 이혼율, 상승하는 인플레이션, 증가하는 테러 행위는 수많은 사람에게 영향을 미쳐 왔다", "참으로 “이 세상의 장면은 변하고 있다” [고린도 전서 7:31 낭독]", "사도 바울은 연극 무대에서 벌어지는 장면에 비유하여 표현한 것이다. 마치 무대 위의 연기자들처럼 정치계, 종교계, 문화계의 명사들이 출연하여 각자의 역할을 연기한 다음 다른 연기자들에게 무대를 넘기고 떠난다 (「파04」 2/1 18-19면 2-4항)"]}, {"title": "세상은 1914년에 마지막 때에 돌입했다", "points": ["지난 세기들에는 변화가 대체로 긴 기간에 걸쳐 일어났다", "교육자들과 역사가들은 1914년 이후로 세상의 변화 속도가 극적으로 빨라져 왔음을 인정한다 (「파04」 2/1 20면 9항; 「파01」 6/1 5면 4항)", "급속히 악화되고 있는 세상의 배후에 있으면서 이 모든 일에 대한 책임이 있는 자는 바로 사탄 마귀이다 (계 12:7-9, 12)", "현 세상 상태는 예수 그리스도의 보이지 않는 임재와 급속히 다가오는 이 세상 제도의 끝을 알리는 신호이다 (마 24:3)", "예수께서는 마지막 날의 표징을 이룰 재난들을 예언하셨다 (눅 21:10, 11; 계 6:2-8; \n「파14」 2/1 5-7면)"]}, {"title": "여호와의 두려움을 불러일으키는 날로 이어지게 될 사건들", "points": ["성경 예언을 살펴보면 조만간 더 많은 중대한 변화들이 일어날 것임을 알 수 있다", "심판의 날은 예상치 못하게 올 것이다. 대부분의 사람이 개인적인 일을 추구하는 것을 중심으로 인생을 살며 실제로 하느님께서 인간사에 개입하실 것이라고 믿지 않기 때문이다 (마 24:37-39; 벧후 3:3, 4)", "여호와의 날이 오기 전에 나라들은 “평화롭다, 안전하다!”라는 의미심장한 선언을 할 것이다 [데살로니가 전서 5:1-3 낭독] (「파13」 11/15 12-13면 9-12항; 「파12」 2/1 9면)", "그 후 얼마 안 있어, 이 세상의 정치 요소들이 거짓 종교를 공격하여 멸망시킬 때 여호와의 날이 시작될 것이다 (계 17:1, 3, 5, 15-17; 「파12」 9/15 3-5면 3-7항)", "또한 거짓 종교에 대한 공격은 “큰 환난”이 시작된다는 표시이다 (마 24:21)", "그 뒤에 정치 요소들 그리고 하느님의 왕국에 반대하는 모든 자들에게 예언된 “갑작스러운 멸망”이 닥칠 것이다 (단 2:44; 계 19:11-15)", "현재 세상이라는 무대에서는 대단원의 막이라고 할 만한 일들이 펼쳐지고 있다", "여호와께서는 불순종하는 사람들의 막을 내리실 것이다", "여호와의 날은 아마겟돈 전쟁에서 절정에 이를 것이다 (계 16:14, 16)", "이 악한 제도는 그 영과 불경건한 특성들과 함께 완전히 사라질 것이다 (벧후 3:10)", "그 후 사탄은 무저갱에 던져질 것이다 (계 20:1-3)", "이 땅은 깨끗해질 것이며 여호와 하느님을 사랑하는 모든 사람을 위한 놀라운 변화들이 있을 것이다"]}, {"title": "두려워하지 말고 여호와의 약속에 대한 믿음을 가지라", "points": ["의로운 신세계를 바라보는 모든 사람에게 하느님의 약속들을 살펴보고 그분의 영감받은 말씀에 믿음을 둘 것을 격려하는 바이다", "곧 이 세상의 장면에 영구적으로 좋은 변화가 있을 것이다", "전쟁, 범죄, 폭력, 테러가 없어질 것이다 (시 37:10, 11; 46:9)", "온갖 질병이 과거의 일이 될 것이다 (사 33:24)", "여호와 하느님을 충실히 섬기는 모든 사람은 영원히 살 것이다 (요1 2:17)", "지금 “행실을 거룩하게” 하고 “경건한 정성을 행동으로” 나타냄으로 여호와의 약속에 대한 믿음을 실천하는 사람이 되라 (벧후 3:11-13)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「전도 학교」 52-55, 166-169면 참조]", "No. 98-KO 9/16\t 30분에 다룰 것", ""]}]}, {"no": 99, "title": "성경을 신뢰할 수 있는 이유", "t": 4, "note": "", "sections": [{"title": "인류에게는 신뢰할 만한 지침이 필요하다", "points": ["세계 전역의 사람들은 지침을 구한다 [시각 자료 1]", "어떤 사람들은 건강이나 가정생활을 개선하기를 원한다", "어떤 사람들은 교육이나 취업, 재정 문제에 관한 결정을 내리기 위해 도움을 구한다", "인간의 생각에 근거한 지침을 따르면 흔히 실망하게 된다 (렘 10:23)", "전 세계에서 수많은 사람들이 실제로 효과가 있는 신뢰할 만한 지침을 발견했다", "여호와의 증인은 성경이 여호와 하느님의 영감을 받은 책이라고 확신하며, 성경이 그분의 인도 즉 가장 훌륭한 지침을 베푼다고 굳게 믿는다 (시 119:66, 138)"]}, {"title": "성경을 신뢰해야 하는 이유", "points": ["예수 그리스도께서는 성경에 기록되어 있는 하느님의 말씀이 진리라고 말씀하셨다 [요한복음 17:17 낭독]", "따라서 성경을 조사해 보면, 그 내용이 온전히 믿을 만한 것임을 알게 될 것이다 [아래 나오는 요점들을 다룰 때, 참조된 출판물을 사용해 성경에 나오는 예들을 제시하라]", "역사적·지리적으로 정확하다", "성경에 이름이 나오는 사람들은 실존했던 역사적 인물들이다 (「파」15 5/1 9면 1-2항; 「그밖주」 기사 7)", "성경에 나오는 여러 장소와 사건들이 고고학에 의해 확증되었다 (「깨」07/11 17면 2항–18면 3항)", "과학적으로 정확하다", "과학과 관련된 내용을 언급할 때 성경은 정확하다 (「웹성대」 기사 82 1-7항)", "성경의 정확성에 대한 오해는 쉽게 풀릴 수 있다 (「웹성대」 기사 82면 8-18항)", "예언들이 정확하다", "성경 필자들은 영감을 받아 예언들을 자세히 기록했으며, 모두 정확하게 성취되었다 (벧후 1:21; 「파23.01」 4-5면 10-11항)"]}, {"title": "성경의 지침을 따라야 하는 이유", "points": ["성경이 하느님의 말씀이라고 믿는 것만으로는 충분하지 않다. 각자는 성경의 지침을 따르는 삶을 살 것인지 결정해야 한다", "성경의 조언을 따르면 진정으로 행복해질 것인가?", "그 질문에 대한 답을 얻기 위해, 먼저 시편 19편을 살펴보자. 19편은 성경의 조언을 적용할 때 얻는 유익을 설명한다", "시편 19편은 하느님이 만드신 창조물과 그분의 도덕적 지침을 비교한다", "하느님의 창조물은 그분의 지혜를 나타내고 그분께 영광을 돌린다 (시 19:1-6)", "여호와께서 정해 놓으신 안정된 물리 법칙들 덕분에 생명이 유지되며, 우리는 질서 있고 행복한 삶을 누릴 수 있다 (「깨89」 10/15 19면 5-7항)", "마찬가지로, 성경의 실용적인 조언은 하느님의 지혜를 나타내고 그분께 영광을 돌린다 (시 19:7-10)", "성경의 조언을 따르면, 하느님께 영광을 돌리며 평화롭고 행복한 삶을 누릴 수 있다", "다음으로, 생활의 세 부면에 관한 성경의 지혜로운 조언을 살펴보자 [아래의 요점들을 다룰 때, 성경 조언을 적용해 유익을 얻은 사람들의 예를 들어 그 요점들을 설명하라]", "건강을 잘 관리한다", "절도 있게 먹고 마시며, 지나치게 염려하지 않고, 담배를 피우거나 약물을 남용하지 않는다 (잠 23:20; 마 6:25-27; 고후 7:1) [시각 자료 2]", "행복한 가정생활을 위해 힘쓴다", "부도덕을 피하고, 배우자에게 사랑과 존중심을 보인다 (고전 6:18; 엡 5:33) [시각 자료 3]", "사람들과 평화롭게 지내려고 노력한다", "보복하지 않는다. 남을 자기보다 더 나은 사람으로 여기고, 그들의 일에 관심을 가진다. 다른 사람들을 기꺼이 용서한다 (롬 12:17; 빌 2:3, 4; 골 3:13) [시각 자료 4]", "성경의 지침을 따름으로 행복한 삶을 영원히 누리라 (4 분)", "성경이 하느님의 영감받은 말씀임을 받아들이고 그 말씀을 생활에 적용하라 (살전 2:13)", "매일 성경을 읽고, 그 내용을 온전히 받아들이라 (시 1:1-3)", "시련이나 문제에 직면할 때, 성경에서 지침을 얻으라 (딤후 3:16, 17)", "성경이 알려 주는 미래의 희망에 대한 확신을 강하게 하라 (시 37:29; 계 21:3, 4)", "성경의 지침을 따름으로 행복한 삶을 영원히 누리기 바란다", "[골자에 밀접히 고착하고, 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 99 1/25"]}]}, {"no": 100, "title": "영원히 지속될 튼튼한 우정을 기르는 방법", "t": 9, "note": "", "sections": [{"title": "우리에게 친구가 필요한 이유", "points": ["좋은 친구가 있으면 만족스럽고 의미 있는 삶을 사는 데 도움이 된다 (잠 18:24; 「깨04」 12/8 3면)", "친구가 없이 고립되어 지내는 것은 해롭다 (잠 18:1)", "친한 친구는 어려운 시기를 헤쳐 나가는 데 도움이 될 수 있다 [잠언 17:17 낭독] [시각 자료 1]"]}, {"title": "좋은 친구를 선택하는 방법", "points": ["친구는 우리가 어떤 사람이 되고 어떤 일을 겪을지에 영향을 미친다 [잠언 13:20 낭독]", "친구를 선택할 때 어떤 점을 보아야 하는가?", "훌륭한 특성: 본받을 만한 특성들이 있고 우리에게 좋은 영향을 줄 사람들을 친구로 선택하라 (잠 27:17; 고전 15:33; 갈 5:22, 23)", "높은 도덕 표준: 하느님의 표준과 일치한 도덕 표준을 가진 사람들을 친구로 선택하라 (엡 5:3-5)", "나이와 배경이 같은 사람들과만 친구가 되지 말라 (고후 6:13; 「깨」 14/6 7면)"]}, {"title": "튼튼한 우정을 기르는 방법", "points": ["튼튼한 우정을 기르는 비결은 비이기적인 사랑을 나타내는 것이다 (고전 13:4-7; 「깨」 14/6 5면 1-4항)", "룻과 나오미, 요나단과 다윗, 바울과 디모데는 비이기적인 사랑을 기초로 우정을 길러 나간 뛰어난 본이다   (룻 1:16, 17; 삼상 18:1; 23:16-18; 빌 2:19-22)", "사랑에 기초한 성경 원칙들을 적용함으로 우정을 강화하라", "잘 들어 주는 사람이 되라 (약 1:19; 「깨」 14/6 5면 5-9항)", "내밀한 일을 누설하거나 남에 대한 해로운 이야기를 퍼뜨리지 말라 (잠 16:28; 20:19)", "다른 사람의 불완전성을 지나쳐 주고 기꺼이 용서하라 (골 3:13)", "친구에게 존중심을 보이라. 그의 양심과 사생활을 존중해 주라 (롬 12:10; 14:10; 벧전 4:15)"]}, {"title": "가장 중요한 우정을 기르는 방법", "points": ["우리가 맺을 수 있는 가장 중요한 우정은 여호와와 예수와 누리는 우정이다", "여호와께서는 그분과 친구가 되고 싶어 하는 사람들과 가까워지는 것을 기뻐하신다 (약 2:23; 4:8)", "여호와의 친구가 되려면 마음을 다해 그분을 사랑해야 한다 [마태복음 22:37, 38 낭독]", "우리는 하느님의 계명에 순종함으로 그분에 대한 비이기적인 사랑을 나타낸다 (요1 5:3; 「파06」 12/1 21면 8항)", "우리는 예수 그리스도를 통해 여호와께 가까이 간다 (요 14:6, 21; 「파20.04」 21면 5-6항)", "우리는 예수께서 생각하고 행동하신 방식을 본받고 그분의 명령에 순종함으로 예수와의 우정을 기를 수 있다 (요 14:15; 「파20.04」 22-24면 10-11항)"]}, {"title": "영원히 지속될 우정을 기르는 방법", "points": ["우정이 지속되려면 그 우정을 튼튼하게 하기 위해 계속 노력해야 한다", "정기적으로 여호와께 기도로 말씀드리고 그분이 성경을 통해 하시는 말씀을 들음으로 여호와와의 우정을 계속 튼튼하게 유지하라 (시 1:2, 3; 살전 5:17)", "당신처럼 여호와를 사랑하는 사람을 친구로 선택하라", "당신의 친구가 하느님을 더 사랑하도록 돕고, 함께 하느님을 숭배하라 (살전 5:11; 히 10:24, 25) [시각 자료 2]", "그렇게 한다면 영원히 지속될 우정을 지금 기를 수 있다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 100 9/22"]}]}, {"no": 101, "title": "여호와—“위대한 창조주”", "t": 0, "note": "", "sections": [{"title": "여호와만이 “위대한 창조주”이시다", "points": ["오직 여호와께서만 시작이 없으신 분이다. 그분은 “영원하신 왕”이시다 (딤전 1:17)", "그분은 하늘과 땅에 있는 모든 것을 만드신 “위대한 창조주”이시다 (전 12:1)", "우리는 시간을 내서 여호와와 그분의 창조물에 대해 배워야 한다 [전도서 3:11 낭독]", "그분은 가장 먼저 자신의 독생자를 창조하셨고 그를 통해 다른 모든 것을 만드셨다 (골 1:15, 16)", "하느님께서는 자신의 아들을 통해 다른 수많은 영적 피조물을 창조하셨다 (욥 38:4, 7; 단 7:10)", "나중에 하느님께서는 우주와 지구를 창조하셨고 자신의 형상을 닮은 인간을 포함해 지구의 수많은 창조물도 만드셨다 (창 1:1, 20-27)"]}, {"title": "하늘과 땅은 하느님의 영광을 알린다", "points": ["하느님의 창조물을 보면 그분의 특성들을 알게 되고 외경심과 감사한 마음이 가득해진다 [시편 19:1-3 낭독]", "능력: 과학자들의 추산에 따르면 지구상에 있는 모래알의 숫자보다 우주에 있는 별의 숫자가 더 많다 [시각 자료 1]", "별들의 에너지를 모두 합치면 헤아릴 수 없을 정도로 크다 (사 40:25, 26; 「파03」 7/1 10면 5-6항)", "지혜: 깨끗하고 효율적인 자연계의 순환은 우리의 보금자리인 지구를 쾌적하고 생명체가 살기 좋은 상태로 유지해 준다", "[「생명—창조된 것인가?」 8-9면에 나오는 예들을 간단히 설명한다]", "사랑: 지구는 아름다운 창조물들과 끝없이 다양한 식품으로 가득하다 (행 14:17) [시각 자료 2]", "우리의 뇌와 신체 감각들은 우리가 하느님의 선물들을 즐기고 감상할 수 있게 해 준다", "[「깨어라!」 2011년 5월호 4-7면에서 두세 가지 예를 간단히 언급한다]", "여호와의 놀라운 창조물에 대해 감사하고 그분을 찬양하도록 하자! (계 4:11)"]}, {"title": "하느님의 목적을 이루기 위한 “새로운 창조물”", "points": ["하느님께서는 사람들이 땅에서 평화를 누리며 영원히 살도록 창조하셨다", "첫 인간 부부인 아담과 하와는 그들의 창조주께 영예를 돌리지 않고 그분께 반역했다. 그로 인해 그들뿐 아니라 그들의 후손들까지 불완전성과 죽음을 겪게 되었다 (롬 5:12)", "여호와께서는 인류가 입은 손상을 복구하고 인류에 대한 자신의 목적을 이루시기 위해 “새로운 창조물”을 만들기 시작하셨는데, 그것은 원래 그분의 마련이 아니었다", "예수와 일부 사람들은 하느님의 성령을 통해 완전히 새로운 창조물 즉 영으로 출생한 하느님의 아들들이 되었다 [고린도 후서 5:17 낭독] (고후 5:17 「신세연」 연구 노트)", "그들은 하늘에서 이 땅을 다스릴 것이다 (계 5:9, 10; 20:4)", "그들의 숫자는 14만 4001명으로 제한되어 있다 (계 14:1)", "“새로운 창조물”은 하느님의 왕국 정부를 구성한다 (단 7:13, 14, 27)", "왕국은 사탄의 일을 “산산이 부숴 버리”고 하느님의 뜻이 이루어지도록 할 것이다 (요1 3:8; 마 6:9, 10)", "부활된 사람들을 포함해 충성스러운 백성들은 인간 완전성에 이르러 하느님의 자녀가 될 것이다 (요 5:28, 29; 롬 8:21)", "그 결과 첫 인간 부부가 에덴에서 누렸던 완전한 상태로의 “재창조”가, 다시 말해 그러한 상태로의 회복이 있을 것이다. 하지만 이 일은 세계적인 규모로 있을 것이다 (마 19:28; 「파09」 8/1 22면 2항) [시각 자료 3]"]}, {"title": "위대한 창조주께 감사를 나타내라", "points": ["우리는 우리에게 모든 것을 주신 분께 감사를 나타내야 한다 (행 17:27, 28)", "계속 여호와와 그분의 목적에 관해 배우고 그분의 사랑에 찬 인도를 따르라", "여호와께서는 우리를 사랑하시고 우리가 그분을 영원히 섬기면서 “가장 큰 기쁨”을 얻기를 원하시기 때문에 우리 마음에 영원이라는 개념을 넣어 두셨다 (시 37:4, 29, 각주)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2022 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 101 9/22"]}]}, {"no": 102, "title": "“예언의 말씀”에 주의를 기울이십시오", "t": 4, "note": "", "sections": [{"title": "왜 “예언의 말씀”에 주의를 기울여야 하는가?", "points": ["성경은 인류의 놀라운 미래를 예언한다 (시 37:10, 11, 29; 계 21:3, 4)", "이러한 약속들이 성취될 것이라고 확신하는가?", "“예언의 말씀”에 주의를 기울임으로 우리는 믿음을 강하게 할 수 있다 [베드로 후서 1:19 낭독]", "다음과 같은 세 가지 질문을 살펴보자. (1) “예언의 말씀”이란 무엇인가? (2) 어떻게 ‘예언의 말씀이 더욱 확실해’졌는가? (3) 예언에 “주의를 기울이면” 어떤 유익을 얻는가?"]}, {"title": "“예언의 말씀”이란 무엇인가?", "points": ["성경에서 “예언”이라는 말은 하느님에게서 온 소식을 가리킨다 (「용어 설명」 “예언”)", "많은 성경 예언은 미래에 무슨 일이 있을지 알려 준다", "오직 여호와 하느님께서만 미래를 정확히 알려 주실 수 있다 [베드로 후서 1:20, 21 낭독] (사 46:9, 10)", "성경에 나오는 “예언의 말씀”은 그분의 영감을 받은 것이다 (「통」-2 338면 5항)", "성경 예언은 흔히 하느님의 왕국에 초점을 맞춘다 (단 2:44; 7:13, 14)", "여호와께서는 왕국을 통해 자신의 이름을 거룩하게 하고 땅과 인류에 대한 목적을 이루실 것이다 \n(마 6:9, 10)", "예수께서는 성경 예언의 성취에서 핵심적인 역할을 하신다 (계 19:10; 「파09」 7/15 5면 11항)"]}, {"title": "어떻게 ‘예언의 말씀이 더욱 확실해’졌는가?", "points": ["사도 베드로와 야고보와 요한은 성경 예언을 믿을 수 있음을 확증해 주는 예수와 관련된 한 사건을 목격했다 \n[베드로 후서 1:16-18 낭독]", "[마태복음 17:1-9에 기록된 예수의 변형 환상을 언급하라] [시각 자료 1]", "이 환상은 예수께서 영광스러운 하늘의 왕이 될 것임을 확증해 주었다", "이 환상은 예수의 사도들의 믿음을 강하게 해 주었다 (「파19.03」 10면 7-8항; 「예길」 144면 7항)", "“샛별”이신 예수께서는 1914년에 왕이 되셨다 (벧후 1:19; 계 22:16; 「파08」 11/15 22면 2항)"]}, {"title": "성경 예언에 주의를 기울이면 어떤 유익을 얻는가?", "points": ["성경 예언은 “어두운 곳에서 비치는 등불”처럼 우리의 마음을 밝혀 준다 (「파00」 4/1 15면 12항)", "하느님의 목적에 대한 통찰력을 준다", "위로를 주고 미래에 대한 희망을 준다 (롬 15:4)", "현재 세상 상태의 의미를 이해할 수 있게 도와준다 (마 24:3-14; 딤후 3:1-5)", "성경 예언은 가까운 미래에 무슨 일이 있을지 알려 주며 따라서 우리가 대비할 수 있게 해 준다", "“평화롭다, 안전하다”는 선언 (살전 5:3; 「파19.09」 9면 7-8항)", "거짓 종교의 멸망 (계 17:1, 2, 5, 16; 「파19.09」 10면 10-11항)", "하느님의 숭배자들에 대한 마지막 공격 (겔 38:2, 8, 9; 「파19.09」 11면 13-14항)", "아마겟돈 전쟁 (계 16:14, 16; 「파19.09」 8면 3항; 9면 6항)"]}, {"title": "“예언의 말씀”에 계속 주의를 기울이라", "points": ["이 제도의 끝을 살아남으려면 우리 모두에게는 강한 믿음이 필요할 것이다 (히 10:38, 39)", "성취된 성경 예언들을 연구함으로 믿음을 강화하라", "현재 성경 예언을 성취시키고 있는 세상 상태에 주의를 기울이라 (눅 21:36)", "“예언의 말씀”에 믿음을 두고 그것을 행동으로 나타내라!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 102 1/23"]}]}, {"no": 103, "title": "어떻게 진정한 기쁨을 누릴 수 있는가?", "t": 9, "note": "", "sections": [{"title": "진정한 기쁨은 무엇이며, 왜 필요한가?", "points": ["우리는 “대처하기 어려운 위급한 때”에 살고 있으므로, 기쁨을 얻기가 어려워 보일 수 있다 (딤후 3:1)", "어떤 사람들은 부나 소유물, 과도한 오락에서 기쁨을 찾으려고 한다 [시각 자료 1]", "하지만 그러한 것들에서 오는 기쁨은 일시적일 뿐이다 (잠 14:13)", "진정한 기쁨은 외적인 상황에 좌우되지 않는 내적인 특성이다 (「파18.02」 28면 3-4항)", "심지어 상황이 좋지 않을 때에도 진정한 기쁨을 누릴 수 있다 (약 1:2, 3) [시각 자료 2]", "사실 기쁨은 좋지 않은 상황을 인내하는 데 도움이 된다 (잠 17:22)"]}, {"title": "어떻게 더 큰 기쁨을 얻을 수 있는가?", "points": ["이제 더 큰 기쁨을 얻는 데 도움이 되는 세 가지 성경 원칙을 살펴볼 것이다", "긍정적인 면에 초점을 맞추라 [잠언 15:15 낭독] (「깨16.1」 5면 6-10항; 「깨92」 10/15 5-6면)", "부정적인 생각을 긍정적인 생각으로 바꾸는 법을 배우라 (빌 4:8)", "긍정적인 시각을 가지면 낙담을 물리치고 기쁨을 유지하는 데 도움이 된다", "감사하는 마음을 가지라 [데살로니가 전서 5:16-18 낭독] (「파17.12」 26면 11항)", "매일 감사할 것들을 생각해 보고 그러한 것들에 대해 여호와께 감사하라 [시각 자료 3]", "감사하는 태도는 어려운 상황에서도 기쁨을 유지하는 데 도움이 된다", "다른 사람들을 도우라 [사도행전 20:35 낭독] (「깨16.1」 6면)", "친절한 행동이나 격려의 말이 필요한 사람들에게 솔선해서 도움을 베풀라 (빌 2:3, 4) [시각 자료 4]", "그렇게 하는 것은 자신의 문제에 너무 몰두하지 않는 데 도움이 된다"]}, {"title": "어떻게 가장 큰 기쁨을 얻을 수 있는가?", "points": ["훨씬 더 큰 기쁨을 얻을 수 있는 세 가지 방법을 살펴보자", "영적 필요를 채우라 [마태복음 5:3 낭독] (「파18.12」 20면 6-7항)", "진정한 기쁨은 하느님의 성령의 열매의 한 부분이다. 하느님께 성령을 청하고, 기쁨을 기르도록 도와 달라고 기도하라 (눅 11:13; 갈 5:22)", "기도는 우리가 기쁨을 얻는 데 꼭 필요한 “하느님의 평화”를 누리게 해 줄 수 있다 (빌 4:4, 6, 7)", "정기적으로 성경을 읽고 연구하면 삶의 염렷거리들에 잘 대처할 수 있다 (시 1:1, 2; 94:19)", "“생명의 길”을 따라 걸으라 [시편 16:11 낭독] (「파18.12」 28면 18-21항)", "하느님께서는 우리를 보호하기 위해 그분의 법을 주셨으며, 그 법에 순종하면 기쁨을 얻을 수 있다 (사 48:17, 18)", "여호와의 법을 지키는 것은 너무 어려운 일이 아니다 (신 30:11-14)", "여호와의 약속들에 대한 믿음을 기르라 [요한 계시록 21:3, 4 낭독]", "미래에 여호와께서는 기쁨에 방해가 되는 것들을 모두 없애실 것이다 (시 37:10, 11)", "그리스도인 집회는 하느님의 약속에 대한 믿음을 기르는 데 도움이 된다 (히 10:24, 25)", "여호와의 증인은 여러분이 여호와에 대해 더 배우고 그분을 섬기면서 가장 큰 기쁨을 얻도록 기꺼이 도와줄 것이다 (시 16:8, 9)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2024 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 103 10/24"]}]}, {"no": 104, "title": "부모 여러분—여러분은 내화 재료로 건축하고 있습니까?", "t": 2, "note": "", "sections": [{"title": "부모들에게 교훈을 주는 비유", "points": ["그리스도인 부모에게는 자녀들이 여호와를 사랑하고 섬기도록 가르칠 특별한 책임이 있다", "부모는 자녀가 세상의 영향을 저항하고 잘못된 경향을 극복하도록 도와야 한다 (창 8:21; 요1 5:19)", "부모는 어떻게 자신의 책임을 잘 이행할 수 있는가? 성경의 한 비유에서 교훈을 얻을 수 있다 [고린도 전서 \n3:12, 13 낭독]", "자녀가 진리에 굳게 서도록 양육하는 것은 내구성이 좋은 건물을 건축하는 것과 같다. 두 경우 모두 내화 재료가 필요하다"]}, {"title": "내화 재료란 무엇인가?", "points": ["고린도 전서의 비유는 두 종류의 건축 재료를 대조한다. 인화성 재료와 내화 재료이다 (고전 3:12 「신세연」 연구 노트)", "불은 하느님에 대한 믿음과 사랑을 시험하는 압력과 유혹을 의미한다", "내화 재료는 시험을 받아도 하느님께 충성을 유지하도록 도와주는 믿음, 지혜, 사랑과 같은 훌륭한 특성들을 의미한다 (잠 3:13-15; 벧전 1:7; 요1 5:3)", "문자적인 내화 재료는 값이 비싸다. 이와 비슷하게 자녀들이 내화 재료와 같은 특성들을 기르도록 도우려면 시간과 노력이 많이 든다"]}, {"title": "내화 재료로 건축하는 방법", "points": ["자녀를 하느님의 말씀으로 가르치라 (잠 22:6)", "자녀를 “유아기부터” 훈련하라 (딤후 3:15)", "자녀를 가르칠 때 예수의 본을 강조하라 (고전 3:11; 「파20.10」 29-31면 12-18항)", "가족 숭배는 정기적이고 실용적이고 즐거워야 한다 (「파09」 10/15 29-31면) [시각 자료 1]", "가족 숭배 시간을 사용해 자녀들이 믿음의 시험에 대비하도록 도와주라", "자녀들에게 개인 성서 연구를 하는 방법과 연구 도구를 사용하는 방법을 가르치라", "본을 통해 가르치라 (신 6:5, 6; 「파07」 5/15 15면 3-5항)", "좋은 본을 통해 여호와의 법에 순종하는 것이 지혜롭다는 것을 보여 주라", "자녀는 부모의 말과 행동이 일치하는지 쉽게 알아차린다 (롬 2:21; 「파22.05」 28면 7-9항)", "자녀들이 기도하도록 가르치고 함께 기도하라", "가족이 함께 정기적으로 그리스도인 집회에 참석하고 야외 봉사에 참여하라 [시각 자료 2]", "자녀들의 마음을 감동시키라", "자녀와 자주 대화하고 그들의 말을 잘 들어 주라 (신 6:7; 약 1:19; 「파16.09」 29-30면 6-8항)", "자녀가 편안하게 자신의 감정을 표현하게 해 주라 (잠 20:5; 「파16.09」 29면 3-5항) [시각 자료 3]", "자녀가 믿음을 기르도록 도우면서 참을성을 나타내라 (「파17.12」 19-20면 6-9항)", "각 자녀의 필요에 맞게 가르치는 방식을 조정하라 (시 127:4; 「파19.12」 26면 20항)", "사랑에 찬 징계를 베풀라 (잠 13:24; 「파04」 7/15 31면 3항)", "징계에는 교훈, 지도, 시정을 베푸는 것이 포함된다", "징계는 일관성이 있고 합리적이고 친절해야 한다. 결코 지나치거나 가혹해서는 안 된다 (고전 13:4; \n골 3:21; 「깨18.2」 9면)"]}, {"title": "내화 재료로 건축할 때 따르는 상", "points": ["여호와의 도움으로 부모는 “능숙한 건축가”가 될 수 있다 (고전 3:10)", "부모는 여호와께 힘을 주실 것과 자신의 노력을 인도해 주실 것을 간청해야 한다 (삿 13:8-10; 「파15」 11/15 7면 15항)", "부지런한 부모는 자녀를 내화 재료로 건축하려는 자신의 노력이 성공을 거둘 것임을 기대할 수 있다 \n[고린도 전서 3:14 낭독]", "청소년 자녀가 여호와를 섬기지 않기로 결정하더라도, 충실한 부모는 여호와께서 자신을 소중히 여기신다는 것을 확신할 수 있다 (고전 3:15)", "부모들은 내화 재료로 건축할 때 따르는 상을 영원히 누리게 될 것이다!", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 104 1/23"]}]}, {"no": 105, "title": "물질 풍요의 세상에서 도도 만족하는 하느님의 목표", "t": 9, "note": "물질 만능주의의 영향을 경계하고 하느님을 가까이하도록 격려한다", "sections": [{"title": "물질 풍요가 가져오는 위험", "points": ["재물이 우리의 마음을 사로잡을 수 있다 (마 6:24)", "부유해질수록 하느님을 잊을 위험이 있다 (신 8:11-14)"]}, {"title": "진정한 만족의 원천", "points": ["물질이 아닌 하느님과의 관계에서 만족을 찾는다 (빌 4:11-13)", "단순한 생활 방식이 행복을 가져다준다"]}, {"title": "우선순위를 바르게 정하라", "points": ["먼저 왕국을 구하라 (마 6:33)", "가장 중요한 것에 시간과 에너지를 투자하라"]}, {"title": "하느님의 목표를 삶의 목표로 삼으라", "points": ["전도 사업에 적극 참여한다", "영적 목표를 설정하고 추구한다"]}]}, {"no": 106, "title": "여호와와 사람—어떻게 함께 일하는가?", "t": 0, "note": "여호와와 협력하여 일하는 특권과 책임에 대해 설명한다", "sections": [{"title": "여호와께서 인간과 협력하여 일하신다", "points": ["여호와는 자신의 목적을 이루기 위해 인간을 사용하신다 (사 43:10)", "이것은 놀라운 특권이다"]}, {"title": "효과적으로 협력하는 방법", "points": ["여호와의 지시에 주의를 기울인다", "성경 연구와 기도를 규칙적으로 한다", "회중과 협력하여 일한다"]}, {"title": "협력의 걸림돌", "points": ["자신의 생각을 여호와의 생각보다 앞세우는 것", "두려움이나 자기 불신", "세상의 영향"]}, {"title": "협력의 결과와 보상", "points": ["왕국 소식이 전파된다", "우리 자신이 영적으로 성장한다", "여호와의 기쁨이 된다"]}]}, {"no": 107, "title": "당신은 훈련받은 양심을 통해 유익을 얻고 있는가?", "t": 9, "note": "", "sections": [{"title": "양심이란 무엇인가?", "points": ["여호와께서는 인간을 창조하실 때 옳고 그른 것을 판단하는 내면의 감각인 양심을 넣어 주셨다 [로마서 2:14, 15 낭독] (「랑쉬」 17면 3항)", "우리는 양심을 사용해서 여호와와의 관계를 강화하고 보호해야 한다", "양심이 제 기능을 발휘하려면 양심을 잘 훈련해야 한다 (「파18.06」 16면 2-3항)", "양심을 잘 훈련하지 않거나 양심의 소리를 반복적으로 무시한다면, 양심이 우리를 올바로 인도할 수 없다\n(딤전 4:1, 2; 딛 1:15, 16)"]}, {"title": "어떻게 양심을 훈련할 수 있는가?", "points": ["여호와의 시각으로 보는 법을 배움으로 양심을 훈련하라", "하느님의 법을 사랑하고 존중하는 마음을 기르라 (시 119:97, 98; 롬 12:9; 「파18.06」 17면 5-7항)", "죄에 따르는 해로운 영향과 순종할 때 오는 좋은 결과를 묵상한다", "성경 원칙을 찾아 보고 그에 근거해 생각해 보라 (사 48:17, 18; 히 5:14; 「파18.06」 18면 9-10항)", "성경 원칙에 근거하여 양심을 훈련하면, 구체적인 성경의 법이 없는 경우에도 여호와를 기쁘시게 하는 결정을 내릴 수 있다 (엡 5:17; 「랑쉬」 8-9면 8-9항)"]}, {"title": "사탄의 세상이 양심을 더럽히지 못하게 하라", "points": ["사탄은 사람들이 여호와의 표준을 배척하도록 부추긴다 (엡 2:1-3)", "그로 인해 많은 사람들의 양심은 기능을 발휘하지 못한다 (사 5:20; 엡 4:17-19)", "사탄의 세상이 성경으로 훈련받은 양심을 더럽히는 일을 어떻게 막을 수 있는가?", "대중을 따르게 만드는 압력을 저항하라 (출 23:2; 잠 1:10, 15)", "오늘날 동성애와 같은 부도덕이 널리 용인되고 있지만 하느님의 표준은 변하지 않았다 (말 3:6; 고전 6:9, 10)", "다른 사람의 조롱을 받더라도 여호와를 기쁘시게 하겠다고 결심하라 [베드로 전서 3:16 낭독] (벧전 4:4)", "잘못된 행동을 특징으로 하는 오락을 피하라", "영화, 음악, 비디오 게임, 소셜 미디어가 우리의 생각과 행동에 영향을 줄 수 있다", "잘못된 행동에 반복적으로 노출되면 그것을 받아들일 만한 것으로 여기게 될 수 있다 (롬 12:2)"]}, {"title": "양심을 통해 어떤 유익을 얻을 수 있는가?", "points": ["양심은 잘못을 한 후에 가책을 느끼게 하는 것보다 훨씬 더 많은 역할을 한다", "아담과 하와와 유다는 죄를 지은 후 죄책감을 느꼈지만 그들의 양심은 잘못된 행동을 막지는 못했다 \n(창 3:8; 마 27:3, 4)", "훈련받은 양심이 어떻게 훨씬 더 유익한 기능을 하는지 세 가지 면을 살펴보자", "(1) 양심은 여호와를 불쾌하시게 하는 일을 중단하게 할 수 있다", "여호와의 표준을 배우면서 양심의 소리에 귀를 기울이고 그대로 행동하라 (행 3:19)", "삭개오는 자신의 과거 행동을 후회했을 뿐 아니라 행실을 변화시켰다 (눅 19:8)", "심각한 죄를 저질렀다면 여호와와의 관계를 회복하기 위해 신속히 행동하라 (잠 28:13)", "(2) 양심은 죄를 짓지 않도록 미리 경고해 줄 수 있다", "요셉의 양심은 그가 성적 부도덕을 물리치게 해 주었다 (창 39:9-12; 「파22.08」 26면 2항) \n[시각 자료 1]", "(3) 양심은 다른 사람에게 선한 일을 할 동기를 갖게 해 줄 수 있다 [디모데 전서 1:5 낭독]", "다른 사람을 걸려 넘어지게 할 수 있는 행동을 하지 않음으로 사랑을 나타낼 수 있다 (롬 14:21; \n고전 8:12; 「파04」 9/1 11면 15항)", "양심의 작용으로 마음이 움직여 모든 기회에 좋은 소식을 전한 사도 바울을 본받으라 (롬 1:14; \n고전 9:16; 「파15」 9/15 12면 16항) [시각 자료 2]", "정확한 성경 지식에 따라 양심을 훈련하는 일을 결코 중단하지 말라 (골 1:9, 10)", "그렇게 할 때 여호와께 더 가까이 가게 되고 “그분을 온전히 기쁘시게” 하면서 행복을 누리게 될 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 107 1/23"]}]}, {"no": 108, "title": "당신도 확신을 가지고 미래를 맞이할 수 있다!", "t": 8, "note": "", "sections": [{"title": "성경은 우리가 어떻게 확신을 가지고 미래를 맞이할 수 있는지 알려 준다", "points": ["우리가 겪는 어려움들은 너무 커 보일 수 있다", "세계적인 전염병, 전쟁, 난민 위기, 경제의 붕괴, 기후 변화와 같은 문제들 때문에 많은 사람은 인류의 미래를 두려워한다", "자연재해나 건강 문제, 실직과 같은 상황이 갑자기 일어나 우리와 가족들의 미래에 대해 염려하게 만들 수 있다", "성경은 우리가 어떻게 확신을 가지고 미래를 맞이할 수 있는지 알려 준다 [시편 46:1, 2 낭독]", "세상 상태가 갈수록 나빠지고 개인적인 시련을 겪더라도 여호와 하느님을 신뢰한다면 확신을 유지할 수 있다 (시 112:7)"]}, {"title": "하느님은 우리가 확신을 가지고 미래를 맞이하도록 어떻게 도우시는가?", "points": ["(1) 하느님은 미래에 대한 놀라운 희망을 주셨다 (시 37:29; 사 65:21-23) [시각 자료 1]", "사망한 수많은 사람들도 유익을 얻을 것이다 (행 24:15)", "그 무엇도 하느님이 자신의 약속을 성취하시는 것을 막을 수 없다 (사 55:11)", "(2) 하느님은 현재 우리에게 도움을 베푸신다 [시편 73:23, 24 낭독] (「파13」 2/15 25면 3항)", "그분은 우리가 어려움에 가장 잘 대처할 수 있도록 지혜를 주신다 (약 1:5)", "그분은 주로 그분의 말씀인 성경을 통해 지혜를 주신다", "그분은 오래 참음과 믿음과 같은 좋은 특성들을 기르게 도와주셔서 우리가 지나친 염려에 빠지지 않게 해 주신다 (갈 5:22, 23)", "그분은 “하느님의 평화”, 즉 오직 그분만이 주실 수 있는 내적 평온함을 누리게 해 주신다 (빌 4:6, 7) [시각 자료 2]", "그분은 심각한 문제들에 대처할 수 있는 힘과 용기를 주신다 (엡 3:16; 6:10)", "(3) 하느님은 세계적으로 연합된 형제 자매들을 통해 그분을 신뢰하는 사람들을 지원하신다 (벧전 5:9)", "여호와의 증인은 특히 어려운 때에 서로를 격려하고 지원한다 (살전 5:11) [시각 자료 3]", "그들은 서로에 대한 사랑을 행동으로 증명한다 (요1 3:18)", "[미래에 대한 확신을 가진 여호와의 증인 2명이 나오는 3분 분량의 동영상을 청중에게 보여 준다. 그 후 그 증인들이 여호와를 신뢰하여 어떤 유익을 얻었는지 언급한다]"]}, {"title": "어떻게 하느님을 당신의 “도피처와 힘”으로 삼을 수 있는가?", "points": ["(1) 성경을 연구함으로 여호와를 사랑 많은 아버지로 여기는 법을 배우라", "그분의 가르침을 배우고 따르라 (사 48:17, 18)", "여호와의 증인과 함께 무료로 성경을 공부함으로 성경을 더 깊이 알아보라", "하느님이 성경 시대에 충실한 사람들을 어떻게 도와주셨는지, 그리고 오늘날 어떻게 그렇게 하고 계신지 보면서 하느님에 대한 신뢰심이 강해질 것이다 (사 26:3)", "(2) 하느님이 도와주실 것을 확신하면서 그분께 염려를 내맡기라 [베드로 전서 5:6, 7 낭독] (「파08」 3/15 13면 8항)", "기도로 그분의 성령을 청하라 (눅 11:13)", "하느님은 지금 당장 모든 시련을 없애 주지는 않으실지 모르지만, 우리가 그 어떤 시련을 겪든 대처할 수 있는 힘과 지혜를 주실 것이다 (고전 10:13)", "(3) 가족과도 같은 전 세계적인 여호와의 증인 조직과 연합하라", "다른 그리스도인들과 정기적으로 교제를 나누면 여호와에 대한 신뢰심이 강해질 것이다 (히 10:24, 25)", "당신은 “고난의 때”에 서로를 지원해 주는 사랑 많은 친구들을 많이 얻게 될 것이다 (잠 17:17)", "여호와께 희망을 두는 모든 사람은 결코 실망하지 않을 것이다! (시 27:14; 딤전 4:10)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 108 10/23"]}]}, {"no": 109, "title": "하느님의 왕국은 가까워졌다", "t": 0, "note": "왕국이 곧 지구에서 통치를 시작할 것임을 청중이 이해하도록 돕는다", "sections": [{"title": "왕국이 가까웠다는 증거", "points": ["예수께서 왕국이 가까웠음을 선포하셨다 (마 4:17)", "예언된 징조들이 오늘날 이루어지고 있다"]}, {"title": "왕국이 이루어질 일들", "points": ["모든 고통과 불의가 없어질 것이다 (계 21:4)", "지구가 낙원으로 회복될 것이다"]}, {"title": "왕국을 위해 지금 무엇을 해야 하는가?", "points": ["왕국 소식을 전파하는 일에 참여한다", "왕국의 가치관과 원칙에 따라 산다", "왕국이 올 것을 확신하고 기대한다"]}, {"title": "왕국의 도래를 앞당기는 행동", "points": ["기도한다 (마 6:10)", "전도 활동에 적극 참여한다"]}]}, {"no": 110, "title": "하느님의 청호도 동역할 수 있다", "t": 7, "note": "", "sections": [{"title": "하느님의 목적에 동참하는 특권", "points": ["우리는 하느님의 동역자가 될 수 있다 (고전 3:9)", "이것은 놀라운 특권이다"]}, {"title": "어떻게 동역할 수 있는가?", "points": ["전도 활동에 참여한다", "다른 사람들을 가르치고 돕는다", "재정적으로 왕국 사업을 지원한다"]}, {"title": "동역의 어려움과 극복 방법", "points": ["두려움을 극복하고 담대하게 행동한다", "시간과 우선순위를 잘 조정한다"]}, {"title": "동역의 보람과 결과", "points": ["하느님과 가까워진다", "다른 사람들이 진리를 알게 된다", "영원한 생명의 희망을 갖는다"]}]}, {"no": 111, "title": "인류를 완전히 치료하는 일—어떻게 가능한가?", "t": 6, "note": "", "sections": [{"title": "인류는 치료가 필요하다", "points": ["의학 기술이 발전했지만 매년 수많은 사람들이 심장 질환, 암, 당뇨병과 같은 질병들 때문에 사망한다 [당신의 지역에서 흔히 볼 수 있는 질병을 언급할 수 있다]", "그뿐만 아니라 인류는 영적으로 병든 상태이다. 대부분의 사람이 하느님과 좋은 관계를 맺지 못하고 있다", "그 결과 이 세상은 이기심과 악으로 가득 차 있다 (딤후 3:1-5)", "성경은 인류가 겪는 고난의 근본 원인과 하느님이 베푸실 완전한 치료책을 알려 준다"]}, {"title": "질병, 죽음, 악의 근본 원인", "points": ["아담과 하와는 완전한 건강을 누리며 영원히 살 전망을 갖고 있었다 (창 2:16, 17)", "그들은 고의로 하느님께 죄를 지었으며 그 결과 불완전해지고 늙고 죽게 되었다 (창 3:6, 19)", "아담의 불완전성을 유전받았기 때문에 우리도 늙고 죽는다 [로마서 5:12 낭독]", "우리는 불완전성으로 인해 죄와 잘못을 저지르는 경향도 있다 (창 8:21; 마 15:19)", "여호와께서는 에덴에서 일어난 반역으로 초래된 모든 해를 바로잡기 위해 조처를 취하셨다"]}, {"title": "하느님께서는 우리가 살 수 있도록 자신의 아들을 주셨다", "points": ["여호와께서는 우리의 죗값을 치르기 위해 아들 예수를 보내셨다 [로마서 6:23 낭독] (사 53:4, 5)", "예수께서는 우리를 위해 자신의 생명을 기꺼이 바치셨다 (마 20:28)", "예수께서는 완전한 인간이었으며 “아무 죄도 짓지 않으셨다” (벧전 2:21, 22)", "그분은 아담으로 인해 그의 후손들이 잃어버린 완전하고 영원한 생명의 전망을 도로 사기 위해, 자신의 완전한 인간 생명의 가치를 사용하셨다 (롬 5:18, 19; 벧전 2:24)"]}, {"title": "완전한 치료가 보장되어 있다!", "points": ["예수께서는 이 땅에 계실 때 미래에 있을 완전한 치료를 미리 보여 주셨다", "그분은 사람들을 신체적으로 치료해 주셨고 죽은 사람들을 부활시키셨다 (마 4:23, 24; 눅 7:12-15) \n[시각 자료 1]", "가장 중요한 점으로 예수께서는 하느님에 관한 진리를 가르침으로 사람들을 영적으로 치료해 주셨다.\n그 덕분에 그들은 하느님의 승인을 얻고 영원한 생명의 희망을 가질 수 있게 되었다 (눅 5:31, 32) \n[시각 자료 2]", "인류를 완전히 치료하기 위한 여호와의 마련들은 “생명수의 강”과 그 강가에 있는 “생명나무”로 상징되어 있다 [요한 계시록 22:1, 2 낭독] (「파10」 2/15 15면 4-6항) [시각 자료 3]", "이 마련들은 예수 그리스도의 희생에 근거해 있다", "하느님의 왕국의 천년 통치 기간 동안, 순종하는 인류는 유전받은 죄와 그 영향으로부터 완전히 벗어나게 될 것이다 (계 21:3-5; 「파22.05」 18면 16항)", "“기념 무덤”에 있는 사람들 즉 죽어 잠들어 있는 사람들도 부활되어 영원한 생명을 얻을 기회를 갖게 될 것이다 (요 5:28, 29)"]}, {"title": "당신도 치료될 사람들 가운데 포함될 것인가?", "points": ["당신은 지금부터 영적으로 치료받을 수 있다 (계 22:17; 「파09」 2/15 5면 6항)", "성서 연구를 함으로 “생명수를 거저 마시라”", "여호와의 증인은 당신이 생명을 주는 성경 지식을 얻도록 기꺼이 도울 것이다 (요 17:3)", "성경 진리를 배우면 하느님의 약속에 대한 믿음을 기르고 그리스도와 같은 “새 인간성”을 입게 될 것이다 (골 3:8-10; 롬 10:17)", "예수의 희생에 대한 믿음을 행동으로 나타내고 여호와와 가까운 관계를 맺어 나가라 (요 3:36; 골 1:20, 21; 「파14」 2/15 22면 5항)", "지금 여호와의 친구가 되면 그분과 그분의 아들이 미래에 인류를 완전히 치료해 주실 때 유익을 얻게 될 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2023 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 111 1/23"]}]}, {"no": 112, "title": "이기적인 세상에서 사랑을 나타내는 방법", "t": 3, "note": "", "sections": [{"title": "그리스도인이 이기심이 아니라 사랑을 나타내는 이유", "points": ["오늘날 세상에는 이기심이 만연해 있으며, 그로 인해 많은 해가 초래된다 (딤후 3:1-5)", "이기심은 자신에게 해를 입히고 안타까운 결과를 가져오는 특성이다", "이기적으로 돈과 소유물을 모으는 사람은 결코 만족하지 못한다 (전 5:10; 딤전 6:9, 10)", "이기적으로 성적 쾌락을 추구하는 사람은 자신과 다른 사람에게 고통과 해를 입히게 된다 (고전 6:18)", "진정한 그리스도인들은 이 세상의 이기적인 태도를 물리친다", "그들은 사랑 그 자체이신 여호와를 본받는다 (엡 5:1; 요1 4:8)", "그들은 모든 일에서 하느님의 사랑을 반영하신 예수를 본받는다 (요 13:34, 35; 벧전 2:21)", "여호와와 예수께서는 비이기적으로 주는 일을 하기 때문에 행복하시다 (행 20:35; 딤전 1:11)", "우리가 진정으로 행복하려면 그분들을 본받기 위해 최선을 다해야 한다. 성경은 그 방법을 알려 준다"]}, {"title": "비이기적인 사랑은 어떻게 행동하는가?", "points": ["성경은 그리스도인 사랑이 있다면 어떻게 행동하고 어떻게 행동하지 않는지 알려 준다 [고린도 전서 13:4-7 낭독]", "[「여호와께 가까이 가십시오」 302-307면 8-20항의 내용을 사용하여 이 구절들에 대해 설명한다. 연구 노트가 자신의 언어로 나와 있다면 그 내용도 참조할 수 있다. 아래에는 네 가지 표현만 나오지만 시간이 되는 대로 더 많은 표현을 다룰 수 있다. 실제적인 예와 간단한 경험담을 사용하여 사랑을 어떻게 나타낼 수 있는지, 그리고 그렇게 하는 것이 왜 유익한지 설명한다]", "사랑은 무엇이며 어떻게 행동하는가?", "“사랑은 오래 참고 친절합니다”", "오래 참음과 친절은 하느님의 영이 산출하는 특성들이다 (갈 5:22)", "오래 참음 즉 참을성에는 목적을 가지고 인내하는 것과 분노하기를 더디 하는 것이 포함된다. 여호와와 예수께서는 사람들을 대하실 때 언제나 오래 참음을 나타내신다", "친절에는 다른 사람들에 대해 적극적인 관심을 보이는 것과 그들의 필요에 대해 부드럽고 우호적인 방식으로 사려 깊음과 배려를 나타내는 것이 포함된다", "“모든 것을 참고”", "이 표현은 문자적으로 “모든 것을 덮고”를 의미한다. 예를 들어 사랑은 누군가의 사소한 잘못을 덮어 주며 그러한 잘못을 다른 사람에게 알리지 않는다 (벧전 4:8)", "사랑은 무엇이 아니며 어떻게 행동하지 않는가?", "“사랑은 질투하지 않고”", "질투심은 이기적이고 파괴적인 감정이기 때문에 평화를 깨뜨릴 수 있다", "사랑은 다른 사람에게 좋은 일이 있을 때 함께 기뻐하는 데 도움이 된다 (롬 12:15; 약 4:5)", "“사랑은 ··· 자기 유익을 구하지 않고”", "사랑은 오늘날 세상에 만연해 있는 이기심과 반대되는 특성이다 (엡 2:2)", "사랑이 있는 사람은 자기 자신만의 방식을 고집하지 않으며, 다른 사람이 그 방식을 따르도록 강요하지도 않는다", "우리에게 사랑이 있다면 젊은 사람, 연로한 사람, 병약한 사람을 포함해 다른 사람들에게 관심을 나타낼 것이다 (고전 10:24) [시각 자료 1]", "우리는 사랑을 왜 “탁월한 길”이라고 부르는지 이해할 수 있다 (고전 12:31)"]}, {"title": "“사랑은 결코 없어지지 않습니다”", "points": ["“사랑은 결코 없어지지 않는다.” 즉 사라지지 않는다. 사랑은 여호와 하느님에게서 나오는 특성이며 그분은 영원히 존재하시기 때문이다 (고전 13:8)", "더 강한 사랑을 기르기 위해 계속 노력하라", "솔선해서 사랑을 나타내라 (골 3:13, 14)", "우리가 사랑을 나타내면 다른 사람들도 사랑을 나타내도록 그들의 마음을 움직일 수 있다 (눅 6:38)", "사랑을 나타내면 설령 다른 사람이 변하지 않는다 해도 우리 자신에게 언제나 유익하다", "여호와께서는 우리가 나타내는 사랑의 행동을 단 하나도 잊지 않으실 것이다 (잠 19:17; 히 6:10)", "오늘날 세상에 만연해 있는 이기적인 태도를 계속 멀리하라!", "매일 사랑을 나타낸다면 사랑 많으신 창조주를 기쁘게 해 드릴 수 있을 것이다", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 112 10/25"]}]}, {"no": 113, "title": "청소년들은 어떻게 행복하고 성공적인 삶을 살 수 있는가?", "t": 2, "note": "", "sections": [{"title": "지혜로운 결정을 내리는 방법", "points": ["여호와 하느님은 여러분이 행복하기를 바라신다 [전도서 11:9 낭독]", "청소년 시기는 인생에서 매우 행복한 시기가 될 수 있다. 하지만 자신이 한 행동에 대해 하느님께 책임을 져야 한다는 것을 기억해야 한다", "하느님은 여러분이 지혜롭게 행동할 때 상을 주기를 열망하신다 (시 37:4)", "청소년들이 지금 내리는 결정은 미래에 누릴 행복에 영향을 미친다 (갈 6:7)", "어떤 청소년들은 스스로에게 해를 입히는 행동에 빠져 고통스러운 결과를 겪는다", "창조주의 인도에 따라 결정을 내리면 지혜롭게 행동할 수 있다 (전 11:10; 12:1; 딤후 3:16, 17)", "하느님의 말씀인 성경이 어떤 세 가지 부면에서 신뢰할 만한 지침을 알려 주는지 살펴보자"]}, {"title": "친구 선택", "points": ["여러분의 친구는 여러분에게 큰 영향을 미친다 [잠언 13:20 낭독]", "건전한 가치관을 가지고 있고 본받을 만한 특성들을 가진 사람을 친구로 사귀라 (고전 15:33)", "여러분에게 나쁜 영향을 주는 사람을 친구로 사귀지 말라. 무조건 친구들이 시키는 대로 해서는 안 된다\n(롬 12:2)", "다양한 나이와 배경을 가진 사람들 가운데서 자신에게 좋은 영향을 줄 수 있는 친구들을 찾으라 (삼상 18:1) \n[시각 자료 1]", "여러분 자신이 좋은 친구가 되는 데 필요한 특성들을 기르기 위해 노력하라 (잠 10:19; 18:24)"]}, {"title": "성과 관련된 결정", "points": ["인간의 성은 하느님이 주신 선물이다 (잠 5:18)", "여러분이 그 선물에 대해 존중심을 보일 때 그분은 여러분을 풍성히 축복해 주실 것이다 (고전 6:18; 살전 4:3)", "부도덕한 행동을 거부하기 위해 단호하게 행동하라 (창 39:7-12; 「묻2」 50면) [시각 자료 2]", "성욕을 제어하는 법을 배우라 [데살로니가 전서 4:4 낭독]", "그렇게 하는 데 어려움을 겪고 있다면, 부모님이나 영적으로 장성한 벗에게 도움을 요청하라", "성과 관련해 지혜로운 결정을 내리면 자중심을 유지할 수 있고, 미래에 가슴 아픈 일을 겪지 않을 수 있으며, 하느님을 기쁘시게 해 드릴 수 있다"]}, {"title": "미래를 위한 목표", "points": ["부와 명성을 얻으려고 애쓰는 사람들은 흔히 만족하지 못하고 좌절을 겪는다 (전 5:10)", "종말이 정해진 불안정한 세상에서 안정된 미래를 누리려고 애쓸 이유가 무엇이겠는가? [요한 1서 2:15-17 낭독]", "오늘날 세상에 있는 그 어떤 것도 여러분이 미래에 누릴 축복에 비할 수 없다 (막 10:29, 30; 딤전 6:19)", "비이기적인 활동들을 중심으로 살아가면서 기쁨을 맛보라 (행 20:35)", "하느님의 뜻을 생활에서 첫째 자리에 두는 사람은 진정한 만족감을 느낀다 (딤전 6:6, 9; 딤후 2:22)", "다른 사람들이 여호와를 알도록 도우면 큰 기쁨을 얻게 된다"]}, {"title": "미래에 행복한 삶을 누리기 위해 지금 행동하라", "points": ["여호와와 개인적으로 친밀한 관계를 맺기 위해 노력하라", "여호와에 대한 강한 사랑을 가지면 그분께 충성을 지킬 수 있다 (단 1:6-20) [시각 자료 3]", "성경이 하느님의 영감을 받은 책인지 직접 확인해 보라", "성경 원칙을 어떻게 적용할 수 있는지 그리고 그렇게 하는 것이 왜 유익한지 계속 배워 나가라 (딤전 4:12, 15)", "잘 발전하여 헌신하고 침례를 받으려는 목표를 세우라", "여호와께서는 여러분이 기울이는 노력을 축복하실 것이며, 여러분이 진정으로 행복하고 성공적인 삶을 살도록 도와주실 것이다 (잠 3:5, 6)", "[골자에 밀접히 고착하고 각 부분에 표시된 시간을 지켜야 한다. 참조된 성구를 모두 낭독하거나 설명할 필요는 없다. \n「전도 학교」 책 52-55, 166-169면 참조]", "30분에 다룰 것", "© 2020 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 113 10/20"]}]}, {"no": 114, "title": "하느님의 경이로운 창조물을 인식하라", "t": 0, "note": "창조물을 통해 여호와의 성품과 능력을 알 수 있도록 도와준다", "sections": [{"title": "창조물이 하느님에 대해 무엇을 나타내는가?", "points": ["창조물은 하느님의 능력과 지혜를 나타낸다 (롬 1:20)", "창조물의 복잡성과 아름다움은 설계자가 있음을 보여 준다"]}, {"title": "창조물의 놀라운 면들", "points": ["인체의 정교한 설계", "자연계의 균형과 조화", "우주의 광대함과 정확성"]}, {"title": "창조물 감상이 우리에게 주는 유익", "points": ["하느님에 대한 지식이 깊어진다", "감사와 경외감이 커진다", "하느님을 더 신뢰하게 된다"]}, {"title": "창조 지식을 다른 사람들과 나누어라", "points": ["창조물에 관해 다른 사람들과 이야기한다", "창조주에 대한 믿음을 전파한다"]}]}, {"no": 115, "title": "사탄의 교활한 행위로부터 자신을 보호하십시오", "t": 3, "note": "", "sections": [{"title": "사탄은 누구인가?", "points": ["사탄은 강력하고 보이지 않는 영적 피조물이며, 하느님께 반역했다", "그의 동기는 교만, 야망, 숭배받고 싶은 욕망이다", "사탄은 우리가 여호와와 누리는 관계를 손상시키고 싶어 한다 [베드로 전서 5:8 낭독]", "사탄은 자기처럼 우리도 여호와의 표준을 무시하는 반역자가 되기를 원한다 (계 12:9)", "사탄과 그를 본받는 자들은 조만간 모두 사라질 것이다 (계 12:12)"]}, {"title": "사탄은 어떻게 우리에게 영향을 주려고 하는가?", "points": ["사탄은 강제로 우리가 그를 본받게 할 수 없다", "사탄은 우리가 여호와를 숭배하는 것을 중단하게 하려고 교활한 계략들을 고안해 냈다 (고후 2:11)", "사탄은 이 세상을 지배하고 있으며, 세상을 이용해 사람들을 속이고 그들에게 압력을 가한다 [요한 1서 5:19 낭독]", "그는 거짓 종교를 이용해 사람들이 여호와에 대한 진리를 알지 못하게 한다 (행 20:29, 30; 고후 4:4; 「파19.06」 5면 11항)", "그는 이기적인 욕망을 자극하는 것들을 이용해 사람들을 유혹한다 (요1 2:15, 16)", "음란물 (「파19.06」 27면 4-7항)", "부와 소유물 (「파19.01」 17면 9항)", "독립적인 태도 (「파16.05」 4면 4항)", "그는 사람에 대한 두려움을 이용한다 (계 2:10; 「파22.06 」 16-17면 11-12항)"]}, {"title": "사탄의 교활한 행위로부터 어떻게 자신을 보호할 수 있는가?", "points": ["우리 자신을 보호하려면, 여호와께서 주시는 영적 갑주를 입어야 한다 [에베소서 6:11 낭독] [시각 자료 1]", "온전히 보호받으려면, 각 부분을 모두 착용해야 한다 [시각 자료 2]", "성경 진리를 배움으로 “진리의 허리띠”를 두른다 (엡 6:14ㄱ; 「파18.05」 28면 3-4항)", "여호와의 표준에 따라 살아감으로 “의의 흉갑”을 입는다 (엡 6:14ㄴ; 「파18.05」 28면 6-7항)", "“발에는 평화의 좋은 소식을 전할 준비의 신”을 신는다 (엡 6:15; 「파21.03」 27면 8항)", "여호와에 대한 신뢰심을 강화함으로 “믿음의 큰 방패”를 든다 (엡 6:16; 「파21.03」 28면 9항)", "왕국 희망에 계속 초점을 맞춤으로 “구원의 투구”를 쓴다 (엡 6:17ㄱ; 「파18.05」 30-31면 15-17항)", "“영의 칼”을 능숙하게 사용하는 방법을 배운다 (엡 6:17ㄴ; 「파21.03」 29면 11항)"]}, {"title": "여호와께서는 우리 편이다", "points": ["우리가 사탄을 물리치면 여호와께서 기뻐하신다", "여호와께서는 우리가 “마귀를 대적하”도록 도와주실 것이다 [야고보서 4:7, 8 낭독]", "여호와께 기도로, 그분을 기쁘시게 해 드리려고 노력하는 자신과 다른 사람들을 도와 달라고 계속 청하라 (엡 6:18)", "여호와를 온전히 의지한다면, 사탄의 교활한 행위에도 불구하고 그를 물리칠 수 있을 것이다 (롬 8:31, 38, 39; 요1 2:17)", "[골자에 밀접히 고착하고, 각 부분에 할당된 시간을 지켜야 한다. 참조된 성구를 모두 낭독할 필요는 없다. 「공개 강연 연사 유의 사항」(S-141) 참조)]", "30분에 다룰 것", "© 2025 Watch Tower Bible and Tract Society of Pennsylvania", "S-34-KO No. 115 1/25"]}]}, {"no": 116, "title": "친구를 지혜롭게 선택하라!", "t": 9, "note": "교제가 우리의 영성에 미치는 영향을 이해하도록 돕고 현명한 교제 선택을 격려한다", "sections": [{"title": "교제가 우리에게 미치는 영향", "points": ["나쁜 교제는 좋은 습관을 망친다 (고전 15:33)", "함께하는 사람들이 우리의 사고방식과 행동에 영향을 미친다"]}, {"title": "어떤 친구를 선택해야 하는가?", "points": ["여호와를 사랑하고 그분의 말씀에 따라 사는 사람들 (시 119:63)", "영적
